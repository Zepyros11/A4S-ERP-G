<!doctype html>
<html lang="th">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>เที่ยวบิน / ตั๋ว — A4S-ERP</title>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="../../css/main.css" />
    <link rel="stylesheet" href="../../css/shared/assign-2pane.css" />
  </head>
  <body>
    <div class="loading-overlay" id="loadingOverlay"><div class="spinner"></div></div>
    <div class="toast" id="toast"></div>
    <div class="topbar"></div>
    <div class="page">
      <div class="page-hero page-hero--simple page-hero--compact">
        <div style="display:flex;align-items:center;gap:12px;flex-wrap:wrap">
          <h1 class="page-hero-title" style="margin:0">🛫 เที่ยวบิน / ตั๋ว</h1>
          <span class="a2p-crumb">
            <a id="backLink" href="#">← workspace</a>
            <span style="opacity:.45">|</span>
            <span id="progType" style="font-weight:600">—</span>
            <span id="progName" style="font-weight:700">กำลังโหลด...</span>
          </span>
        </div>
      </div>

      <div class="stats-row">
        <div class="stat-card"><div class="stat-icon">✈️</div><div><div class="stat-value" id="cFlights">0</div><div class="stat-label">เที่ยวบิน/กรุ๊ป</div></div></div>
        <div class="stat-card"><div class="stat-icon">✅</div><div><div class="stat-value" id="cAssigned">0</div><div class="stat-label">จัดแล้ว</div></div></div>
        <div class="stat-card"><div class="stat-icon">⏳</div><div><div class="stat-value" id="cUnassigned">0</div><div class="stat-label">ยังไม่จัด</div></div></div>
        <div class="stat-card"><div class="stat-icon">👥</div><div><div class="stat-value" id="cTotal">0</div><div class="stat-label">ผู้เดินทาง</div></div></div>
      </div>

      <!-- 2-pane: รายชื่อคน (ซ้าย) → จัดขึ้นเครื่อง (ขวา) -->
      <div class="a2p-grid">
        <div class="a2p-left">
          <div class="a2p-left-hdr">
            <div class="a2p-tabs"><button type="button" class="a2p-tab active">👥 ผู้เข้าร่วม <span class="a2p-tab-count" id="paxCount">0</span></button></div>
            <div style="display:flex;align-items:center;gap:6px">
              <span class="a2p-sel-count" id="selCount" style="display:none">0 เลือก</span>
              <button class="a2p-clear" id="clearSelBtn" style="display:none" onclick="window.clearSel()">ล้าง</button>
            </div>
          </div>
          <div class="a2p-toolbar">
            <input id="paxSearch" placeholder="🔍 ค้นหาชื่อ..." autocomplete="off" oninput="window.onPaxSearch()" />
            <select id="paxFilter" onchange="window.renderPax()">
              <option value="all">ทั้งหมด</option>
              <option value="unassigned">ยังไม่จัด</option>
              <option value="assigned">จัดแล้ว</option>
            </select>
          </div>
          <div class="a2p-list" id="paxList"><div class="a2p-empty">กำลังโหลด...</div></div>
        </div>

        <div class="a2p-right">
          <div class="a2p-right-hdr">
            <div class="a2p-tabs"><button type="button" class="a2p-tab active">✈️ เที่ยวบิน <span class="a2p-tab-count" id="flightCount">0</span></button></div>
            <div class="a2p-right-ctrls">
              <span class="a2p-hint" id="flightHint"></span>
              <button class="btn btn-primary" data-perm="program_flight_create" onclick="window.openFlightModal()">＋ เพิ่มเที่ยวบิน</button>
            </div>
          </div>
          <div class="a2p-cards" id="flightGrid"></div>
        </div>
      </div>
    </div>

    <div class="modal-overlay" id="flightOverlay">
      <div class="modal v-sage-header" onclick="event.stopPropagation()">
        <div class="modal-hdr"><div class="modal-title" id="flightModalTitle">เพิ่มเที่ยวบิน</div><button class="btn-modal-close" onclick="window.closeFlightModal()">✕</button></div>
        <div class="modal-body">
          <div class="form-group"><label class="form-label">ชื่อกลุ่ม/เที่ยวบิน <span class="req">*</span></label><input class="form-control" id="fFlightName" placeholder="เช่น กรุ๊ป A ไป-กลับ" autocomplete="off" /></div>
          <div class="form-row" style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:14px">
            <div class="form-group"><label class="form-label">เที่ยวบิน (Flight No.)</label><input class="form-control" id="fFlightNo" placeholder="TG660" autocomplete="off" /></div>
            <div class="form-group"><label class="form-label">เส้นทาง</label><input class="form-control" id="fRoute" placeholder="BKK → NRT" autocomplete="off" /></div>
          </div>
          <div class="form-row" style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:14px">
            <div class="form-group"><label class="form-label">เวลาออก (ไป)</label><input class="form-control" type="datetime-local" id="fDepart" /></div>
            <div class="form-group"><label class="form-label">เวลาออก (กลับ)</label><input class="form-control" type="datetime-local" id="fReturn" /></div>
          </div>
          <div class="form-group" style="margin-top:14px"><label class="form-label">หมายเหตุ</label><input class="form-control" id="fNote" placeholder="(ถ้ามี)" autocomplete="off" /></div>
        </div>
        <div class="modal-footer"><button class="btn btn-ghost" onclick="window.closeFlightModal()">ยกเลิก</button><button class="btn btn-primary" onclick="window.saveFlight()">💾 บันทึก</button></div>
      </div>
    </div>

    <script src="../../js/core/auth.js"></script>
    <script src="../../js/core/authz.js"></script>
    <script src="../../js/core/date-format.js"></script>
    <script>AuthZ.requirePerm("program_flight_view");</script>
    <script src="./program-flights.js"></script>
    <script src="../../js/components/modal/deleteModal.js"></script>
    <script src="../../js/components/modal/modalManager.js"></script>
    <script src="../../js/components/modal/enterSave.js"></script>
    <script src="../../js/components/navigation/sidebar.js"></script>
    <script type="module">import { loadTopbar } from "../../js/components/navigation/topbar.js"; loadTopbar("🧭 Operations");</script>
  </body>
</html>
