<!doctype html>
<html lang="th">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>รายชื่อผู้เข้าร่วม — A4S-ERP</title>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="../../css/main.css" />
    <link rel="stylesheet" href="../../css/shared/assign-2pane.css" />
    <style>
      .pp-role{display:inline-block;padding:2px 9px;border-radius:6px;font-size:11px;font-weight:600;}
      .pp-role-primary{background:#dbeafe;color:#1d4ed8;}
      .pp-role-co_applicant{background:#ede9fe;color:#6d28d9;}
      .pp-role-guest{background:#fef3c7;color:#92400e;}
      .pp-code{font-family:'IBM Plex Mono',monospace;font-size:12px;color:var(--text3);}
      .action-group{display:flex;gap:4px;justify-content:center;}
      .action-group .btn-icon{width:30px;height:30px;font-size:14px;}
      .pp-legacy-note{background:#fffbeb;border:1px solid #fde68a;color:#92400e;border-radius:10px;padding:11px 14px;font-size:12.5px;line-height:1.55;margin-bottom:14px;display:flex;align-items:center;gap:12px;flex-wrap:wrap;}
      .pp-legacy-note .btn{flex-shrink:0;}
      /* member search in modal */
      .pp-search-box{position:relative;}
      .pp-results{border:1px solid var(--border);border-radius:8px;margin-top:6px;max-height:200px;overflow-y:auto;display:none;}
      .pp-results.show{display:block;}
      .pp-result{display:flex;align-items:center;gap:10px;padding:8px 11px;cursor:pointer;border-bottom:1px solid var(--border);}
      .pp-result:last-child{border-bottom:none;}
      .pp-result:hover{background:var(--accent-pale);}
      .pp-result .nm{flex:1;font-size:13px;font-weight:600;}
      .pp-result .cd{font-family:'IBM Plex Mono',monospace;font-size:11.5px;color:var(--text3);}
    </style>
  </head>
  <body>
    <div class="loading-overlay" id="loadingOverlay"><div class="spinner"></div></div>
    <div class="toast" id="toast"></div>
    <div class="topbar"></div>
    <div class="page">
      <div class="page-hero page-hero--simple page-hero--compact">
        <div style="display:flex;align-items:center;gap:12px;flex-wrap:wrap">
          <h1 class="page-hero-title" style="margin:0">👥 รายชื่อผู้เข้าร่วม</h1>
          <span class="a2p-crumb">
            <a id="backLink" href="#">← workspace</a>
            <span style="opacity:.45">|</span>
            <span id="progType" style="font-weight:600">—</span>
            <span id="progName" style="font-weight:700">กำลังโหลด...</span>
          </span>
        </div>
      </div>

      <div id="legacyNote"></div>

      <div class="stats-row">
        <div class="stat-card"><div class="stat-icon">👥</div><div><div class="stat-value" id="cTotal">0</div><div class="stat-label">ทั้งหมด</div></div></div>
        <div class="stat-card"><div class="stat-icon">🪪</div><div><div class="stat-value" id="cMember">0</div><div class="stat-label">สมาชิก</div></div></div>
        <div class="stat-card"><div class="stat-icon">🎟️</div><div><div class="stat-value" id="cGuest">0</div><div class="stat-label">แขก</div></div></div>
        <div class="stat-card"><div class="stat-icon">✅</div><div><div class="stat-value" id="cChecked">0</div><div class="stat-label">เช็คอิน</div></div></div>
      </div>

      <div class="table-card">
        <div class="toolbar">
          <div class="search-wrap"><span class="search-icon">🔍</span><input class="search-input" id="searchInput" placeholder="ค้นหาชื่อ..." /></div>
          <div class="toolbar-right">
            <button class="btn btn-primary" data-perm="program_participant_create" onclick="window.openPaxModal()">＋ เพิ่มคน</button>
          </div>
        </div>
        <div class="table-hdr"><div class="table-title">👥 รายชื่อผู้เข้าร่วม</div><div class="table-count" id="tableCount">0 คน</div></div>
        <div class="table-wrap">
          <table class="data-table">
            <thead><tr>
              <th style="width:44px;text-align:center">#</th>
              <th>ชื่อ</th>
              <th class="col-center" style="width:130px">บทบาท</th>
              <th class="col-center" style="width:120px">รหัสสมาชิก</th>
              <th class="col-center" style="width:90px">เพศ</th>
              <th class="col-center" style="width:100px">เช็คอิน</th>
              <th class="col-center" style="width:100px">จัดการ</th>
            </tr></thead>
            <tbody id="paxBody"><tr><td colspan="7"><div class="empty-state"><div class="empty-icon">👥</div><div class="empty-text">กำลังโหลด...</div></div></td></tr></tbody>
          </table>
        </div>
      </div>
    </div>

    <!-- PAX MODAL -->
    <div class="modal-overlay" id="paxOverlay">
      <div class="modal v-sage-header" onclick="event.stopPropagation()">
        <div class="modal-hdr"><div class="modal-title" id="paxModalTitle">เพิ่มคน</div><button class="btn-modal-close" onclick="window.closePaxModal()">✕</button></div>
        <div class="modal-body">
          <div class="form-group">
            <label class="form-label">ชื่อ <span class="req">*</span></label>
            <input class="form-control" id="fName" placeholder="ชื่อ-นามสกุล" autocomplete="off" />
          </div>
          <div class="form-group pp-search-box" style="margin-top:10px">
            <button type="button" class="btn btn-ghost" style="font-size:12px" onclick="window.toggleMemberSearch()">🔍 ค้นจากสมาชิก (เติมชื่อ+รหัสให้)</button>
            <input class="form-control" id="memSearch" placeholder="พิมพ์ชื่อ/รหัสสมาชิก..." style="margin-top:8px;display:none" oninput="window.searchMembers()" />
            <div class="pp-results" id="memResults"></div>
          </div>
          <div class="form-row" style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:14px">
            <div class="form-group">
              <label class="form-label">บทบาท</label>
              <select class="form-control" id="fRole">
                <option value="primary">หลัก (primary)</option>
                <option value="co_applicant">ผู้ร่วม (co-applicant)</option>
                <option value="guest">แขก (guest)</option>
              </select>
            </div>
            <div class="form-group">
              <label class="form-label">เพศ</label>
              <select class="form-control" id="fGender"><option value="">—</option><option value="male">ชาย</option><option value="female">หญิง</option></select>
            </div>
          </div>
          <input type="hidden" id="fMemberCode" />
          <div class="form-group" style="margin-top:14px">
            <label class="form-label"><input type="checkbox" id="fChecked" style="width:15px;height:15px;vertical-align:-2px;accent-color:var(--accent)"> เช็คอินแล้ว</label>
          </div>
        </div>
        <div class="modal-footer">
          <button class="btn btn-ghost" onclick="window.closePaxModal()">ยกเลิก</button>
          <button class="btn btn-primary" onclick="window.savePax()">💾 บันทึก</button>
        </div>
      </div>
    </div>

    <script src="../../js/core/auth.js"></script>
    <script src="../../js/core/authz.js"></script>
    <script src="../../js/core/date-format.js"></script>
    <script>AuthZ.requirePerm("program_participant_view");</script>
    <script src="./program-participants.js"></script>
    <script src="../../js/components/modal/deleteModal.js"></script>
    <script src="../../js/components/modal/modalManager.js"></script>
    <script src="../../js/components/modal/enterSave.js"></script>
    <script src="../../js/components/navigation/sidebar.js"></script>
    <script type="module">
      import { loadTopbar } from "../../js/components/navigation/topbar.js";
      loadTopbar("🧭 Operations");
    </script>
  </body>
</html>
