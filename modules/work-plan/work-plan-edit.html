<!doctype html>
<html lang="th">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>แก้แผนงาน — A4S-ERP</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="../../css/main.css" />
    <link rel="stylesheet" href="./work-plan.css" />
  </head>
  <body>
    <div class="loading-overlay" id="loadingOverlay"><div class="spinner"></div></div>
    <div class="toast" id="toast"></div>

    <div class="topbar"></div>
    <div class="layout">
      <div id="sidebar-container"></div>
      <div class="content-area">
        <div class="page">
          <!-- HERO -->
          <div id="wpHero" class="wp-hero scope-event">
            <div>
              <div class="wp-hero-title">
                <a id="backLink" href="./work-plan-list.html?scope=event"
                   style="color:#fff;text-decoration:none;opacity:.75;margin-right:6px">← กลับ</a>
                <span id="heroTitle">กำลังโหลด…</span>
              </div>
              <div id="heroSub" class="wp-hero-sub">แก้ตารางแผนงาน — autosave</div>
            </div>
            <div class="wp-hero-actions">
              <span id="saveState" class="wp-save-state">พร้อม</span>
            </div>
          </div>

          <!-- HEADER INFO -->
          <div class="wp-edit-header">
            <input id="planNameInput" class="wp-title-input" type="text" placeholder="ชื่อแผน" />
            <select id="planDeptInput"></select>
            <input id="planYearInput" type="number" style="width:90px" placeholder="ปี" />
            <input id="planStartInput" type="date" />
            <span style="color:var(--text3)">–</span>
            <input id="planEndInput" type="date" />
            <input id="planLocationInput" type="text" placeholder="สถานที่" list="placeList" autocomplete="off" style="flex:1;min-width:180px" />
            <datalist id="placeList"></datalist>
          </div>

          <!-- DAY TABS (only if multi-day) -->
          <div id="dayTabs" class="wp-day-tabs" style="display:none"></div>

          <!-- TABLE -->
          <div class="wp-grid-wrap">
            <table class="wp-table" id="wpTable">
              <thead id="wpThead"></thead>
              <tbody id="wpTbody"></tbody>
            </table>
            <div class="wp-toolbar">
              <button onclick="window.addRow()">＋ เพิ่มแถว</button>
              <button onclick="window.addColumn()">＋ เพิ่มคอลัมน์</button>
              <span style="flex:1"></span>
              <button onclick="window.deletePlanFromEdit()" style="color:#b91c1c">🗑 ลบแผน</button>
            </div>
            <div id="wpTotal" class="wp-total" style="display:none"></div>
          </div>
        </div>
      </div>
    </div>

    <!-- ── Popover: time picker (shared) ── -->
    <div id="timePickerPop" class="wp-time-pop" style="display:none">
      <div class="wp-time-pop-row">
        <div class="wp-time-pop-col">
          <div class="wp-time-pop-label">ชั่วโมง</div>
          <div class="wp-time-pop-hh" id="tpHh"></div>
        </div>
        <div class="wp-time-pop-col">
          <div class="wp-time-pop-label">นาที</div>
          <div class="wp-time-pop-mm" id="tpMm"></div>
          <button type="button" class="wp-tp-clear" onclick="window.clearTimePicker()">ล้างค่า</button>
        </div>
      </div>
    </div>

    <!-- ── Popover: assignee picker ── -->
    <div id="assigneePop" class="wp-pop" style="display:none"></div>

    <!-- ── Popover: column menu ── -->
    <div id="colMenuPop" class="wp-colmenu" style="display:none"></div>

    <!-- ── Modal: เพิ่ม/แก้ column ── -->
    <div class="wp-modal-overlay" id="colModal">
      <div class="wp-modal" style="max-width:440px">
        <h3 id="colModalTitle">เพิ่มคอลัมน์ใหม่</h3>
        <div class="form-group">
          <label class="form-label">ชื่อคอลัมน์ *</label>
          <input class="form-input" id="colNameInput" type="text" placeholder="เช่น รายละเอียด, เวลา, หมายเหตุ" />
        </div>
        <div class="form-group">
          <label class="form-label">ประเภทข้อมูล</label>
          <div class="wp-type-picker" id="colTypePicker">
            <button type="button" class="wp-type-btn active" data-type="text">
              <span class="wp-type-icon">📝</span>
              <span>ข้อความ</span>
            </button>
            <button type="button" class="wp-type-btn" data-type="number">
              <span class="wp-type-icon">🔢</span>
              <span>ตัวเลข</span>
            </button>
            <button type="button" class="wp-type-btn" data-type="date">
              <span class="wp-type-icon">📅</span>
              <span>วันที่</span>
            </button>
            <button type="button" class="wp-type-btn" data-type="time">
              <span class="wp-type-icon">⏰</span>
              <span>เวลา</span>
            </button>
          </div>
        </div>
        <div class="wp-modal-footer">
          <button class="btn btn-secondary" onclick="window.closeColModal()">ยกเลิก</button>
          <button class="btn btn-primary" onclick="window.submitColModal()">เพิ่มคอลัมน์</button>
        </div>
      </div>
    </div>

    <script src="../../js/core/auth.js"></script>
    <script src="../../js/core/authz.js"></script>
    <script type="module" src="./work-plan-edit.js"></script>
    <script src="../../js/components/modal/deleteModal.js"></script>
    <script type="module">
      import { loadTopbar } from "../../js/components/navigation/topbar.js";
      loadTopbar("📋 แก้แผนงาน");
    </script>
    <script src="../../js/components/navigation/sidebar.js"></script>
  </body>
</html>
