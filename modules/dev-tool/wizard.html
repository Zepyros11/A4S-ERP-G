<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Step Wizard — A4S-ERP Dev Tool</title>
<link rel="stylesheet" href="../../css/main.css">
<style>
/* ── Hero ── */
.wz-hero{background:linear-gradient(135deg,#1e293b,#334155);color:#fff;border-radius:14px;padding:20px 24px;margin-bottom:18px;box-shadow:0 8px 24px rgba(30,41,59,.3);position:relative;overflow:hidden;display:flex;align-items:center;justify-content:space-between;gap:14px;flex-wrap:wrap;}
.wz-hero::before{content:'';position:absolute;top:-40px;right:-40px;width:140px;height:140px;border-radius:50%;background:rgba(255,255,255,.04);}
.wz-hero h1{font-size:18px;font-weight:700;margin:0;display:flex;align-items:center;gap:8px;position:relative;z-index:1;}
.wz-hero p{margin:3px 0 0;font-size:12.5px;opacity:.85;position:relative;z-index:1;}
.wz-hero-actions{display:flex;gap:8px;flex-shrink:0;position:relative;z-index:1;}
.wz-btn{padding:8px 16px;border:none;border-radius:18px;font-family:inherit;font-size:12.5px;font-weight:600;cursor:pointer;transition:all .15s;display:flex;align-items:center;gap:6px;}
.wz-btn.ghost{background:rgba(255,255,255,.15);color:#fff;border:1.5px solid rgba(255,255,255,.2);}
.wz-btn.ghost:hover{background:rgba(255,255,255,.25);}
.wz-btn.primary{background:linear-gradient(135deg,var(--accent),var(--accent-light));color:#fff;box-shadow:0 3px 10px rgba(15,76,117,.3);}
.wz-btn.primary:hover{transform:translateY(-1px);box-shadow:0 5px 14px rgba(15,76,117,.4);}

/* ── Task selector ── */
.wz-task-select{display:flex;align-items:center;gap:10px;margin-bottom:16px;}
.wz-task-select label{font-size:13px;font-weight:600;color:var(--text2);}
.wz-task-select select{flex:1;max-width:400px;padding:9px 14px;border:1.5px solid var(--border);border-radius:8px;font-family:inherit;font-size:13px;background:var(--surface);}

/* ── Step list ── */
.wz-steps{display:flex;flex-direction:column;gap:0;position:relative;padding-left:28px;}
.wz-steps::before{content:'';position:absolute;left:13px;top:20px;bottom:20px;width:2px;background:var(--border);}

.wz-step{display:flex;align-items:stretch;gap:12px;position:relative;background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:14px 16px;transition:all .15s;margin-bottom:8px;}
.wz-step:hover{border-color:var(--accent);box-shadow:0 4px 12px rgba(0,0,0,.06);}
.wz-step.active{border-color:var(--accent);box-shadow:0 0 0 3px rgba(15,76,117,.1);}

.wz-step-num{position:absolute;left:-28px;top:50%;transform:translateY(-50%);width:24px;height:24px;border-radius:50%;background:var(--accent);color:#fff;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;z-index:2;border:2px solid var(--surface);}
.wz-step-icon{width:36px;height:36px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0;}
.wz-step-icon.login{background:#fef3c7;}
.wz-step-icon.navigate{background:#dbeafe;}
.wz-step-icon.click{background:#e0e7ff;}
.wz-step-icon.fill_form{background:#d1fae5;}
.wz-step-icon.export{background:#fce7f3;}
.wz-step-icon.import_db{background:#f3e8ff;}

.wz-step-body{flex:1;min-width:0;}
.wz-step-label{font-size:13.5px;font-weight:600;color:var(--text);}
.wz-step-meta{font-size:11.5px;color:var(--text3);margin-top:2px;font-family:'IBM Plex Mono',monospace;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.wz-step-type{font-size:10px;text-transform:uppercase;letter-spacing:.5px;font-weight:700;color:var(--text3);margin-top:3px;}

.wz-step-actions{display:flex;flex-direction:column;gap:4px;justify-content:center;flex-shrink:0;}
.wz-step-btn{width:28px;height:28px;border:1px solid var(--border);background:var(--surface);border-radius:6px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:12px;color:var(--text3);transition:all .12s;}
.wz-step-btn:hover{background:var(--accent);color:#fff;border-color:var(--accent);}
.wz-step-btn.danger:hover{background:#dc2626;border-color:#dc2626;}

/* ── Add step button ── */
.wz-add{margin:10px 0 10px 28px;display:flex;gap:8px;flex-wrap:wrap;}
.wz-add-btn{padding:7px 14px;border:1.5px dashed var(--border);border-radius:18px;background:var(--surface);font-family:inherit;font-size:12px;color:var(--text3);cursor:pointer;transition:all .12s;display:flex;align-items:center;gap:5px;}
.wz-add-btn:hover{border-color:var(--accent);color:var(--accent);background:var(--accent-pale);}

/* ── Preview section ── */
.wz-preview{background:#0f172a;color:#e2e8f0;border-radius:10px;padding:16px 18px;margin-top:18px;font-family:'IBM Plex Mono',monospace;font-size:12px;line-height:1.7;max-height:400px;overflow-y:auto;display:none;}
.wz-preview.show{display:block;}
.wz-preview .comment{color:#64748b;}
.wz-preview .keyword{color:#7dd3fc;}
.wz-preview .string{color:#a5f3fc;}
.wz-preview .fn{color:#c4b5fd;}

/* ── Step edit modal ── */
.wz-modal-overlay{position:fixed;inset:0;background:rgba(15,23,42,.55);backdrop-filter:blur(3px);display:none;align-items:center;justify-content:center;z-index:9999;}
.wz-modal-overlay.open{display:flex;}
.wz-modal{background:#fff;border-radius:14px;max-width:560px;width:92%;box-shadow:0 20px 50px rgba(0,0,0,.25);overflow:hidden;max-height:90vh;overflow-y:auto;}
.wz-modal-head{padding:16px 20px;display:flex;align-items:center;gap:10px;border-bottom:1px solid var(--border);}
.wz-modal-head .icon{width:36px;height:36px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:18px;}
.wz-modal-head h2{margin:0;font-size:15px;font-weight:700;flex:1;}
.wz-modal-body{padding:18px 20px;}
.wz-modal-foot{padding:14px 20px;border-top:1px solid var(--border);display:flex;justify-content:flex-end;gap:8px;}

.wz-field{margin-bottom:12px;}
.wz-field label{display:block;font-size:11.5px;font-weight:700;color:var(--text2);margin-bottom:4px;letter-spacing:.3px;}
.wz-field input,.wz-field select,.wz-field textarea{width:100%;padding:9px 12px;border:1.5px solid var(--border);border-radius:7px;font-family:inherit;font-size:12.5px;transition:border-color .15s;}
.wz-field input:focus,.wz-field select:focus,.wz-field textarea:focus{outline:none;border-color:var(--accent);}
.wz-field .hint{font-size:10.5px;color:var(--text3);margin-top:3px;}
.wz-field-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.wz-field-row3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;}
.wz-field textarea{resize:vertical;min-height:50px;font-family:'IBM Plex Mono',monospace;}
.wz-check{display:flex;align-items:center;gap:6px;font-size:12.5px;color:var(--text2);cursor:pointer;margin-top:6px;}
.wz-check input{width:15px;height:15px;cursor:pointer;}

/* ── Dynamic fields list (for fill_form) ── */
.wz-fields-list{border:1px solid var(--border);border-radius:8px;padding:8px;margin-bottom:8px;}
.wz-fields-item{display:grid;grid-template-columns:1fr 1fr auto auto;gap:6px;align-items:center;padding:4px 0;border-bottom:1px solid var(--border);}
.wz-fields-item:last-child{border-bottom:none;}
.wz-fields-item input{padding:6px 8px;font-size:11.5px;}
.wz-fields-item button{width:24px;height:24px;border:none;background:none;cursor:pointer;font-size:12px;color:var(--text3);}
.wz-fields-item button:hover{color:#dc2626;}

/* ── Empty state ── */
.wz-empty{text-align:center;padding:40px 20px;color:var(--text3);}
.wz-empty-icon{font-size:48px;opacity:.3;margin-bottom:8px;}
</style>
</head>
<body>

<div class="loading-overlay" id="loadingOverlay"><div class="spinner"></div></div>
<div class="toast" id="toast"></div>

<div class="topbar"></div>

<div class="page">

  <!-- Hero -->
  <div class="wz-hero">
    <div>
      <h1>🧙 Step Wizard</h1>
      <p>สร้าง automation flow แบบ step-by-step · กำหนด selector, URL, credentials ผ่าน UI</p>
    </div>
    <div class="wz-hero-actions">
      <button class="wz-btn ghost" onclick="togglePreview()">👁️ Preview</button>
      <button class="wz-btn primary" onclick="saveSteps()">💾 Save</button>
    </div>
  </div>

  <!-- Task selector -->
  <div class="wz-task-select">
    <label>Task:</label>
    <select id="taskSelect" onchange="loadTask(this.value)">
      <option value="">-- เลือก automation task --</option>
    </select>
  </div>

  <!-- Step list -->
  <div class="wz-steps" id="stepList">
    <div class="wz-empty" id="emptyState">
      <div class="wz-empty-icon">🧙</div>
      <div style="font-weight:600;color:var(--text2);font-size:14px">เลือก task ด้านบนเพื่อดูและแก้ไข steps</div>
      <div style="font-size:12.5px;margin-top:4px">หรือสร้าง task ใหม่ที่หน้า Web Automation ก่อน</div>
    </div>
  </div>

  <!-- Add step buttons -->
  <div class="wz-add" id="addStepBar" style="display:none">
    <button class="wz-add-btn" onclick="addStep('login')">🔐 Login</button>
    <button class="wz-add-btn" onclick="addStep('navigate')">🔗 Navigate</button>
    <button class="wz-add-btn" onclick="addStep('click')">👆 Click</button>
    <button class="wz-add-btn" onclick="addStep('fill_form')">📝 Fill Form</button>
    <button class="wz-add-btn" onclick="addStep('export')">📥 Export</button>
    <button class="wz-add-btn" onclick="addStep('import_db')">🗄️ Import DB</button>
  </div>

  <!-- Preview -->
  <div class="wz-preview" id="previewPanel"></div>

</div>

<!-- Step Edit Modal -->
<div class="wz-modal-overlay" id="stepModalOverlay" onclick="if(event.target===this)closeStepModal()">
  <div class="wz-modal">
    <div class="wz-modal-head">
      <div class="icon" id="smIcon">🔐</div>
      <h2 id="smTitle">แก้ไข Step</h2>
    </div>
    <div class="wz-modal-body" id="smBody">
      <!-- dynamic per step type -->
    </div>
    <div class="wz-modal-foot">
      <button class="wz-btn ghost" onclick="closeStepModal()" style="color:var(--text2)">ยกเลิก</button>
      <button class="wz-btn primary" onclick="saveStepModal()">💾 บันทึก</button>
    </div>
  </div>
</div>

<script src="../../js/core/auth.js"></script>
<script src="../../js/core/authz.js"></script>
<script src="../../js/core/date-format.js"></script>
<script>AuthZ.requirePerm("devtool_manage");</script>
<script src="./wizard.js"></script>
<script type="module">
  import { loadTopbar } from "../../js/components/navigation/topbar.js";
  loadTopbar("🧙 Step Wizard");
</script>
<script src="../../js/components/navigation/sidebar.js"></script>
</body>
</html>
