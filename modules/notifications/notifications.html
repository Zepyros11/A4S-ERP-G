<!doctype html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>แจ้งเตือนของฉัน — A4S-ERP</title>
  <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../../css/main.css" />
  <link rel="stylesheet" href="../ibd/ibd-shared.css" />
  <style>
    .notif-row { cursor: pointer; transition: background .1s; }
    .notif-row:hover { background: var(--surface); }
    .notif-row.unread td { background: #eff6ff; font-weight: 500; }
    .notif-row.unread:hover td { background: #dbeafe; }
    .notif-title { font-size: 13px; color: var(--text); }
    .notif-trigger {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 12px;
      font-size: 11px;
      font-weight: 600;
      background: #e2e8f0;
      color: #334155;
      white-space: nowrap;
    }
    .notif-trigger.ibd { background: #dbeafe; color: #1e40af; }
    .notif-trigger.event { background: #fef3c7; color: #92400e; }
    .notif-trigger.booking { background: #dcfce7; color: #166534; }
    .notif-status {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 10px;
      font-size: 10.5px;
      font-weight: 700;
    }
    .notif-status.unread { background: #fee2e2; color: #991b1b; }
    .notif-status.read   { background: #f1f5f9; color: #64748b; }
  </style>
</head>
<body>

<div class="loading-overlay" id="loadingOverlay"><div class="spinner"></div></div>
<div class="toast" id="toast"></div>

<div class="topbar"></div>
    <div class="page">

      <div class="page-hero" style="display:flex;align-items:center;gap:14px">
        <div style="flex:1">
          <div class="page-hero-title">🔔 แจ้งเตือนของฉัน</div>
          <div class="page-hero-sub">รายการแจ้งเตือนทั้งหมดที่คุณได้รับ — เรียงใหม่สุดก่อน</div>
        </div>
        <button class="ibd-btn ibd-btn-primary" onclick="markAllRead()">✓ อ่านทั้งหมด</button>
      </div>

      <div class="ibd-kpis">
        <div class="ibd-kpi"><div class="ibd-kpi-label">ทั้งหมด</div><div class="ibd-kpi-value" id="kpiTotal">—</div></div>
        <div class="ibd-kpi"><div class="ibd-kpi-label">ยังไม่อ่าน</div><div class="ibd-kpi-value" id="kpiUnread" style="color:#ef4444">—</div></div>
        <div class="ibd-kpi"><div class="ibd-kpi-label">อ่านแล้ว</div><div class="ibd-kpi-value" id="kpiRead">—</div></div>
        <div class="ibd-kpi"><div class="ibd-kpi-label">7 วันล่าสุด</div><div class="ibd-kpi-value" id="kpi7d">—</div></div>
      </div>

      <div class="ibd-filters">
        <input type="text" class="ibd-search" id="filtSearch" placeholder="🔎 ค้นหาในหัวข้อ..." />
        <div class="ibd-filter-group">
          <span class="ibd-filter-label">📌 สถานะ</span>
          <select class="ibd-filter-select" id="filtStatus">
            <option value="">ทั้งหมด</option>
            <option value="unread">ยังไม่อ่าน</option>
            <option value="read">อ่านแล้ว</option>
          </select>
        </div>
        <div class="ibd-filter-group">
          <span class="ibd-filter-label">🏷️ ประเภท</span>
          <select class="ibd-filter-select" id="filtTrigger">
            <option value="">ทั้งหมด</option>
          </select>
        </div>
        <button class="ibd-btn ibd-btn-ghost" onclick="reload()">🔄 รีเฟรช</button>
      </div>

      <div class="ibd-table-wrap">
        <div style="overflow-x:auto">
          <table class="ibd-table">
            <thead>
              <tr>
                <th style="width:160px">เวลา</th>
                <th style="width:140px">ประเภท</th>
                <th>หัวข้อ</th>
                <th style="width:90px;text-align:center">สถานะ</th>
                <th style="width:80px;text-align:center">ลบ</th>
              </tr>
            </thead>
            <tbody id="tbody">
              <tr><td colspan="5" class="ibd-empty">กำลังโหลด...</td></tr>
            </tbody>
          </table>
        </div>
        <div class="pagination" id="paginate"></div>
      </div>

    </div>
<script src="../../js/core/permissions.js"></script>
<script src="../../js/core/auth.js"></script>
<script src="../../js/core/authz.js"></script>
<script src="../../js/core/date-format.js"></script>
<script src="./notifications.js"></script>
<script type="module">
  import { loadTopbar } from "../../js/components/navigation/topbar.js";
  loadTopbar("🔔 แจ้งเตือน");
</script>
<script src="../../js/components/navigation/sidebar.js"></script>
<script src="../../js/components/modal/modalManager.js"></script>
<script src="../../js/components/modal/confirmModal.js"></script>
</body>
</html>
