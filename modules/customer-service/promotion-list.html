<!doctype html>
<html lang="th">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>โปรโมชัน — A4S-ERP</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700&family=IBM+Plex+Mono:wght@400;500&family=Playfair+Display:wght@600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="../../css/main.css" />
    <link rel="stylesheet" href="./promotions.css" />
  </head>
  <body>
    <div class="loading-overlay" id="loadingOverlay">
      <div class="spinner"></div>
    </div>
    <div class="toast" id="toast"></div>

    <div class="topbar"></div>
        <div class="page">

          <!-- ─── HERO ─── -->
          <div class="page-hero page-hero--simple page-hero--compact">
            <div>
              <h1 class="page-hero-title">🎁 โปรโมชันประจำเดือน</h1>
              <p class="page-hero-sub" id="pageSubtitle">กำลังโหลด...</p>
            </div>
            <div class="page-hero-actions">
              <button class="btn-on-hero" id="btnPrevMonth" onclick="window.prevMonth()" title="เดือนก่อน">‹</button>
              <span class="btn-on-hero" id="monthLabel" style="cursor:default;pointer-events:none;min-width:140px;text-align:center;">—</span>
              <button class="btn-on-hero" id="btnNextMonth" onclick="window.nextMonth()" title="เดือนถัดไป">›</button>
              <button class="btn-on-hero btn-primary" data-perm="promotion_create" onclick="window.openUpload()">＋ อัปโหลดโปสเตอร์</button>
            </div>
          </div>

          <div class="table-card">

            <!-- ─── TOOLBAR (grid toggle only) ─── -->
            <div class="toolbar promo-toolbar" style="justify-content:flex-end;">
              <div class="promo-grid-toggle">
                <button class="promo-toggle-btn" id="btnGrid3" onclick="window.setGrid(3)">⊞ 3</button>
                <button class="promo-toggle-btn" id="btnGrid4" onclick="window.setGrid(4)">⊟ 4</button>
                <button class="promo-toggle-btn active" id="btnGrid5" onclick="window.setGrid(5)">▦ 5</button>
                <button class="promo-toggle-btn" id="btnGrid6" onclick="window.setGrid(6)">⊡ 6</button>
              </div>
            </div>

            <!-- ─── CATEGORY CHIPS ─── -->
            <div class="promo-cat-bar" id="catBar">
              <button class="promo-cat-chip active" data-cat="all" onclick="window.filterCat(this,'all')">
                ทั้งหมด
              </button>
              <!-- dynamic chips injected by JS -->
              <button class="promo-cat-manage-btn" onclick="window.openCatManager()" title="จัดการหมวดหมู่">⚙️</button>
            </div>

            <!-- ─── STATS MINI ─── -->
            <div class="promo-stats" id="promoStats">
              <span class="promo-stat">🖼️ <strong id="statTotal">0</strong> โปสเตอร์</span>
              <span class="promo-stat">📂 <strong id="statCats">0</strong> หมวดหมู่</span>
            </div>

            <!-- ─── GALLERY GRID ─── -->
            <div class="promo-gallery" id="galleryBody">
              <!-- cards rendered by JS -->
            </div>

          </div>
        </div>

        <!-- ─── UPLOAD MODAL ─── -->
        <div class="promo-modal-overlay" id="uploadModal">
          <div class="promo-modal" onclick="event.stopPropagation()">
            <div class="promo-modal-header">
              <span>📤 อัปโหลดโปสเตอร์โปรโมชัน</span>
              <button class="promo-modal-close" onclick="window.closeUpload()">✕</button>
            </div>
            <div class="promo-modal-body">
              <label class="promo-field-label">หมวดหมู่</label>
              <select id="uploadCat" class="promo-select">
                <option value="">— เลือกหมวดหมู่ —</option>
              </select>
              <label class="promo-field-label" style="margin-top:16px">เดือน</label>
              <input id="uploadMonth" type="month" class="promo-input" />
              <label class="promo-field-label" style="margin-top:16px">เลือกไฟล์ภาพ (เลือกได้หลายไฟล์)</label>
              <div class="promo-drop-zone" id="dropZone" onclick="document.getElementById('fileInput').click()">
                <div class="promo-drop-icon">📁</div>
                <div class="promo-drop-text">คลิกหรือลากไฟล์มาวาง</div>
                <div class="promo-drop-hint">PNG, JPG — เลือกได้หลายไฟล์พร้อมกัน</div>
              </div>
              <input type="file" id="fileInput" multiple accept="image/*" style="display:none" onchange="window.handleFiles(this.files)" />
              <div class="promo-preview-grid" id="previewGrid"></div>
            </div>
            <div class="promo-modal-footer">
              <button class="btn btn-outline" onclick="window.closeUpload()">ยกเลิก</button>
              <button class="btn btn-primary" id="btnUploadConfirm" onclick="window.confirmUpload()">📤 อัปโหลด</button>
            </div>
          </div>
        </div>

        <!-- ─── CATEGORY MANAGER MODAL ─── -->
        <div class="promo-modal-overlay" id="catManagerModal" onclick="window.closeCatManager()">
          <div class="promo-modal" style="width:500px" onclick="event.stopPropagation()">
            <div class="promo-modal-header">
              <span>⚙️ จัดการหมวดหมู่</span>
              <button class="promo-modal-close" onclick="window.closeCatManager()">✕</button>
            </div>
            <div class="promo-modal-body" style="padding:0">
              <div id="catManagerList" class="cat-mgr-list">
                <!-- rendered by JS -->
              </div>
            </div>
            <div class="promo-modal-footer" style="justify-content:space-between">
              <button class="btn btn-outline" onclick="window.addCatRow()">＋ เพิ่มหมวดหมู่</button>
              <div style="display:flex;gap:8px">
                <button class="btn btn-outline" onclick="window.closeCatManager()">ปิด</button>
                <button class="btn btn-primary" onclick="window.saveCatChanges()">💾 บันทึก</button>
              </div>
            </div>
        <script src="../../js/core/auth.js"></script>
        <script src="../../js/core/authz.js"></script>
<script src="../../js/core/date-format.js"></script>
        <script>AuthZ.requirePerm("view_promotions");</script>
        <script src="../../js/core/imageCompressor.js"></script>
        <script type="module" src="./promotion-list.js"></script>
        <script src="../../js/components/modal/deleteModal.js"></script>
        <script src="../../js/components/modal/modalManager.js"></script>
        <script type="module">
          import { loadTopbar } from "../../js/components/navigation/topbar.js";
          loadTopbar("🎁 โปรโมชัน");
        </script>
        <script src="../../js/components/navigation/imgPopup.js"></script>
        <script src="../../js/components/navigation/sidebar.js"></script>
      </div>
    </div>
  </body>
</html>
