<!doctype html>
<html lang="th">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Promotion Catalog — A4S-ERP</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700&family=IBM+Plex+Mono:wght@400;500&family=Playfair+Display:wght@600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="../../css/main.css" />
    <link rel="stylesheet" href="./promotion-catalog.css" />
  </head>
  <body>
    <div class="loading-overlay" id="loadingOverlay">
      <div class="spinner"></div>
    </div>
    <div class="toast" id="toast"></div>

    <div class="topbar"></div>
        <div class="page">

          <!-- ─── HERO ─── -->
          <div class="page-hero page-hero--simple page-hero--compact">
            <div>
              <h1 class="page-hero-title" id="heroTitle">📰 โปรโมชันประจำเดือน</h1>
              <p class="page-hero-sub" id="heroSubtitle">กำลังโหลด...</p>
            </div>
            <div class="page-hero-actions">
              <button class="btn-on-hero" onclick="window.prevMonth()" title="เดือนก่อน">‹</button>
              <span class="btn-on-hero" id="monthLabel" style="cursor:default;pointer-events:none;min-width:140px;text-align:center;">—</span>
              <button class="btn-on-hero" onclick="window.nextMonth()" title="เดือนถัดไป">›</button>
            </div>
          </div>

          <!-- ─── CATEGORY FILTER ─── -->
          <div class="cat-filter-bar" id="catFilterBar">
            <!-- rendered by JS -->
          </div>

          <!-- ─── CATALOG GRID ─── -->
          <div class="cat-body" id="catalogBody">
            <!-- rendered by JS -->
          </div>

      <script src="../../js/core/auth.js"></script>
      <script src="../../js/core/authz.js"></script>
<script src="../../js/core/date-format.js"></script>
      <script>AuthZ.requirePerm("view_promotions");</script>
      <script type="module" src="./promotion-catalog.js"></script>
      <script src="../../js/components/modal/modalManager.js"></script>
      <script type="module">
        import { loadTopbar } from "../../js/components/navigation/topbar.js";
        loadTopbar("📰 Promotion Catalog");
      </script>
      <script src="../../js/components/navigation/imgPopup.js"></script>
      <script src="../../js/components/navigation/sidebar.js"></script>
    </div>
  </body>
</html>
