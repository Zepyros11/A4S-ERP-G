<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>สร้างบัตร — A4S-ERP</title>
<link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700;800&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../../css/main.css">
<style>
.content-area{background:linear-gradient(180deg,#f0f9ff 0%,#eef7f3 60%,#fef3f9 100%);min-height:100vh;}
.page{padding:24px;max-width:1300px;margin:0 auto;}

.tk-header{display:flex;justify-content:space-between;align-items:center;gap:14px;flex-wrap:wrap;margin-bottom:18px;}
.tk-title{font-size:20px;font-weight:700;display:flex;align-items:center;gap:10px;color:var(--text);}
.tk-event-chip{background:#06c755;color:#fff;padding:4px 12px;border-radius:999px;font-size:12px;font-weight:600;}
.tk-subtitle{font-size:12.5px;color:var(--text3);margin-top:3px;}

.tk-layout{display:grid;grid-template-columns:340px 1fr;gap:18px;align-items:start;}
@media(max-width:1024px){.tk-layout{grid-template-columns:1fr;}}

.tk-card{background:#fff;border:1px solid #e2e8f0;border-radius:14px;padding:16px;box-shadow:0 2px 10px rgba(15,23,42,.04);}
.tk-card-title{font-size:13px;font-weight:700;color:#0f172a;margin-bottom:12px;display:flex;align-items:center;gap:8px;padding-bottom:8px;border-bottom:1px solid #f1f5f9;}

/* Attendee list (left) */
.tk-search{display:flex;align-items:center;background:#f8fafc;border:1px solid #e2e8f0;border-radius:8px;padding:0 12px;margin-bottom:10px;}
.tk-search input{border:none;background:transparent;outline:none;padding:8px 0;flex:1;font-family:inherit;font-size:13px;}
.tk-list{display:flex;flex-direction:column;gap:6px;max-height:600px;overflow-y:auto;padding-right:4px;}
.tk-att{border:1.5px solid #e2e8f0;border-radius:9px;padding:9px 12px;cursor:pointer;transition:all .15s;background:#fff;}
.tk-att:hover{border-color:#06c755;}
.tk-att.active{border-color:#06c755;background:#f0fdf4;box-shadow:0 0 0 2px rgba(6,199,85,.15);}
.tk-att-name{font-size:13px;font-weight:700;color:#0f172a;}
.tk-att-meta{font-size:11px;color:#64748b;margin-top:2px;font-family:'IBM Plex Mono',monospace;}
.tk-att-tag{display:inline-block;font-size:10px;background:#dbeafe;color:#1e40af;padding:1px 6px;border-radius:4px;margin-left:4px;font-family:inherit;}

/* Ticket preview (right) */
.tk-preview-area{display:flex;flex-direction:column;align-items:center;gap:16px;}
.tk-ticket{
  width:360px;
  background:#fff;
  border-radius:20px;
  overflow:hidden;
  box-shadow:0 10px 40px rgba(15,23,42,.15);
  position:relative;
}
.tk-ticket-hero{
  padding:22px 24px 18px;
  color:#fff;
  background:linear-gradient(135deg,#0ea5e9 0%,#06c755 60%,#10b981 100%);
  position:relative;overflow:hidden;
}
.tk-ticket-hero::after{content:'';position:absolute;top:-50px;right:-50px;width:180px;height:180px;border-radius:50%;background:rgba(255,255,255,.12);}
.tk-event-label{font-size:10.5px;font-weight:700;letter-spacing:1.5px;opacity:.85;margin-bottom:4px;position:relative;z-index:1;}
.tk-event-name{font-size:19px;font-weight:800;line-height:1.25;position:relative;z-index:1;}
.tk-event-date{font-size:12px;opacity:.92;margin-top:6px;position:relative;z-index:1;display:flex;align-items:center;gap:6px;}

.tk-ticket-body{padding:22px 24px 18px;position:relative;}
.tk-notch{position:absolute;top:-12px;left:50%;transform:translateX(-50%);background:var(--content-bg,#eef7f3);height:24px;width:80%;border-radius:0 0 20px 20px;}
.tk-attendee{text-align:center;margin-bottom:14px;}
.tk-attendee-name{font-size:17px;font-weight:700;color:#0f172a;line-height:1.3;}
.tk-attendee-code{font-family:'IBM Plex Mono',monospace;font-size:11.5px;color:#64748b;margin-top:3px;}

.tk-qr-area{display:flex;justify-content:center;padding:10px 0 14px;}
.tk-qr-wrap{padding:14px;background:#fff;border:1px dashed #e2e8f0;border-radius:14px;display:inline-block;}

.tk-ticket-footer{
  padding:12px 24px 18px;border-top:1.5px dashed #e2e8f0;
  display:flex;justify-content:space-between;align-items:center;gap:10px;
}
.tk-ticket-footer-left{font-size:10.5px;color:#94a3b8;font-family:'IBM Plex Mono',monospace;}
.tk-ticket-no{font-size:13px;font-weight:700;color:#06c755;font-family:'IBM Plex Mono',monospace;}

/* Actions */
.tk-actions{display:flex;gap:8px;flex-wrap:wrap;justify-content:center;}
.tk-btn{padding:9px 16px;border:1.5px solid #e2e8f0;background:#fff;border-radius:9px;font-family:inherit;font-size:12.5px;cursor:pointer;color:#475569;font-weight:600;transition:all .15s;}
.tk-btn:hover{border-color:#0ea5e9;color:#0ea5e9;}
.tk-btn-primary{background:linear-gradient(135deg,#06c755,#10b981);color:#fff;border-color:transparent;box-shadow:0 3px 10px rgba(6,199,85,.3);}
.tk-btn-primary:hover{filter:brightness(1.08);color:#fff;transform:translateY(-1px);}
.tk-btn-accent{background:linear-gradient(135deg,#0ea5e9,#6366f1);color:#fff;border-color:transparent;}
.tk-btn-accent:hover{filter:brightness(1.08);color:#fff;}

/* Bulk bar */
.tk-bulk{margin-top:14px;padding:12px 16px;background:#fff;border:1px solid #e2e8f0;border-radius:12px;display:flex;align-items:center;gap:10px;flex-wrap:wrap;}
.tk-bulk-status{font-size:12px;color:#64748b;font-family:'IBM Plex Mono',monospace;}
.tk-progress{flex:1;height:6px;background:#f1f5f9;border-radius:3px;overflow:hidden;min-width:150px;}
.tk-progress-bar{height:100%;background:linear-gradient(90deg,#06c755,#0ea5e9);width:0;transition:width .2s;}

.tk-empty{padding:40px 20px;text-align:center;color:#94a3b8;font-size:13px;}

/* Print */
@media print {
  body * { visibility: hidden; }
  .tk-print-area, .tk-print-area * { visibility: visible; }
  .tk-print-area {
    position: absolute; left: 0; top: 0; width: 100%;
    display: grid; grid-template-columns: repeat(2, 1fr); gap: 10mm; padding: 10mm;
  }
  .tk-print-area .tk-ticket { width: 85mm; margin: 0 auto; box-shadow: none; border: 1px solid #ccc; page-break-inside: avoid; }
}

@media(max-width:767px){
  .page{padding:14px;}
  .tk-ticket{width:100%;max-width:360px;}
}
</style>
</head>
<body>

<div class="loading-overlay" id="loadingOverlay"><div class="spinner"></div></div>
<div class="toast" id="toast"></div>

<div class="topbar"></div>

<div class="layout">
  <div id="sidebar-container"></div>

  <div class="content-area">
    <div class="page">
      <div class="tk-header">
        <div>
          <div class="tk-title">
            🎫 สร้างบัตรผู้เข้าร่วม
            <span class="tk-event-chip" id="tkEventChip" style="display:none;"></span>
          </div>
          <div class="tk-subtitle" id="tkSubtitle">เลือกผู้เข้าร่วม · ดู preview บัตร · Download / Print / ส่ง LINE</div>
        </div>
        <div style="display:flex;gap:8px;flex-wrap:wrap;">
          <button class="tk-btn" onclick="location.href='attendees.html?event=' + new URLSearchParams(location.search).get('event')">← กลับ</button>
          <button class="tk-btn" onclick="openDesigner()">🎨 แก้ QR style</button>
        </div>
      </div>

      <div class="tk-layout">
        <!-- LEFT: Attendee list -->
        <div class="tk-card">
          <div class="tk-card-title">👥 ผู้เข้าร่วม <span id="tkCount" style="margin-left:auto;color:#64748b;font-weight:500;font-size:11px;">0</span></div>
          <div class="tk-search">
            🔍 <input type="text" id="tkSearch" placeholder="ค้นหาชื่อ / รหัส / ticket...">
          </div>
          <div class="tk-list" id="tkList">
            <div class="tk-empty">⏳ กำลังโหลด...</div>
          </div>
          <div style="margin-top:10px;display:flex;gap:6px;">
            <button class="tk-btn" style="flex:1;" onclick="downloadAllTickets()" title="ดาวน์โหลด PNG ทุกคน (zip-like, ทีละไฟล์)">⬇️ All PNG</button>
            <button class="tk-btn" style="flex:1;" onclick="printAllTickets()" title="พิมพ์ทุกคน 2 ใบ/หน้า A4">🖨️ Print All</button>
          </div>
          <div class="tk-bulk" id="tkBulkBar" style="display:none;">
            <div class="tk-bulk-status" id="tkBulkStatus">-</div>
            <div class="tk-progress"><div class="tk-progress-bar" id="tkProgress"></div></div>
          </div>
        </div>

        <!-- RIGHT: Ticket preview + actions -->
        <div>
          <div class="tk-preview-area">
            <div class="tk-ticket" id="tkTicket">
              <div class="tk-ticket-hero">
                <div class="tk-event-label">🎫 EVENT TICKET</div>
                <div class="tk-event-name" id="tkEventName">—</div>
                <div class="tk-event-date" id="tkEventDate"><span>📅</span><span>—</span></div>
              </div>
              <div class="tk-ticket-body">
                <div class="tk-notch"></div>
                <div class="tk-attendee">
                  <div class="tk-attendee-name" id="tkAttName">เลือกผู้เข้าร่วมจากรายการ</div>
                  <div class="tk-attendee-code" id="tkAttCode"></div>
                </div>
                <div class="tk-qr-area">
                  <div class="tk-qr-wrap" id="tkQrWrap">
                    <div style="width:280px;height:280px;background:#f8fafc;display:flex;align-items:center;justify-content:center;color:#cbd5e1;border-radius:8px;">👈</div>
                  </div>
                </div>
              </div>
              <div class="tk-ticket-footer">
                <div class="tk-ticket-footer-left">A4S · powered</div>
                <div class="tk-ticket-no" id="tkTicketNo">—</div>
              </div>
            </div>

            <div class="tk-actions">
              <button class="tk-btn" onclick="downloadTicket('png')">⬇️ Download PNG</button>
              <button class="tk-btn" onclick="printTicket()">🖨️ Print</button>
              <button class="tk-btn tk-btn-accent" onclick="sendTicketLine()" id="tkBtnLine">📱 ส่ง LINE</button>
            </div>
          </div>
        </div>
      </div>

      <!-- Hidden print area (populated on demand) -->
      <div class="tk-print-area" id="tkPrintArea" style="display:none;"></div>
    </div>
  </div>
</div>

<script src="../../js/core/auth.js"></script>
<script src="../../js/core/authz.js"></script>
<script src="../../js/core/crypto.js"></script>
<script src="../../js/core/line.js"></script>
<script src="../../js/core/qr-designer.js"></script>
<script src="../../js/core/date-format.js"></script>
<script>AuthZ.requirePerm("attendee_view");</script>
<script src="./ticket-generator.js"></script>
<script type="module">
  import { loadTopbar } from "../../js/components/navigation/topbar.js";
  loadTopbar("🎫 สร้างบัตร");
</script>
<script src="../../js/components/navigation/sidebar.js"></script>
<script src="../../js/components/modal/modalManager.js"></script>
</body>
</html>
