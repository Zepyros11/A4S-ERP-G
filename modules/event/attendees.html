<!doctype html>
<html lang="th">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ผู้เข้าร่วมกิจกรรม — A4S-ERP</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="../../css/main.css" />
    <link rel="stylesheet" href="./attendees.css" />
  </head>
  <body>
    <div class="loading-overlay" id="loadingOverlay">
      <div class="spinner"></div>
    </div>
    <div class="toast" id="toast"></div>

    <div class="topbar"></div>
    <div class="layout">
      <div id="sidebar-container"></div>
      <div class="content-area">
        <div class="page">
          <!-- HERO -->
          <div style="background:linear-gradient(135deg,#1e40af,#3b82f6);color:#fff;border-radius:14px;padding:20px 24px;margin-bottom:18px;box-shadow:0 8px 24px rgba(30,64,175,.3);position:relative;overflow:hidden;display:flex;align-items:center;justify-content:space-between;gap:14px;flex-wrap:wrap">
            <div style="position:absolute;top:-40px;right:-40px;width:140px;height:140px;border-radius:50%;background:rgba(255,255,255,.06)"></div>
            <div style="position:relative;z-index:1">
              <div id="heroTitle" style="font-size:18px;font-weight:700;display:flex;align-items:center;gap:8px">👥 ผู้เข้าร่วมกิจกรรม</div>
              <div id="heroSubtitle" style="font-size:12.5px;opacity:.85;margin-top:3px">ลงทะเบียน · Check-in · ติดตามผู้เข้าร่วม</div>
            </div>
            <div id="eventActionBtns" style="display:none;gap:8px;flex-shrink:0;position:relative;z-index:1">
              <button style="padding:8px 14px;border:none;border-radius:16px;background:rgba(255,255,255,.18);color:#fff;font-family:inherit;font-size:12px;font-weight:600;cursor:pointer;border:1.5px solid rgba(255,255,255,.25);display:flex;align-items:center;gap:5px" onclick="window.exportCSV()">📥 Export CSV</button>
            </div>
          </div>

          <!-- EVENT SELECTOR -->
          <div id="eventSelectWrap" style="background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:12px 16px;display:flex;align-items:center;gap:12px;margin-bottom:18px">
            <span style="font-size:13px;font-weight:600;color:var(--text2);white-space:nowrap">🗓 เลือกกิจกรรม:</span>
            <select class="form-input" id="eventSelect" style="flex:1;max-width:500px" onchange="window.onEventChange()">
              <option value="">-- เลือกกิจกรรม --</option>
            </select>
          </div>

          <!-- STATS (hidden until event selected) -->
          <div id="attStatsSection" style="display: none">
            <div class="att-stats">
              <div class="att-stat-card">
                <div class="att-stat-label">ลงทะเบียนทั้งหมด</div>
                <div class="att-stat-value" id="statTotal">0</div>
              </div>
              <div class="att-stat-card">
                <div class="att-stat-label">Check-in แล้ว</div>
                <div
                  class="att-stat-value"
                  id="statCheckedIn"
                  style="color: var(--success)"
                >
                  0
                </div>
              </div>
              <div class="att-stat-card">
                <div class="att-stat-label">ยังไม่ Check-in</div>
                <div
                  class="att-stat-value"
                  id="statNotCheckedIn"
                  style="color: var(--text3)"
                >
                  0
                </div>
              </div>
              <div class="att-stat-card">
                <div class="att-stat-label">ชำระแล้ว</div>
                <div
                  class="att-stat-value"
                  id="statPaid"
                  style="color: var(--accent)"
                >
                  0
                </div>
              </div>
              <div class="att-stat-card">
                <div class="att-stat-label">รายรับรวม (฿)</div>
                <div class="att-stat-value" id="statRevenue">0</div>
              </div>
            </div>
          </div>

          <!-- TOOLBAR -->
          <div id="attToolbar" style="display: none">
            <div class="toolbar">
              <div class="search-wrap">
                <span class="search-icon">🔍</span>
                <input
                  class="search-input"
                  id="searchInput"
                  placeholder="ค้นหาชื่อ / อีเมล / บริษัท..."
                />
              </div>
              <select class="filter-select" id="filterCheckin">
                <option value="">⚪ ทุกสถานะ Check-in</option>
                <option value="true">✅ Check-in แล้ว</option>
                <option value="false">⏳ ยังไม่ Check-in</option>
              </select>
              <select class="filter-select" id="filterPayment">
                <option value="">⚪ ทุกสถานะชำระ</option>
                <option value="PAID">💳 ชำระแล้ว</option>
                <option value="UNPAID">⏳ ยังไม่ชำระ</option>
                <option value="COMPLIMENTARY">🎫 ฟรี / ยกเว้น</option>
              </select>
            </div>
          </div>

          <!-- TABLE -->
          <div id="attTableSection" style="display: none">
            <div class="content-wrap">
              <div class="table-card">
                <div class="table-hdr">
                  <div class="table-title">👥 รายชื่อผู้เข้าร่วม</div>
                  <div class="table-count" id="attCount">0 คน</div>
                </div>
                <div class="table-wrap">
                  <table class="data-table att-inline-table">
                    <thead>
                      <tr>
                        <th style="min-width:240px">🔍 ค้นหาสมาชิก / ชื่อ</th>
                        <th class="col-center" style="min-width:100px">⭐ ตำแหน่ง</th>
                        <th class="col-center" style="min-width:110px">🎫 Ticket</th>
                        <th class="col-center" style="min-width:130px">💰 ชำระ</th>
                        <th class="col-center" style="min-width:90px">✅ Check-in</th>
                        <th class="col-center" style="min-width:90px">จัดการ</th>
                      </tr>
                    </thead>
                    <tbody id="attTableBody"></tbody>
                  </table>
                </div>
              </div>
            </div>
          </div>

          <!-- Empty state -->
          <div id="noEventState">
            <div class="empty-state" style="min-height: 300px">
              <div class="empty-icon">👥</div>
              <div class="empty-text">เลือกกิจกรรมเพื่อดูผู้เข้าร่วม</div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- Shared member search suggest dropdown (positioned dynamically per row) -->
    <div id="memberSuggest" style="display:none;position:absolute;background:var(--surface,#fff);border:1px solid var(--border,#e2e8f0);border-radius:8px;box-shadow:0 6px 20px rgba(0,0,0,.15);z-index:500;max-height:240px;overflow-y:auto;min-width:280px"></div>

    <script src="../../js/core/auth.js"></script>
    <script src="../../js/core/authz.js"></script>
    <script>AuthZ.requirePerm("attendee_view");</script>
    <script type="module" src="./attendees.js"></script>
    <script src="../../js/components/modal/deleteModal.js"></script>
    <script src="../../js/components/modal/modalManager.js"></script>
    <script src="../../js/components/modal/enterSave.js"></script>
    <script type="module">
      import { loadTopbar } from "../../js/components/navigation/topbar.js";
      loadTopbar("👥 ผู้เข้าร่วมกิจกรรม");
    </script>
    <script src="../../js/components/navigation/sidebar.js"></script>
  </body>
</html>
