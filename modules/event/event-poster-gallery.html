<!doctype html>
<html lang="th">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Poster Gallery — A4S-ERP</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="../../css/main.css" />
    <link rel="stylesheet" href="events.css" />
    <link rel="stylesheet" href="./event-poster-gallery.css" />
  </head>
  <body>
    <div class="loading-overlay" id="loadingOverlay">
      <div class="spinner"></div>
    </div>
    <div class="toast" id="toast"></div>

    <div class="topbar"></div>
    <div class="layout">
      <div id="sidebar-container"></div>

      <div class="content-area">
        <div class="page">
          <!-- PAGE HEADER -->
          <div class="epg-page-header">
            <button
              class="btn btn-outline epg-back-btn"
              onclick="window.location.href = 'events-list.html'"
            >
              ← กลับ
            </button>

            <div class="epg-header-divider"></div>

            <div class="epg-header-info">
              <div class="epg-header-title">🖼️ Poster Gallery</div>
              <div class="epg-header-subtitle" id="pageSubtitle">กำลังโหลด...</div>
            </div>

            <div class="epg-header-actions">
              <!-- Grid Toggle -->
              <div class="epg-grid-toggle">
                <button class="epg-toggle-btn" id="btnGrid3" onclick="window.setGrid(3)">⊞ 3</button>
                <button class="epg-toggle-btn active" id="btnGrid4" onclick="window.setGrid(4)">⊟ 4</button>
                <button class="epg-toggle-btn" id="btnGrid5" onclick="window.setGrid(5)">▦ 5</button>
              </div>
            </div>
          </div>

          <!-- Filter Chips -->
          <div class="epg-filter-chips" id="filterChipsWrap">
            <button
              class="epg-chip active"
              data-cat=""
              onclick="window.setTypeFilter(this, '')"
            >
              ทั้งหมด
            </button>
            <!-- dynamic category chips injected by JS -->
            <!-- Poster filter -->
            <div style="margin-left: auto">
              <select class="filter-select" id="filterPoster">
                <option value="all">🖼️ ทั้งหมด</option>
                <option value="has" selected>✅ มีโปสเตอร์</option>
                <option value="none">❌ ไม่มีโปสเตอร์</option>
              </select>
            </div>
          </div>

          <!-- GALLERY BODY -->
          <div id="galleryBody">
            <!-- จะ render เป็น Section แยกตาม Month -->
          </div>
        </div>

        <script src="../../js/core/auth.js"></script>
        <script src="../../js/core/authz.js"></script>
        <script>AuthZ.requirePerm("poster_view");</script>
        <script type="module" src="./event-poster-gallery.js"></script>
        <script src="../../js/components/modal/deleteModal.js"></script>
        <script src="../../js/components/modal/modalManager.js"></script>
        <script type="module">
          import { loadTopbar } from "../../js/components/navigation/topbar.js";
          loadTopbar("🖼️ Poster Gallery");
        </script>
        <script src="../../js/components/navigation/imgPopup.js"></script>
        <script src="../../js/components/navigation/sidebar.js"></script>
      </div>
    </div>
  </body>
</html>
