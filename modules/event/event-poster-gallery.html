<!doctype html>
<html lang="th">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Poster Gallery — A4S-ERP</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700&family=IBM+Plex+Mono:wght@400;500&family=Playfair+Display:wght@600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="../../css/main.css" />
    <link rel="stylesheet" href="events.css" />
    <link rel="stylesheet" href="./event-poster-gallery.css" />
  </head>
  <body>
    <div class="loading-overlay" id="loadingOverlay">
      <div class="spinner"></div>
    </div>
    <div class="toast" id="toast"></div>

    <div class="topbar"></div>
        <div class="page">
          <!-- HERO -->
          <div class="page-hero page-hero--simple page-hero--compact">
            <div>
              <h1 class="page-hero-title">🖼️ Poster Gallery</h1>
              <p class="page-hero-sub" id="pageSubtitle">กำลังโหลด...</p>
            </div>
            <div class="page-hero-actions">
              <div class="epg-grid-toggle">
                <button class="epg-toggle-btn" id="btnGrid3" onclick="window.setGrid(3)">⊞ 3</button>
                <button class="epg-toggle-btn active" id="btnGrid4" onclick="window.setGrid(4)">⊟ 4</button>
                <button class="epg-toggle-btn" id="btnGrid5" onclick="window.setGrid(5)">▦ 5</button>
              </div>
            </div>
          </div>

          <!-- MAIN CARD (floating content like events-list) -->
          <div class="table-card">

            <!-- Filter Chips -->
            <div class="epg-filter-chips" id="filterChipsWrap">
              <span class="epg-filter-label">⏱ ช่วงเวลา</span>
              <span class="tooltip-wrap">
                <button
                  class="epg-chip active"
                  id="btnThisMonth"
                  onclick="window.toggleThisMonth(this)"
                >
                  📅 เดือนนี้
                </button>
                <span class="tooltip tooltip-below" id="btnThisMonthTip">คลิกเพื่อดูทั้งหมด</span>
              </span>
              <span class="epg-filter-divider" aria-hidden="true"></span>
              <span class="epg-filter-label">🏷 ประเภท</span>
              <div class="dropdown filter-dropdown" id="epgCatDropdown">
                <button class="dropdown-toggle filter-dropdown-toggle" type="button" onclick="window.toggleCatDropdown(event)">
                  <span class="filter-dropdown-label" id="epgCatLabel">🧿 ทั้งหมด</span>
                  <span class="filter-dropdown-chevron">▾</span>
                </button>
                <div class="dropdown-menu" id="epgCatMenu">
                  <!-- items populated by JS, with default "ทั้งหมด" -->
                </div>
              </div>
            </div>

            <!-- GALLERY BODY -->
            <div class="epg-gallery-wrap" id="galleryBody">
              <!-- จะ render เป็น Section แยกตาม Month -->
            </div>

        <script src="../../js/core/auth.js"></script>
        <script src="../../js/core/authz.js"></script>
<script src="../../js/core/date-format.js"></script>
        <script>AuthZ.requirePerm("poster_view");</script>
        <script type="module" src="./event-poster-gallery.js"></script>
        <script src="../../js/components/modal/deleteModal.js"></script>
        <script src="../../js/components/modal/modalManager.js"></script>
        <script type="module">
          import { loadTopbar } from "../../js/components/navigation/topbar.js";
          loadTopbar("🖼️ Poster Gallery");
        </script>
        <script src="../../js/components/navigation/imgPopup.js"></script>
        <script src="../../js/components/navigation/sidebar.js"></script>
      </div>
    </div>
  </body>
</html>
