<!doctype html>
<html lang="th">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ยื่นคำขอจัดกิจกรรม — A4S-ERP</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="../../../../css/main.css" />
    <link rel="stylesheet" href="./event-request-form.css" />
  </head>
  <body>
    <div class="loading-overlay" id="loadingOverlay">
      <div class="spinner"></div>
    </div>
    <div class="toast" id="toast"></div>

    <div class="topbar"></div>
    <div class="layout">
      <div id="sidebar-container"></div>
      <div class="content-area">
        <div class="page">
          <!-- PAGE HEADER -->
          <div class="erf-page-header">
            <div>
              <div class="erf-page-title">📋 ยื่นคำขอจัดกิจกรรม</div>
              <div class="erf-page-sub" id="pageSubtitle">คำขอใหม่</div>
            </div>
            <button
              class="btn btn-secondary"
              onclick="window.location.href = './event-requests.html'"
            >
              ← กลับรายการ
            </button>
          </div>

          <!-- FORM CARD -->
          <div class="erf-card">
            <!-- ── ส่วนที่ 1: ข้อมูลทั่วไป ── -->
            <div class="erf-section-title">📌 ข้อมูลทั่วไป</div>
            <div class="erf-grid">
              <div class="form-group erf-span2">
                <label class="form-label"
                  >ชื่อกิจกรรม <span class="req-mark">*</span></label
                >
                <input
                  class="form-input"
                  id="fReqName"
                  placeholder="ระบุชื่อกิจกรรมที่ต้องการจัด"
                />
              </div>

              <div class="form-group">
                <label class="form-label"
                  >ประเภทกิจกรรม <span class="req-mark">*</span></label
                >
                <select class="form-input" id="fReqType">
                  <option value="">-- เลือกประเภท --</option>
                  <option value="BOOTH">🏪 ออกบูธ</option>
                  <option value="MEETING">👥 ประชุม / สัมมนา</option>
                  <option value="ONLINE">💻 Online</option>
                  <option value="HYBRID">🔀 Hybrid</option>
                  <option value="CONFERENCE">🎤 Conference</option>
                  <option value="OTHER">📌 อื่นๆ</option>
                </select>
              </div>

              <div class="form-group">
                <label class="form-label">แผนกที่ขอ</label>
                <select class="form-input" id="fReqDept">
                  <option value="">-- เลือกแผนก --</option>
                </select>
              </div>

              <div class="form-group">
                <label class="form-label"
                  >วันที่ต้องการจัด <span class="req-mark">*</span></label
                >
                <input type="date" class="form-input" id="fReqDate" />
              </div>

              <div class="form-group">
                <label class="form-label">วันสิ้นสุด</label>
                <input type="date" class="form-input" id="fReqEndDate" />
              </div>

              <div class="form-group">
                <label class="form-label">เวลาเริ่ม</label>
                <input type="time" class="form-input" id="fReqStartTime" />
              </div>

              <div class="form-group">
                <label class="form-label">เวลาสิ้นสุด</label>
                <input type="time" class="form-input" id="fReqEndTime" />
              </div>
            </div>

            <div class="erf-divider"></div>

            <!-- ── ส่วนที่ 2: สถานที่และผู้เข้าร่วม ── -->
            <div class="erf-section-title">📍 สถานที่และผู้เข้าร่วม</div>
            <div class="erf-grid">
              <div class="form-group erf-span2">
                <label class="form-label">สถานที่จัดงาน</label>
                <input
                  class="form-input"
                  id="fReqLocation"
                  placeholder="ชื่อสถานที่ / ที่อยู่"
                />
              </div>

              <div class="form-group">
                <label class="form-label">จำนวนผู้เข้าร่วม (คน)</label>
                <input
                  type="number"
                  class="form-input"
                  id="fReqAttendees"
                  min="0"
                  placeholder="0"
                />
              </div>

              <div class="form-group">
                <label class="form-label">งบประมาณโดยประมาณ (บาท)</label>
                <input
                  type="number"
                  class="form-input"
                  id="fReqBudget"
                  min="0"
                  placeholder="0.00"
                />
              </div>
            </div>

            <div class="erf-divider"></div>

            <!-- ── ส่วนที่ 3: รายละเอียดและเหตุผล ── -->
            <div class="erf-section-title">📝 รายละเอียดและเหตุผล</div>
            <div class="erf-grid">
              <div class="form-group erf-span2">
                <label class="form-label">วัตถุประสงค์ / เหตุผล</label>
                <textarea
                  class="form-input"
                  id="fReqObjective"
                  rows="3"
                  placeholder="เหตุผลที่ต้องการจัดกิจกรรมนี้..."
                ></textarea>
              </div>

              <div class="form-group erf-span2">
                <label class="form-label">รายละเอียดกิจกรรม</label>
                <textarea
                  class="form-input"
                  id="fReqDetail"
                  rows="4"
                  placeholder="รายละเอียดกิจกรรม กำหนดการ หรือสิ่งที่ต้องการ..."
                ></textarea>
              </div>
            </div>

            <div class="erf-divider"></div>

            <!-- ── ส่วนที่ 4: ไฟล์แนบ ── -->
            <div class="erf-section-title">📎 ไฟล์แนบ</div>
            <div class="erf-grid">
              <div class="form-group erf-span2">
                <label class="form-label">แนบเอกสารประกอบ</label>
                <div
                  class="erf-file-area"
                  id="fileArea"
                  onclick="document.getElementById('fReqFile').click()"
                  ondragover="event.preventDefault()"
                  ondrop="window.handleFileDrop(event)"
                >
                  <div class="erf-file-icon">📁</div>
                  <div class="erf-file-hint">คลิกหรือลากไฟล์มาวาง</div>
                  <div class="erf-file-sub">
                    PDF, DOC, DOCX, JPG, PNG — ไม่เกิน 10MB
                  </div>
                  <div class="erf-file-name" id="fileName"></div>
                </div>
                <input
                  type="file"
                  id="fReqFile"
                  style="display: none"
                  accept=".pdf,.doc,.docx,.jpg,.jpeg,.png"
                  onchange="window.handleFileSelect(this)"
                />
              </div>
            </div>
          </div>
          <!-- /erf-card -->

          <!-- FOOTER ACTIONS -->
          <div class="erf-footer">
            <button
              class="btn btn-secondary"
              onclick="window.location.href = './event-requests.html'"
            >
              ยกเลิก
            </button>
            <button class="btn btn-primary" onclick="window.submitRequest()">
              📤 ส่งคำขอ
            </button>
          </div>
        </div>
        <!-- /page -->
      </div>
    </div>

    <script type="module" src="./event-request-form.js"></script>
    <script src="../../../../js/core/auth.js"></script>
    <script src="../../../../js/components/modal/deleteModal.js"></script>
    <script src="../../../../js/components/modal/modalManager.js"></script>
    <script type="module">
      import { loadTopbar } from "../../../../js/components/navigation/topbar.js";
      loadTopbar("📋 ยื่นคำขอจัดกิจกรรม");
    </script>
    <script src="../../../../js/components/navigation/sidebar.js"></script>
  </body>
</html>
