<!doctype html>
<html lang="th">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>คำขอจัดกิจกรรม — A4S-ERP</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="../../../../css/main.css" />
    <link rel="stylesheet" href="./event-requests.css" />
  </head>
  <body>
    <div class="loading-overlay" id="loadingOverlay">
      <div class="spinner"></div>
    </div>
    <div class="toast" id="toast"></div>

    <div class="topbar"></div>
    <div class="layout">
      <div id="sidebar-container"></div>
      <div class="content-area">
        <div class="page">
          <!-- STATS -->
          <div class="stats-row">
            <div class="stat-card">
              <div class="stat-icon">📋</div>
              <div>
                <div class="stat-value" id="cardTotal">0</div>
                <div class="stat-label">คำขอทั้งหมด</div>
              </div>
            </div>
            <div class="stat-card">
              <div class="stat-icon">⏳</div>
              <div>
                <div class="stat-value" id="cardPending">0</div>
                <div class="stat-label">รอดำเนินการ</div>
              </div>
            </div>
            <div class="stat-card">
              <div class="stat-icon">✅</div>
              <div>
                <div class="stat-value" id="cardApproved">0</div>
                <div class="stat-label">อนุมัติแล้ว</div>
              </div>
            </div>
            <div class="stat-card">
              <div class="stat-icon">❌</div>
              <div>
                <div class="stat-value" id="cardRejected">0</div>
                <div class="stat-label">ปฏิเสธ</div>
              </div>
            </div>
          </div>

          <!-- TOOLBAR -->
          <div class="toolbar">
            <div class="search-wrap">
              <span class="search-icon">🔍</span>
              <input
                class="search-input"
                id="searchInput"
                placeholder="ค้นหาชื่อกิจกรรม..."
              />
            </div>
            <select class="filter-select" id="filterStatus">
              <option value="">⚪ ทุกสถานะ</option>
              <option value="PENDING">⏳ รอดำเนินการ</option>
              <option value="APPROVED">✅ อนุมัติแล้ว</option>
              <option value="REJECTED">❌ ปฏิเสธ</option>
            </select>
            <select class="filter-select" id="filterType">
              <option value="">⚪ ทุกประเภท</option>
              <option value="BOOTH">🏪 ออกบูธ</option>
              <option value="MEETING">👥 ประชุม</option>
              <option value="ONLINE">💻 Online</option>
              <option value="HYBRID">🔀 Hybrid</option>
              <option value="CONFERENCE">🎤 Conference</option>
              <option value="OTHER">📌 อื่นๆ</option>
            </select>
            <div class="toolbar-right">
              <button
                class="btn btn-primary"
                onclick="window.location.href = './event-request-form.html'"
              >
                ＋ ยื่นคำขอ
              </button>
            </div>
          </div>

          <!-- TABLE: Room Booking Requests -->
          <div class="content-wrap" style="margin-top:24px;">
            <div class="table-card">
              <div class="table-hdr">
                <div class="table-title">🚪 รายการจองห้องประชุม</div>
                <div class="table-count" id="rbkqCount">กำลังโหลด...</div>
              </div>
              <div class="table-wrap">
                <table class="data-table">
                  <thead>
                    <tr>
                      <th style="width:140px">รหัสคำขอ</th>
                      <th>ห้อง</th>
                      <th class="col-center">ผู้จอง</th>
                      <th class="col-center">CS</th>
                      <th class="col-center">วันที่</th>
                      <th class="col-center">เวลา</th>
                      <th class="col-center">สถานะ</th>
                      <th class="col-center">จัดการ</th>
                    </tr>
                  </thead>
                  <tbody id="rbkqTableBody">
                    <tr><td colspan="8"><div class="empty-state"><div class="empty-icon">🚪</div><div class="empty-text">กำลังโหลด...</div></div></td></tr>
                  </tbody>
                </table>
              </div>
            </div>
          </div>

        </div>
        <!-- /page -->
      </div>
      <!-- /content-area -->
    </div>
    <!-- /layout -->

    <!-- ── SIDE PANEL ── -->
    <div class="req-panel" id="reqPanel">
      <div class="req-panel-header">
        <div class="req-panel-title">📋 รายละเอียดคำขอ</div>
        <button class="btn-icon" onclick="window.closeReqPanel()">✕</button>
      </div>
      <div class="req-panel-body" id="reqPanelBody">
        <!-- filled by JS -->
      </div>
      <div class="req-panel-footer" id="reqPanelFooter">
        <!-- filled by JS (approve/reject buttons) -->
      </div>
    </div>
    <div
      id="panelBackdrop"
      style="display: none; position: fixed; inset: 0; z-index: 299"
      onclick="window.closeReqPanel()"
    ></div>

    <!-- ── REQUEST MODAL ── -->
    <div class="req-modal-overlay" id="reqModalOverlay">
      <div class="req-modal">
        <div class="req-modal-header">
          <div style="font-weight: 700; font-size: 15px">
            📋 ยื่นคำขอจัดกิจกรรม
          </div>
          <button class="btn-icon" onclick="window.closeRequestModal()">
            ✕
          </button>
        </div>
        <div class="req-modal-body">
          <div class="req-form-grid">
            <div class="form-group span2">
              <label class="form-label"
                >ชื่อกิจกรรม <span class="req-mark">*</span></label
              >
              <input
                class="form-input"
                id="fReqName"
                placeholder="ชื่อกิจกรรมที่ต้องการจัด"
              />
            </div>
            <div class="form-group">
              <label class="form-label"
                >ประเภท <span class="req-mark">*</span></label
              >
              <select class="form-input" id="fReqType">
                <option value="">-- เลือกประเภท --</option>
                <option value="BOOTH">🏪 ออกบูธ</option>
                <option value="MEETING">👥 ประชุม</option>
                <option value="ONLINE">💻 Online</option>
                <option value="HYBRID">🔀 Hybrid</option>
                <option value="CONFERENCE">🎤 Conference</option>
                <option value="OTHER">📌 อื่นๆ</option>
              </select>
            </div>
            <div class="form-group">
              <label class="form-label">แผนก</label>
              <select class="form-input" id="fReqDept">
                <option value="">-- เลือกแผนก --</option>
              </select>
            </div>
            <div class="form-group">
              <label class="form-label"
                >วันที่ต้องการจัด <span class="req-mark">*</span></label
              >
              <input type="date" class="form-input" id="fReqDate" />
            </div>
            <div class="form-group">
              <label class="form-label">วันสิ้นสุด</label>
              <input type="date" class="form-input" id="fReqEndDate" />
            </div>
            <div class="form-group span2">
              <label class="form-label">สถานที่</label>
              <input
                class="form-input"
                id="fReqLocation"
                placeholder="สถานที่จัดกิจกรรม"
              />
            </div>
            <div class="form-group">
              <label class="form-label">จำนวนผู้เข้าร่วม (คน)</label>
              <input
                type="number"
                class="form-input"
                id="fReqAttendees"
                min="0"
                placeholder="0"
              />
            </div>
            <div class="form-group">
              <label class="form-label">แนบไฟล์</label>
              <input
                type="file"
                class="form-input"
                id="fReqFile"
                accept=".pdf,.doc,.docx,.jpg,.png"
              />
            </div>
            <div class="form-group span2">
              <label class="form-label">รายละเอียด</label>
              <textarea
                class="form-input"
                id="fReqDetail"
                rows="3"
                placeholder="รายละเอียดเพิ่มเติม..."
              ></textarea>
            </div>
          </div>
        </div>
        <div class="req-modal-footer">
          <button
            class="btn btn-secondary"
            onclick="window.closeRequestModal()"
          >
            ยกเลิก
          </button>
          <button class="btn btn-primary" onclick="window.submitRequest()">
            📤 ส่งคำขอ
          </button>
        </div>
      </div>
    </div>

    <!-- ── REJECT MODAL ── -->
    <div class="reject-modal-overlay" id="rejectModalOverlay">
      <div class="reject-modal">
        <div style="font-weight: 700; font-size: 15px; margin-bottom: 14px">
          ❌ เหตุผลที่ปฏิเสธ
        </div>
        <textarea
          class="form-input"
          id="fRejectReason"
          rows="3"
          placeholder="ระบุเหตุผล..."
        ></textarea>
        <div
          style="
            display: flex;
            gap: 8px;
            justify-content: flex-end;
            margin-top: 14px;
          "
        >
          <button class="btn btn-secondary" onclick="window.closeRejectModal()">
            ยกเลิก
          </button>
          <button class="btn btn-danger" onclick="window.confirmReject()">
            ยืนยันปฏิเสธ
          </button>
        </div>
      </div>
    </div>

    <!-- Room Booking Requests Section -->
    <style>
      .room-bkq-section { margin-top: 24px; }
      .room-bkq-section .table-hdr { display:flex; justify-content:space-between; align-items:center; padding:12px 16px; border-bottom:1px solid #e2e8f0; }
      .room-bkq-section .table-title { font-weight:700; font-size:14px; color:#1e293b; }
      .room-bkq-section .table-count { font-size:11px; color:#64748b; }
      .room-bkq-badge { display:inline-block; font-size:10px; font-weight:700; padding:2px 8px; border-radius:999px; }
      .room-bkq-badge.PENDING  { background:#fef9c3; color:#92400e; }
      .room-bkq-badge.APPROVED { background:#dcfce7; color:#166534; }
      .room-bkq-badge.REJECTED { background:#fee2e2; color:#991b1b; }
      .room-bkq-badge.CANCELLED{ background:#f1f5f9; color:#64748b; }
    </style>

    <script type="module" src="./event-requests.js"></script>
    <script src="../../../../js/core/auth.js"></script>
    <script src="../../../../js/components/modal/deleteModal.js"></script>
    <script src="../../../../js/components/modal/modalManager.js"></script>
    <script src="../../../../js/components/modal/enterModal.js"></script>
    <script type="module">
      import { loadTopbar } from "../../../../js/components/navigation/topbar.js";
      loadTopbar("📋 คำขอจัดกิจกรรม");
    </script>
    <script src="../../../../js/components/navigation/sidebar.js"></script>

    <script>
    // ── Room Booking Requests loader ──────────────────────────
    async function loadRoomBookingRequests() {
      const SB_URL = localStorage.getItem("sb_url") || "";
      const SB_KEY = localStorage.getItem("sb_key") || "";
      const tbody = document.getElementById("rbkqTableBody");
      const counter = document.getElementById("rbkqCount");
      if (!tbody) return;
      if (!SB_URL || !SB_KEY) {
        tbody.innerHTML = `<tr><td colspan="8" style="text-align:center;color:#94a3b8;font-size:12px;">ไม่พบข้อมูล Supabase</td></tr>`;
        return;
      }

      const STATUS_MAP = {
        PENDING:  { label: "รอดำเนินการ", cls: "PENDING"  },
        APPROVED: { label: "อนุมัติแล้ว", cls: "APPROVED" },
        REJECTED: { label: "ปฏิเสธ",      cls: "REJECTED" },
        CANCELLED:{ label: "ยกเลิก",      cls: "CANCELLED"},
      };

      try {
        const [rbRes, usersRes] = await Promise.all([
          fetch(`${SB_URL}/rest/v1/room_booking_requests?select=*&order=created_at.desc`,
            { headers: { apikey: SB_KEY, Authorization: `Bearer ${SB_KEY}` } }),
          fetch(`${SB_URL}/rest/v1/users?select=user_id,full_name&is_active=eq.true`,
            { headers: { apikey: SB_KEY, Authorization: `Bearer ${SB_KEY}` } }),
        ]);
        const rows = await rbRes.json().catch(() => []) || [];
        const users = await usersRes.json().catch(() => []) || [];
        const userMap = Object.fromEntries(users.map(u => [String(u.user_id), u.full_name]));

        counter.textContent = `${rows.length} รายการ`;

        if (rows.length === 0) {
          tbody.innerHTML = `<tr><td colspan="8"><div class="empty-state"><div class="empty-icon">🚪</div><div class="empty-text">ยังไม่มีรายการจองห้อง</div></div></td></tr>`;
          counter.textContent = "0 รายการ";
          return;
        }

        counter.textContent = `${rows.length} รายการ`;
        tbody.innerHTML = rows.map(r => {
          const s = STATUS_MAP[r.status] || STATUS_MAP.PENDING;
          const booker = userMap[String(r.booked_by)] || "—";
          const cs     = userMap[String(r.cs_id)] || "—";
          const timeStr = r.end_time === "ALLDAY" ? "ตลอดทั้งวัน" : `${r.start_time || ""}–${r.end_time || ""}`;
          return `
            <tr>
              <td><span style="font-family:monospace;font-size:11px;color:#6366f1">${r.request_code}</span></td>
              <td>${r.place_name}</td>
              <td class="col-center">${booker}</td>
              <td class="col-center">${cs}</td>
              <td class="col-center">${r.booking_date}</td>
              <td class="col-center">${timeStr}</td>
              <td class="col-center"><span class="room-bkq-badge ${s.cls}">${s.label}</span></td>
              <td class="col-center">
                <button class="btn-icon" title="อนุมัติ" onclick="updateRoomBooking(${r.request_id},'APPROVED',this)">✅</button>
                <button class="btn-icon" title="ปฏิเสธ"  onclick="updateRoomBooking(${r.request_id},'REJECTED',this)">❌</button>
              </td>
            </tr>`;
        }).join("");
      } catch (e) {
        tbody.innerHTML = `<tr><td colspan="8" style="text-align:center;color:#ef4444;font-size:12px;">โหลดข้อมูลไม่ได้: ${e.message}</td></tr>`;
      }
    }
    // รอให้ auth.js โหลด credentials ก่อน
    setTimeout(loadRoomBookingRequests, 800);

    async function updateRoomBooking(id, status, btn) {
      const SB_URL = localStorage.getItem("sb_url") || "";
      const SB_KEY = localStorage.getItem("sb_key") || "";
      btn.disabled = true;
      try {
        const res = await fetch(`${SB_URL}/rest/v1/room_booking_requests?request_id=eq.${id}`, {
          method: "PATCH",
          headers: { apikey: SB_KEY, Authorization: `Bearer ${SB_KEY}`, "Content-Type": "application/json", Prefer: "return=representation" },
          body: JSON.stringify({ status }),
        });
        if (res.ok) loadRoomBookingRequests();
      } catch { btn.disabled = false; }
    }
    window.updateRoomBooking = updateRoomBooking;
    </script>
  </body>
</html>
