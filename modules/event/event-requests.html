    <script>
    // ── Supabase helper ───────────────────────────────────────
    function bkqSB() {
      return { url: localStorage.getItem("sb_url")||"", key: localStorage.getItem("sb_key")||"" };
    }
    async function bkqFetch(table, query="", opts={}) {
      const { url, key } = bkqSB();
      const { method="GET", body } = opts;
      const res = await fetch(`${url}/rest/v1/${table}${query}`, {
        method,
        headers: {
          apikey: key, Authorization: `Bearer ${key}`,
          "Content-Type": "application/json",
          ...(method==="POST"||method==="PATCH" ? { Prefer:"return=representation" } : {}),
        },
        body: body ? JSON.stringify(body) : undefined,
      });
      if (!res.ok) {
        // GET stays lenient (preserve existing silent behavior); write methods throw with details
        if (method === "GET") return [];
        const txt = await res.text().catch(() => "");
        throw new Error(`${res.status} ${res.statusText}${txt ? " — " + txt : ""}`);
      }
      return method==="DELETE" ? null : res.json().catch(()=>[]);
    }

    // ── State ─────────────────────────────────────────────────
    let _bkqRows = [];       // enriched rows (with _booker, _cs)
    let _bkqCurrentId = null;
    let _bkqLogPollTimer  = null;
    let _bkqLogsCache     = [];
    let _bkqLastLogSig    = "";
    let _bkqListPollTimer = null;
    let _bkqListLastSig   = "";
    let _bkqLogCountCache = {}; // { [request_id]: totalLogCount }

    function startBkqLogPolling(requestId) {
      stopBkqLogPolling();
      _bkqLogPollTimer = setInterval(() => loadBkqLogs(requestId, true), 4000);
    }
    function stopBkqLogPolling() {
      if (_bkqLogPollTimer) { clearInterval(_bkqLogPollTimer); _bkqLogPollTimer = null; }
      _bkqLastLogSig = "";
    }

    const BKQ_STATUS_MAP = {
      PENDING:  { label:"จองแล้ว",  cls:"APPROVED"  },
      APPROVED: { label:"จองแล้ว",  cls:"APPROVED" },
      REJECTED: { label:"ยกเลิก",    cls:"CANCELLED" },
      CANCELLED:{ label:"ยกเลิก",    cls:"CANCELLED"},
    };

    // ── Room Booking Requests loader ──────────────────────────
    async function loadRoomBookingRequests(silent = false) {
      const { url, key } = bkqSB();
      const tbody   = document.getElementById("rbkqTableBody");
      const counter = document.getElementById("rbkqCount");
      if (!tbody) return;
      if (!url || !key) {
        if (!silent) tbody.innerHTML = `<tr class="r-card-plain"><td colspan="10" style="text-align:center;color:#94a3b8;font-size:12px;">ไม่พบข้อมูล Supabase</td></tr>`;
        return;
      }
      try {
        const [rbRes, usersRes] = await Promise.all([
          fetch(`${url}/rest/v1/room_booking_requests?select=*&order=created_at.desc`,
            { headers: { apikey:key, Authorization:`Bearer ${key}` } }),
          fetch(`${url}/rest/v1/users?select=user_id,full_name&is_active=eq.true`,
            { headers: { apikey:key, Authorization:`Bearer ${key}` } }),
        ]);
        const raw   = await rbRes.json().catch(()=>[]) || [];
        const users = await usersRes.json().catch(()=>[]) || [];

        const sig = raw.map(r => `${r.request_id}:${r.status}:${r.updated_at||r.created_at}`).join("|");
        if (silent && sig === _bkqListLastSig) return;
        _bkqListLastSig = sig;

        const userMap = Object.fromEntries(users.map(u=>[String(u.user_id), u.full_name]));
        _bkqRows = raw.map(r => ({
          ...r,
          _booker: r.booked_by_name || userMap[String(r.booked_by)] || "—",
          _cs:     r.cs_name        || userMap[String(r.cs_id)]     || "—",
        }));

        filterRoomBookings();   // re-apply current search/filter
      } catch (e) {
        if (!silent) tbody.innerHTML = `<tr class="r-card-plain"><td colspan="10" style="text-align:center;color:#ef4444;font-size:12px;">โหลดข้อมูลไม่ได้: ${e.message}</td></tr>`;
      }
    }

    // Date in Bangkok timezone as YYYY-MM-DD (en-CA gives ISO-like order)
    function bkqBkkDate(d) {
      const dt = d ? new Date(d) : new Date();
      if (isNaN(dt)) return "";
      return dt.toLocaleDateString("en-CA", { timeZone: "Asia/Bangkok" });
    }

    // Log-oriented stat cards (computed from full _bkqRows, not filtered view)
    function updateBkqCards() {
      const rows  = _bkqRows || [];
      const today = bkqBkkDate();
      const month = today.slice(0, 7);
      const setC  = (id, v) => { const el = document.getElementById(id); if (el) el.textContent = v; };
      setC("cardTotal",     rows.length);
      setC("cardToday",     rows.filter(r => bkqBkkDate(r.created_at) === today).length);
      setC("cardMonth",     rows.filter(r => bkqBkkDate(r.created_at).startsWith(month)).length);
      setC("cardCancelled", rows.filter(r => r.status === "CANCELLED" || r.status === "REJECTED").length);
    }

    function renderRoomBookings(rows) {
      const tbody   = document.getElementById("rbkqTableBody");
      const counter = document.getElementById("rbkqCount");
      counter.textContent = `${rows.length} รายการ`;

      // Refresh log stat cards (count from full _bkqRows, not filtered view)
      updateBkqCards();

      if (rows.length === 0) {
        tbody.innerHTML = `<tr class="r-card-plain"><td colspan="10"><div class="empty-state"><div class="empty-icon">🚪</div><div class="empty-text">ยังไม่มีรายการจองห้อง</div></div></td></tr>`;
        return;
      }

      tbody.innerHTML = rows.map(r => {
        const s       = BKQ_STATUS_MAP[r.status] || BKQ_STATUS_MAP.PENDING;
        const booker  = r._booker;
        const cs      = r._cs;
        const timeStr = r.end_time==="ALLDAY" ? "ตลอดทั้งวัน" : `${r.start_time||""}–${r.end_time||""}`;
        const unread  = getBkqUnread(r.request_id);
        const unreadBadge = unread > 0
          ? `<span style="display:inline-flex;align-items:center;gap:2px;background:#f97316;color:#fff;font-size:9px;font-weight:700;padding:1px 6px;border-radius:999px;line-height:1.5;margin-left:4px">💬 ${unread}</span>`
          : "";
        const noteRaw  = (r.note || "").replace(/</g,"&lt;");
        const noteHtml = noteRaw
          ? `<span title="${noteRaw.replace(/"/g,'&quot;')}" style="display:inline-block;max-width:180px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;vertical-align:middle;color:#475569">${noteRaw}</span>`
          : `<span style="color:#cbd5e1">—</span>`;
        return `
          <tr data-rid="${r.request_id}" style="cursor:pointer">
            <td class="r-card-corner" style="text-align:center" onclick="event.stopPropagation()">
              <input type="checkbox" class="bkq-chk" value="${r.request_id}" onchange="syncBkqDeleteBtn()" />
            </td>
            <td class="r-card-title">${r.place_name}${r.room_name ? ` — ${r.room_name}` : ""}${unreadBadge}</td>
            <td class="col-center" data-label="ผู้จอง">${booker}</td>
            <td class="col-center" data-label="หมายเหตุ">${noteHtml}</td>
            <td class="col-center" data-label="CS">${cs}</td>
            <td class="col-center" data-label="วันที่ใช้ห้อง">${window.DateFmt?.formatDMY(r.booking_date) || r.booking_date || ""}</td>
            <td class="col-center" data-label="วันที่จอง">${window.DateFmt?.formatDMY(r.created_at) || (r.created_at||"").slice(0,10) || ""}</td>
            <td class="col-center" data-label="เวลา">${timeStr}</td>
            <td class="col-center" data-label="สถานะ"><span class="room-bkq-badge ${s.cls}">${s.label}</span></td>
            <td class="col-center" data-label="จัดการ" onclick="event.stopPropagation()">
              <button class="btn-icon" title="ผู้เข้าร่วม" onclick="window.open('./booking-attendees.html?request=${r.request_id}','_blank')" style="color:#6366f1">👥</button>
              <button class="btn-icon" title="แก้ไข" onclick="openBkqDetailById(${r.request_id})" style="color:#f97316">✏️</button>
              <button class="btn-icon" title="ลบ"    onclick="deleteBkqRow(${r.request_id},this)"  style="color:#ef4444">🗑</button>
            </td>
          </tr>`;
      }).join("");

      tbody.querySelectorAll("tr[data-rid]").forEach(tr => {
        tr.addEventListener("click", () => {
          const row = _bkqRows.find(r => String(r.request_id) === tr.dataset.rid);
          if (row) openBkqDetail(row);
        });
      });
    }

    function filterRoomBookings() {
      const q = (document.getElementById("rbkqSearch")?.value || "").toLowerCase();
      const s = document.getElementById("rbkqFilterStatus")?.value || "";
      const filtered = _bkqRows.filter(r =>
        (!q || r.request_code?.toLowerCase().includes(q) ||
               r.place_name?.toLowerCase().includes(q)   ||
               r._booker?.toLowerCase().includes(q)      ||
               r._cs?.toLowerCase().includes(q)) &&
        (!s || (s === "CANCELLED" ? (r.status === "CANCELLED" || r.status === "REJECTED") : r.status === s))
      );
      renderRoomBookings(filtered);
    }

    // ── Unread Log Counts ─────────────────────────────────────
    async function refreshBkqLogCounts() {
      if (!_bkqRows.length) return;
      const ids = _bkqRows.map(r => r.request_id).join(",");
      const logs = await bkqFetch("room_booking_logs", `?request_id=in.(${ids})&select=request_id,created_at`);
      const map = {};
      (logs || []).forEach(l => {
        const id = l.request_id;
        if (!map[id]) map[id] = { total: 0, latest: "" };
        map[id].total++;
        if (l.created_at > map[id].latest) map[id].latest = l.created_at;
      });
      const prev = JSON.stringify(_bkqLogCountCache);
      _bkqLogCountCache = map;
      if (JSON.stringify(map) !== prev) filterRoomBookings();
    }

    function getBkqUnread(requestId) {
      const info   = _bkqLogCountCache[requestId];
      if (!info || info.total === 0) return 0;
      const seenAt = localStorage.getItem(`lsLogCS_${requestId}`) || "";
      return seenAt >= info.latest ? 0 : info.total - parseInt(localStorage.getItem(`lsLogNCS_${requestId}`) || "0", 10);
    }

    function markBkqLogsRead(requestId, logs) {
      const count  = (logs || []).length;
      const latest = (logs || []).reduce((m, l) => l.created_at > m ? l.created_at : m, "");
      localStorage.setItem(`lsLogCS_${requestId}`, latest);
      localStorage.setItem(`lsLogNCS_${requestId}`, count);
      if (!_bkqLogCountCache[requestId]) _bkqLogCountCache[requestId] = { total: 0, latest: "" };
      _bkqLogCountCache[requestId].total  = count;
      _bkqLogCountCache[requestId].latest = latest || _bkqLogCountCache[requestId].latest;
      filterRoomBookings();
    }

    // ── Checkbox helpers ──────────────────────────────────────
    function toggleAllBkqCheckbox(master) {
      document.querySelectorAll(".bkq-chk").forEach(c => c.checked = master.checked);
      syncBkqDeleteBtn();
    }
    function syncBkqDeleteBtn() {
      const checked = document.querySelectorAll(".bkq-chk:checked").length;
      const btn = document.getElementById("btnDeleteSelectedBkq");
      if (btn) btn.style.display = checked > 0 ? "" : "none";
      const master = document.getElementById("chkAllBkq");
      if (master) {
        const total = document.querySelectorAll(".bkq-chk").length;
        master.indeterminate = checked > 0 && checked < total;
        master.checked = total > 0 && checked === total;
      }
    }

    // ── Open detail by ID ─────────────────────────────────────
    function openBkqDetailById(id) {
      const row = _bkqRows.find(r => String(r.request_id) === String(id));
      if (row) openBkqDetail(row);
    }

    // ── Delete single row ─────────────────────────────────────
    function deleteBkqRow(id, btn) {
      DeleteModal.open("ยืนยันลบรายการนี้?", async () => {
        btn.disabled = true;
        const { url, key } = bkqSB();
        const h = { apikey: key, Authorization: `Bearer ${key}` };
        try {
          await fetch(`${url}/rest/v1/room_booking_logs?request_id=eq.${id}`, { method: "DELETE", headers: h });
          await fetch(`${url}/rest/v1/room_booking_requests?request_id=eq.${id}`, { method: "DELETE", headers: h });
          _bkqListLastSig = "";
          await loadRoomBookingRequests();
        } catch { btn.disabled = false; }
      });
    }

    // ── Delete selected rows ──────────────────────────────────
    function deleteSelectedBkq() {
      const ids = [...document.querySelectorAll(".bkq-chk:checked")].map(c => c.value);
      if (!ids.length) return;
      DeleteModal.open(`ยืนยันลบ ${ids.length} รายการ?`, async () => {
        const { url, key } = bkqSB();
        const btn = document.getElementById("btnDeleteSelectedBkq");
        const h = { apikey: key, Authorization: `Bearer ${key}` };
        btn.disabled = true;
        try {
          await fetch(`${url}/rest/v1/room_booking_logs?request_id=in.(${ids.join(",")})`, { method: "DELETE", headers: h });
          await fetch(`${url}/rest/v1/room_booking_requests?request_id=in.(${ids.join(",")})`, { method: "DELETE", headers: h });
          _bkqListLastSig = "";
          await loadRoomBookingRequests();
        } catch { btn.disabled = false; }
      });
    }

    setTimeout(async () => {
      await loadRoomBookingRequests();
      refreshBkqLogCounts();
      _bkqListPollTimer = setInterval(async () => {
        await loadRoomBookingRequests(true);
        refreshBkqLogCounts();
      }, 8000);
    }, 800);

    function fireBookingCreatedNotification(payload) {
      if (!payload || !window.Notify) return;
      const fmt = (d) => (window.DateFmt?.formatDMY?.(d) || d || "");
      let requester = "";
      try {
        const raw = localStorage.getItem("erp_session") || sessionStorage.getItem("erp_session");
        if (raw) requester = JSON.parse(raw).full_name || JSON.parse(raw).username || "";
      } catch (_) {}
      window.Notify.evaluateRules("booking.created", {
        request_code:   payload.request_code || "",
        room_name:      payload.room_name || "",
        place_name:     payload.place_name || "",
        booking_date:   fmt(payload.booking_date),
        start_time:     payload.start_time || "",
        end_time:       payload.end_time === "ALLDAY" ? "ทั้งวัน" : (payload.end_time || ""),
        booked_by_name: payload.booked_by_name || "",
        cs_name:        payload.cs_name || "",
        note:           payload.note || "",
        num_people:     payload.num_people != null ? payload.num_people : "",
        requester,
      });
    }
    window.fireBookingCreatedNotification = fireBookingCreatedNotification;

    function fireBookingApprovedNotification(row) {
      if (!row || !window.Notify) return;
      const fmt = (d) => (window.DateFmt?.formatDMY?.(d) || d || "");
      let approver = "";
      try {
        const raw = localStorage.getItem("erp_session") || sessionStorage.getItem("erp_session");
        if (raw) approver = JSON.parse(raw).full_name || JSON.parse(raw).username || "";
      } catch (_) {}
      window.Notify.evaluateRules("booking.approved", {
        request_code:   row.request_code || "",
        room_name:      row.room_name || "",
        place_name:     row.place_name || "",
        booking_date:   fmt(row.booking_date),
        start_time:     row.start_time || "",
        end_time:       row.end_time === "ALLDAY" ? "ทั้งวัน" : (row.end_time || ""),
        booked_by_name: row.booked_by_name || "",
        cs_name:        row.cs_name || "",
        num_people:     row.num_people != null ? row.num_people : "",
        approver,
      });
    }
    window.fireBookingApprovedNotification = fireBookingApprovedNotification;

    // ── Booking Detail Modal ───────────────────────────────────
    function openBkqDetail(row) {
      _bkqCurrentId = row.request_id;
      document.getElementById("bkqModalCode").textContent = row.request_code || "—";

      // Fill edit fields
      document.getElementById("bkqEditBooker").value = row.booked_by_name || "";
      document.getElementById("bkqEditCS").value     = row.cs_name || "";
      document.getElementById("bkqEditRoom").value   = row.place_name || "";
      document.getElementById("bkqEditDate").value   = row.booking_date || "";
      document.getElementById("bkqEditStatus").value = (row.status === "REJECTED" ? "CANCELLED" : row.status) || "PENDING";

      const isAllday = row.end_time === "ALLDAY";
      document.getElementById("bkqAlldayCheck").checked = isAllday;
      document.getElementById("bkqTimeFields").style.display = isAllday ? "none" : "flex";
      document.getElementById("bkqEditStart").value = !isAllday ? (row.start_time||"").slice(0,5) : "";
      document.getElementById("bkqEditEnd").value   = !isAllday ? (row.end_time||"").slice(0,5)   : "";

      document.getElementById("bkqLogInput").value = "";

      /* Set chat panel header info */
      document.getElementById("bkqChatSubtitle").textContent = row.request_code || "—";
      document.getElementById("bkqSenderName").textContent =
        window.ERP_USER?.full_name || window.ERP_USER?.username || "Admin";

      document.getElementById("bkqDetailOverlay").classList.add("open");
      loadBkqLogs(row.request_id);
      startBkqLogPolling(row.request_id);
    }

    function closeBkqDetail() {
      document.getElementById("bkqDetailOverlay").classList.remove("open");
      _bkqCurrentId = null;
      stopBkqLogPolling();
    }

    function toggleBkqAllday(checked) {
      document.getElementById("bkqTimeFields").style.display = checked ? "none" : "flex";
    }

    async function saveBkqDetail() {
      if (!_bkqCurrentId) return;
      const btn = document.getElementById("bkqSaveBtn");
      const origLabel = btn.textContent;
      btn.disabled = true; btn.textContent = "กำลังบันทึก...";

      const isAllday = document.getElementById("bkqAlldayCheck").checked;
      const place = document.getElementById("bkqEditRoom").value.trim();
      const date  = document.getElementById("bkqEditDate").value;
      const start = document.getElementById("bkqEditStart").value;
      const end   = document.getElementById("bkqEditEnd").value;

      if (!place) { bkqToast("กรุณากรอกชื่อห้อง/สถานที่", "error"); btn.disabled = false; btn.textContent = origLabel; return; }
      if (!date)  { bkqToast("กรุณาเลือกวันที่", "error");         btn.disabled = false; btn.textContent = origLabel; return; }
      if (!isAllday && (!start || !end))   { bkqToast("กรุณากรอกเวลา", "error");                   btn.disabled = false; btn.textContent = origLabel; return; }
      if (!isAllday && start && end && start >= end) { bkqToast("เวลาสิ้นสุดต้องหลังเวลาเริ่มต้น", "error"); btn.disabled = false; btn.textContent = origLabel; return; }

      const payload = {
        booked_by_name: document.getElementById("bkqEditBooker").value.trim() || null,
        cs_name:        document.getElementById("bkqEditCS").value.trim()     || null,
        place_name:     place,
        booking_date:   date,
        start_time:     isAllday ? null : (start || null),
        end_time:       isAllday ? "ALLDAY" : (end || null),
        status:         document.getElementById("bkqEditStatus").value,
      };

      try {
        await bkqFetch("room_booking_requests", `?request_id=eq.${_bkqCurrentId}`, { method:"PATCH", body:payload });
        _bkqListLastSig = "";
        await loadRoomBookingRequests();
        closeBkqDetail();
        bkqToast("บันทึกการแก้ไขแล้ว ✅", "success");
      } catch(e) {
        bkqToast("บันทึกไม่สำเร็จ: " + (e.message || ""), "error");
      } finally {
        btn.disabled = false; btn.textContent = origLabel;
      }
    }

    // ── Logs ──────────────────────────────────────────────────
    async function loadBkqLogs(requestId, silent = false) {
      const list = document.getElementById("bkqLogList");
      if (!silent) {
        list.innerHTML = `<p class="bkq-empty">กำลังโหลด...</p>`;
        _bkqLastLogSig = "";
      }

      const logs = await bkqFetch("room_booking_logs", `?request_id=eq.${requestId}&select=*&order=created_at.asc`);

      const sig = (logs || []).map(l => l.created_at).join("|");
      if (silent && sig === _bkqLastLogSig) return;
      _bkqLastLogSig = sig;

      // Mark as read only when user actively opens the detail (not background polling)
      if (!silent) markBkqLogsRead(requestId, logs);

      if (!logs || logs.length === 0) {
        list.innerHTML = `<p class="bkq-empty">ยังไม่มี log</p>`;
        return;
      }

      const wasAtBottom = list.scrollHeight - list.scrollTop <= list.clientHeight + 8;

      _bkqLogsCache = logs;
      const myName = window.ERP_USER?.full_name || window.ERP_USER?.username || "";
      list.innerHTML = logs.map((log, idx) => {
        const time   = (log.created_at||"").slice(0,16).replace("T"," ");
        const author = log.created_by_name || "ระบบ";
        const isMe   = author === myName;
        let bg, border, textColor;
        if (isMe) { bg="#ede9fe"; border="#c4b5fd"; textColor="#4c1d95"; }
        else      { bg="#fffbeb"; border="#fcd34d"; textColor="#92400e"; }
        const br = isMe ? "14px 4px 14px 14px" : "4px 14px 14px 14px";
        const delBtn = `<button onclick="deleteBkqLog(${idx})" title="ลบ"
          style="opacity:0;background:none;border:none;cursor:pointer;font-size:13px;padding:2px 4px;border-radius:6px;transition:opacity .15s,background .15s;line-height:1">🗑</button>`;
        return `<div style="display:flex;flex-direction:column;max-width:82%;align-self:${isMe?"flex-end":"flex-start"};align-items:${isMe?"flex-end":"flex-start"}" class="bkq-bubble-row">
          <div style="font-size:10px;font-weight:700;color:#94a3b8;margin-bottom:3px">${author}</div>
          <div style="display:flex;align-items:center;gap:4px;${isMe?"flex-direction:row-reverse":""}">
            <div style="background:${bg};border:1.5px solid ${border};border-radius:${br};padding:8px 12px;font-size:13px;line-height:1.5;color:${textColor};word-break:break-word">${log.message||""}</div>
            ${delBtn}
          </div>
          <div style="font-size:10px;color:#94a3b8;margin-top:3px">${time}</div>
        </div>`;
      }).join("");

      if (!silent || wasAtBottom) list.scrollTop = list.scrollHeight;
    }

    async function submitBkqLog() {
      if (!_bkqCurrentId) return;
      const input = document.getElementById("bkqLogInput");
      const msg   = (input.value||"").trim();
      if (!msg) return;
      const btn = document.getElementById("bkqLogSendBtn");
      btn.disabled = true;

      await bkqFetch("room_booking_logs", "", {
        method: "POST",
        body: { request_id: _bkqCurrentId, message: msg, created_by_name: (window.ERP_USER?.full_name || window.ERP_USER?.username || "Admin") },
      });
      input.value = "";
      btn.disabled = false;
      await loadBkqLogs(_bkqCurrentId);
    }

    function deleteBkqLog(idx) {
      const log = _bkqLogsCache[idx];
      if (!log) { showToast?.("ไม่พบข้อความ", "toast-error"); return; }

      const filter = `?log_id=eq.${log.log_id}`;

      DeleteModal.open("ต้องการลบข้อความนี้หรือไม่?", async () => {
        try {
          const { url, key } = bkqSB();
          await fetch(`${url}/rest/v1/room_booking_logs${filter}`, {
            method: "DELETE",
            headers: { apikey: key, Authorization: `Bearer ${key}`, Prefer: "return=minimal" },
          });
          if (_bkqCurrentId) await loadBkqLogs(_bkqCurrentId);
        } catch (e) {
          showToast?.("ลบไม่ได้: " + e.message, "toast-error");
        }
      });
    }
    window.deleteBkqLog = deleteBkqLog;

    // Close on backdrop click
    document.getElementById("bkqDetailOverlay").addEventListener("click", function(e) {
      if (e.target === this) closeBkqDetail();
    });

    window.closeBkqDetail  = closeBkqDetail;
    window.saveBkqDetail   = saveBkqDetail;
    window.submitBkqLog    = submitBkqLog;
    window.toggleBkqAllday = toggleBkqAllday;

    // ── Create Booking Modal ──────────────────────────────────
    let _bkqPlaces = [];
    let _bkqRoomsByPlace = {}; // { place_id: [room, ...] }
    let _bkqUsers = [];
    let _bkqCreateLoaded = false;

    async function loadBkqCreateData() {
      if (_bkqCreateLoaded) return;
      const [placesRes, roomsRes, usersRes] = await Promise.all([
        bkqFetch("places", "?select=*&status=eq.ACTIVE&order=place_name.asc"),
        bkqFetch("place_rooms", "?select=*&order=room_name.asc"),
        bkqFetch("users", "?select=user_id,full_name&is_active=eq.true&order=full_name.asc"),
      ]);
      const allPlaces = placesRes || [];
      const allRooms  = roomsRes  || [];
      _bkqUsers = usersRes || [];
      _bkqRoomsByPlace = {};
      allRooms.forEach(r => {
        if (!_bkqRoomsByPlace[r.place_id]) _bkqRoomsByPlace[r.place_id] = [];
        _bkqRoomsByPlace[r.place_id].push(r);
      });
      _bkqPlaces = allPlaces.filter(p =>
        (_bkqRoomsByPlace[p.place_id]?.length > 0) || p.place_type === "MEETING_ROOM"
      );

      const placeSel = document.getElementById("bkqNewPlace");
      placeSel.innerHTML = _bkqPlaces.map(p =>
        `<option value="${p.place_id}">${p.place_name}</option>`
      ).join("") || `<option value="">— ไม่พบสถานที่ —</option>`;

      setupBkqNameDropdown();

      onBkqPlaceChange();
      _bkqCreateLoaded = true;
    }

    function setupBkqNameDropdown() {
      const input = document.getElementById("bkqNewBooker");
      const panel = document.getElementById("bkqNewBookerPanel");
      if (!input || !panel || input._bkqBound) return;
      input._bkqBound = true;

      function getOptions() {
        // Unique booker names from existing booking requests only
        const names = new Set();
        _bkqRows.forEach(r => { if (r.booked_by_name) names.add(r.booked_by_name); });
        return [...names].sort((a,b) => a.localeCompare(b, "th"));
      }
      function render(q) {
        const opts = getOptions().filter(n => !q || n.toLowerCase().includes(q.toLowerCase()));
        if (!opts.length) { panel.classList.remove("show"); return; }
        panel.innerHTML = opts.map(n =>
          `<div class="bkq-name-opt" data-val="${n.replace(/"/g,'&quot;')}">${n}</div>`
        ).join("");
        panel.classList.add("show");
        panel.querySelectorAll("[data-val]").forEach(el => {
          el.addEventListener("mousedown", (e) => {
            e.preventDefault();
            input.value = el.dataset.val;
            panel.classList.remove("show");
          });
        });
      }
      input.addEventListener("focus", () => render(input.value));
      input.addEventListener("input", () => render(input.value));
      input.addEventListener("blur",  () => setTimeout(() => panel.classList.remove("show"), 150));
    }

    function onBkqPlaceChange() {
      const placeId = document.getElementById("bkqNewPlace").value;
      const place   = _bkqPlaces.find(p => String(p.place_id) === String(placeId));
      const rooms   = _bkqRoomsByPlace[placeId] || [];
      const roomSel = document.getElementById("bkqNewRoom");
      if (rooms.length > 0) {
        roomSel.innerHTML = rooms.map(r => `<option value="${r.room_id}">${r.room_name}</option>`).join("");
        roomSel.disabled = false;
      } else {
        roomSel.innerHTML = `<option value="">— ไม่มีห้องย่อย —</option>`;
        roomSel.disabled = true;
      }
    }

    const BKQ_START_SLOTS = ["09:00","09:30","10:00","10:30","11:00","11:30","12:00","12:30","13:00","13:30","14:00","14:30"];
    const BKQ_END_PRESETS = [
      { label: "ทั้งวัน",      value: "ALLDAY" },
      { label: "จนปิดบริษัท",  value: "18:00"  },
    ];
    const BKQ_END_SLOTS = ["13:00","13:30","14:00","14:30","15:00","15:30","16:00","16:30","17:00","17:30","18:00"];

    function bkqNextHour(timeStr, hours = 1) {
      const [h, m] = timeStr.split(":").map(Number);
      const total = h * 60 + m + hours * 60;
      const nh = Math.min(Math.floor(total / 60), 18);
      const nm = total % 60;
      return `${String(nh).padStart(2, "0")}:${String(nm).padStart(2, "0")}`;
    }

    function buildBkqStartGrid(selectedVal) {
      const grid = document.getElementById("bkqNewStartGrid");
      grid.innerHTML = BKQ_START_SLOTS.map(t =>
        `<button type="button" class="bkq-time-btn${t === selectedVal ?" active" : ""}" data-time="${t}">${t}</button>`
      ).join("");
      grid.querySelectorAll("button").forEach(btn => {
        btn.addEventListener("click", () => {
          const t = btn.dataset.time;
          document.getElementById("bkqNewStart").value = t;
          buildBkqStartGrid(t);
          const endVal = document.getElementById("bkqNewEnd").value;
          if (endVal !== "ALLDAY" && endVal <= t) {
            const newEnd = bkqNextHour(t, 1);
            document.getElementById("bkqNewEnd").value = newEnd;
            buildBkqEndGrid(newEnd);
          } else {
            buildBkqEndGrid(endVal);
          }
        });
      });
    }

    function buildBkqEndGrid(selectedVal) {
      const grid = document.getElementById("bkqNewEndGrid");
      const presetBtns = BKQ_END_PRESETS.map(p =>
        `<button type="button" class="bkq-time-btn span2${p.value === selectedVal ?" active" : ""}" data-time="${p.value}">${p.label}</button>`
      ).join("");
      const slotBtns = BKQ_END_SLOTS.map(t =>
        `<button type="button" class="bkq-time-btn${t === selectedVal ?" active" : ""}" data-time="${t}">${t}</button>`
      ).join("");
      grid.innerHTML = presetBtns + slotBtns;
      grid.querySelectorAll("button").forEach(btn => {
        btn.addEventListener("click", () => {
          const t = btn.dataset.time;
          document.getElementById("bkqNewEnd").value = t;
          buildBkqEndGrid(t);
        });
      });
    }

    async function openBkqCreate() {
      await loadBkqCreateData();
      const today = new Date().toISOString().slice(0,10);
      document.getElementById("bkqNewDate").value = today;
      document.getElementById("bkqNewBooker").value = "";
      document.getElementById("bkqNewCS").value =
        window.ERP_USER?.full_name || window.ERP_USER?.username || "Admin";
      document.getElementById("bkqNewStart").value = "09:00";
      document.getElementById("bkqNewEnd").value   = "10:00";
      document.getElementById("bkqNewNote").value  = "";
      buildBkqStartGrid("09:00");
      buildBkqEndGrid("10:00");
      document.getElementById("bkqCreateOverlay").classList.add("open");
      setTimeout(() => document.getElementById("bkqNewBooker").focus(), 50);
    }

    function closeBkqCreate() {
      document.getElementById("bkqCreateOverlay").classList.remove("open");
    }

    async function generateBkqCode() {
      const now = new Date();
      const prefix = `RBKQ-${now.getFullYear()}${String(now.getMonth()+1).padStart(2,"0")}-`;
      const rows = await bkqFetch("room_booking_requests",
        `?request_code=like.${prefix}*&select=request_code`);
      let maxSeq = 0;
      (rows || []).forEach(r => {
        const n = parseInt((r.request_code||"").split("-").pop(), 10);
        if (!isNaN(n) && n > maxSeq) maxSeq = n;
      });
      return `${prefix}${String(maxSeq+1).padStart(3,"0")}`;
    }

    function bkqToast(msg, type = "success") {
      const t = document.getElementById("toast");
      if (!t) { console.log(msg); return; }
      t.className = `toast toast-${type} show`;
      t.textContent = msg;
      setTimeout(() => t.classList.remove("show"), 3000);
    }

    async function submitBkqCreate() {
      const placeId = document.getElementById("bkqNewPlace").value;
      const roomId  = document.getElementById("bkqNewRoom").value;
      const booker  = document.getElementById("bkqNewBooker").value.trim();
      const csName  = document.getElementById("bkqNewCS").value.trim();
      const date    = document.getElementById("bkqNewDate").value;
      const note    = document.getElementById("bkqNewNote").value.trim();
      const endRaw  = document.getElementById("bkqNewEnd").value;
      const allday  = endRaw === "ALLDAY";
      const start   = allday ? null     : document.getElementById("bkqNewStart").value;
      const end     = allday ? "ALLDAY" : endRaw;

      if (!placeId) { bkqToast("กรุณาเลือกสถานที่", "error"); return; }
      if (!booker)  { bkqToast("กรุณากรอกชื่อผู้จอง", "error"); return; }
      if (!date)    { bkqToast("กรุณาเลือกวันที่", "error"); return; }
      if (!allday && (!start || !end)) { bkqToast("กรุณากรอกเวลา", "error"); return; }
      if (!allday && start >= end) { bkqToast("เวลาสิ้นสุดต้องหลังเวลาเริ่มต้น", "error"); return; }

      const place = _bkqPlaces.find(p => String(p.place_id) === String(placeId));
      const room  = roomId ? (_bkqRoomsByPlace[placeId] || []).find(r => String(r.room_id) === String(roomId)) : null;
      const bookerUser = _bkqUsers.find(u => u.full_name === booker);
      const csUser     = _bkqUsers.find(u => u.full_name === csName);

      const btn = document.getElementById("bkqCreateBtn");
      btn.disabled = true;
      const origLabel = btn.textContent;
      btn.textContent = "กำลังบันทึก...";

      try {
        const code = await generateBkqCode();
        const payload = {
          request_code: code,
          place_id:  Number(placeId),
          place_name: place?.place_name || "",
          room_id:   room ? Number(room.room_id) : null,
          room_name: room?.room_name || null,
          booked_by: bookerUser?.user_id || null,
          booked_by_name: booker,
          cs_id:     csUser?.user_id || null,
          cs_name:   csName || null,
          booking_date: date,
          start_time:   start,
          end_time:     end,
          note:         note || null,
          status: "APPROVED",
        };
        // Retry up to 3 times, stripping any column the DB reports as missing.
        // Handles schemas that don't have room_id/room_name/created_by/etc.
        const optionalCols = ["room_id","room_name","created_by","note"];
        let lastErr;
        for (let i = 0; i < 4; i++) {
          try {
            await bkqFetch("room_booking_requests", "", { method:"POST", body: payload });
            lastErr = null;
            break;
          } catch (err) {
            lastErr = err;
            const msg = err.message || "";
            // Try to find a column from the error message that we can safely drop
            const dropped = optionalCols.find(c =>
              new RegExp(`['"\\b]${c}['"\\b]`).test(msg) && c in payload
            );
            if (!dropped) break;
            delete payload[dropped];
          }
        }
        if (lastErr) throw lastErr;
        console.log('[booking.created] before fire', typeof fireBookingCreatedNotification, payload);
        try { fireBookingCreatedNotification(payload); } catch(e) { console.error('[booking.created] fire threw', e); }
        // Auto-approve: booking confirmed on submit, also fire approved event
        try { fireBookingApprovedNotification(payload); } catch(e) { console.error('[booking.approved] fire threw', e); }
        closeBkqCreate();
        bkqToast("จองห้องสำเร็จ 🚪", "success");
        _bkqListLastSig = "";
        await loadRoomBookingRequests();
      } catch (e) {
        bkqToast("บันทึกไม่สำเร็จ: " + (e.message || ""), "error");
      } finally {
        btn.disabled = false;
        btn.textContent = origLabel;
      }
    }

    window.openBkqCreate    = openBkqCreate;
    window.closeBkqCreate   = closeBkqCreate;
    window.onBkqPlaceChange = onBkqPlaceChange;
    window.submitBkqCreate  = submitBkqCreate;

    // Backdrop-click-to-close DISABLED for the create form (prevents
    // accidental dismissal + full data re-entry). Use ✕ / ยกเลิก / ESC.


    // ESC to close modals (innermost first)
    document.addEventListener("keydown", (e) => {
      if (e.key !== "Escape") return;
      const dm = document.getElementById("deleteModalOverlay");
      if (dm && dm.classList.contains("active")) {
        DeleteModal.close(); return;
      }
      if (document.getElementById("bkqCreateOverlay").classList.contains("open")) {
        closeBkqCreate(); return;
      }
      if (document.getElementById("bkqDetailOverlay").classList.contains("open")) {
        closeBkqDetail(); return;
      }
    });
    </script>
