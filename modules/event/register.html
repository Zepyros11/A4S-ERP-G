<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ลงทะเบียน — A4S-ERP</title>
<link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Sarabun',sans-serif;background:#f1f5f9;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:16px;}

.reg-card{background:#fff;border-radius:18px;max-width:440px;width:100%;box-shadow:0 12px 40px rgba(0,0,0,.1);overflow:hidden;}

/* ── Hero ── */
.reg-hero{position:relative;overflow:hidden;}
.reg-poster{width:100%;aspect-ratio:16/9;object-fit:cover;display:block;}
.reg-poster-placeholder{width:100%;aspect-ratio:16/9;background:linear-gradient(135deg,#1e40af,#3b82f6);display:flex;align-items:center;justify-content:center;font-size:48px;color:rgba(255,255,255,.3);}
.reg-hero-overlay{position:absolute;bottom:0;left:0;right:0;padding:16px 20px;background:linear-gradient(transparent,rgba(0,0,0,.7));color:#fff;}
.reg-hero-name{font-size:18px;font-weight:700;text-shadow:0 1px 4px rgba(0,0,0,.3);}
.reg-hero-badges{display:flex;gap:6px;margin-top:6px;flex-wrap:wrap;}
.reg-badge{padding:3px 10px;border-radius:12px;font-size:11px;font-weight:600;backdrop-filter:blur(6px);}
.reg-badge.status{background:rgba(74,222,128,.2);color:#4ade80;border:1px solid rgba(74,222,128,.3);}
.reg-badge.series{background:rgba(255,255,255,.15);color:#fff;border:1px solid rgba(255,255,255,.2);}

/* ── Info rows ── */
.reg-info{padding:16px 20px;border-bottom:1px solid #f1f5f9;}
.reg-info-row{display:flex;align-items:center;gap:8px;padding:5px 0;font-size:13.5px;color:#334155;}
.reg-info-icon{font-size:16px;width:22px;text-align:center;flex-shrink:0;}
.reg-info-label{color:#94a3b8;font-size:11px;min-width:50px;}

/* ── Prereq box ── */
.reg-prereq{margin:0 20px;padding:10px 14px;background:#eff6ff;border:1px solid #bfdbfe;border-radius:8px;font-size:12px;line-height:1.6;color:#1e40af;margin-top:12px;}
.reg-prereq.warn{background:#fef2f2;border-color:#fecaca;color:#991b1b;}
.reg-prereq.ok{background:#f0fdf4;border-color:#bbf7d0;color:#065f46;}

/* ── Capacity bar ── */
.reg-capacity{margin:12px 20px 0;font-size:12px;color:#64748b;}
.reg-cap-bar{height:6px;background:#e2e8f0;border-radius:3px;margin-top:4px;overflow:hidden;}
.reg-cap-fill{height:100%;border-radius:3px;transition:width .3s;}
.reg-cap-fill.ok{background:linear-gradient(90deg,#10b981,#34d399);}
.reg-cap-fill.warn{background:linear-gradient(90deg,#f59e0b,#fbbf24);}
.reg-cap-fill.full{background:linear-gradient(90deg,#ef4444,#f87171);}

/* ── Auth form ── */
.reg-auth{padding:20px;}
.reg-auth-title{font-size:14px;font-weight:700;color:#334155;margin-bottom:12px;display:flex;align-items:center;gap:6px;}

/* Tab switcher: สมาชิก / บุคคลทั่วไป */
.reg-tabs{display:flex;gap:4px;padding:4px;background:#f1f5f9;border-radius:10px;margin-bottom:14px;}
.reg-tab{flex:1;padding:9px 10px;border:none;background:transparent;border-radius:7px;font-family:inherit;font-size:13px;font-weight:600;color:#64748b;cursor:pointer;transition:all .15s;display:flex;align-items:center;justify-content:center;gap:5px;}
.reg-tab:hover:not(.active){color:#334155;}
.reg-tab.active{background:#fff;color:#1e40af;box-shadow:0 1px 3px rgba(0,0,0,.08);}
.reg-tab-pane{display:none;}
.reg-tab-pane.active{display:block;}
.reg-guest-note{font-size:11.5px;color:#64748b;background:#f8fafc;border:1px solid #e2e8f0;border-radius:8px;padding:8px 11px;margin-bottom:10px;line-height:1.5;}

.reg-field{margin-bottom:10px;}
.reg-field label{display:block;font-size:12px;font-weight:600;color:#64748b;margin-bottom:4px;}
.reg-field input{width:100%;padding:11px 14px;border:1.5px solid #e2e8f0;border-radius:8px;font-family:inherit;font-size:14px;transition:border-color .15s;}
.reg-field input:focus{outline:none;border-color:#3b82f6;box-shadow:0 0 0 3px rgba(59,130,246,.1);}
.reg-submit{width:100%;padding:13px;border:none;border-radius:12px;background:linear-gradient(135deg,#1e40af,#3b82f6);color:#fff;font-family:inherit;font-size:15px;font-weight:700;cursor:pointer;transition:all .15s;margin-top:8px;}
.reg-submit:hover{transform:translateY(-1px);box-shadow:0 6px 20px rgba(30,64,175,.3);}
.reg-submit:disabled{opacity:.5;cursor:not-allowed;transform:none;box-shadow:none;}

/* ── Messages ── */
.reg-msg{padding:14px 20px;text-align:center;font-size:13.5px;line-height:1.6;}
.reg-msg.error{background:#fef2f2;color:#991b1b;}
.reg-msg.success{background:#f0fdf4;color:#065f46;}
.reg-success-ticket{font-family:'IBM Plex Mono',monospace;font-size:18px;font-weight:700;color:#1e40af;margin-top:8px;}

/* ── Full/closed state ── */
.reg-closed{padding:24px 20px;text-align:center;color:#64748b;font-size:14px;}
.reg-closed-icon{font-size:36px;margin-bottom:8px;opacity:.5;}

/* ── Loading ── */
.reg-loading{display:none;padding:20px;text-align:center;color:#64748b;}
.reg-loading.show{display:block;}

/* ── Toast ── */
.toast{position:fixed;top:20px;left:50%;transform:translateX(-50%);padding:10px 20px;border-radius:10px;font-size:13px;font-weight:600;color:#fff;z-index:999;opacity:0;transition:opacity .3s;pointer-events:none;}
.toast.show{opacity:1;}
.toast-success{background:#065f46;}
.toast-error{background:#991b1b;}

/* ── Language switcher ── */
.lang-switch{position:fixed;top:12px;right:14px;z-index:200;display:flex;gap:3px;background:rgba(255,255,255,.92);backdrop-filter:blur(8px);border:1px solid #e2e8f0;border-radius:20px;padding:3px;box-shadow:0 3px 12px rgba(0,0,0,.14);}
.lang-switch button{border:none;background:transparent;font-family:inherit;font-size:12px;font-weight:700;color:#64748b;padding:5px 11px;border-radius:16px;cursor:pointer;transition:all .15s;line-height:1;}
.lang-switch button.active{background:linear-gradient(135deg,#1e40af,#3b82f6);color:#fff;box-shadow:0 2px 6px rgba(30,64,175,.3);}
.lang-switch button:hover:not(.active){background:#f1f5f9;color:#1e40af;}

@media(max-width:480px){
  body{padding:0;align-items:flex-start;}
  .reg-card{border-radius:0;min-height:100vh;max-width:100%;}
}

/* ── Desktop 2-column layout: [poster | detail] ── */
@media(min-width:840px){
  /* Full-bleed: no outer container frame, fill the whole window */
  body.has-event{align-items:stretch;justify-content:stretch;padding:0;background:#fff;}
  body.has-event .reg-card{max-width:100%;width:100%;border-radius:0;box-shadow:none;height:100vh;max-height:100vh;}
  body.has-event #regContent{
    display:grid;
    grid-template-columns: 440px 1fr;
    align-items:stretch;
    height:100vh;
  }
  body.has-event #regHero{min-height:100%;background:#0f172a;position:relative;}
  /* Right column scrolls on its own only if it ever exceeds the viewport */
  body.has-event #regRight{overflow-y:auto;max-height:100vh;}

  /* Poster fills left column (crop with cover) */
  body.has-event .reg-hero .reg-poster,
  body.has-event .reg-hero .reg-poster-placeholder{
    aspect-ratio:auto;
    position:absolute;inset:0;
    width:100%;height:100%;
    object-fit:cover;
  }
  body.has-event .reg-hero-overlay{padding:20px 22px;}
  body.has-event .reg-hero-name{font-size:20px;}

  /* Right column — compact so the whole form fits without scrolling */
  body.has-event #regRight{display:flex;flex-direction:column;justify-content:center;}
  body.has-event .reg-info{padding:10px 26px 8px;}
  body.has-event .reg-info-row{padding:2px 0;font-size:12.5px;}
  body.has-event .reg-info-icon{font-size:14px;}
  body.has-event .reg-prereq{margin:0 26px;margin-top:6px;}
  body.has-event .reg-capacity{margin:6px 26px 0;}
  body.has-event .reg-auth{padding:10px 26px 12px;}
  body.has-event .reg-auth-title{margin-bottom:8px;}
  body.has-event .reg-tabs{margin-bottom:8px;}
  body.has-event .reg-tab{padding:7px 10px;}
  body.has-event .reg-field{margin-bottom:6px;}
  body.has-event .reg-field label{margin-bottom:2px;}
  body.has-event .reg-field input{padding:8px 13px;}
  body.has-event .reg-guest-note{margin-bottom:6px;padding:6px 11px;}
  body.has-event .reg-submit{padding:10px;margin-top:4px;}
  /* LINE panel — slim CTA strip so it doesn't push content off-screen */
  body.has-event .reg-line-panel{margin:0 26px 12px;padding:8px 12px;}
  body.has-event .reg-line-avatar{width:30px;height:30px;font-size:15px;}
}

/* ── Event picker (premium "grand" mode) ── */
body.is-picker{
  background:
    radial-gradient(ellipse 60% 50% at 15% 5%, rgba(99,102,241,.28), transparent 60%),
    radial-gradient(ellipse 50% 40% at 85% 90%, rgba(59,130,246,.22), transparent 60%),
    radial-gradient(ellipse 70% 60% at 50% 50%, rgba(139,92,246,.12), transparent 70%),
    linear-gradient(180deg,#0b1228 0%,#1e293b 100%);
  align-items:flex-start;
  padding:40px 20px;
  min-height:100vh;
  position:relative;
}
body.is-picker::before{
  content:'';
  position:fixed;inset:0;
  background-image:
    radial-gradient(circle at 1px 1px, rgba(255,255,255,.05) 1px, transparent 0);
  background-size:28px 28px;
  pointer-events:none;
}
body.is-picker .reg-card{
  max-width:560px;
  background:#fff;
  border-radius:22px;
  box-shadow:
    0 40px 100px rgba(0,0,0,.45),
    0 20px 40px rgba(30,64,175,.2),
    0 0 0 1px rgba(99,102,241,.15);
  position:relative;
  animation: reg-rise .55s cubic-bezier(.22,.9,.35,1) both;
}
@keyframes reg-rise{
  from{opacity:0;transform:translateY(16px) scale(.98);}
  to{opacity:1;transform:translateY(0) scale(1);}
}

.reg-picker{padding:40px 30px 30px;position:relative;overflow:hidden;}
.reg-picker::before{
  content:'';
  position:absolute;top:-80px;left:50%;transform:translateX(-50%);
  width:380px;height:260px;
  background:radial-gradient(ellipse at center, rgba(99,102,241,.14), transparent 70%);
  pointer-events:none;
}

.reg-picker-head{text-align:center;margin-bottom:28px;position:relative;}
.reg-picker-badge{
  width:76px;height:76px;margin:0 auto 18px;
  border-radius:22px;
  background:linear-gradient(135deg,#3b82f6 0%,#1e40af 45%,#6366f1 100%);
  display:flex;align-items:center;justify-content:center;
  font-size:36px;
  box-shadow:
    0 22px 50px rgba(30,64,175,.42),
    0 10px 22px rgba(99,102,241,.3),
    inset 0 1px 0 rgba(255,255,255,.3);
  position:relative;
  animation: reg-float 3.4s ease-in-out infinite;
}
.reg-picker-badge::after{
  content:'';
  position:absolute;inset:-10px;
  border-radius:28px;
  background:linear-gradient(135deg,#3b82f6,#8b5cf6);
  z-index:-1;opacity:.3;filter:blur(18px);
}
@keyframes reg-float{
  0%,100%{transform:translateY(0);}
  50%{transform:translateY(-6px);}
}
.reg-picker-title{
  font-size:26px;font-weight:800;
  letter-spacing:-.02em;margin-bottom:6px;
  background:linear-gradient(135deg,#0f172a 0%,#1e40af 55%,#6366f1 100%);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  background-clip:text;
}
.reg-picker-subtitle{font-size:13.5px;color:#64748b;}
.reg-picker-count{
  display:inline-flex;align-items:center;gap:7px;
  margin-top:14px;padding:6px 14px;
  background:linear-gradient(135deg,#eff6ff,#dbeafe);
  color:#1e40af;
  font-size:11.5px;font-weight:700;
  border-radius:22px;
  border:1px solid rgba(30,64,175,.15);
  box-shadow:0 2px 8px rgba(30,64,175,.08);
}
.reg-picker-count::before{
  content:'';
  width:7px;height:7px;border-radius:50%;
  background:#10b981;
  box-shadow:0 0 0 3px rgba(16,185,129,.2);
  animation: reg-pulse 2s ease-in-out infinite;
}
@keyframes reg-pulse{
  0%,100%{opacity:1;transform:scale(1);}
  50%{opacity:.5;transform:scale(.85);}
}

.reg-picker-list{display:flex;flex-direction:column;gap:12px;position:relative;}
.reg-picker-card{
  display:flex;gap:14px;padding:14px;
  background:#fff;
  border:1.5px solid #e2e8f0;
  border-radius:16px;
  text-decoration:none;color:inherit;
  align-items:center;
  transition:all .25s cubic-bezier(.22,.9,.35,1);
  position:relative;overflow:hidden;
  animation: reg-slide-in .5s cubic-bezier(.22,.9,.35,1) both;
}
.reg-picker-card:nth-child(1){animation-delay:.05s;}
.reg-picker-card:nth-child(2){animation-delay:.1s;}
.reg-picker-card:nth-child(3){animation-delay:.15s;}
.reg-picker-card:nth-child(4){animation-delay:.2s;}
.reg-picker-card:nth-child(5){animation-delay:.25s;}
.reg-picker-card:nth-child(n+6){animation-delay:.3s;}
@keyframes reg-slide-in{
  from{opacity:0;transform:translateY(10px);}
  to{opacity:1;transform:translateY(0);}
}
.reg-picker-card::before{
  content:'';
  position:absolute;inset:0;
  border-radius:16px;padding:1.5px;
  background:linear-gradient(135deg,#3b82f6,#6366f1,#8b5cf6);
  -webkit-mask:linear-gradient(#000 0 0) content-box, linear-gradient(#000 0 0);
  -webkit-mask-composite:xor;
  mask-composite:exclude;
  opacity:0;transition:opacity .25s;
  pointer-events:none;
}
.reg-picker-card:hover{
  transform:translateY(-3px);
  box-shadow:0 18px 36px rgba(30,64,175,.18),0 6px 14px rgba(99,102,241,.12);
  border-color:transparent;
}
.reg-picker-card:hover::before{opacity:1;}

.reg-picker-poster{
  width:84px;height:84px;border-radius:12px;
  object-fit:cover;flex-shrink:0;
  background:#f1f5f9;
  box-shadow:0 4px 12px rgba(0,0,0,.1);
}
.reg-picker-poster-ph{
  width:84px;height:84px;border-radius:12px;
  background:linear-gradient(135deg,#1e40af,#6366f1);
  flex-shrink:0;
  display:flex;align-items:center;justify-content:center;
  color:#fff;font-size:34px;
  box-shadow:0 4px 12px rgba(30,64,175,.28);
}
.reg-picker-body{flex:1;min-width:0;}
.reg-picker-name{
  font-weight:700;font-size:15px;color:#0f172a;
  line-height:1.35;
  display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;
  overflow:hidden;margin-bottom:7px;
  letter-spacing:-.005em;
}
.reg-picker-meta{display:flex;gap:5px;flex-wrap:wrap;}
.reg-picker-chip{
  display:inline-flex;align-items:center;gap:3px;
  padding:3px 8px;
  font-size:10.5px;font-weight:700;
  border-radius:6px;white-space:nowrap;
}
.reg-picker-chip.date{background:#eff6ff;color:#1e40af;border:1px solid #dbeafe;}
.reg-picker-chip.loc{background:#fef3c7;color:#92400e;border:1px solid #fde68a;max-width:180px;overflow:hidden;text-overflow:ellipsis;}
.reg-picker-arrow{
  color:#cbd5e1;flex-shrink:0;
  font-size:28px;font-weight:300;line-height:1;
  transition:all .22s;margin-right:4px;
}
.reg-picker-card:hover .reg-picker-arrow{color:#3b82f6;transform:translateX(4px);}

.reg-picker-empty{text-align:center;padding:44px 20px;}
.reg-picker-empty-icon{font-size:56px;margin-bottom:14px;opacity:.35;}
.reg-picker-empty-title{font-size:16px;font-weight:700;color:#475569;margin-bottom:4px;}
.reg-picker-empty-sub{font-size:12.5px;color:#94a3b8;}

@media(max-width:480px){
  body.is-picker{padding:20px 12px;}
  body.is-picker .reg-card{border-radius:18px;min-height:auto;}
  .reg-picker{padding:30px 20px 22px;}
  .reg-picker-title{font-size:21px;}
  .reg-picker-badge{width:64px;height:64px;font-size:30px;margin-bottom:14px;}
  .reg-picker-poster,.reg-picker-poster-ph{width:72px;height:72px;}
}

/* ── Person picker modal (สมาชิก / บุคคลธรรมดา / ผู้สมัครร่วม) ── */
.pp-overlay{position:fixed;inset:0;background:rgba(15,23,42,.55);backdrop-filter:blur(4px);display:none;align-items:center;justify-content:center;padding:18px;z-index:1000;}
.pp-overlay.open{display:flex;animation:pp-fade .22s ease both;}
@keyframes pp-fade{from{opacity:0}to{opacity:1}}
.pp-card{background:#fff;border-radius:18px;width:100%;max-width:440px;box-shadow:0 30px 60px rgba(0,0,0,.35);overflow:hidden;animation:pp-rise .28s cubic-bezier(.22,.9,.35,1) both;}
@keyframes pp-rise{from{opacity:0;transform:translateY(10px) scale(.98)}to{opacity:1;transform:none}}
.pp-head{padding:20px 22px 12px;}
.pp-title{font-size:17px;font-weight:800;color:#0f172a;letter-spacing:-.01em;}
.pp-sub{font-size:12.5px;color:#64748b;margin-top:4px;}
.pp-body{padding:6px 16px 18px;display:flex;flex-direction:column;gap:9px;}
.pp-opt{display:flex;align-items:center;gap:12px;padding:13px 14px;border:1.5px solid #e2e8f0;border-radius:13px;background:#fff;cursor:pointer;transition:all .16s;text-align:left;font-family:inherit;width:100%;}
.pp-opt:hover:not(:disabled){border-color:#3b82f6;background:#eff6ff;transform:translateY(-1px);box-shadow:0 6px 14px rgba(30,64,175,.12);}
.pp-opt:disabled{opacity:.55;cursor:not-allowed;background:#f8fafc;}
.pp-icon{width:42px;height:42px;border-radius:11px;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0;}
.pp-icon.primary{background:#dbeafe;color:#1e40af;}
.pp-icon.coapp{background:#f3e8ff;color:#9333ea;}
.pp-icon.both{background:linear-gradient(135deg,#dbeafe,#f3e8ff);color:#6366f1;}
.pp-info{flex:1;min-width:0;}
.pp-name{font-weight:700;font-size:14px;color:#0f172a;line-height:1.3;}
.pp-meta{font-size:11.5px;color:#64748b;margin-top:3px;display:flex;gap:6px;flex-wrap:wrap;align-items:center;}
.pp-chip{padding:1px 7px;border-radius:5px;font-size:10.5px;font-weight:700;}
.pp-chip.role-primary{background:#dbeafe;color:#1e40af;}
.pp-chip.role-coapp{background:#f3e8ff;color:#9333ea;}
.pp-chip.done{background:#dcfce7;color:#166534;}
.pp-chip.warn{background:#fef3c7;color:#92400e;}
.pp-arrow{color:#cbd5e1;font-size:22px;flex-shrink:0;}
.pp-opt:hover:not(:disabled) .pp-arrow{color:#3b82f6;}
.pp-foot{padding:8px 16px 16px;text-align:center;}
.pp-cancel{background:none;border:none;color:#64748b;font-family:inherit;font-size:12.5px;cursor:pointer;padding:6px 14px;border-radius:8px;}
.pp-cancel:hover{background:#f1f5f9;color:#0f172a;}

/* ── LINE connect panel ── */
.reg-line-panel{margin:0 20px 32px;padding:12px 14px;background:#f0fdf4;border:1px solid #bbf7d0;border-radius:10px;display:flex;align-items:center;gap:10px;}
.reg-line-panel.linked{background:#f0fdf4;border-color:#86efac;}
.reg-line-panel.unlinked{background:#f9fafb;border-color:#e5e7eb;}
.reg-line-avatar{width:38px;height:38px;border-radius:50%;background:#06c755;color:#fff;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0;overflow:hidden;}
.reg-line-avatar img{width:100%;height:100%;object-fit:cover;}
.reg-line-info{flex:1;min-width:0;}
.reg-line-title{font-size:12.5px;font-weight:700;color:#065f46;}
.reg-line-name{font-size:13.5px;font-weight:600;color:#0f172a;}
.reg-line-sub{font-size:11px;color:#64748b;}
.reg-line-btn{padding:6px 12px;border:none;border-radius:8px;background:#06c755;color:#fff;font-family:inherit;font-size:12px;font-weight:700;cursor:pointer;white-space:nowrap;}
.reg-line-btn:hover{background:#05a84a;}
</style>
</head>
<body>

<div class="lang-switch" id="langSwitch">
  <button type="button" data-lang="th" onclick="setLang('th')">ไทย</button>
  <button type="button" data-lang="en" onclick="setLang('en')">EN</button>
  <button type="button" data-lang="fr" onclick="setLang('fr')">FR</button>
</div>

<div class="toast" id="toast"></div>

<div class="pp-overlay" id="ppOverlay" role="dialog" aria-modal="true" aria-labelledby="ppTitle"></div>

<script src="./register-config.js"></script>

<div class="reg-card">
  <!-- Loading -->
  <div class="reg-loading show" id="regLoading">⏳ กำลังโหลดข้อมูล...</div>

  <!-- Event info (populated by JS) -->
  <div id="regContent" style="display:none">
    <!-- Hero -->
    <div class="reg-hero" id="regHero"></div>

    <!-- Right column (scrolls independently on desktop) -->
    <div id="regRight">
      <!-- Info rows -->
      <div class="reg-info" id="regInfo"></div>

const STAMP_LINK_LABEL = 'ลงทะเบียนผ่าน Link';

// หา key ของฟิลด์ "ผู้บันทึก" (type stamp) จาก config ของ event/template → ใช้ tag ว่าลงทะเบียนผ่าน Link
async function getStampFieldKey() {
  if (_stampKey !== undefined) return _stampKey;
  _stampKey = null;
  try {
    let cfg = (_event?.attendee_field_config && Object.keys(_event.attendee_field_config).length)
      ? _event.attendee_field_config : null;
    if (!cfg && _event?.template_id) {
      const t = await sbGet(`attendee_form_templates?id=eq.${_event.template_id}&select=config&limit=1`);
      cfg = t?.[0]?.config || null;
    }
    if (!cfg) {
      const d = await sbGet('attendee_form_templates?is_default=eq.true&select=config&limit=1');
      cfg = d?.[0]?.config || null;
    }
    let customFields = cfg?.custom_fields;
    if ((!customFields || !customFields.length) && Array.isArray(cfg?.blocks)) {
      customFields = [];
      cfg.blocks.forEach(b => (b.items || []).forEach(it => {
        if (it && it.type === 'stamp' && it.key) customFields.push({ key: it.key, ftype: 'stamp' });
      }));
    }
    const stamp = (customFields || []).find(c => c.ftype === 'stamp');
    if (stamp) _stampKey = stamp.key;
  } catch (e) { console.warn('getStampFieldKey:', e?.message || e); }
  return _stampKey;
}

async function sbGet(path) {
  const res = await fetch(`${SB_URL}/rest/v1/${path}`, {
    headers: { apikey: SB_KEY, Authorization: `Bearer ${SB_KEY}` },
  });
  if (!res.ok) {
    const body = await res.text().catch(() => '');
    const table = path.split('?')[0];
    console.error(`[sbGet ${res.status}] ${path}`, body);
    throw new Error(`${res.status} @ ${table}${body ? ' — ' + body.slice(0, 120) : ''}`);
  }
  return res.json();
}

async function sbPost(path, body) {
  const res = await fetch(`${SB_URL}/rest/v1/${path}`, {
    method: 'POST',
    headers: { apikey: SB_KEY, Authorization: `Bearer ${SB_KEY}`, 'Content-Type': 'application/json', Prefer: 'return=representation' },
    body: JSON.stringify(body),
  });
  if (!res.ok) {
    const text = await res.text().catch(() => '');
    console.error(`[sbPost ${res.status}] ${path}`, text, body);
    throw new Error(`${res.status} @ ${path.split('?')[0]}${text ? ' — ' + text.slice(0, 150) : ''}`);
  }
  return res.json();
}

/* ── Position rank hierarchy (สูง → ต่ำ): SVP > VP > AVP > SD > DR ── */
const POSITION_RANK = { DR: 1, SD: 2, AVP: 3, VP: 4, SVP: 5 };
const POSITION_LABEL = {
  DR: 'DR (Director)', SD: 'SD (Senior Director)',
  AVP: 'AVP', VP: 'VP', SVP: 'SVP',
};
// true = ตำแหน่ง memberPos ผ่านเกณฑ์ minPos (เท่าหรือสูงกว่า) · null/blank → ผ่านเสมอ
function meetsMinPosition(memberPos, minPos) {
  if (!minPos) return true;                          // ไม่จำกัด
  const minRank = POSITION_RANK[String(minPos).toUpperCase()];
  if (!minRank) return true;                         // value แปลก → ไม่บล็อก
  const memRank = POSITION_RANK[String(memberPos || '').toUpperCase()] || 0;
  return memRank >= minRank;
}

/* ── Today (Bangkok TZ, YYYY-MM-DD) — เทียบกับ _event.event_date ── */
function todayBangkok() {
  return new Date().toLocaleDateString('en-CA', { timeZone: 'Asia/Bangkok' });
}
// true = ลงทะเบียนก่อนวันงาน → pre-reg (ยัง check-in ไม่ได้)
function isPreRegistration() {
  if (!_event?.event_date) return false;
  return todayBangkok() < _event.event_date;
}

/* ── Extract eventId from URL (support LIFF redirect via liff.state) ── */
function getEventIdFromUrl() {
  const params = new URLSearchParams(location.search);
  let eventId = params.get('event') || params.get('event_id');
  if (eventId) return eventId;
  // LIFF redirect: ?liff.state=%2F%3Fevent%3D93  →  "/?event=93"
  const liffState = params.get('liff.state');
  if (liffState) {
    try {
      const decoded = decodeURIComponent(liffState);
      const q = decoded.includes('?') ? decoded.split('?').pop() : decoded;
      const sp = new URLSearchParams(q);
      eventId = sp.get('event') || sp.get('event_id');
    } catch {}
  }
  // LIFF SDK might store state in window.liff after init — fallback check
  try {
    if (window.liff?.isInClient && window.liff.isInClient()) {
      const ctx = window.liff.getContext?.();
      if (ctx?.query) {
        const qp = new URLSearchParams(ctx.query);
        eventId = qp.get('event') || qp.get('event_id');
      }
    }
  } catch {}
  // Hash fallback (some clients strip query but keep hash)
  if (!eventId && location.hash) {
    const h = location.hash.replace(/^#/, '');
    try {
      const qp = new URLSearchParams(h.includes('?') ? h.split('?').pop() : h);
      eventId = qp.get('event') || qp.get('event_id');
    } catch {}
  }
  return eventId;
}

/* ── Init ── */
(async () => {
  // If LIFF SDK is available, init first so liff.state is processed + redirect completes
  if (window.liff) {
    try {
      // Need LIFF ID — fetch default event channel's liff_id from Supabase
      const rows = await sbGet(`line_channels?purpose=eq.event&is_default=eq.true&is_active=eq.true&select=liff_id&limit=1`);
      const liffId = rows?.[0]?.liff_id;
      if (liffId) {
        await liff.init({ liffId });
        // After init, URL may have been updated — re-read event id
      }
    } catch (e) { console.warn('Early liff.init failed:', e?.message || e); }
  }

  const eventId = getEventIdFromUrl();
  if (!SB_URL) {
    document.getElementById('regLoading').innerHTML = '❌ ยังไม่ได้ตั้งค่า Supabase';
    return;
  }
  if (!eventId) {
    // Fallback: show event picker
    await showEventPicker();
    return;
  }

  try {
    // Load event
    const events = await sbGet(`events?event_id=eq.${eventId}&select=*&limit=1`);
    _event = events[0];
    if (!_event) throw new Error('Event not found');

    // Load series + level
    if (_event.series_id) {
      const s = await sbGet(`course_series?id=eq.${_event.series_id}&limit=1`);
      _series = s[0];
    }
    if (_event.level_id) {
      const l = await sbGet(`course_levels?id=eq.${_event.level_id}&limit=1`);
      _level = l[0];
      if (_level?.prerequisite_level_id) {
        const p = await sbGet(`course_levels?id=eq.${_level.prerequisite_level_id}&limit=1`);
        _prereqLevel = p[0];
      }
    }

    // Count current attendees
    const attRes = await fetch(`${SB_URL}/rest/v1/event_attendees?event_id=eq.${eventId}&select=attendee_id`, {
      headers: { apikey: SB_KEY, Authorization: `Bearer ${SB_KEY}`, Prefer: 'count=exact', Range: '0-0' },
    });
    const range = attRes.headers.get('content-range') || '*/0';
    _attendeeCount = parseInt(range.split('/')[1], 10) || 0;

    // Load LINE channel config (for LIFF)
    await loadLineChannel();

    renderPage();

    // Init LIFF after DOM is ready
    initLiff().catch(e => console.warn('LIFF init failed:', e?.message || e));
  } catch (e) {
    document.getElementById('regLoading').innerHTML = t('load_fail') + e.message;
  }
})();

async function loadLineChannel() {

/* Prefetch one-time link token จาก /line/preauth — เรียกใน doRegister หลัง verify password
   เก็บใน _autoLinkToken (อายุ 10 นาที) → connectViaOA() ใช้แม้ form ถูก destroy แล้ว
   Best-effort — fail แล้วเงียบ ๆ (จะ fallback ไป flow legacy) */
async function _prefetchLineLinkToken(code, password) {
  const proxyUrl = (window.REGISTER_CONFIG?.proxy_url || '').replace(/\/+$/, '');
  if (!proxyUrl || !code || !password) return;
  try {
    const res = await fetch(`${proxyUrl}/line/preauth`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ code, password }),
    });
    const data = await res.json().catch(() => ({}));
    if (res.ok && data?.token) {
      _autoLinkToken = data.token;
      console.log('[preauth] token ready (10min)');
    } else {
      console.warn('[preauth] failed:', res.status, data?.error);
    }
  } catch (e) {
    console.warn('[preauth] network error:', e.message);
  }
}

/* Open LINE OA chat — auto-link via pre-authorized token when possible.
   Priority:
     1) _autoLinkToken (cached จาก doRegister) → deep link "🔗 เชื่อม LINE กับ A4S · รหัสยืนยัน: <token>"
     2) rPass + rCode (pre-register) → live POST /line/preauth → token → deep link
     3) Legacy fallback → ส่งแค่ code → user พิมพ์ password ใน chat */
window.connectViaOA = async function () {
  const codeEl = document.getElementById('rCode');
  const passEl = document.getElementById('rPass');
  const code = (codeEl?.value.trim()) || _registeredCode || '';
  if (!code) {
    await ConfirmModal.open({
      icon: '📝',
      title: t('line_need_reg_title'),
      tone: 'warning',
      message: t('line_need_reg_msg'),
      hideCancel: true,
      okText: t('ok'),
    });
    codeEl?.scrollIntoView({ behavior: 'smooth', block: 'center' });
    setTimeout(() => codeEl?.focus(), 300);
    return;
  }

  const oaId = '@949bctau'; // A4S-Bot-Assistant basic ID
  const openDeepLink = (msg) => {
    const url = `https://line.me/R/oaMessage/${encodeURIComponent(oaId)}/?${encodeURIComponent(msg)}`;
    window.open(url, '_blank');
    // เตือน user ให้กด Send ใน LINE (LINE ไม่ให้ auto-send กัน spam)
    showToast(t('line_opened'), 'info');
  };

  // Priority 1: cached token จาก doRegister
  if (_autoLinkToken) {
    openDeepLink(`🔗 เชื่อม LINE กับ A4S · รหัสยืนยัน: ${_autoLinkToken}`);
    return;
  }

  // Priority 2: live preauth (form ยังอยู่ + password กรอกแล้ว)
  const proxyUrl = (window.REGISTER_CONFIG?.proxy_url || '').replace(/\/+$/, '');
  const password = (passEl?.value || '').trim();
  if (proxyUrl && password) {
    try {
      const res = await fetch(`${proxyUrl}/line/preauth`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ code, password }),
      });
      const data = await res.json().catch(() => ({}));
      if (res.ok && data?.token) {
        _autoLinkToken = data.token;
        openDeepLink(`🔗 เชื่อม LINE กับ A4S · รหัสยืนยัน: ${data.token}`);
        return;
      }
      if (res.status === 401) { showToast(t('err_wrong_password'), 'error'); passEl?.focus(); return; }
      if (res.status === 404) { showToast(t('err_not_found_member'), 'error'); codeEl?.focus(); return; }
      console.warn('[preauth live] failed, fallback to legacy:', res.status, data?.error);
    } catch (e) {
      console.warn('[preauth live] network error, fallback to legacy:', e.message);
    }
  }

  // Priority 3: Legacy fallback — ส่งแค่ code (user ต้องพิมพ์ password ใน chat)
  openDeepLink(code);
};

/* ── Referrer lookup (live + on-submit) ──
   Returns { code, name } when found, null otherwise. */
let _referrerCache = null;
async function lookupReferrer(code) {
  const st = document.getElementById('gRefStatus');
  const v = (code || '').trim();
  if (!v) { _referrerCache = null; if (st) st.innerHTML = ''; return null; }
  try {
    // members (MLM) → fallback test_members
    let rows = await sbGet(`members?member_code=eq.${encodeURIComponent(v)}&select=member_code,member_name,full_name&limit=1`);
    if (!rows.length) {
      rows = await sbGet(`test_members?member_code=eq.${encodeURIComponent(v)}&select=member_code,member_name,full_name&limit=1`);
    }
    if (!rows.length) {
      _referrerCache = null;
      if (st) st.innerHTML = `<span style="color:#dc2626">${t('ref_not_found')}</span>`;
      return null;
    }
    const r = rows[0];
    const name = r.full_name || r.member_name || r.member_code;
    // Auto-derive สายงาน — ถ้า referrer link กับ upline_leader โดยตรง
    let uplineId = null, uplineName = null;
    try {
      const ulRows = await sbGet(`upline_leaders?member_code=eq.${encodeURIComponent(r.member_code)}&is_active=eq.true&select=id,name&limit=1`);
      if (ulRows?.length) {
        uplineId = ulRows[0].id;
        uplineName = ulRows[0].name;
      }
    } catch {}
    _referrerCache = { code: r.member_code, name, uplineId, uplineName };
    if (st) st.innerHTML = `<span style="color:#065f46">✅ ${esc(name)}</span>`;
    return _referrerCache;
  } catch (e) {
    _referrerCache = null;
    if (st) st.innerHTML = `<span style="color:#dc2626">${t('ref_err')}</span>`;
    return null;
  }
}

/* ── Tab switcher: member / guest ── */
window.switchRegTab = function (tab) {
  document.querySelectorAll('.reg-tab').forEach(b => b.classList.toggle('active', b.dataset.tab === tab));
  const memberPane = document.getElementById('tabMember');
  const guestPane = document.getElementById('tabGuest');
  if (memberPane) memberPane.classList.toggle('active', tab === 'member');
  if (guestPane) guestPane.classList.toggle('active', tab === 'guest');
  // Auto-focus first field of active tab
  setTimeout(() => {
    if (tab === 'member') document.getElementById('rCode')?.focus();
    else document.getElementById('gName')?.focus();
  }, 50);
};

/* ── Link LINE account to member (persistent, cross-event) ───
   1) Upsert history row in member_line_accounts (ตัวเก็บทุก LINE ID)
   2) Set <table>.line_user_id = this one (primary/current)
   table = 'members' (default, MLM) หรือ 'test_members' (mock)
*/
async function linkLineToMember(memberCode, profile, table = 'members') {
  if (!memberCode || !profile?.userId) return;
  const now = new Date().toISOString();

  // 1) Upsert history — POST with merge-duplicates
  await fetch(`${SB_URL}/rest/v1/member_line_accounts?on_conflict=member_code,line_user_id`, {
    method: 'POST',
    headers: {
      apikey: SB_KEY,
      Authorization: `Bearer ${SB_KEY}`,
      'Content-Type': 'application/json',
      Prefer: 'resolution=merge-duplicates,return=minimal',
    },
    body: JSON.stringify({
      member_code: memberCode,
      line_user_id: profile.userId,
      line_display_name: profile.displayName || null,
      line_picture_url: profile.pictureUrl || null,
      last_active_at: now,
      is_active: true,
      source: 'liff_login',
    }),
  });

  // 2) Set as primary on members / test_members (latest login = current target)
  await fetch(`${SB_URL}/rest/v1/${table}?member_code=eq.${encodeURIComponent(memberCode)}`, {
    method: 'PATCH',
    headers: {
      apikey: SB_KEY,
      Authorization: `Bearer ${SB_KEY}`,
      'Content-Type': 'application/json',
    },
    body: JSON.stringify({
      line_user_id: profile.userId,
      line_display_name: profile.displayName || null,
      line_picture_url: profile.pictureUrl || null,
      line_linked_at: now,
    }),
  });
}

async function doRegister() {
  const code = document.getElementById('rCode').value.trim();
  const pass = document.getElementById('rPass').value;
  const msgEl = document.getElementById('regMsg');
  const btn = document.getElementById('btnRegister');

  if (!code || !pass) { showMsg(t('err_need_code_pass'), 'error'); return; }

  btn.disabled = true;
  btn.textContent = t('checking');
  msgEl.style.display = 'none';

  try {
    // 1. Find member — ลอง members (MLM) ก่อน · fallback ไป test_members (mock สำหรับทดสอบ)
    //    เพิ่ม co_applicant_name + is_company สำหรับสร้าง persons ใน JS (เลี่ยง view member_persons ที่ timeout)
    //    เพิ่ม position_level สำหรับเช็คเงื่อนไข min_position_level ของ event
    const members = await sbGet(`members?member_code=eq.${encodeURIComponent(code)}&select=member_code,member_name,full_name,phone,password_hash,co_applicant_name,is_company,position_level&limit=1`);
    let member = members[0];
    let memberTable = 'members';
    if (!member) {
      const testRows = await sbGet(`test_members?member_code=eq.${encodeURIComponent(code)}&select=member_code,member_name,full_name,phone,password_hash,co_applicant_name,position_level&limit=1`);
      member = testRows[0];
      if (member) { memberTable = 'test_members'; member.is_company = false; }
    }
    if (!member) { showMsg(t('err_not_found_member'), 'error'); btn.disabled = false; btn.textContent = t('btn_register'); return; }

    // 2. Verify password via hash (no master key needed — works anywhere)
    if (!window.ERPCrypto) {
      showMsg(t('err_not_ready'), 'error'); btn.disabled = false; btn.textContent = t('btn_register'); return;
    }
    if (!member.password_hash) { showMsg(t('err_no_password_set'), 'error'); btn.disabled = false; btn.textContent = t('btn_register'); return; }
    const inputHash = await ERPCrypto.hash(pass);
    if (inputHash !== member.password_hash) { showMsg(t('err_wrong_password'), 'error'); btn.disabled = false; btn.textContent = t('btn_register'); return; }

    // 2b. Prefetch LINE link token (best-effort — ไม่ block ลงทะเบียน)
    //     เก็บไว้ใน _autoLinkToken เพื่อ connectViaOA() ใช้ได้แม้ form ถูก destroy แล้ว (10 นาที)
    _prefetchLineLinkToken(code, pass).catch(() => {});

    // 3. Check members_only
    if (_event.members_only && !member.member_code) {
      showMsg(t('err_members_only'), 'error'); btn.disabled = false; btn.textContent = t('btn_register'); return;
    }

    // 3b. Check min_position_level — ถ้า event กำหนดตำแหน่งขั้นต่ำ ต้องเช็ค position ของสมาชิก
    if (_event.min_position_level && !meetsMinPosition(member.position_level, _event.min_position_level)) {
      const need = POSITION_LABEL[_event.min_position_level] || _event.min_position_level;
      const have = member.position_level ? `${member.position_level}` : t('no_position');
      showMsg(t('err_pos_low', { have: esc(have), need: esc(need) }), 'error');
      btn.disabled = false; btn.textContent = t('btn_register'); return;
    }

    // 4. Build attendable persons (1-2 rows: primary + co_applicant) — สร้างใน JS
    //    เคยใช้ view member_persons แต่ timeout (PG 57014) เพราะ CTE materialize ทั้ง table ก่อน filter
    //    Logic mirror view: company → full_name (fallback member_name) · personal → member_name · +co_applicant ถ้ามี
    const persons = [];
    const isCompany = !!member.is_company;
    const primaryName = (isCompany
      ? (member.full_name?.trim() || member.member_name?.trim())
      : member.member_name?.trim()) || null;
    if (primaryName) {
      persons.push({
        member_code: code,
        person_role: 'primary',
        person_name: primaryName,
        phone: member.phone || null,
        is_company: isCompany,
      });
    }
    const coAppName = member.co_applicant_name?.trim();
    if (coAppName) {
      persons.push({
        member_code: code,
        person_role: 'co_applicant',
        person_name: coAppName,
        phone: null,
        is_company: isCompany,
      });
    }
    if (!persons.length) {
      // Last-resort fallback — data ไม่ครบเลย
      persons.push({
        member_code: code,
        person_role: 'primary',
        person_name: member.full_name || member.member_name || code,
        phone: member.phone || null,
        is_company: false,
      });
    }
    const primary = persons.find(p => p.person_role === 'primary');
    const coApplicant = persons.find(p => p.person_role === 'co_applicant');

    // 5. Check existing registration (per role) — UNIQUE (event_id, member_code, person_role)
    const existing = await sbGet(`event_attendees?event_id=eq.${_event.event_id}&member_code=eq.${encodeURIComponent(code)}&select=attendee_id,person_role,ticket_no,name`);
    const hasPrimary = existing.some(r => r.person_role === 'primary');
    const hasCoApp = existing.some(r => r.person_role === 'co_applicant');

    // ถ้ามีแค่ 1 person ที่ register ได้ และลงไปแล้ว → แสดงบัตรเดิม
    if (persons.length === 1) {
      const role = persons[0].person_role;
      if ((role === 'primary' && hasPrimary) || (role === 'co_applicant' && hasCoApp)) {
        showAlreadyRegistered(code, existing); return;
      }
    } else if (persons.length === 2 && hasPrimary && hasCoApp) {
      showAlreadyRegistered(code, existing); return;
    }

    // 6. Check prerequisite
    if (_prereqLevel && _event.series_id) {
      const attended = await sbGet(`event_attendees?member_code=eq.${encodeURIComponent(code)}&checked_in=eq.true&select=event_id`);
      let passed = false;
      if (attended.length) {
        const eids = attended.map(a => a.event_id).join(',');
        const matchEv = await sbGet(`events?series_id=eq.${_event.series_id}&level_id=eq.${_level.prerequisite_level_id}&event_id=in.(${eids})&select=event_id`);
        passed = matchEv.length > 0;
      }
      if (!passed) {
        showMsg(t('err_prereq', { lvl: esc(_prereqLevel.level_name) }), 'error');
        btn.disabled = false; btn.textContent = t('btn_register'); return;
      }
    }

    // 7. Determine selection — popup เฉพาะตอนมี 2 rows
    const seatsLeft = _event.max_attendees > 0 ? Math.max(0, _event.max_attendees - _attendeeCount) : Infinity;
    if (_event.max_attendees > 0 && seatsLeft <= 0) {
      showMsg(t('err_full'), 'error'); btn.disabled = false; btn.textContent = t('btn_register'); return;
    }

    let selectedRoles;
    if (persons.length === 1) {
      selectedRoles = [persons[0].person_role];
    } else {
      const pick = await showPersonPicker({ primary, coApplicant, hasPrimary, hasCoApp, seatsLeft });
      if (!pick) {
        // user cancelled
        btn.disabled = false; btn.textContent = t('btn_register'); return;
      }
      selectedRoles = pick;
    }

    if (_event.max_attendees > 0 && selectedRoles.length > seatsLeft) {
      showMsg(t('err_seats_not_enough'), 'error'); btn.disabled = false; btn.textContent = t('btn_register'); return;
    }

    // 8. Generate ticket(s)
    const prefix = `TK-${_event.event_id}-`;
    let baseNum = 1;
    try {
      const tix = await sbGet(`event_attendees?ticket_no=like.${prefix}*&select=ticket_no&order=ticket_no.desc&limit=1`);
      if (tix.length) {
        const lastBase = parseInt(String(tix[0].ticket_no).slice(prefix.length).split('-')[0], 10) || 0;
        baseNum = lastBase + 1;
      }
    } catch {}
    const baseStr = String(baseNum).padStart(4, '0');
    const tickets = selectedRoles.length === 2
      ? [`${prefix}${baseStr}-A`, `${prefix}${baseStr}-B`]   // primary=A, co_applicant=B
      : [`${prefix}${baseStr}`];

    // 9. Build payload — LINE ผูกเฉพาะ "เจ้าของเครื่องที่กดลงทะเบียน"
    //    - เลือกคนเดียว → คนนั้นเป็น LINE owner
    //    - เลือกทั้งคู่ → primary เป็น LINE owner (co_applicant ไม่ผูก LINE)
    //    - ก่อนวันงาน → pre-reg (checked_in=false) · วันงาน/หลังวันงาน → auto check-in
    const lineOwnerRole = selectedRoles.length === 2 ? 'primary' : selectedRoles[0];
    const nowIso = new Date().toISOString();
    const preReg = isPreRegistration();
    const stampKey = await getStampFieldKey();   // ผู้บันทึก = "ลงทะเบียนผ่าน Link"
    const payload = selectedRoles.map((role, i) => {
      const p = role === 'primary' ? primary : coApplicant;
      const isLineOwner = _lineProfile && role === lineOwnerRole;
      return {
        event_id: _event.event_id,
        name: p?.person_name || code,
        phone: p?.phone || null,
        member_code: code,
        person_role: role,
        attend_type: 'ONSITE',
        ticket_no: tickets[i],
        payment_status: 'FREE',
        checked_in: !preReg,
        check_in_at: preReg ? null : nowIso,
        ...(stampKey ? { extra_fields: { [stampKey]: STAMP_LINK_LABEL } } : {}),
        ...(isLineOwner ? {
          line_user_id: _lineProfile.userId,
          line_display_name: _lineProfile.displayName || null,
          line_picture_url: _lineProfile.pictureUrl || null,
          line_linked_at: nowIso,
        } : {}),
      };
    });
    await sbPost('event_attendees', payload);

    // 9b. Link LINE account to member (persistent, cross-event)
    if (_lineProfile) {
      try { await linkLineToMember(code, _lineProfile, memberTable); }
      catch (e) { console.warn('linkLineToMember failed:', e?.message || e); }
    }

    // Success!
    const ticketLines = payload.map((p, i) =>
      `<div style="display:flex;flex-direction:column;align-items:center;gap:6px;padding:14px 12px;background:#fff;border:1px solid #e2e8f0;border-radius:12px;margin-top:10px;box-shadow:0 1px 2px rgba(0,0,0,.04)">
         <div style="font-size:13px;color:#0f172a;font-weight:600">${p.person_role === 'co_applicant' ? '👥' : '👤'} ${esc(p.name)}</div>
         <div id="mRegQr_${i}" data-qr="${esc(p.ticket_no)}" style="background:#fff;padding:8px;border-radius:8px"></div>
         <div style="font-family:'IBM Plex Mono',monospace;font-size:13px;font-weight:700;color:#1e40af;letter-spacing:.5px">${esc(p.ticket_no)}</div>
       </div>`).join('');
    _registeredCode = code;     // remember after form is destroyed (for connectViaOA)
    document.getElementById('regForm').innerHTML = `
      <div class="reg-msg success">
        <div style="font-size:32px;margin-bottom:8px">✅</div>
        <div style="font-weight:700;font-size:16px;line-height:1.4">${t('success_title', { event: esc(_event.event_name) })}</div>
        ${preReg ? `<div style="margin-top:6px;display:inline-block;padding:3px 10px;background:#fef3c7;color:#92400e;border:1px solid #fde68a;border-radius:10px;font-size:11.5px;font-weight:700">${t('prereg_badge')}</div>` : ''}
        ${payload.length === 2 ? `<div style="margin-top:4px;font-size:12.5px;color:#64748b">${t('two_names')}</div>` : ''}
        ${ticketLines}
        <div style="margin-top:14px;font-size:12px;color:#64748b">${preReg ? t('qr_hint_prereg') : t('qr_hint')}</div>
      </div>`;
    // Render QR per ticket
    payload.forEach((p, i) => {
      const wrap = document.getElementById(`mRegQr_${i}`);
      if (!wrap) return;
      try {
        new QRCode(wrap, { text: p.ticket_no, width: 160, height: 160, correctLevel: QRCode.CorrectLevel.M });
      } catch {
        wrap.textContent = p.ticket_no;
      }
    });

  } catch (e) {
    showMsg(t('err_generic') + (e.message || '').slice(0, 100), 'error');
    btn.disabled = false; btn.textContent = t('btn_register');
  }
}

/* ── Guest registration (ไม่ใช่สมาชิก A4S) ─────────────── */
async function doRegisterGuest() {
  const name = document.getElementById('gName').value.trim();
  const phone = document.getElementById('gPhone').value.trim();
  const refCode = document.getElementById('gRef').value.trim();
  const btn = document.getElementById('btnRegisterGuest');

  if (!name) { showGuestMsg(t('err_need_name'), 'error'); return; }
  if (!phone) { showGuestMsg(t('err_need_phone'), 'error'); return; }
  if (!refCode) { showGuestMsg(t('err_need_ref'), 'error'); return; }
  if (_event.members_only) { showGuestMsg(t('err_members_only'), 'error'); return; }
  if (_event.min_position_level) {
    const need = POSITION_LABEL[_event.min_position_level] || _event.min_position_level;
    showGuestMsg(t('err_guest_pos', { need: esc(need) }), 'error'); return;
  }

  btn.disabled = true;
  btn.textContent = t('registering');
  document.getElementById('regMsgGuest').style.display = 'none';

  const resetBtn = () => { btn.disabled = false; btn.textContent = t('btn_register'); };

  try {
    // Validate referrer (use cache if same code, else re-fetch)
    const ref = (_referrerCache && _referrerCache.code === refCode)
      ? _referrerCache
      : await lookupReferrer(refCode);
    if (!ref) { showGuestMsg(t('err_ref_not_found_db'), 'error'); resetBtn(); return; }

    // Refresh capacity (กันคนอื่นเพิ่งลง)
    if (_event.max_attendees && _event.max_attendees > 0) {
      const attRes = await fetch(`${SB_URL}/rest/v1/event_attendees?event_id=eq.${_event.event_id}&select=attendee_id`, {
        headers: { apikey: SB_KEY, Authorization: `Bearer ${SB_KEY}`, Prefer: 'count=exact', Range: '0-0' },
      });
      const range = attRes.headers.get('content-range') || '*/0';
      _attendeeCount = parseInt(range.split('/')[1], 10) || 0;
      if (_attendeeCount >= _event.max_attendees) {
        showGuestMsg(t('err_full'), 'error'); resetBtn(); return;
      }
    }

    // Generate ticket
    const prefix = `TK-${_event.event_id}-`;
    let baseNum = 1;
    try {
      const tix = await sbGet(`event_attendees?ticket_no=like.${prefix}*&select=ticket_no&order=ticket_no.desc&limit=1`);
      if (tix.length) {
        const lastBase = parseInt(String(tix[0].ticket_no).slice(prefix.length).split('-')[0], 10) || 0;
        baseNum = lastBase + 1;
      }
    } catch {}
    const ticketNo = `${prefix}${String(baseNum).padStart(4, '0')}`;

    const nowIso = new Date().toISOString();
    const preReg = isPreRegistration();
    const stampKey = await getStampFieldKey();   // ผู้บันทึก = "ลงทะเบียนผ่าน Link"
    const row = {
      event_id: _event.event_id,
      name,
      phone,
      member_code: null,
      person_role: 'guest',
      attend_type: 'ONSITE',
      ticket_no: ticketNo,
      payment_status: 'FREE',
      checked_in: !preReg,
      check_in_at: preReg ? null : nowIso,
      extra_fields: {
        referrer_code: ref.code,
        referrer_name: ref.name,
        ...(stampKey ? { [stampKey]: STAMP_LINK_LABEL } : {}),
      },
      ...(ref.uplineId ? {
        upline_id: ref.uplineId,
        upline_name_text: ref.uplineName,
      } : {}),
      ...(_lineProfile ? {
        line_user_id: _lineProfile.userId,
        line_display_name: _lineProfile.displayName || null,
        line_picture_url: _lineProfile.pictureUrl || null,
        line_linked_at: nowIso,
      } : {}),
    };
    await sbPost('event_attendees', [row]);

    // Success!
    document.getElementById('regForm').innerHTML = `
      <div class="reg-msg success">
        <div style="font-size:32px;margin-bottom:8px">✅</div>
        <div style="font-weight:700;font-size:16px;line-height:1.4">${t('success_title', { event: esc(_event.event_name) })}</div>
        ${preReg ? `<div style="margin-top:6px;display:inline-block;padding:3px 10px;background:#fef3c7;color:#92400e;border:1px solid #fde68a;border-radius:10px;font-size:11.5px;font-weight:700">${t('prereg_badge')}</div>` : ''}

        <div style="background:#fff;border:1px solid #e2e8f0;border-radius:12px;padding:12px 14px;margin-top:12px;text-align:left;box-shadow:0 1px 2px rgba(0,0,0,.04)">
          <div style="display:flex;gap:10px;padding:6px 0;font-size:13px;color:#0f172a">
            <span style="color:#64748b;min-width:80px">${t('sx_name')}</span>
            <span style="font-weight:600;flex:1">${esc(name)}</span>
          </div>
          <div style="display:flex;gap:10px;padding:6px 0;font-size:13px;color:#0f172a;border-top:1px dashed #e2e8f0">
            <span style="color:#64748b;min-width:80px">${t('sx_phone')}</span>
            <span style="font-weight:600;flex:1">${esc(phone)}</span>
          </div>
          <div style="display:flex;gap:10px;padding:6px 0;font-size:13px;color:#0f172a;border-top:1px dashed #e2e8f0">
            <span style="color:#64748b;min-width:80px">${t('sx_ref')}</span>
            <span style="font-weight:600;flex:1">${esc(ref.code)} · ${esc(ref.name)}</span>
          </div>
        </div>

        <div style="display:flex;flex-direction:column;align-items:center;gap:6px;padding:14px 12px;background:#fff;border:1px solid #e2e8f0;border-radius:12px;margin-top:10px;box-shadow:0 1px 2px rgba(0,0,0,.04)">
          <div id="gRegQr" data-qr="${esc(ticketNo)}" style="background:#fff;padding:8px;border-radius:8px"></div>
          <div style="font-family:'IBM Plex Mono',monospace;font-size:13px;font-weight:700;color:#1e40af;letter-spacing:.5px">${esc(ticketNo)}</div>
        </div>

      </div>`;
    const qrWrap = document.getElementById('gRegQr');
    if (qrWrap) {
      try {
        new QRCode(qrWrap, { text: ticketNo, width: 160, height: 160, correctLevel: QRCode.CorrectLevel.M });
      } catch {
        qrWrap.textContent = ticketNo;
      }
    }
    // ซ่อน LINE OA connect button — guest ไม่มี member_code ให้ผูก
    if (!_lineProfile) {
      const linePanel = document.getElementById('regLinePanel');
      if (linePanel) linePanel.style.display = 'none';
    }
  } catch (e) {
    showGuestMsg(t('err_generic') + (e.message || '').slice(0, 100), 'error');
    resetBtn();
  }
}

/* ── Person picker — เลือก primary / co_applicant / ทั้งคู่ ──
   Returns Promise<['primary'] | ['co_applicant'] | ['primary','co_applicant'] | null>
   null = user cancelled */
function showPersonPicker({ primary, coApplicant, hasPrimary, hasCoApp, seatsLeft }) {
  return new Promise(resolve => {
    const ov = document.getElementById('ppOverlay');
    const pName = primary?.person_name || '—';
    const cName = coApplicant?.person_name || '—';
    const primaryChip = primary?.is_company
      ? `<span class="pp-chip role-primary">${t('pp_primary_company')}</span>`
      : `<span class="pp-chip role-primary">${t('pp_primary_person')}</span>`;
    const bothDisabled = hasPrimary || hasCoApp || seatsLeft < 2;
    const bothNote = hasPrimary || hasCoApp
      ? `<span class="pp-chip warn">${t('pp_has_registered')}</span>`
      : (seatsLeft < 2 ? `<span class="pp-chip warn">${t('pp_seats_left', { n: seatsLeft })}</span>` : '');
    const doneChip = `<span class="pp-chip done">${t('pp_registered')}</span>`;

    ov.innerHTML = `
      <div class="pp-card" role="document">
        <div class="pp-head">
          <div class="pp-title" id="ppTitle">${t('pp_title')}</div>
          <div class="pp-sub">${t('pp_sub')}</div>
        </div>
        <div class="pp-body">
          <button class="pp-opt" data-pick="primary" ${hasPrimary ? 'disabled' : ''}>
            <div class="pp-icon primary">👤</div>
            <div class="pp-info">
              <div class="pp-name">${esc(pName)}</div>
              <div class="pp-meta">${primaryChip}${hasPrimary ? doneChip : ''}</div>
            </div>
            <div class="pp-arrow">›</div>
          </button>
          <button class="pp-opt" data-pick="co_applicant" ${hasCoApp ? 'disabled' : ''}>
            <div class="pp-icon coapp">👥</div>
            <div class="pp-info">
              <div class="pp-name">${esc(cName)}</div>
              <div class="pp-meta"><span class="pp-chip role-coapp">${t('pp_coapp')}</span>${hasCoApp ? doneChip : ''}</div>
            </div>
            <div class="pp-arrow">›</div>
          </button>
          <button class="pp-opt" data-pick="both" ${bothDisabled ? 'disabled' : ''}>
            <div class="pp-icon both">👫</div>
            <div class="pp-info">
              <div class="pp-name">${t('pp_both')}</div>
              <div class="pp-meta"><span class="pp-chip role-primary">${t('pp_2people')}</span>${bothNote}</div>
            </div>
            <div class="pp-arrow">›</div>
          </button>
        </div>
        <div class="pp-foot">
          <button type="button" class="pp-cancel" data-pick="cancel">${t('pp_cancel')}</button>
        </div>
      </div>`;
    ov.classList.add('open');

    // Watch for external close (modalManager.js handles ESC by removing .open)
    const observer = new MutationObserver(() => {
      if (!ov.classList.contains('open')) close(null);
    });
    observer.observe(ov, { attributes: true, attributeFilter: ['class'] });

    const close = (result) => {
      observer.disconnect();
      ov.classList.remove('open');
      ov.removeEventListener('click', onClick);
      resolve(result);
    };
    const onClick = (e) => {
      const btn = e.target.closest('[data-pick]');
      if (btn) {
        if (btn.disabled) return;
        const v = btn.dataset.pick;
        if (v === 'cancel') return close(null);
        if (v === 'both') return close(['primary', 'co_applicant']);
        return close([v]);
      }
      // Click on overlay backdrop = cancel
      if (e.target === ov) close(null);
    };
    ov.addEventListener('click', onClick);
  });
}

  const el = document.getElementById('regMsg');

}

function showAlreadyRegistered(code, existing) {
  const order = { primary: 0, co_applicant: 1 };
  const sorted = [...existing].sort((a, b) => (order[a.person_role] ?? 9) - (order[b.person_role] ?? 9));
  const tickets = sorted.map((p, i) => {
    const qrId = `arQr_${i}`;
    const ticketNo = p.ticket_no || `A4S-ATT-${p.attendee_id}`;
    return `
      <div style="display:flex;flex-direction:column;align-items:center;gap:6px;padding:14px 12px;background:#fff;border:1px solid #e2e8f0;border-radius:12px;margin-top:10px;box-shadow:0 1px 2px rgba(0,0,0,.04)">
        <div style="font-size:13px;color:#0f172a;font-weight:600">${p.person_role === 'co_applicant' ? '👥' : '👤'} ${esc(p.name || code)}</div>
        <div id="${qrId}" data-qr="${esc(ticketNo)}" style="background:#fff;padding:8px;border-radius:8px"></div>
        <div style="font-family:'IBM Plex Mono',monospace;font-size:13px;font-weight:700;color:#1e40af;letter-spacing:.5px">${esc(ticketNo)}</div>
      </div>`;
  }).join('');
  _registeredCode = code;
  document.getElementById('regForm').innerHTML = `
    <div class="reg-msg success">
      <div style="font-size:32px;margin-bottom:4px">✅</div>
      <div style="font-weight:700;font-size:16px;line-height:1.4">${t('success_title', { event: esc(_event.event_name) })}</div>
      ${sorted.length === 2 ? `<div style="margin-top:4px;font-size:12.5px;color:#64748b">${t('two_names')}</div>` : ''}
      ${tickets}
      <div style="margin-top:14px;font-size:12px;color:#64748b">${t('qr_hint')}</div>
    </div>`;
  // Render QR after DOM is in place
  sorted.forEach((p, i) => {
    const wrap = document.getElementById(`arQr_${i}`);
    if (!wrap) return;
    const text = wrap.getAttribute('data-qr');
    try {
      new QRCode(wrap, { text, width: 160, height: 160, correctLevel: QRCode.CorrectLevel.M });
    } catch (e) {
      wrap.textContent = text;
    }
  });
}

function esc(s) { return String(s || '').replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m])); }

function showToast(msg, type) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = `toast show toast-${type}`;
  setTimeout(() => t.className = 'toast', 3500);
}
</script>
