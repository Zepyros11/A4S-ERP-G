<!doctype html>
<html lang="th">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>รายการสถานที่ — A4S-ERP</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="../../css/main.css" />
    <link rel="stylesheet" href="./events.css" />
    <link rel="stylesheet" href="./events-place-list.css" />
  </head>
  <body>
    <div class="loading-overlay" id="loadingOverlay">
      <div class="spinner"></div>
    </div>
    <div class="toast" id="toast"></div>

    <!-- TOPBAR -->
    <div class="topbar"></div>
    <div class="layout">
      <!-- SIDEBAR -->
      <div id="sidebar-container"></div>

      <!-- CONTENT -->
      <div class="content-area">
        <div class="page">
          <!-- ① STATS -->
          <div class="stats-row">
            <div class="stat-card">
              <div class="stat-icon">📍</div>
              <div>
                <div class="stat-value" id="cardTotal">0</div>
                <div class="stat-label">สถานที่ทั้งหมด</div>
              </div>
            </div>
            <div class="stat-card">
              <div class="stat-icon">✅</div>
              <div>
                <div class="stat-value" id="cardActive">0</div>
                <div class="stat-label">ACTIVE</div>
              </div>
            </div>
            <div class="stat-card">
              <div class="stat-icon">🏨</div>
              <div>
                <div class="stat-value" id="cardHotel">0</div>
                <div class="stat-label">โรงแรม</div>
              </div>
            </div>
            <div class="stat-card">
              <div class="stat-icon">🎤</div>
              <div>
                <div class="stat-value" id="cardEventSpace">0</div>
                <div class="stat-label">Event Space</div>
              </div>
            </div>
          </div>

          <!-- ② TOOLBAR -->
          <div class="table-card">
            <div class="table-toolbar">
              <div class="search-wrap">
                <span class="search-icon">🔍</span>
                <input
                  class="search-input"
                  id="searchInput"
                  placeholder="ค้นหาชื่อสถานที่ หรือที่อยู่..."
                />
              </div>
              <select class="filter-select" id="filterType">
                <option value="">⚪ ทุกประเภท</option>
                <option value="HOTEL">🏨 โรงแรม</option>
                <option value="MEETING_ROOM">🏢 ห้องประชุม</option>
                <option value="RESTAURANT">🍽 ร้านอาหาร</option>
                <option value="EVENT_SPACE">🎤 Event Space</option>
              </select>
              <select class="filter-select" id="filterStatus">
                <option value="">⚪ ทุกสถานะ</option>
                <option value="ACTIVE">✅ ACTIVE</option>
                <option value="INACTIVE">🚫 INACTIVE</option>
              </select>
              <div class="toolbar-right">
                <button
                  class="btn btn-primary"
                  onclick="window.location.href = './events-place-form.html'"
                >
                  ＋ เพิ่มสถานที่
                </button>
              </div>
            </div>

            <!-- ③ TABLE -->
            <div class="table-hdr">
              <div class="table-title">📍 รายการสถานที่</div>
              <div class="table-count" id="tableCount">0 รายการ</div>
            </div>
            <div class="table-wrap">
              <table class="data-table">
                <thead>
                  <tr>
                    <th style="width: 40px; text-align: center">
                      <input
                        type="checkbox"
                        id="chkAll"
                        onclick="window.toggleAllCheckbox(this)"
                      />
                    </th>
                    <th class="col-center" style="width: 80px">รูป</th>
                    <th
                      onclick="window.sortTable('place_name')"
                      style="cursor: pointer"
                    >
                      ชื่อสถานที่ <span class="sort-icon">⇅</span>
                    </th>
                    <th class="col-center">ประเภท</th>
                    <th>ที่อยู่</th>
                    <th>ติดต่อ</th>
                    <th
                      class="col-center"
                      onclick="window.sortTable('capacity')"
                      style="cursor: pointer"
                    >
                      Capacity <span class="sort-icon">⇅</span>
                    </th>
                    <th class="col-center">ที่จอดรถ</th>
                    <th class="col-center">สถานะ</th>
                    <th class="col-center">จัดการ</th>
                  </tr>
                </thead>
                <tbody id="tableBody">
                  <tr>
                    <td colspan="10">
                      <div class="empty-state">
                        <div class="empty-icon">📍</div>
                        <div class="empty-text">ยังไม่มีข้อมูลสถานที่</div>
                      </div>
                    </td>
                  </tr>
                </tbody>
              </table>
            </div>
          </div>
        </div>
        <!-- end .page -->

        <!-- SCRIPTS -->
        <script type="module" src="./events-place-list.js"></script>
        <script src="../../js/core/auth.js"></script>
        <script src="../../js/components/modal/deleteModal.js"></script>
        <script src="../../js/components/modal/modalManager.js"></script>
        <script src="../../js/components/navigation/imgPopup.js"></script>
        <script src="../../js/components/navigation/sidebar.js"></script>
        <script type="module">
          import { loadTopbar } from "../../js/components/navigation/topbar.js";
          loadTopbar("📍 สถานที่");
        </script>
      </div>
    </div>

    <!-- OVERLAY -->
    <div
      id="plPanelOverlay"
      style="
        display: none;
        position: fixed;
        inset: 0;
        background: rgba(0, 0, 0, 0.4);
        z-index: 299;
        backdrop-filter: blur(2px);
      "
      onclick="window.closePlacePanel()"
    ></div>

    <!-- SIDE PANEL -->
    <div id="plSidePanel" class="ev-side-panel">
      <div class="ev-panel-header">
        <div class="ev-panel-title">📍 รายละเอียดสถานที่</div>
        <button class="btn-icon" onclick="window.closePlacePanel()">✕</button>
      </div>

      <div class="ev-panel-body">
        <!-- Cover Image -->
        <div class="ev-panel-poster" id="panelCover">
          <span style="font-size: 48px; opacity: 0.3">📍</span>
        </div>

        <!-- ── EDIT FORM ── -->
        <div class="panel-field">
          <label class="panel-label"
            >ชื่อสถานที่ <span style="color: var(--danger)">*</span></label
          >
          <input class="panel-input" id="peqName" placeholder="ชื่อสถานที่" />
        </div>

        <div class="panel-row-2">
          <div class="panel-field">
            <label class="panel-label">ประเภท</label>
            <select class="panel-input" id="peqType">
              <option value="HOTEL">🏨 โรงแรม</option>
              <option value="MEETING_ROOM">🏢 ห้องประชุม</option>
              <option value="RESTAURANT">🍽 ร้านอาหาร</option>
              <option value="EVENT_SPACE">🎤 Event Space</option>
            </select>
          </div>
          <div class="panel-field">
            <label class="panel-label">สถานะ</label>
            <select class="panel-input" id="peqStatus">
              <option value="ACTIVE">✅ ACTIVE</option>
              <option value="INACTIVE">🚫 INACTIVE</option>
            </select>
          </div>
        </div>

        <div class="panel-field">
          <label class="panel-label">ที่อยู่</label>
          <textarea
            class="panel-input panel-textarea"
            id="peqAddress"
            placeholder="ที่อยู่..."
          ></textarea>
        </div>

        <div class="panel-row-2">
          <div class="panel-field">
            <label class="panel-label">ชื่อผู้ติดต่อ</label>
            <input class="panel-input" id="peqContact" placeholder="ชื่อ" />
          </div>
          <div class="panel-field">
            <label class="panel-label">เบอร์โทร</label>
            <input
              class="panel-input"
              id="peqPhone"
              placeholder="08x-xxx-xxxx"
            />
          </div>
        </div>

        <div class="panel-field">
          <label class="panel-label">Email</label>
          <input
            class="panel-input"
            id="peqEmail"
            type="email"
            placeholder="email@..."
          />
        </div>

        <div class="panel-row-2">
          <div class="panel-field">
            <label class="panel-label">Capacity (คน)</label>
            <input
              class="panel-input"
              id="peqCapacity"
              type="number"
              min="0"
              placeholder="0"
            />
          </div>
          <div class="panel-field">
            <label class="panel-label">Meeting Rooms</label>
            <input
              class="panel-input"
              id="peqMeetingRooms"
              type="number"
              min="0"
              placeholder="0"
            />
          </div>
        </div>

        <div class="panel-row-2">
          <div class="panel-field">
            <label class="panel-label">ห้องพัก</label>
            <input
              class="panel-input"
              id="peqRooms"
              type="number"
              min="0"
              placeholder="0"
            />
          </div>
          <div class="panel-field">
            <label class="panel-label">ที่จอดรถ</label>
            <select class="panel-input" id="peqParking">
              <option value="">— เลือก —</option>
              <option value="true">✅ มี</option>
              <option value="false">❌ ไม่มี</option>
            </select>
          </div>
        </div>

        <div class="panel-field">
          <label class="panel-label">Google Map URL</label>
          <input
            class="panel-input"
            id="peqMap"
            placeholder="https://maps.google.com/..."
          />
        </div>

        <div class="panel-field">
          <label class="panel-label">รายละเอียด</label>
          <textarea
            class="panel-input panel-textarea"
            id="peqDesc"
            placeholder="รายละเอียด..."
          ></textarea>
        </div>
      </div>

      <div class="ev-panel-footer">
        <button
          class="btn btn-outline"
          onclick="
            window.location.href =
              './events-place-form.html?id=' + window._panelPlaceId
          "
        >
          🔗 แก้ไขเต็ม
        </button>
        <button
          class="btn btn-primary"
          id="panelBtnSave"
          onclick="window.savePanelPlace()"
        >
          💾 บันทึก
        </button>
      </div>
    </div>

    <!-- DELETE SELECTED -->
    <script>
      document.addEventListener("DOMContentLoaded", () => {
        const toolbarRight = document.querySelector(".toolbar-right");
        if (toolbarRight) {
          const btnDel = document.createElement("button");
          btnDel.id = "btnDeleteSelected";
          btnDel.className = "btn btn-danger-outline";
          btnDel.style.display = "none";
          btnDel.innerHTML = "🗑 ลบที่เลือก";
          btnDel.onclick = () => window.deleteSelectedPlaces();
          toolbarRight.insertBefore(btnDel, toolbarRight.firstChild);
        }
      });
    </script>
  </body>
</html>
