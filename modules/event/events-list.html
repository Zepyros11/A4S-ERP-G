<!doctype html>
<html lang="th">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>รายการกิจกรรม — A4S-ERP</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="../../css/main.css" />
    <link rel="stylesheet" href="./events.css" />
  </head>
  <body>
    <div class="loading-overlay" id="loadingOverlay">
      <div class="spinner"></div>
    </div>
    <div class="toast" id="toast"></div>

    <!-- TOPBAR -->
    <div class="topbar"></div>
    <div class="layout">
      <!-- SIDEBAR -->
      <div id="sidebar-container"></div>

      <!-- CONTENT -->
      <div class="content-area">
        <div class="page">

          <!-- ① STATS: Events (default visible) -->
          <div class="stats-row" id="statsEvents">
            <div class="stat-card">
              <div class="stat-icon">🗓️</div>
              <div>
                <div class="stat-value" id="cardTotal">0</div>
                <div class="stat-label">งานทั้งหมด</div>
              </div>
            </div>
            <div class="stat-card">
              <div class="stat-icon">⏳</div>
              <div>
                <div class="stat-value" id="cardUpcoming">0</div>
                <div class="stat-label">กำลังจะมาถึง</div>
              </div>
            </div>
            <div class="stat-card">
              <div class="stat-icon">▶️</div>
              <div>
                <div class="stat-value" id="cardOngoing">0</div>
                <div class="stat-label">กำลังดำเนินการ</div>
              </div>
            </div>
            <div class="stat-card">
              <div class="stat-icon">✅</div>
              <div>
                <div class="stat-value" id="cardDone">0</div>
                <div class="stat-label">เสร็จสิ้นแล้ว</div>
              </div>
            </div>
          </div>

          <!-- ② TOOLBAR + TABLE -->
          <div class="table-card">

            <!-- TOOLBAR: Events -->
            <div class="toolbar" id="toolbarEvents">
              <div class="search-wrap">
                <span class="search-icon">🔍</span>
                <input
                  class="search-input"
                  id="searchInput"
                  placeholder="ค้นหาชื่อกิจกรรม หรือสถานที่..."
                />
              </div>
              <select class="filter-select" id="filterType">
                <option value="">⚪ ทุกประเภท</option>
                <option value="BOOTH">🏪 ออกบูธ</option>
                <option value="MEETING">👥 ประชุม</option>
                <option value="ONLINE">💻 Online</option>
                <option value="HYBRID">🔀 Hybrid</option>
                <option value="CONFERENCE">🎤 Conference</option>
                <option value="OTHER">📌 อื่นๆ</option>
              </select>
              <select class="filter-select" id="filterStatus">
                <option value="">⚪ ทุกสถานะ</option>
                <option value="DRAFT">📝 Draft</option>
                <option value="CONFIRMED">✔️ Confirmed</option>
                <option value="ONGOING">▶️ Ongoing</option>
                <option value="DONE">✅ Done</option>
                <option value="CANCELLED">❌ Cancelled</option>
              </select>
              <div class="toolbar-right">
                <button
                  class="btn btn-primary"
                  onclick="window.open('./cs-view/events-calendar.html', '_blank')"
                >
                  Event Calendar
                </button>
                <button
                  class="btn btn-primary"
                  onclick="window.location.href = './event-form.html'"
                >
                  ＋ สร้างกิจกรรม
                </button>
              </div>
            </div>

            <!-- ③ TABLE HEADER with TABS -->
            <div class="table-hdr">
              <div class="ev-tabs">
                <button class="ev-tab active">
                  🗓️ รายการกิจกรรม
                </button>
                <button class="ev-tab" onclick="window.location.href='event-requests.html'">
                  🚪 คำขอจองห้อง<span id="reqPendingBadge" class="tab-badge" style="display:none"></span>
                </button>
              </div>
              <div class="table-count" id="tableCount">0 รายการ</div>
            </div>

            <!-- TAB CONTENT: Events -->
            <div id="tabContentEvents">
              <div class="table-wrap">
                <table class="data-table table-events">
                  <thead>
                    <tr>
                      <th style="width: 40px; text-align: center">
                        <input type="checkbox" id="chkAll" onclick="window.toggleAllCheckbox(this)" />
                      </th>
                      <th onclick="window.sortTable('event_date')" style="cursor: pointer">
                        วันที่จัดงาน <span class="sort-icon">⇅</span>
                      </th>
                      <th onclick="window.sortTable('event_name')" style="cursor: pointer">
                        ชื่องาน <span class="sort-icon">⇅</span>
                      </th>
                      <th>สถานที่</th>
                      <th>ผู้รับผิดชอบ</th>
                      <th class="col-center">โปสเตอร์</th>
                      <th class="col-center">สถานะ</th>
                      <th class="col-center">จัดการ</th>
                    </tr>
                  </thead>
                  <tbody id="tableBody">
                    <tr>
                      <td colspan="9">
                        <div class="empty-state">
                          <div class="empty-icon">🗓️</div>
                          <div class="empty-text">ยังไม่มีข้อมูลกิจกรรม</div>
                        </div>
                      </td>
                    </tr>
                  </tbody>
                </table>
              </div>
            </div>

          </div>
          <!-- end .table-card -->
        </div>
        <!-- end .page -->

        <!-- SCRIPTS -->
        <script type="module" src="./events-list.js"></script>
        <script src="../../js/core/auth.js"></script>
        <script src="../../js/components/modal/deleteModal.js"></script>
        <script src="../../js/components/modal/modalManager.js"></script>
        <script src="../../js/components/modal/enterModal.js"></script>
        <script type="module">
          import { loadTopbar } from "../../js/components/navigation/topbar.js";
          loadTopbar("🗓️ รายการกิจกรรม");
        </script>
        <script src="../../js/components/navigation/imgPopup.js"></script>
        <script src="../../js/components/navigation/sidebar.js"></script>
      </div>
    </div>

    <!-- ═══════════════════════════════════════════════
     SIDE PANEL OVERLAY (Events)
    ═══════════════════════════════════════════════ -->
    <div
      id="evPanelOverlay"
      style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.4);z-index:299;backdrop-filter:blur(2px);"
      onclick="window.closeEventPanel()"
    ></div>

    <!-- ═══════════════════════════════════════════════
     SIDE PANEL (Events)
    ═══════════════════════════════════════════════ -->
    <div id="evSidePanel" class="ev-side-panel">
      <div class="ev-panel-header">
        <div class="ev-panel-title">📋 รายละเอียดกิจกรรม</div>
        <button class="btn-icon" onclick="window.closeEventPanel()">✕</button>
      </div>
      <div class="ev-panel-body">
        <div class="ev-panel-poster" id="panelPoster">
          <span class="ev-panel-poster-placeholder">📋</span>
        </div>
        <div class="panel-field">
          <label class="panel-label">ชื่อกิจกรรม <span style="color:var(--danger)">*</span></label>
          <input class="panel-input" id="peqEventName" placeholder="ชื่อกิจกรรม" />
        </div>
        <div class="panel-field">
          <label class="panel-label">Event Code</label>
          <input class="panel-input" id="peqEventCode" readonly />
        </div>
        <div class="panel-row-2">
          <div class="panel-field">
            <label class="panel-label">ประเภท</label>
            <select class="panel-input" id="peqEventType"></select>
          </div>
          <div class="panel-field">
            <label class="panel-label">สถานะ</label>
            <select class="panel-input" id="peqStatus">
              <option value="DRAFT">📝 Draft</option>
              <option value="CONFIRMED">✔️ Confirmed</option>
              <option value="ONGOING">▶️ Ongoing</option>
              <option value="DONE">✅ Done</option>
              <option value="CANCELLED">❌ Cancelled</option>
            </select>
          </div>
        </div>
        <div class="panel-row-2">
          <div class="panel-field">
            <label class="panel-label">วันที่เริ่ม</label>
            <input class="panel-input" id="peqEventDate" type="date" />
          </div>
          <div class="panel-field">
            <label class="panel-label">วันที่สิ้นสุด</label>
            <input class="panel-input" id="peqEndDate" type="date" />
          </div>
        </div>
        <div class="panel-row-2">
          <div class="panel-field">
            <label class="panel-label">เวลาเริ่ม</label>
            <input class="panel-input" id="peqStartTime" type="time" />
          </div>
          <div class="panel-field">
            <label class="panel-label">เวลาสิ้นสุด</label>
            <input class="panel-input" id="peqEndTime" type="time" />
          </div>
        </div>
        <div class="panel-field">
          <label class="panel-label">สถานที่</label>
          <input class="panel-input" id="peqLocation" placeholder="สถานที่" />
        </div>
        <div class="panel-row-2">
          <div class="panel-field">
            <label class="panel-label">จำนวนผู้เข้าร่วมสูงสุด</label>
            <input class="panel-input" id="peqMaxAttendees" type="number" min="0" placeholder="0" />
          </div>
          <div class="panel-field">
            <label class="panel-label">ผู้รับผิดชอบ</label>
            <select class="panel-input" id="peqAssignee"></select>
          </div>
        </div>
        <div class="panel-field">
          <label class="panel-label">รายละเอียด</label>
          <textarea class="panel-input panel-textarea" id="peqDesc" placeholder="รายละเอียดกิจกรรม"></textarea>
        </div>
      </div>
      <div class="ev-panel-footer">
        <button class="btn btn-outline" id="panelBtnFullEdit">🗔 แก้ไขเต็ม</button>
        <button class="btn btn-outline" id="panelBtnLog">💬 Log งาน</button>
        <button class="btn btn-primary" id="panelBtnSaveEdit">💾 บันทึก</button>
      </div>
    </div>

    <!-- PENDING BADGE: fetch count from room_booking_requests -->
    <script>
      (async function loadPendingBadge() {
        const url = localStorage.getItem("sb_url") || "";
        const key = localStorage.getItem("sb_key") || "";
        if (!url || !key) return;
        try {
          const res = await fetch(
            `${url}/rest/v1/room_booking_requests?select=request_id&status=eq.PENDING`,
            { headers: { apikey: key, Authorization: `Bearer ${key}`, "Range-Unit": "items", Range: "0-999" } }
          );
          const data = await res.json().catch(() => []);
          const count = Array.isArray(data) ? data.length : 0;
          const badge = document.getElementById("reqPendingBadge");
          if (badge && count > 0) {
            badge.textContent = count;
            badge.style.display = "inline-flex";
          }
        } catch {}
      })();
    </script>

    <!-- DELETE SELECTED BUTTON -->
    <script>
      document.addEventListener("DOMContentLoaded", () => {
        const toolbarRight = document.querySelector("#toolbarEvents .toolbar-right");
        if (toolbarRight) {
          const btnDel = document.createElement("button");
          btnDel.id = "btnDeleteSelected";
          btnDel.className = "btn btn-danger-outline";
          btnDel.style.display = "none";
          btnDel.innerHTML = "🗑 ลบที่เลือก";
          btnDel.onclick = () => window.deleteSelectedEvents();
          toolbarRight.insertBefore(btnDel, toolbarRight.firstChild);
        }
      });
    </script>

  </body>
</html>
