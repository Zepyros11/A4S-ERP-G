<!doctype html>
<html lang="th">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>รายการกิจกรรม — A4S-ERP</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="../../css/main.css" />
    <link rel="stylesheet" href="./events.css" />
  </head>
  <body>
    <div class="loading-overlay" id="loadingOverlay">
      <div class="spinner"></div>
    </div>
    <div class="toast" id="toast"></div>

    <!-- TOPBAR -->
    <div class="topbar"></div>
    <div class="layout">
      <!-- SIDEBAR -->
      <div id="sidebar-container"></div>

      <!-- CONTENT -->
      <div class="content-area">
        <div class="page">

          <!-- ① STATS: Events (default visible) -->
          <div class="stats-row" id="statsEvents">
            <div class="stat-card">
              <div class="stat-icon">📅</div>
              <div>
                <div class="stat-value" id="cardMonth">0</div>
                <div class="stat-label">เดือนนี้</div>
              </div>
            </div>
            <div class="stat-card">
              <div class="stat-icon">⏳</div>
              <div>
                <div class="stat-value" id="cardWeek">0</div>
                <div class="stat-label">สัปดาห์นี้</div>
              </div>
            </div>
            <div class="stat-card">
              <div class="stat-icon">▶️</div>
              <div>
                <div class="stat-value" id="cardOngoing">0</div>
                <div class="stat-label">กำลังดำเนินการ</div>
              </div>
            </div>
            <div class="stat-card">
              <div class="stat-icon">📝</div>
              <div>
                <div class="stat-value" id="cardDraft">0</div>
                <div class="stat-label">Draft / รออนุมัติ</div>
              </div>
            </div>
          </div>

          <!-- ② TOOLBAR + TABLE -->
          <div class="table-card">

            <!-- TOOLBAR: Events -->
            <div class="toolbar" id="toolbarEvents">
              <div class="search-wrap">
                <span class="search-icon">🔍</span>
                <input
                  class="search-input"
                  id="searchInput"
                  placeholder="ค้นหาชื่อกิจกรรม หรือสถานที่..."
                />
              </div>
              <!-- Date filter chips -->
              <div class="date-filter-chips" id="dateFilterChips">
                <button class="date-chip" data-range="all" onclick="window.setDateFilter(this,'all')">ทั้งหมด</button>
                <button class="date-chip active" data-range="month" onclick="window.setDateFilter(this,'month')">เดือนนี้</button>
                <button class="date-chip" data-range="week" onclick="window.setDateFilter(this,'week')">อาทิตย์นี้</button>
                <button class="date-chip" data-range="today" onclick="window.setDateFilter(this,'today')">วันนี้</button>
              </div>
              <div class="date-filter-chips" id="statusFilterChips">
                <button class="date-chip active" data-status="" onclick="window.setStatusFilter(this,'')">ทุกสถานะ</button>
                <button class="date-chip" data-status="DRAFT" onclick="window.setStatusFilter(this,'DRAFT')">📝 Draft</button>
                <button class="date-chip" data-status="CONFIRMED" onclick="window.setStatusFilter(this,'CONFIRMED')">✔️ Confirmed</button>
                <button class="date-chip" data-status="ONGOING" onclick="window.setStatusFilter(this,'ONGOING')">▶️ Ongoing</button>
                <button class="date-chip" data-status="DONE" onclick="window.setStatusFilter(this,'DONE')">✅ Done</button>
                <button class="date-chip" data-status="CANCELLED" onclick="window.setStatusFilter(this,'CANCELLED')">❌ Cancelled</button>
              </div>
              <div class="toolbar-right">
                <button
                  class="btn btn-primary"
                  onclick="window.open('./cs-view/events-calendar.html', '_blank')"
                >
                  Event Calendar
                </button>
                <button
                  class="btn btn-primary"
                  data-perm="events_create"
                  onclick="window.location.href = './event-form.html'"
                >
                  ＋ สร้างกิจกรรม
                </button>
              </div>
            </div>

            <!-- ③ TABLE HEADER with TABS -->
            <div class="table-hdr">
              <div class="ev-tabs">
                <button class="ev-tab active" onclick="window.switchListTab('events',this)">
                  🗓️ รายการกิจกรรม
                </button>
                <button class="ev-tab" onclick="window.switchListTab('chatrooms',this)">
                  💬 ห้องสนทนา<span id="chatroomBadge" class="tab-badge" style="display:none"></span>
                </button>
                <button class="ev-tab" onclick="window.location.href='event-requests.html'">
                  🚪 คำขอจองห้อง<span id="reqPendingBadge" class="tab-badge" style="display:none"></span>
                </button>
              </div>
              <div class="table-count" id="tableCount">0 รายการ</div>
            </div>

            <!-- TAB CONTENT: Events -->
            <div id="tabContentEvents">
              <div class="table-wrap">
                <table class="data-table table-events">
                  <thead>
                    <tr>
                      <th style="width: 40px; text-align: center">
                        <input type="checkbox" id="chkAll" onclick="window.toggleAllCheckbox(this)" />
                      </th>
                      <th onclick="window.sortTable('event_date')" style="cursor: pointer">
                        วันที่จัดงาน <span class="sort-icon">⇅</span>
                      </th>
                      <th onclick="window.sortTable('event_name')" style="cursor: pointer">
                        ชื่องาน <span class="sort-icon">⇅</span>
                      </th>
                      <th>สถานที่</th>
                      <th>ผู้รับผิดชอบ</th>
                      <th class="col-center">โปสเตอร์</th>
                      <th class="col-center">สถานะ</th>
                      <th class="col-center">จัดการ</th>
                    </tr>
                  </thead>
                  <tbody id="tableBody">
                    <tr>
                      <td colspan="9">
                        <div class="empty-state">
                          <div class="empty-icon">🗓️</div>
                          <div class="empty-text">ยังไม่มีข้อมูลกิจกรรม</div>
                        </div>
                      </td>
                    </tr>
                  </tbody>
                </table>
              </div>
            </div>

            <!-- TAB CONTENT: Chat rooms -->
            <div id="tabContentChatrooms" style="display:none">
              <div class="chatroom-list" id="chatroomList">
                <div class="empty-state">
                  <div class="empty-icon">💬</div>
                  <div class="empty-text">ยังไม่มีห้องสนทนา</div>
                </div>
              </div>
            </div>

          </div>
          <!-- end .table-card -->
        </div>
        <!-- end .page -->

        <!-- SCRIPTS -->
        <script src="../../js/core/auth.js"></script>
        <script src="../../js/core/authz.js"></script>
        <script>AuthZ.requirePerm("events_view");</script>
        <script type="module" src="./events-list.js"></script>
        <script src="../../js/components/modal/deleteModal.js"></script>
        <script src="../../js/components/modal/modalManager.js"></script>
        <script src="../../js/components/modal/enterSave.js"></script>
        <script type="module">
          import { loadTopbar } from "../../js/components/navigation/topbar.js";
          loadTopbar("🗓️ รายการกิจกรรม");
        </script>
        <script src="../../js/components/navigation/imgPopup.js"></script>
        <script src="../../js/components/navigation/sidebar.js"></script>
      </div>
    </div>


    <!-- EVENT POPUP (calendar-style) -->
    <div id="evPopupOverlay" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.55);z-index:400;backdrop-filter:blur(4px);align-items:center;justify-content:center;" onclick="window.closeBadgePopup()">
      <div class="ev-popup" onclick="event.stopPropagation()">
        <button class="ev-popup-close" onclick="window.closeBadgePopup()">✕</button>
        <!-- COL 1: Poster -->
        <div class="ev-popup-left" id="popupPoster">
          <span class="ev-popup-placeholder">🗓️</span>
        </div>
        <!-- COL 2: Detail -->
        <div class="ev-popup-detail">
          <div class="ev-popup-name" id="popupName">—</div>
          <div class="ev-popup-code" id="popupCode"></div>
          <div class="ev-popup-badges">
            <span id="popupStatus"></span>
            <span id="popupType"></span>
          </div>
          <div class="ev-popup-info-rows">
            <div class="ev-popup-info-row">
              <div class="ev-popup-info-icon">🕐</div>
              <div class="ev-popup-info-body">
                <div class="ev-popup-info-label">Date & Time</div>
                <div class="ev-popup-info-datetime">
                  <span class="ev-popup-info-value" id="popupDate">—</span>
                  <span class="ev-popup-info-sep">|</span>
                  <span class="ev-popup-info-value" id="popupTime" style="color:#64748b">—</span>
                </div>
              </div>
            </div>
            <div class="ev-popup-info-row">
              <div class="ev-popup-info-icon">📍</div>
              <div class="ev-popup-info-body">
                <div class="ev-popup-info-label">Location</div>
                <div class="ev-popup-info-value" id="popupLocation">—</div>
              </div>
            </div>
          </div>
          <div class="ev-popup-info-label" style="margin-bottom:4px">รายละเอียด</div>
          <div class="ev-popup-desc" id="popupDesc">—</div>
          <div id="popupPrereq" style="display:none;margin-top:8px"></div>
          <div class="ev-popup-footer">
            <button class="btn btn-primary" id="popupBtnMsg">💬 Message</button>
            <button class="btn btn-primary" id="popupBtnEdit" style="background:#475569">✏️ แก้ไข</button>
          </div>
        </div>
        <!-- COL 3: Chat Panel (slides in) -->
        <div class="ev-popup-chat" id="popupChatCol">
          <button class="ev-chat-tab" onclick="window.closePopupChat()" title="ปิดบอร์ดสนทนา">&#8249;</button>
          <div class="ev-chat-inner">
            <div class="ev-chat-header">
              <div>
                <div class="ev-chat-title">💬 บอร์ดสนทนา</div>
                <div id="popupChatEvName" class="ev-chat-subtitle">—</div>
              </div>
            </div>
            <div class="ev-chat-role-bar">
              <span class="ev-chat-role-label">ส่งในนามของ:</span>
              <span class="ev-chat-sender-name" id="popupChatSender">—</span>
            </div>
            <div id="popupChatLog" class="ev-chat-log">
              <p style="text-align:center;font-size:12px;color:#94a3b8;font-style:italic">กำลังโหลด...</p>
            </div>
            <div class="ev-chat-input-bar">
              <input id="popupChatInput" type="text" placeholder="พิมพ์ข้อความ..."
                onkeydown="if(event.key==='Enter')window.submitPopupChat()"
                class="ev-chat-input" />
              <button id="popupChatBtn" onclick="window.submitPopupChat()" class="ev-chat-send-btn">ส่ง</button>
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- PENDING BADGE: fetch count from room_booking_requests (auto-refresh) -->
    <script>
      (function () {
        async function loadPendingBadge() {
          const url = localStorage.getItem("sb_url") || "";
          const key = localStorage.getItem("sb_key") || "";
          if (!url || !key) return;
          try {
            const res = await fetch(
              `${url}/rest/v1/room_booking_requests?select=request_id&status=eq.PENDING`,
              { headers: { apikey: key, Authorization: `Bearer ${key}`, "Range-Unit": "items", Range: "0-999" } }
            );
            const data = await res.json().catch(() => []);
            const count = Array.isArray(data) ? data.length : 0;
            const badge = document.getElementById("reqPendingBadge");
            if (badge) {
              badge.textContent = count;
              badge.style.display = count > 0 ? "inline-flex" : "none";
            }
          } catch {}
        }
        loadPendingBadge();
        setInterval(loadPendingBadge, 10000);
      })();
    </script>

    <!-- DELETE SELECTED BUTTON -->
    <script>
      document.addEventListener("DOMContentLoaded", () => {
        const toolbarRight = document.querySelector("#toolbarEvents .toolbar-right");
        if (toolbarRight) {
          const btnDel = document.createElement("button");
          btnDel.id = "btnDeleteSelected";
          btnDel.className = "btn btn-danger-outline";
          btnDel.style.display = "none";
          btnDel.innerHTML = "🗑 ลบที่เลือก";
          btnDel.onclick = () => window.deleteSelectedEvents();
          toolbarRight.insertBefore(btnDel, toolbarRight.firstChild);
        }
      });
    </script>

  </body>
</html>
