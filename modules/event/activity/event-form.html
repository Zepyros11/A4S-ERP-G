<!doctype html>
<html lang="th">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>สร้างกิจกรรม — A4S-ERP</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="../../../css/main.css" />
    <link rel="stylesheet" href="../activity/events.css" />
    <link rel="stylesheet" href="./event-form.css" />
  </head>
  <body>
    <div class="loading-overlay" id="loadingOverlay">
      <div class="spinner"></div>
    </div>
    <div class="toast" id="toast"></div>

    <!-- TOPBAR -->
    <div class="topbar"></div>
    <div class="layout">
      <!-- SIDEBAR -->
      <div id="sidebar-container"></div>

      <!-- CONTENT -->
      <div class="content-area">
        <div class="page">
          <!-- PAGE HEADER -->
          <div class="toolbar" style="margin-bottom: 20px">
            <div style="display: flex; align-items: center; gap: 12px">
              <button
                class="btn btn-outline"
                onclick="window.location.href = '../activity/events-list.html'"
              >
                ← กลับ
              </button>
              <div>
                <div style="font-size: 18px; font-weight: 700" id="pageTitle">
                  ✨ สร้างกิจกรรมใหม่
                </div>
                <div
                  style="font-size: 12px; color: var(--text3)"
                  id="pageSubtitle"
                >
                  กรอกข้อมูลกิจกรรมให้ครบถ้วน
                </div>
              </div>
            </div>
            <div class="toolbar-right">
              <button
                class="btn btn-outline"
                id="btnCancel"
                onclick="window.location.href = '../activity/events-list.html'"
              >
                ยกเลิก
              </button>
              <button
                class="btn btn-primary"
                id="btnSave"
                onclick="window.saveEvent()"
              >
                💾 บันทึก
              </button>
            </div>
          </div>

          <!-- FORM BODY (2 columns) -->
          <div class="ef-layout">
            <!-- ── LEFT COLUMN ── -->
            <div class="ef-left">

              <!-- SECTION: รูปภาพ -->
              <div class="ef-section">
                <div class="ef-section-title">🖼️ รูปภาพกิจกรรม <span style="font-weight:400;font-size:11px;color:var(--text3)">(สูงสุด 5 ภาพ — ภาพแรก = โปสเตอร์หลัก)</span></div>
                <div class="ef-img-grid" id="imgGrid"></div>
                <input type="file" id="imgInput" accept="image/*" style="display:none">
              </div>

              <!-- SECTION: ข้อมูลหลัก -->
              <div class="ef-section">
                <div class="ef-section-title">📋 ข้อมูลหลัก</div>

                <div class="ef-field" style="position: relative">
                  <label class="ef-label">
                    ชื่องาน <span class="ef-required">*</span>
                  </label>
                  <input
                    class="ef-input"
                    type="text"
                    id="fEventName"
                    placeholder="ระบุชื่อกิจกรรม"
                    autocomplete="off"
                  />
                  <div id="eventNameDropdown" class="ef-dropdown"></div>
                </div>

                <div class="ef-field">
                  <label class="ef-label">
                    ประเภทกิจกรรม <span class="ef-required">*</span>
                  </label>
                  <select class="ef-input" id="fEventType">
                    <option value="">— เลือกประเภทกิจกรรม —</option>
                  </select>
                </div>

                <div class="ef-row-2">
                  <div class="ef-field">
                    <label class="ef-label">
                      วันที่เริ่ม <span class="ef-required">*</span>
                    </label>
                    <input class="ef-input" type="date" id="fEventDate" />
                  </div>
                  <div class="ef-field">
                    <label class="ef-label">วันที่สิ้นสุด</label>
                    <input class="ef-input" type="date" id="fEndDate" />
                  </div>
                </div>

                <div class="ef-row-2">
                  <div class="ef-field">
                    <label class="ef-label">เวลาเริ่ม</label>
                    <input class="ef-input" type="time" id="fStartTime" />
                  </div>
                  <div class="ef-field">
                    <label class="ef-label">เวลาสิ้นสุด</label>
                    <input class="ef-input" type="time" id="fEndTime" />
                  </div>
                </div>

           <div class="ef-field">
  <label class="ef-label">สถานที่</label>
  <div class="ef-location-wrap" id="locationWrap">
    <input
      class="ef-input"
      type="text"
      id="fLocation"
      placeholder="พิมพ์เพื่อค้นหาสถานที่..."
      autocomplete="off"
      style="padding-right:36px"
    />
    <button type="button" id="btnClearLocation" onclick="window._clearLocation()" title="ล้างสถานที่"
      style="display:none;position:absolute;right:10px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;color:var(--text3);font-size:16px;padding:2px 4px;line-height:1">✕</button>
    <div class="ef-location-dropdown" id="locationDropdown"></div>
  </div>
</div>

                <div class="ef-field">
                  <label class="ef-label">จำนวนผู้เข้าร่วมสูงสุด</label>
                  <input
                    class="ef-input"
                    type="number"
                    id="fMaxAttendees"
                    placeholder="0"
                    min="0"
                  />
                </div>
              </div>

              <!-- SECTION: การมอบหมาย -->
              <div class="ef-section">
                <div class="ef-section-title">👤 การมอบหมาย</div>

                <div class="ef-row-2">
                  <div class="ef-field">
                    <label class="ef-label">ผู้รับผิดชอบ</label>
                    <select class="ef-input" id="fAssignedTo">
                      <option value="">— เลือกพนักงาน —</option>
                    </select>
                  </div>
                  <div class="ef-field">
                    <label class="ef-label">สถานะ</label>
                    <select class="ef-input" id="fStatus">
                      <option value="DRAFT">📝 Draft</option>
                      <option value="CONFIRMED">✔️ Confirmed</option>
                      <option value="ONGOING">▶️ Ongoing</option>
                      <option value="DONE">✅ Done</option>
                      <option value="CANCELLED">❌ Cancelled</option>
                    </select>
                  </div>
                </div>

                <div class="ef-field">
                  <label class="ef-label">รายละเอียดกิจกรรม</label>
                  <textarea
                    class="ef-input ef-textarea"
                    id="fDescription"
                    placeholder="ระบุรายละเอียดกิจกรรม หรือกำหนดการเบื้องต้น..."
                  ></textarea>
                </div>
              </div>
            </div>
            <!-- end ef-left -->

            <!-- ── RIGHT COLUMN ── -->
            <div class="ef-right">
              <!-- SECTION: รหัสกิจกรรม -->
              <div class="ef-section">
                <div class="ef-section-title">🔖 รหัสกิจกรรม</div>
                <div class="ef-field">
                  <label class="ef-label">Event Code</label>
                  <input
                    class="ef-input"
                    style="font-family: &quot;IBM Plex Mono&quot;, monospace"
                    type="text"
                    id="fEventCode"
                    placeholder="EVT-YYYYMM-001 (สร้างอัตโนมัติ)"
                  />
                  <div
                    style="
                      font-size: 11px;
                      color: var(--text3);
                      margin-top: 4px;
                    "
                  >
                    ระบบจะสร้างให้อัตโนมัติ หรือกรอกเองได้
                  </div>
                </div>
              </div>
            </div>
            <!-- end ef-right -->
          </div>
          <!-- end ef-layout -->
        </div>
        <!-- end .page -->

        <!-- ══════════════════════════════════════════
             PLAIN SCRIPT: Poster handlers
             ต้องเป็น plain script (ไม่ใช่ module)
             เพื่อให้ inline onclick/ondrop เรียกได้ทันที
        ══════════════════════════════════════════ -->
        <script>
          // ── saveEvent bridge ──────────────────────────────────
          window.saveEvent = function () {
            if (typeof window._saveEventImpl === "function") {
              window._saveEventImpl();
            } else {
              var waited = 0;
              var check = setInterval(function () {
                waited += 100;
                if (typeof window._saveEventImpl === "function") {
                  clearInterval(check);
                  window._saveEventImpl();
                } else if (waited >= 5000) {
                  clearInterval(check);
                  alert("ระบบยังโหลดไม่เสร็จ กรุณารอสักครู่แล้วลองใหม่");
                }
              }, 100);
            }
          };

          // ── Multi-image state ─────────────────────────────────
          var MAX_IMGS = 5;
          window._imageFiles = new Array(MAX_IMGS).fill(null);
          window._imageUrls  = new Array(MAX_IMGS).fill(null);
          window._imgTargetIdx = 0;

          function _showToast(msg) {
            var t = document.getElementById("toast");
            t.className = "toast toast-error show";
            t.textContent = msg;
            setTimeout(function () { t.classList.remove("show"); }, 3000);
          }

          function _dropFileToSlot(file, idx) {
            if (!file || !file.type.startsWith("image/")) { _showToast("กรุณาเลือกไฟล์รูปภาพเท่านั้น"); return; }
            if (file.size > 5 * 1024 * 1024) { _showToast("ไฟล์ใหญ่เกิน 5MB"); return; }
            window._imageFiles[idx] = file;
            _renderImgGrid();
          }

          function _renderImgGrid() {
            var grid = document.getElementById("imgGrid");
            if (!grid) return;
            grid.innerHTML = "";
            for (var i = 0; i < MAX_IMGS; i++) {
              (function (idx) {
                var file = window._imageFiles[idx];
                var url  = window._imageUrls[idx];
                var preview = file ? URL.createObjectURL(file) : url;

                var slot = document.createElement("div");
                slot.className = "ef-img-slot" + (preview ? " has-img" : "");

                if (preview) {
                  slot.innerHTML =
                    '<img src="' + preview + '" alt="img">' +
                    '<button class="ef-img-remove" onclick="event.stopPropagation();_imgRemove(' + idx + ')">✕</button>' +
                    (idx === 0 ? '<span class="ef-img-main-badge">โปสเตอร์</span>' : "");
                } else {
                  slot.innerHTML = '<span class="ef-img-add">+</span>';
                  slot.onclick = function () {
                    window._imgTargetIdx = idx;
                    document.getElementById("imgInput").click();
                  };
                }

                // drag-drop ตรงไปยัง slot นั้นๆ
                slot.addEventListener("dragover", function (e) {
                  e.preventDefault();
                  slot.classList.add("drag-over");
                });
                slot.addEventListener("dragleave", function () {
                  slot.classList.remove("drag-over");
                });
                slot.addEventListener("drop", function (e) {
                  e.preventDefault();
                  slot.classList.remove("drag-over");
                  var f = e.dataTransfer && e.dataTransfer.files && e.dataTransfer.files[0];
                  _dropFileToSlot(f, idx);
                });

                grid.appendChild(slot);
              })(i);
            }
          }

          function _imgRemove(idx) {
            window._imageFiles[idx] = null;
            window._imageUrls[idx]  = null;
            // compact: shift non-null values to front
            var files = window._imageFiles.filter(function (f) { return f !== null; });
            var urls  = window._imageUrls.filter(function (u) { return u !== null; });
            while (files.length < MAX_IMGS) files.push(null);
            while (urls.length  < MAX_IMGS) urls.push(null);
            window._imageFiles = files;
            window._imageUrls  = urls;
            _renderImgGrid();
          }

          document.addEventListener("DOMContentLoaded", function () {
            _renderImgGrid();

            document.getElementById("imgInput").onchange = function () {
              var file = this.files && this.files[0];
              if (!file) return;
              if (file.size > 5 * 1024 * 1024) {
                _showToast("ไฟล์ใหญ่เกิน 5MB");
                return;
              }
              if (!file.type.startsWith("image/")) {
                _showToast("กรุณาเลือกไฟล์รูปภาพเท่านั้น");
                return;
              }
              window._imageFiles[window._imgTargetIdx] = file;
              _renderImgGrid();
              this.value = "";
            };

          });
        </script>

        <!-- ES MODULE: main logic -->
        <script type="module" src="./event-form.js"></script>
        <script src="../../../js/core/auth.js"></script>
        <script src="../../../js/components/modal/deleteModal.js"></script>
        <script src="../../../js/components/modal/modalManager.js"></script>
        <script type="module">
          import { loadTopbar } from "../../../js/components/navigation/topbar.js";
          loadTopbar("🗓️ กิจกรรม");
        </script>
        <script src="../../../js/components/navigation/sidebar.js"></script>
      </div>
    </div>
  </body>
</html>
