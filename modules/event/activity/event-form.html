<!doctype html>
<html lang="th">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>สร้างกิจกรรม — A4S-ERP</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="../../../css/main.css" />
    <link rel="stylesheet" href="../activity/events.css" />
    <link rel="stylesheet" href="./event-form.css" />
  </head>
  <body>
    <div class="loading-overlay" id="loadingOverlay">
      <div class="spinner"></div>
    </div>
    <div class="toast" id="toast"></div>

    <!-- TOPBAR -->
    <div class="topbar"></div>
    <div class="layout">
      <!-- SIDEBAR -->
      <div id="sidebar-container"></div>

      <!-- CONTENT -->
      <div class="content-area">
        <div class="page">
          <!-- PAGE HEADER -->
          <div class="toolbar" style="margin-bottom: 20px">
            <div style="display: flex; align-items: center; gap: 12px">
              <button
                class="btn btn-outline"
                onclick="window.location.href = '../activity/events-list.html'"
              >
                ← กลับ
              </button>
              <div>
                <div style="font-size: 18px; font-weight: 700" id="pageTitle">
                  ✨ สร้างกิจกรรมใหม่
                </div>
                <div
                  style="font-size: 12px; color: var(--text3)"
                  id="pageSubtitle"
                >
                  กรอกข้อมูลกิจกรรมให้ครบถ้วน
                </div>
              </div>
            </div>
            <div class="toolbar-right">
              <button
                class="btn btn-outline"
                id="btnCancel"
                onclick="window.location.href = '../activity/events-list.html'"
              >
                ยกเลิก
              </button>
              <button
                class="btn btn-primary"
                id="btnSave"
                onclick="window.saveEvent()"
              >
                💾 บันทึก
              </button>
            </div>
          </div>

          <!-- FORM BODY (2 columns) -->
          <div class="ef-layout">
            <!-- ── LEFT COLUMN ── -->
            <div class="ef-left">
              <!-- SECTION: ข้อมูลหลัก -->
              <div class="ef-section">
                <div class="ef-section-title">📋 ข้อมูลหลัก</div>

                <div class="ef-field" style="position: relative">
                  <label class="ef-label">
                    ชื่องาน <span class="ef-required">*</span>
                  </label>
                  <input
                    class="ef-input"
                    type="text"
                    id="fEventName"
                    placeholder="ระบุชื่อกิจกรรม"
                    autocomplete="off"
                  />
                  <div id="eventNameDropdown" class="ef-dropdown"></div>
                </div>

                <div class="ef-field">
                  <label class="ef-label">
                    ประเภทกิจกรรม <span class="ef-required">*</span>
                  </label>
                  <select class="ef-input" id="fEventType">
                    <option value="">— เลือกประเภทกิจกรรม —</option>
                  </select>
                </div>

                <div class="ef-row-2">
                  <div class="ef-field">
                    <label class="ef-label">
                      วันที่เริ่ม <span class="ef-required">*</span>
                    </label>
                    <input class="ef-input" type="date" id="fEventDate" />
                  </div>
                  <div class="ef-field">
                    <label class="ef-label">วันที่สิ้นสุด</label>
                    <input class="ef-input" type="date" id="fEndDate" />
                  </div>
                </div>

                <div class="ef-row-2">
                  <div class="ef-field">
                    <label class="ef-label">เวลาเริ่ม</label>
                    <input class="ef-input" type="time" id="fStartTime" />
                  </div>
                  <div class="ef-field">
                    <label class="ef-label">เวลาสิ้นสุด</label>
                    <input class="ef-input" type="time" id="fEndTime" />
                  </div>
                </div>

           <div class="ef-field">
  <label class="ef-label">สถานที่</label>
  <div class="ef-location-wrap" id="locationWrap">
    <input
      class="ef-input"
      type="text"
      id="fLocation"
      placeholder="ระบุสถานที่ / อาคาร / ห้องประชุม"
      autocomplete="off"
    />
    <div class="ef-location-dropdown" id="locationDropdown"></div>
  </div>
</div>

                <div class="ef-field">
                  <label class="ef-label">จำนวนผู้เข้าร่วมสูงสุด</label>
                  <input
                    class="ef-input"
                    type="number"
                    id="fMaxAttendees"
                    placeholder="0"
                    min="0"
                  />
                </div>
              </div>

              <!-- SECTION: การมอบหมาย -->
              <div class="ef-section">
                <div class="ef-section-title">👤 การมอบหมาย</div>

                <div class="ef-row-2">
                  <div class="ef-field">
                    <label class="ef-label">ผู้รับผิดชอบ</label>
                    <select class="ef-input" id="fAssignedTo">
                      <option value="">— เลือกพนักงาน —</option>
                    </select>
                  </div>
                  <div class="ef-field">
                    <label class="ef-label">สถานะ</label>
                    <select class="ef-input" id="fStatus">
                      <option value="DRAFT">📝 Draft</option>
                      <option value="CONFIRMED">✔️ Confirmed</option>
                      <option value="ONGOING">▶️ Ongoing</option>
                      <option value="DONE">✅ Done</option>
                      <option value="CANCELLED">❌ Cancelled</option>
                    </select>
                  </div>
                </div>

                <div class="ef-field">
                  <label class="ef-label">รายละเอียดกิจกรรม</label>
                  <textarea
                    class="ef-input ef-textarea"
                    id="fDescription"
                    placeholder="ระบุรายละเอียดกิจกรรม หรือกำหนดการเบื้องต้น..."
                  ></textarea>
                </div>
              </div>
            </div>
            <!-- end ef-left -->

            <!-- ── RIGHT COLUMN ── -->
            <div class="ef-right">
              <!-- SECTION: โปสเตอร์ -->
              <div class="ef-section">
                <div class="ef-section-title">🖼️ โปสเตอร์กิจกรรม</div>

                <div
                  class="ef-poster-preview"
                  id="posterPreview"
                  ondragover="
                    event.preventDefault();
                    this.classList.add('drag-over');
                    document
                      .getElementById('uploadZone')
                      .classList.add('drag-over');
                  "
                  ondragleave="
                    this.classList.remove('drag-over');
                    document
                      .getElementById('uploadZone')
                      .classList.remove('drag-over');
                  "
                  ondrop="_posterDrop(event)"
                >
                  <span class="ef-poster-placeholder">🗓️</span>
                </div>

                <div
                  class="ef-upload-zone"
                  id="uploadZone"
                  onclick="document.getElementById('posterInput').click()"
                  ondragover="
                    event.preventDefault();
                    this.classList.add('drag-over');
                    document
                      .getElementById('posterPreview')
                      .classList.add('drag-over');
                  "
                  ondragleave="
                    this.classList.remove('drag-over');
                    document
                      .getElementById('posterPreview')
                      .classList.remove('drag-over');
                  "
                  ondrop="_posterDrop(event)"
                >
                  <div class="ef-upload-icon">📤</div>
                  <div class="ef-upload-text">
                    คลิกเพื่ออัปโหลด หรือลากไฟล์มาที่นี่
                  </div>
                  <div class="ef-upload-hint">JPG, PNG ไม่เกิน 5MB</div>
                </div>

                <input
                  type="file"
                  id="posterInput"
                  accept="image/*"
                  style="display: none"
                  onchange="_posterSelect(this)"
                />

                <button
                  class="btn btn-danger-outline"
                  id="btnRemovePoster"
                  style="display: none; width: 100%; margin-top: 8px"
                  onclick="_posterRemove()"
                >
                  🗑 ลบโปสเตอร์
                </button>
              </div>

              <!-- SECTION: รหัสกิจกรรม -->
              <div class="ef-section">
                <div class="ef-section-title">🔖 รหัสกิจกรรม</div>
                <div class="ef-field">
                  <label class="ef-label">Event Code</label>
                  <input
                    class="ef-input"
                    style="font-family: &quot;IBM Plex Mono&quot;, monospace"
                    type="text"
                    id="fEventCode"
                    placeholder="EVT-YYYYMM-001 (สร้างอัตโนมัติ)"
                  />
                  <div
                    style="
                      font-size: 11px;
                      color: var(--text3);
                      margin-top: 4px;
                    "
                  >
                    ระบบจะสร้างให้อัตโนมัติ หรือกรอกเองได้
                  </div>
                </div>
              </div>
            </div>
            <!-- end ef-right -->
          </div>
          <!-- end ef-layout -->
        </div>
        <!-- end .page -->

        <!-- ══════════════════════════════════════════
             PLAIN SCRIPT: Poster handlers
             ต้องเป็น plain script (ไม่ใช่ module)
             เพื่อให้ inline onclick/ondrop เรียกได้ทันที
        ══════════════════════════════════════════ -->
        <script>
          // ── saveEvent bridge ──────────────────────────────────
          // ES Module โหลดช้า — bridge นี้รับ click ก่อน แล้วรอ module พร้อม
          window.saveEvent = function () {
            if (typeof window._saveEventImpl === "function") {
              window._saveEventImpl();
            } else {
              // รอ module โหลดเสร็จ (max 5 วิ)
              var waited = 0;
              var check = setInterval(function () {
                waited += 100;
                if (typeof window._saveEventImpl === "function") {
                  clearInterval(check);
                  window._saveEventImpl();
                } else if (waited >= 5000) {
                  clearInterval(check);
                  alert("ระบบยังโหลดไม่เสร็จ กรุณารอสักครู่แล้วลองใหม่");
                }
              }, 100);
            }
          };

          // bridge state ไปให้ ES module อ่านได้ผ่าน window
          window._posterFile = null;
          window._posterUrl = null;

          function _showPosterPreview(url) {
            document.getElementById("posterPreview").innerHTML =
              '<img src="' +
              url +
              '" alt="poster preview" style="width:100%;height:100%;object-fit:cover;">';
            document.getElementById("btnRemovePoster").style.display = "block";
          }

          function _posterSelect(input) {
            var file = input.files && input.files[0];
            if (!file) return;
            if (file.size > 5 * 1024 * 1024) {
              document.getElementById("toast").className =
                "toast toast-error show";
              document.getElementById("toast").textContent = "ไฟล์ใหญ่เกิน 5MB";
              setTimeout(function () {
                document.getElementById("toast").classList.remove("show");
              }, 3000);
              return;
            }
            window._posterFile = file;
            _showPosterPreview(URL.createObjectURL(file));
          }

          function _posterDrop(e) {
            e.preventDefault();
            document.getElementById("uploadZone").classList.remove("drag-over");
            document
              .getElementById("posterPreview")
              .classList.remove("drag-over");
            var file =
              e.dataTransfer && e.dataTransfer.files && e.dataTransfer.files[0];
            if (!file || !file.type.startsWith("image/")) {
              document.getElementById("toast").className =
                "toast toast-error show";
              document.getElementById("toast").textContent =
                "กรุณาเลือกไฟล์รูปภาพเท่านั้น";
              setTimeout(function () {
                document.getElementById("toast").classList.remove("show");
              }, 3000);
              return;
            }
            if (file.size > 5 * 1024 * 1024) {
              document.getElementById("toast").className =
                "toast toast-error show";
              document.getElementById("toast").textContent = "ไฟล์ใหญ่เกิน 5MB";
              setTimeout(function () {
                document.getElementById("toast").classList.remove("show");
              }, 3000);
              return;
            }
            window._posterFile = file;
            _showPosterPreview(URL.createObjectURL(file));
          }

          function _posterRemove() {
            window._posterFile = null;
            window._posterUrl = null;
            document.getElementById("posterPreview").innerHTML =
              '<span class="ef-poster-placeholder">🗓️</span>';
            document.getElementById("btnRemovePoster").style.display = "none";
            document.getElementById("posterInput").value = "";
          }
        </script>

        <!-- ES MODULE: main logic -->
        <script type="module" src="./event-form.js"></script>
        <script src="../../../js/core/auth.js"></script>
        <script src="../../../js/components/modal/deleteModal.js"></script>
        <script src="../../../js/components/modal/modalManager.js"></script>
        <script type="module">
          import { loadTopbar } from "../../../js/components/navigation/topbar.js";
          loadTopbar("🗓️ กิจกรรม");
        </script>
        <script src="../../../js/components/navigation/sidebar.js"></script>
      </div>
    </div>
  </body>
</html>
