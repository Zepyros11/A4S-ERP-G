<!doctype html>
<html lang="th">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ประเภทกิจกรรม — A4S-ERP</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="../../../../css/main.css" />
    <link rel="stylesheet" href="./events.css" />
    <link rel="stylesheet" href="./events-category.css" />
  </head>
  <body>
    <div class="loading-overlay" id="loadingOverlay">
      <div class="spinner"></div>
    </div>
    <div class="toast" id="toast"></div>

    <!-- TOPBAR -->
    <div class="topbar"></div>
    <div class="layout">
      <!-- SIDEBAR -->
      <div id="sidebar-container"></div>

      <!-- CONTENT -->
      <div class="content-area">
        <div class="page">
          <!-- TOOLBAR -->
          <div class="table-card">
            <div class="toolbar">
              <div class="search-wrap">
                <span class="search-icon">🔍</span>
                <input
                  class="search-input"
                  id="searchInput"
                  placeholder="ค้นหาประเภทกิจกรรม..."
                />
              </div>
              <div class="toolbar-right">
                <button class="btn btn-primary" onclick="window.openModal()">
                  ＋ เพิ่มประเภท
                </button>
              </div>
            </div>

            <!-- TABLE -->
            <div class="table-hdr">
              <div class="table-title">🏷️ ประเภทกิจกรรม</div>
              <div class="table-count" id="tableCount">0 รายการ</div>
            </div>
            <div class="table-wrap">
              <table class="data-table">
                <thead>
                  <tr>
                    <th style="width: 50px; text-align: center">#</th>
                    <th>ประเภทกิจกรรม</th>
                    <th>คำอธิบาย</th>
                    <th class="col-center" style="width: 100px">ไอคอน / สี</th>
                    <th class="col-center" style="width: 90px">ลำดับ</th>
                    <th class="col-center" style="width: 100px">จัดการ</th>
                  </tr>
                </thead>
                <tbody id="tableBody">
                  <tr>
                    <td colspan="6">
                      <div class="empty-state">
                        <div class="empty-icon">🏷️</div>
                        <div class="empty-text">ยังไม่มีประเภทกิจกรรม</div>
                      </div>
                    </td>
                  </tr>
                </tbody>
              </table>
            </div>
          </div>
          <!-- end table-card -->
        </div>
        <!-- end .page -->

        <!-- ES MODULE: main logic -->

        <script type="module" src="./events-category.js"></script>
        <script src="../../../../js/core/auth.js"></script>
        <script src="../../../../js/components/modal/deleteModal.js"></script>
        <script src="../../../../js/components/modal/modalManager.js"></script>
        <script type="module">
          import { loadTopbar } from "../../../../js/components/navigation/topbar.js";
          loadTopbar("🏷️ ประเภทกิจกรรม");
        </script>
        <script src="../../../../js/components/navigation/sidebar.js"></script>
      </div>
    </div>

    <!-- ═══════════════════════════════════════
         MODAL: เพิ่ม / แก้ไขประเภทกิจกรรม
    ════════════════════════════════════════ -->
    <div
      id="catModalOverlay"
      class="ecat-overlay"
      onclick="window.closeModal()"
    ></div>
    <div id="catModal" class="ecat-modal">
      <!-- Header -->
      <div class="ecat-modal-header">
        <div style="display: flex; align-items: center; gap: 12px">
          <div class="ecat-header-icon">
            <span id="headerIconEmoji">➕</span>
          </div>
          <div class="ecat-modal-title" id="modalTitle">เพิ่มประเภทกิจกรรม</div>
        </div>
        <button class="ecat-close-btn" onclick="window.closeModal()">✕</button>
      </div>

      <!-- Body -->
      <div class="ecat-modal-body">
        <!-- ชื่อประเภท -->
        <div class="ecat-field">
          <label class="ecat-label">
            <span class="ecat-label-icon">🔤</span> ชื่อประเภท
            <span style="color: var(--danger)">*</span>
          </label>
          <input
            class="ecat-input"
            type="text"
            id="fCatName"
            placeholder="เช่น ออกบูธ, สัมมนา..."
          />
        </div>

        <!-- คำอธิบาย -->
        <div class="ecat-field">
          <label class="ecat-label">
            <span class="ecat-label-icon">📝</span> คำอธิบาย
          </label>
          <textarea
            class="ecat-input ecat-textarea"
            id="fCatDesc"
            placeholder="อธิบายสั้นๆ เกี่ยวกับกิจกรรมประเภทนี้"
            rows="2"
          ></textarea>
        </div>

        <!-- Emoji | Color | ลำดับ -->
        <div class="ecat-row-3">
          <!-- ไอคอน -->
          <div class="ecat-field">
            <label class="ecat-label">
              <span class="ecat-label-icon">✨</span> ไอคอน (Emoji)
            </label>
            <div
              class="ecat-emoji-selected"
              id="emojiSelectedDisplay"
              onclick="window.toggleEmojiPicker()"
            >
              <span id="emojiPreviewInline">🏷️</span>
              <span style="font-size: 12px; color: #94a3b8"
                >คลิกเพื่อเปลี่ยน</span
              >
              <span style="margin-left: auto; color: #94a3b8; font-size: 11px"
                >▾</span
              >
            </div>
            <input type="hidden" id="fCatIcon" value="🏷️" />
            <div class="ecat-emoji-picker" id="emojiPicker">
              <div class="ecat-emoji-grid" id="emojiGrid"></div>
            </div>
          </div>

          <!-- สี -->
          <div class="ecat-field">
            <label class="ecat-label">
              <span class="ecat-label-icon">🎨</span> สีประจำประเภท
            </label>
            <div style="display: flex; gap: 8px; align-items: center">
              <div class="ecat-color-swatch" id="colorSwatch">
                <input
                  type="color"
                  id="fCatColor"
                  value="#3b82f6"
                  class="ecat-color-picker"
                />
              </div>
              <input
                class="ecat-input"
                type="text"
                id="fCatColorHex"
                value="#3b82f6"
                placeholder="#3b82f6"
                maxlength="7"
                oninput="window.syncColorHex(this)"
                style="
                  font-family: &quot;IBM Plex Mono&quot;, monospace;
                  font-size: 13px;
                  text-transform: uppercase;
                "
              />
            </div>
          </div>

          <!-- ลำดับ -->
          <div class="ecat-field">
            <label class="ecat-label">
              <span class="ecat-label-icon">🔢</span> ลำดับ
            </label>
            <input
              class="ecat-input"
              type="number"
              id="fCatSort"
              placeholder="0"
              min="0"
            />
          </div>
        </div>

        <!-- Preview -->
        <div class="ecat-preview-wrap">
          <div class="ecat-preview-label">👁 Preview Badge</div>
          <div style="display: flex; justify-content: center; padding: 16px 0">
            <div id="previewBadge" class="ecat-badge-preview">
              <span id="previewIcon">🏷️</span>
              <span id="previewName">ชื่อประเภท</span>
            </div>
          </div>
        </div>
      </div>

      <!-- Footer -->
      <div class="ecat-modal-footer">
        <button class="ecat-btn-cancel" onclick="window.closeModal()">
          ยกเลิก
        </button>
        <button
          class="ecat-btn-save"
          id="btnSaveCat"
          onclick="window.saveCategory()"
        >
          <span
            id="saveSpinner"
            style="display: none"
            class="ecat-spinner"
          ></span>
          <span id="saveIcon">💾</span>
          บันทึกข้อมูล
        </button>
      </div>
    </div>

    <!-- Live preview + emoji picker (plain script) -->
    <script>
      const EMOJI_LIST = [
        "🎤",
        "👥",
        "💼",
        "📊",
        "📈",
        "📅",
        "📍",
        "🕒",
        "📋",
        "📝",
        "📢",
        "🎟️",
        "🏷️",
        "🧑‍💼",
        "🤝",
        "💻",
        "🖥️",
        "📽️",
        "🎥",
        "📸",
        "🏢",
        "🏛️",
        "🍽️",
        "📖",
        "📓",
        "📒",
        "✨",
        "💡",
        "🌐",
        "🎉",
        "🎸",
        "🚗",
        "✈️",
        "🎬",
        "🩺",
        "🎯",
        "📌",
        "🌟",
        "🏆",
      ];

      function _buildEmojiGrid() {
        const grid = document.getElementById("emojiGrid");
        if (!grid || grid.dataset.built) return;
        grid.dataset.built = "1";
        grid.innerHTML = EMOJI_LIST.map(
          (e) =>
            `<button type="button" class="ecat-emoji-item" onclick="window.selectEmoji('${e}')">${e}</button>`,
        ).join("");
      }

      window.toggleEmojiPicker = function () {
        _buildEmojiGrid();
        document.getElementById("emojiPicker").classList.toggle("open");
      };

      window.selectEmoji = function (emoji) {
        document.getElementById("fCatIcon").value = emoji;
        document.getElementById("emojiPreviewInline").textContent = emoji;
        document.getElementById("emojiPicker").classList.remove("open");
        _updatePreview();
      };

      function _updatePreview() {
        const icon = document.getElementById("fCatIcon")?.value || "🏷️";
        const name = document.getElementById("fCatName")?.value || "ชื่อประเภท";
        const color = document.getElementById("fCatColor")?.value || "#3b82f6";
        const badge = document.getElementById("previewBadge");
        if (!badge) return;
        badge.style.background = color + "15";
        badge.style.color = color;
        badge.style.borderColor = color + "40";
        badge.style.boxShadow = `0 2px 8px ${color}22`;
        document.getElementById("previewIcon").textContent = icon;
        document.getElementById("previewName").textContent = name;
        document.getElementById("emojiPreviewInline").textContent = icon;
        document.getElementById("fCatColorHex").value = color;
        const swatch = document.getElementById("colorSwatch");
        if (swatch) swatch.style.background = color;
      }

      document.addEventListener("click", function (e) {
        const picker = document.getElementById("emojiPicker");
        const display = document.getElementById("emojiSelectedDisplay");
        if (
          picker &&
          !picker.contains(e.target) &&
          !display?.contains(e.target)
        ) {
          picker.classList.remove("open");
        }
      });

      document.addEventListener("input", _updatePreview);
      document.addEventListener("keydown", function (e) {
        if (e.key === "Escape") window.closeModal();
      });
    </script>
  </body>
</html>
