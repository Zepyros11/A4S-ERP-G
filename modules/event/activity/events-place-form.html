<!doctype html>
<html lang="th">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>เพิ่มสถานที่ — A4S-ERP</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="../../../css/main.css" />
    <link rel="stylesheet" href="./events.css" />
    <link rel="stylesheet" href="./event-form.css" />
    <link rel="stylesheet" href="./events-place-form.css" />
  </head>
  <body>
    <div class="loading-overlay" id="loadingOverlay">
      <div class="spinner"></div>
    </div>
    <div class="toast" id="toast"></div>
    <div class="topbar"></div>

    <div class="layout">
      <div id="sidebar-container"></div>
      <div class="content-area">
        <div class="page">
          <!-- HEADER -->
          <div class="toolbar" style="margin-bottom: 20px">
            <div style="display: flex; align-items: center; gap: 12px">
              <button
                class="btn btn-outline"
                onclick="window.location.href = './events-place-list.html'"
              >
                ← กลับ
              </button>
              <div>
                <div style="font-size: 18px; font-weight: 700">
                  📍 เพิ่มสถานที่
                </div>
                <div style="font-size: 12px; color: var(--text3)">
                  จัดการข้อมูลสถานที่สำหรับ Event
                </div>
              </div>
            </div>
            <div class="toolbar-right">
              <button
                class="btn btn-outline"
                onclick="window.location.href = './events-place-list.html'"
              >
                ยกเลิก
              </button>
              <button class="btn btn-primary" onclick="window.savePlace()">
                💾 บันทึก
              </button>
            </div>
          </div>

          <!-- FORM -->
          <div style="max-width: 100%">
            <!-- SECTION: ข้อมูลสถานที่ -->
            <div class="ef-section">
              <div class="ef-section-title">📋 ข้อมูลสถานที่</div>

              <div class="ef-field">
                <label class="ef-label"
                  >ชื่อสถานที่ <span class="ef-required">*</span></label
                >
                <input
                  class="ef-input"
                  id="fPlaceName"
                  placeholder="เช่น Hilton Bangkok / Impact Arena"
                />
              </div>

              <div class="ef-field">
                <label class="ef-label"
                  >ประเภทสถานที่ <span class="ef-required">*</span></label
                >
                <select class="ef-input" id="fPlaceType">
                  <option value="">— เลือกประเภท —</option>
                  <option value="HOTEL">🏨 โรงแรม</option>
                  <option value="MEETING_ROOM">🏢 ห้องประชุม</option>
                  <option value="RESTAURANT">🍽 ร้านอาหาร</option>
                  <option value="EVENT_SPACE">🎤 Event Space</option>
                </select>
              </div>

              <div class="ef-field">
                <label class="ef-label">รายละเอียด</label>
                <textarea
                  class="ef-input ef-textarea"
                  id="fDescription"
                  placeholder="รายละเอียดสถานที่..."
                ></textarea>
              </div>

              <!-- IMAGE SLOTS -->
              <div class="ef-field">
                <label class="ef-label">🖼️ รูปสถานที่ (สูงสุด 5 รูป)</label>
                <div id="previewGrid" class="place-img-grid"></div>
                <input
                  type="file"
                  id="fileInput"
                  accept="image/*"
                  style="display: none"
                />
              </div>

              <div class="ef-field">
                <label class="ef-label">⚙️ สถานะ</label>
                <select class="ef-input" id="fStatus" style="max-width: 200px">
                  <option value="ACTIVE">✅ ACTIVE</option>
                  <option value="INACTIVE">🚫 INACTIVE</option>
                </select>
              </div>
            </div>

            <!-- SECTION: Location -->
            <div class="ef-section">
              <div class="ef-section-title">📍 Location</div>

              <div class="ef-field">
                <label class="ef-label">ที่อยู่</label>
                <textarea
                  class="ef-input ef-textarea"
                  id="fAddress"
                  placeholder="ที่อยู่เต็ม..."
                  style="height: 90px"
                ></textarea>
              </div>

              <div class="ef-row-2">
                <div class="ef-field">
                  <label class="ef-label">Latitude</label>
                  <input class="ef-input" id="fLat" placeholder="13.7563" />
                </div>
                <div class="ef-field">
                  <label class="ef-label">Longitude</label>
                  <input class="ef-input" id="fLong" placeholder="100.5018" />
                </div>
              </div>

              <div class="ef-field">
                <label class="ef-label">Google Map URL</label>
                <input
                  class="ef-input"
                  id="fMap"
                  placeholder="https://maps.google.com/..."
                />
              </div>
            </div>

            <!-- SECTION: Contact -->
            <div class="ef-section">
              <div class="ef-section-title">📞 Contact</div>

              <div class="ef-row-2">
                <div class="ef-field">
                  <label class="ef-label">ชื่อผู้ติดต่อ</label>
                  <input class="ef-input" id="fContactName" />
                </div>
                <div class="ef-field">
                  <label class="ef-label">เบอร์โทร</label>
                  <input class="ef-input" id="fPhone" />
                </div>
              </div>

              <div class="ef-field">
                <label class="ef-label">Email</label>
                <input class="ef-input" id="fEmail" type="email" />
              </div>
            </div>

            <!-- SECTION: ข้อมูลเพิ่มเติม -->
            <div class="ef-section">
              <div class="ef-section-title">🏢 ข้อมูลเพิ่มเติม</div>

              <div class="ef-row-2">
                <div class="ef-field">
                  <label class="ef-label">Capacity (คน)</label>
                  <input
                    class="ef-input"
                    type="number"
                    id="fCapacity"
                    min="0"
                  />
                </div>
                <div class="ef-field">
                  <label class="ef-label">Meeting Rooms</label>
                  <input
                    class="ef-input"
                    type="number"
                    id="fRoomsMeeting"
                    min="0"
                  />
                </div>
              </div>

              <div class="ef-row-2">
                <div class="ef-field">
                  <label class="ef-label">จำนวนห้องพัก</label>
                  <input class="ef-input" type="number" id="fRooms" min="0" />
                </div>
                <div class="ef-field">
                  <label class="ef-label">ที่จอดรถ</label>
                  <select class="ef-input" id="fParking">
                    <option value="">— เลือก —</option>
                    <option value="true">✅ มี</option>
                    <option value="false">❌ ไม่มี</option>
                  </select>
                </div>
              </div>
            </div>
          </div>
          <!-- end form -->
        </div>
      </div>
    </div>

    <!-- SCRIPTS -->
    <script type="module" src="./events-place-form.js"></script>
    <script src="../../../js/core/auth.js"></script>
    <script src="../../../js/components/navigation/sidebar.js"></script>
    <script type="module">
      import { loadTopbar } from "../../../js/components/navigation/topbar.js";
      loadTopbar("📍 สถานที่");
    </script>
    <script>
      // Slot rendering — plain script ไม่ใช้ module
      var _imageFiles = [];

      function _renderSlots() {
        var grid = document.getElementById("previewGrid");
        if (!grid) {
          setTimeout(_renderSlots, 100);
          return;
        }
        grid.innerHTML = "";
        for (var i = 0; i < 5; i++) {
          (function (idx) {
            var file = _imageFiles[idx];
            var slot = document.createElement("div");
            if (file) {
              slot.className = "place-slot filled";
              slot.draggable = true;
              slot.innerHTML =
                '<img src="' +
                URL.createObjectURL(file) +
                '" />' +
                '<button class="place-remove" onclick="event.stopPropagation();_removeImg(' +
                idx +
                ')">✕</button>' +
                '<div class="place-slot-num">' +
                (idx + 1) +
                "</div>";
              slot.addEventListener("dragstart", function (e) {
                e.dataTransfer.setData("text/plain", String(idx));
              });
            } else {
              slot.className = "place-slot empty";
              slot.innerHTML =
                '<div class="place-slot-inner">' +
                '<div class="place-slot-icon">+</div>' +
                '<div class="place-slot-hint">คลิก / ลากรูป</div>' +
                '<div class="place-slot-num">' +
                (idx + 1) +
                "</div>" +
                "</div>";
              slot.addEventListener("click", function () {
                _pickFile(idx);
              });
            }
            slot.addEventListener("dragover", function (e) {
              e.preventDefault();
              slot.classList.add("drag-over");
            });
            slot.addEventListener("dragleave", function () {
              slot.classList.remove("drag-over");
            });
            slot.addEventListener("drop", function (e) {
              e.preventDefault();
              slot.classList.remove("drag-over");
              var from = parseInt(e.dataTransfer.getData("text/plain"));
              if (!isNaN(from) && from !== idx) {
                var t = _imageFiles[from] || null;
                _imageFiles[from] = _imageFiles[idx] || null;
                _imageFiles[idx] = t;
                _renderSlots();
                return;
              }
              var f = e.dataTransfer.files && e.dataTransfer.files[0];
              if (f && f.type.indexOf("image/") === 0) {
                _imageFiles[idx] = f;
                _renderSlots();
              }
            });
            grid.appendChild(slot);
          })(i);
        }
      }

      function _pickFile(idx) {
        var input = document.getElementById("fileInput");
        input.dataset.index = String(idx);
        input.value = "";
        input.click();
      }

      function _removeImg(idx) {
        _imageFiles.splice(idx, 1);
        _renderSlots();
      }

      document
        .getElementById("fileInput")
        .addEventListener("change", function (e) {
          var file = e.target.files && e.target.files[0];
          if (!file) return;
          var idx = parseInt(e.target.dataset.index);
          _imageFiles[isNaN(idx) ? _imageFiles.length : idx] = file;
          _renderSlots();
        });

      // เริ่ม render — retry ถ้า grid ยังไม่มี
      _renderSlots();
    </script>
  </body>
</html>
