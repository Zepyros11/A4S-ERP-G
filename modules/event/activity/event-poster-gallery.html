<!doctype html>
<html lang="th">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Poster Gallery — A4S-ERP</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="../../../css/main.css" />
    <link rel="stylesheet" href="../activity/events.css" />
    <link rel="stylesheet" href="./event-poster-gallery.css" />
  </head>
  <body>
    <div class="loading-overlay" id="loadingOverlay">
      <div class="spinner"></div>
    </div>
    <div class="toast" id="toast"></div>

    <div class="topbar"></div>
    <div class="layout">
      <div id="sidebar-container"></div>

      <div class="content-area">
        <div class="page">
          <!-- PAGE HEADER -->
          <div class="toolbar" style="margin-bottom: 20px">
            <div style="display: flex; align-items: center; gap: 12px">
              <button
                class="btn btn-outline"
                onclick="window.location.href = '../activity/events-list.html'"
              >
                ← กลับ
              </button>
              <div>
                <div style="font-size: 18px; font-weight: 700">
                  🖼️ Poster Gallery
                </div>
                <div
                  style="font-size: 12px; color: var(--text3)"
                  id="pageSubtitle"
                >
                  กำลังโหลด...
                </div>
              </div>
            </div>
            <div class="toolbar-right">
              <!-- Filter: ประเภท -->
              <select class="filter-select" id="filterType">
                <option value="">⚪ ทุกประเภท</option>
                <option value="BOOTH">🏪 ออกบูธ</option>
                <option value="MEETING">👥 ประชุม</option>
                <option value="ONLINE">💻 Online</option>
                <option value="HYBRID">🔀 Hybrid</option>
                <option value="CONFERENCE">🎤 Conference</option>
                <option value="OTHER">📌 อื่นๆ</option>
              </select>
              <!-- Filter: เฉพาะที่มีโปสเตอร์ -->
              <select class="filter-select" id="filterPoster">
                <option value="all">🖼️ ทั้งหมด</option>
                <option value="has" selected>✅ มีโปสเตอร์</option>
                <option value="none">❌ ไม่มีโปสเตอร์</option>
              </select>
              <!-- Grid size toggle -->
              <div class="epg-grid-toggle">
                <button
                  class="epg-toggle-btn active"
                  id="btnGrid3"
                  onclick="setGrid(3)"
                >
                  ⊞ 3
                </button>
                <button
                  class="epg-toggle-btn"
                  id="btnGrid4"
                  onclick="setGrid(4)"
                >
                  ⊞ 4
                </button>
                <button
                  class="epg-toggle-btn"
                  id="btnGrid5"
                  onclick="setGrid(5)"
                >
                  ⊞ 5
                </button>
              </div>
            </div>
          </div>

          <!-- GALLERY BODY -->
          <div id="galleryBody">
            <!-- จะ render เป็น Section แยกตาม Month -->
          </div>
        </div>

        <script type="module" src="./event-poster-gallery.js"></script>
        <script src="../../../../js/core/auth.js"></script>
        <script src="../../../../js/components/modal/deleteModal.js"></script>
        <script src="../../../../js/components/modal/modalManager.js"></script>
        <script type="module">
          import { loadTopbar } from "../../../../js/components/navigation/topbar.js";
          loadTopbar("🖼️ Poster Gallery");
        </script>
        <script src="../../../../js/components/navigation/imgPopup.js"></script>
        <script src="../../../../js/components/navigation/sidebar.js"></script>
      </div>
    </div>
  </body>
</html>
