<!doctype html>
<html lang="th">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Poster Gallery — A4S-ERP</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="../../../css/main.css" />
    <link rel="stylesheet" href="../activity/events.css" />
    <link rel="stylesheet" href="./event-poster-gallery.css" />
  </head>
  <body>
    <div class="loading-overlay" id="loadingOverlay">
      <div class="spinner"></div>
    </div>
    <div class="toast" id="toast"></div>

    <div class="topbar"></div>
    <div class="layout">
      <div id="sidebar-container"></div>

      <div class="content-area">
        <div class="page">
          <!-- PAGE HEADER -->
          <div
            style="
              display: flex;
              align-items: center;
              gap: 12px;
              margin-bottom: 16px;
            "
          >
            <button
              class="btn btn-outline"
              onclick="window.location.href = '../activity/events-list.html'"
            >
              ← กลับ
            </button>
            <div>
              <div style="font-size: 18px; font-weight: 700">
                🖼️ Poster Gallery
              </div>
              <div
                style="font-size: 12px; color: var(--text3)"
                id="pageSubtitle"
              >
                กำลังโหลด...
              </div>
            </div>
            <div
              style="
                margin-left: auto;
                display: flex;
                align-items: center;
                gap: 8px;
              "
            >
              <!-- Grid Toggle -->
              <div class="epg-grid-toggle">
                <button
                  class="epg-toggle-btn"
                  id="btnGrid3"
                  onclick="window.setGrid(3)"
                >
                  ⊞ 3
                </button>
                <button
                  class="epg-toggle-btn active"
                  id="btnGrid4"
                  onclick="window.setGrid(4)"
                >
                  ⊟ 4
                </button>
                <button
                  class="epg-toggle-btn"
                  id="btnGrid5"
                  onclick="window.setGrid(5)"
                >
                  ▦ 5
                </button>
              </div>
            </div>
          </div>

          <!-- Filter Chips -->
          <div class="epg-filter-chips">
            <button
              class="epg-chip active"
              data-type=""
              onclick="window.setTypeFilter(this, '')"
            >
              ทั้งหมด
            </button>
            <button
              class="epg-chip"
              data-type="BOOTH"
              onclick="window.setTypeFilter(this, 'BOOTH')"
            >
              🏪 ออกบูธ
            </button>
            <button
              class="epg-chip"
              data-type="MEETING"
              onclick="window.setTypeFilter(this, 'MEETING')"
            >
              👥 ประชุม
            </button>
            <button
              class="epg-chip"
              data-type="ONLINE"
              onclick="window.setTypeFilter(this, 'ONLINE')"
            >
              💻 Online
            </button>
            <button
              class="epg-chip"
              data-type="HYBRID"
              onclick="window.setTypeFilter(this, 'HYBRID')"
            >
              🔀 Hybrid
            </button>
            <button
              class="epg-chip"
              data-type="CONFERENCE"
              onclick="window.setTypeFilter(this, 'CONFERENCE')"
            >
              🎤 Conference
            </button>
            <button
              class="epg-chip"
              data-type="OTHER"
              onclick="window.setTypeFilter(this, 'OTHER')"
            >
              📌 อื่นๆ
            </button>
            <!-- Poster filter -->
            <div style="margin-left: auto">
              <select class="filter-select" id="filterPoster">
                <option value="all">🖼️ ทั้งหมด</option>
                <option value="has" selected>✅ มีโปสเตอร์</option>
                <option value="none">❌ ไม่มีโปสเตอร์</option>
              </select>
            </div>
          </div>

          <!-- hidden select สำหรับ JS เดิม -->
          <select id="filterType" style="display: none"></select>

          <!-- GALLERY BODY -->
          <div id="galleryBody">
            <!-- จะ render เป็น Section แยกตาม Month -->
          </div>
        </div>

        <script type="module" src="./event-poster-gallery.js"></script>
        <script src="../../../js/core/auth.js"></script>
        <script src="../../../js/components/modal/deleteModal.js"></script>
        <script src="../../../js/components/modal/modalManager.js"></script>
        <script type="module">
          import { loadTopbar } from "../../../js/components/navigation/topbar.js";
          loadTopbar("🖼️ Poster Gallery");
        </script>
        <script src="../../../js/components/navigation/imgPopup.js"></script>
        <script src="../../../js/components/navigation/sidebar.js"></script>
      </div>
    </div>
  </body>
</html>
