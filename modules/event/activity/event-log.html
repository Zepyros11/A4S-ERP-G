<!doctype html>
<html lang="th">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Log กิจกรรม — A4S-ERP</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="../../../../css/main.css" />
    <link rel="stylesheet" href="../activity/events.css" />
    <link rel="stylesheet" href="./event-log.css" />
  </head>
  <body>
    <div class="loading-overlay" id="loadingOverlay">
      <div class="spinner"></div>
    </div>
    <div class="toast" id="toast"></div>

    <!-- TOPBAR -->
    <div class="topbar"></div>
    <div class="layout">
      <!-- SIDEBAR -->
      <div id="sidebar-container"></div>

      <!-- CONTENT -->
      <div class="content-area">
        <div class="page">
          <!-- PAGE HEADER -->
          <div class="toolbar" style="margin-bottom: 20px">
            <div style="display: flex; align-items: center; gap: 12px">
              <button
                class="btn btn-outline"
                onclick="window.location.href = '../activity/events-list.html'"
              >
                ← กลับ
              </button>
              <div>
                <div style="font-size: 18px; font-weight: 700">
                  💬 Log กิจกรรม
                </div>
                <div
                  style="font-size: 12px; color: var(--text3)"
                  id="pageSubtitle"
                >
                  กำลังโหลด...
                </div>
              </div>
            </div>
            <div class="toolbar-right">
              <button class="btn btn-outline" id="btnEditEvent">
                ✏️ แก้ไขกิจกรรม
              </button>
            </div>
          </div>

          <!-- BODY: 2 columns -->
          <div class="log-layout">
            <!-- ── LEFT: Event Info Card ── -->
            <div class="log-info-col">
              <div class="log-info-card">
                <!-- Poster -->
                <div class="log-poster" id="logPoster">
                  <span style="font-size: 48px; opacity: 0.3">🗓️</span>
                </div>

                <!-- Event Name -->
                <div class="log-event-name" id="logEventName">—</div>
                <div class="log-event-code" id="logEventCode"></div>

                <!-- Badges -->
                <div
                  style="
                    display: flex;
                    gap: 6px;
                    flex-wrap: wrap;
                    margin: 10px 0 16px;
                  "
                >
                  <span id="logStatus"></span>
                  <span id="logType"></span>
                </div>

                <hr class="log-divider" />

                <!-- Info rows -->
                <div class="log-meta">
                  <div class="log-meta-row">
                    <span class="log-meta-icon">📅</span>
                    <div>
                      <div class="log-meta-label">วันที่จัดงาน</div>
                      <div class="log-meta-value" id="logDate">—</div>
                    </div>
                  </div>
                  <div class="log-meta-row">
                    <span class="log-meta-icon">🕐</span>
                    <div>
                      <div class="log-meta-label">เวลา</div>
                      <div class="log-meta-value" id="logTime">—</div>
                    </div>
                  </div>
                  <div class="log-meta-row">
                    <span class="log-meta-icon">📍</span>
                    <div>
                      <div class="log-meta-label">สถานที่</div>
                      <div class="log-meta-value" id="logLocation">—</div>
                    </div>
                  </div>
                  <div class="log-meta-row">
                    <span class="log-meta-icon">👤</span>
                    <div>
                      <div class="log-meta-label">ผู้รับผิดชอบ</div>
                      <div class="log-meta-value" id="logAssignee">—</div>
                    </div>
                  </div>
                </div>
              </div>
            </div>

            <!-- ── RIGHT: Feed + Input ── -->
            <div class="log-feed-col">
              <!-- FEED -->
              <div class="log-feed-card">
                <div class="log-feed-header">
                  <div class="log-feed-title">💬 กระดานสื่อสาร</div>
                  <div class="log-feed-count" id="logCount">0 รายการ</div>
                </div>

                <!-- Timeline -->
                <div class="log-timeline" id="logTimeline">
                  <div class="log-empty">
                    <div style="font-size: 32px">💬</div>
                    <div>ยังไม่มี Log กิจกรรม</div>
                  </div>
                </div>

                <!-- INPUT AREA -->
                <div class="log-input-area">
                  <textarea
                    class="log-textarea"
                    id="logMessage"
                    placeholder="พิมพ์ข้อความอัปเดตงาน หรือสอบถามทีมงาน..."
                  ></textarea>
                  <div class="log-input-toolbar">
                    <div style="display: flex; gap: 8px; align-items: center">
                      <select
                        class="filter-select"
                        id="logType"
                        style="height: 36px; font-size: 12px; width: 150px"
                      >
                        <option value="UPDATE">📢 อัปเดตงาน</option>
                        <option value="NOTE">📝 หมายเหตุ</option>
                        <option value="REQUEST">🙏 ขอความช่วยเหลือ</option>
                        <option value="ISSUE">⚠️ แจ้งปัญหา</option>
                      </select>
                      <button
                        class="btn btn-outline"
                        style="height: 36px"
                        onclick="document.getElementById('logAttach').click()"
                      >
                        📎 แนบไฟล์
                      </button>
                      <input
                        type="file"
                        id="logAttach"
                        style="display: none"
                        onchange="window.handleAttach(this)"
                      />
                      <span
                        id="attachName"
                        style="font-size: 11px; color: var(--text3)"
                      ></span>
                    </div>
                    <button
                      class="btn btn-primary"
                      style="height: 36px"
                      onclick="window.submitLog()"
                    >
                      ส่ง ➤
                    </button>
                  </div>
                </div>
              </div>
            </div>
          </div>
          <!-- end log-layout -->
        </div>
        <!-- end .page -->

        <!-- SCRIPTS -->
        <script type="module" src="./event-log.js"></script>
        <script src="../../../../js/core/auth.js"></script>
        <script src="../../../../js/components/modal/deleteModal.js"></script>
        <script src="../../../../js/components/modal/modalManager.js"></script>
        <script type="module">
          import { loadTopbar } from "../../../../js/components/navigation/topbar.js";
          loadTopbar("💬 Log กิจกรรม");
        </script>
        <script src="../../../../js/components/navigation/sidebar.js"></script>
      </div>
    </div>
  </body>
</html>
