<!doctype html>
<html lang="th">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Check-in หน้างาน — A4S-ERP</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="../../css/main.css" />
    <link rel="stylesheet" href="./attendees.css" />
    <style>
      .ci-page {
        max-width: 720px;
        margin: 0 auto;
        padding: 20px 16px;
      }
      .ci-hero {
        background: linear-gradient(135deg, #1e40af, #3b82f6);
        color: #fff;
        border-radius: 14px;
        padding: 20px;
        margin-bottom: 18px;
        box-shadow: 0 8px 24px rgba(30, 64, 175, 0.3);
      }
      .ci-hero-title {
        font-size: 20px;
        font-weight: 700;
      }
      .ci-hero-sub {
        font-size: 13px;
        opacity: 0.85;
        margin-top: 4px;
      }
      .ci-scanner-card {
        background: #fff;
        border: 1px solid var(--border, #e2e8f0);
        border-radius: 14px;
        padding: 16px;
        margin-bottom: 16px;
      }
      #qr-reader {
        width: 100%;
        max-width: 420px;
        margin: 0 auto;
        border-radius: 10px;
        overflow: hidden;
      }
      .ci-manual {
        display: flex;
        gap: 8px;
        margin-top: 12px;
      }
      .ci-manual input {
        flex: 1;
        padding: 12px 14px;
        border: 1.5px solid var(--border, #e2e8f0);
        border-radius: 10px;
        font-size: 14px;
        font-family: "IBM Plex Mono", monospace;
      }
      .ci-manual button {
        padding: 12px 18px;
        border: none;
        border-radius: 10px;
        background: linear-gradient(135deg, #1e40af, #3b82f6);
        color: #fff;
        font-family: inherit;
        font-size: 13px;
        font-weight: 700;
        cursor: pointer;
      }
      .ci-result {
        background: #fff;
        border: 1px solid var(--border, #e2e8f0);
        border-radius: 14px;
        padding: 20px;
        min-height: 120px;
      }
      .ci-result.success {
        border-color: #10b981;
        background: linear-gradient(135deg, #ecfdf5, #d1fae5);
      }
      .ci-result.error {
        border-color: #ef4444;
        background: linear-gradient(135deg, #fef2f2, #fee2e2);
      }
      .ci-result.warn {
        border-color: #f59e0b;
        background: linear-gradient(135deg, #fffbeb, #fef3c7);
      }
      .ci-name {
        font-size: 20px;
        font-weight: 800;
        color: #0f172a;
      }
      .ci-meta {
        font-size: 13px;
        color: var(--text2, #475569);
        margin-top: 4px;
      }
      .ci-award-banner {
        margin-top: 12px;
        padding: 14px 18px;
        background: linear-gradient(135deg, #fbbf24, #f59e0b);
        color: #7c2d12;
        border-radius: 12px;
        font-size: 16px;
        font-weight: 700;
        text-align: center;
        box-shadow: 0 4px 16px rgba(245, 158, 11, 0.4);
        animation: awardPop 0.4s ease;
      }
      @keyframes awardPop {
        0% { transform: scale(0.7); opacity: 0; }
        60% { transform: scale(1.08); opacity: 1; }
        100% { transform: scale(1); }
      }
      .ci-award-tag {
        display: inline-block;
        margin: 2px 3px;
        padding: 2px 10px;
        background: rgba(255, 255, 255, 0.4);
        border-radius: 20px;
        font-size: 13px;
      }
      .ci-status-chip {
        display: inline-block;
        padding: 3px 10px;
        border-radius: 20px;
        font-size: 11.5px;
        font-weight: 700;
        margin-right: 4px;
      }
      .ci-status-chip.ok { background: #dcfce7; color: #15803d; }
      .ci-status-chip.warn { background: #fef3c7; color: #92400e; }
      .ci-status-chip.err { background: #fee2e2; color: #991b1b; }
      .ci-recent {
        margin-top: 18px;
      }
      .ci-recent-title {
        font-size: 13px;
        font-weight: 700;
        color: var(--text2);
        margin-bottom: 10px;
        text-transform: uppercase;
        letter-spacing: 0.5px;
      }
      .ci-recent-item {
        background: #fff;
        border: 1px solid var(--border);
        border-radius: 10px;
        padding: 10px 14px;
        margin-bottom: 6px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 10px;
      }
      .ci-recent-name {
        font-weight: 600;
        font-size: 14px;
      }
      .ci-recent-time {
        font-size: 11px;
        color: var(--text3);
        font-family: "IBM Plex Mono", monospace;
      }
    </style>
    <script src="https://unpkg.com/html5-qrcode"></script>
  </head>
  <body>
    <div class="toast" id="toast"></div>

    <div class="ci-page">
      <div class="ci-hero">
        <div class="ci-hero-title" id="ciEventName">✅ Check-in หน้างาน</div>
        <div class="ci-hero-sub" id="ciEventSub">กำลังโหลด...</div>
      </div>

      <div class="ci-scanner-card">
        <div id="qr-reader"></div>
        <div class="ci-manual">
          <input
            id="manualCode"
            type="text"
            placeholder="หรือพิมพ์ Ticket No / รหัสสมาชิก"
            autocomplete="off"
          />
          <button onclick="window.ciManualCheckin()">Check-in</button>
        </div>
      </div>

      <div id="ciResult" class="ci-result">
        <div style="color:var(--text3);text-align:center;padding:20px">
          สแกน QR หรือพิมพ์รหัสเพื่อ check-in
        </div>
      </div>

      <div class="ci-recent">
        <div class="ci-recent-title">🕐 Check-in ล่าสุด</div>
        <div id="ciRecent"></div>
      </div>
    </div>

    <script type="module" src="./check-in.js"></script>
  </body>
</html>
