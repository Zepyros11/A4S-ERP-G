<!doctype html>
<html lang="th">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Check-in หน้างาน — A4S-ERP</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="../../css/main.css" />
    <link rel="stylesheet" href="./attendees.css" />
    <style>
      .ci-page {
        max-width: 720px;
        margin: 0 auto;
        padding: 20px 16px;
      }
      .ci-hero {
        background: linear-gradient(135deg, #1e40af, #3b82f6);
        color: #fff;
        border-radius: 14px;
        padding: 20px;
        margin-bottom: 18px;
        box-shadow: 0 8px 24px rgba(30, 64, 175, 0.3);
      }
      .ci-hero-title {
        font-size: 20px;
        font-weight: 700;
      }
      .ci-hero-sub {
        font-size: 13px;
        opacity: 0.85;
        margin-top: 4px;
      }
      .ci-scanner-card {
        background: #fff;
        border: 1px solid var(--border, #e2e8f0);
        border-radius: 14px;
        padding: 16px;
        margin-bottom: 16px;
      }
      #qr-reader {
        width: 100%;
        max-width: 420px;
        margin: 0 auto;
        border-radius: 10px;
        overflow: hidden;
      }
      .ci-manual {
        display: flex;
        gap: 8px;
        margin-top: 12px;
      }
      .ci-manual input {
        flex: 1;
        padding: 12px 14px;
        border: 1.5px solid var(--border, #e2e8f0);
        border-radius: 10px;
        font-size: 14px;
        font-family: "IBM Plex Mono", monospace;
      }
      .ci-manual button {
        padding: 12px 18px;
        border: none;
        border-radius: 10px;
        background: linear-gradient(135deg, #1e40af, #3b82f6);
        color: #fff;
        font-family: inherit;
        font-size: 13px;
        font-weight: 700;
        cursor: pointer;
      }
      .ci-result {
        background: #fff;
        border: 1px solid var(--border, #e2e8f0);
        border-radius: 14px;
        padding: 20px;
        min-height: 120px;
      }
      .ci-result.success {
        border-color: #10b981;
        background: linear-gradient(135deg, #ecfdf5, #d1fae5);
      }
      .ci-result.error {
        border-color: #ef4444;
        background: linear-gradient(135deg, #fef2f2, #fee2e2);
      }
      .ci-result.warn {
        border-color: #f59e0b;
        background: linear-gradient(135deg, #fffbeb, #fef3c7);
      }
      .ci-name {
        font-size: 20px;
        font-weight: 800;
        color: #0f172a;
      }
      .ci-meta {
        font-size: 13px;
        color: var(--text2, #475569);
        margin-top: 4px;
      }
      .ci-award-banner {
        margin-top: 12px;
        padding: 14px 18px;
        background: linear-gradient(135deg, #fbbf24, #f59e0b);
        color: #7c2d12;
        border-radius: 12px;
        font-size: 16px;
        font-weight: 700;
        text-align: center;
        box-shadow: 0 4px 16px rgba(245, 158, 11, 0.4);
        animation: awardPop 0.4s ease;
      }
      @keyframes awardPop {
        0% { transform: scale(0.7); opacity: 0; }
        60% { transform: scale(1.08); opacity: 1; }
        100% { transform: scale(1); }
      }
      .ci-award-tag {
        display: inline-block;
        margin: 2px 3px;
        padding: 2px 10px;
        background: rgba(255, 255, 255, 0.4);
        border-radius: 20px;
        font-size: 13px;
      }
      .ci-status-chip {
        display: inline-block;
        padding: 3px 10px;
        border-radius: 20px;
        font-size: 11.5px;
        font-weight: 700;
        margin-right: 4px;
      }
      .ci-status-chip.ok { background: #dcfce7; color: #15803d; }
      .ci-status-chip.warn { background: #fef3c7; color: #92400e; }
      .ci-status-chip.err { background: #fee2e2; color: #991b1b; }
      .ci-recent {
        margin-top: 18px;
      }
      .ci-recent-title {
        font-size: 13px;
        font-weight: 700;
        color: var(--text2);
        margin-bottom: 10px;
        text-transform: uppercase;
        letter-spacing: 0.5px;
      }
      .ci-recent-item {
        background: #fff;
        border: 1px solid var(--border);
        border-radius: 10px;
        padding: 10px 14px;
        margin-bottom: 6px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 10px;
      }
      .ci-recent-name {
        font-weight: 600;
        font-size: 14px;
      }
      .ci-recent-time {
        font-size: 11px;
        color: var(--text3);
        font-family: "IBM Plex Mono", monospace;
      }
    </style>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>
    <style>
      .ci-hero {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 14px;
      }
      .ci-hero-poster {
        width: 64px;
        height: 64px;
        border-radius: 10px;
        overflow: hidden;
        flex-shrink: 0;
        background: rgba(255, 255, 255, 0.18);
        border: 2px solid rgba(255, 255, 255, 0.35);
        box-shadow: 0 4px 14px rgba(0, 0, 0, 0.18);
        display: none;
      }
      .ci-hero-poster img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        display: block;
      }
      .ci-hero-info { flex: 1; min-width: 0; }
      .ci-hero-actions {
        display: flex;
        gap: 8px;
        flex-shrink: 0;
        flex-wrap: wrap;
        justify-content: flex-end;
      }
      @media (max-width: 520px) {
        .ci-hero { flex-direction: column; align-items: stretch; }
        .ci-hero-actions { justify-content: flex-start; }
      }
      .ci-share-btn {
        padding: 8px 14px;
        border: none;
        border-radius: 10px;
        background: rgba(255, 255, 255, 0.22);
        color: #fff;
        font-family: inherit;
        font-size: 12.5px;
        font-weight: 700;
        cursor: pointer;
        backdrop-filter: blur(4px);
        transition: all 0.15s;
      }
      .ci-share-btn:hover { background: rgba(255, 255, 255, 0.35); }
      .share-modal-overlay {
        position: fixed;
        inset: 0;
        background: rgba(15, 23, 42, 0.55);
        display: flex;
        align-items: center;
        justify-content: center;
        z-index: 9999;
        opacity: 0;
        pointer-events: none;
        transition: opacity 0.2s;
      }
      .share-modal-overlay.open { opacity: 1; pointer-events: all; }
      .share-modal {
        background: #fff;
        width: 420px;
        max-width: 92vw;
        border-radius: 16px;
        overflow: hidden;
        box-shadow: 0 20px 60px rgba(0, 0, 0, 0.25);
        transform: scale(0.95);
        transition: transform 0.2s;
      }
      .share-modal-overlay.open .share-modal { transform: scale(1); }
      .share-modal-header {
        background: linear-gradient(135deg, #1e40af, #3b82f6);
        color: #fff;
        padding: 14px 18px;
        display: flex;
        align-items: center;
        justify-content: space-between;
      }
      .share-modal-header .close-x {
        background: rgba(255, 255, 255, 0.25);
        border: none;
        color: #fff;
        width: 30px;
        height: 30px;
        border-radius: 50%;
        cursor: pointer;
        font-size: 14px;
      }
      .share-modal-body {
        padding: 20px;
        text-align: center;
      }
      #shareQrCode {
        display: inline-block;
        padding: 14px;
        background: #fff;
        border: 2px solid #1e40af;
        border-radius: 12px;
        margin-bottom: 14px;
        box-shadow: 0 4px 16px rgba(30, 64, 175, 0.12);
      }
      .share-link-row {
        display: flex;
        gap: 6px;
        margin-top: 6px;
      }
      .share-link-row input {
        flex: 1;
        padding: 10px 12px;
        border: 1.5px solid #e2e8f0;
        border-radius: 8px;
        font-family: "IBM Plex Mono", monospace;
        font-size: 12px;
        color: #0f172a;
        background: #f8fafc;
      }
      .share-link-row button {
        padding: 10px 16px;
        border: none;
        border-radius: 8px;
        background: linear-gradient(135deg, #1e40af, #3b82f6);
        color: #fff;
        font-family: inherit;
        font-size: 13px;
        font-weight: 700;
        cursor: pointer;
        white-space: nowrap;
      }
      .share-hint {
        font-size: 12px;
        color: #64748b;
        margin-top: 10px;
      }
      /* ── Success Popup ── */
      .ci-success-overlay {
        position: fixed;
        inset: 0;
        background: rgba(15, 23, 42, 0.55);
        display: flex;
        align-items: center;
        justify-content: center;
        z-index: 10000;
        opacity: 0;
        pointer-events: none;
        transition: opacity 0.2s;
        backdrop-filter: blur(4px);
      }
      .ci-success-overlay.open { opacity: 1; pointer-events: all; }
      .ci-success-card {
        background: linear-gradient(135deg, #ecfdf5, #d1fae5);
        border: 3px solid #10b981;
        width: 440px;
        max-width: 92vw;
        border-radius: 20px;
        padding: 28px 24px 24px;
        text-align: center;
        box-shadow: 0 25px 70px rgba(16, 185, 129, 0.35);
        transform: scale(0.7);
        transition: transform 0.25s cubic-bezier(0.18, 1.35, 0.55, 1);
      }
      .ci-success-overlay.open .ci-success-card { transform: scale(1); }
      .ci-success-check {
        width: 84px;
        height: 84px;
        margin: 0 auto 14px;
        border-radius: 50%;
        background: #10b981;
        color: #fff;
        font-size: 48px;
        display: flex;
        align-items: center;
        justify-content: center;
        animation: ciCheckPop 0.45s cubic-bezier(0.18, 1.35, 0.55, 1);
        box-shadow: 0 8px 24px rgba(16, 185, 129, 0.4);
      }
      @keyframes ciCheckPop {
        0% { transform: scale(0); }
        60% { transform: scale(1.15); }
        100% { transform: scale(1); }
      }
      .ci-success-title {
        font-size: 22px;
        font-weight: 800;
        color: #065f46;
        margin-bottom: 4px;
      }
      .ci-success-name {
        font-size: 20px;
        font-weight: 800;
        color: #0f172a;
        margin-top: 10px;
      }
      .ci-success-meta {
        font-size: 13px;
        color: #475569;
        margin-top: 4px;
      }
      .ci-success-chips { margin-top: 12px; }
      .ci-success-award {
        margin-top: 14px;
        padding: 12px 16px;
        background: linear-gradient(135deg, #fbbf24, #f59e0b);
        color: #7c2d12;
        border-radius: 12px;
        font-size: 15px;
        font-weight: 700;
        box-shadow: 0 4px 16px rgba(245, 158, 11, 0.4);
      }
      .ci-success-progress {
        width: 100%;
        height: 4px;
        background: rgba(16, 185, 129, 0.18);
        border-radius: 2px;
        margin-top: 18px;
        overflow: hidden;
      }
      .ci-success-progress::after {
        content: "";
        display: block;
        height: 100%;
        background: #10b981;
        animation: ciProgress 2.2s linear forwards;
      }
      @keyframes ciProgress {
        from { width: 100%; }
        to { width: 0%; }
      }

      /* ───────────────────── MOBILE ───────────────────── */
      @media (max-width: 640px) {
        .ci-page { padding: 12px 10px; }

        .ci-hero {
          padding: 14px;
          border-radius: 12px;
          margin-bottom: 12px;
        }
        .ci-hero-title { font-size: 17px; }
        .ci-hero-sub { font-size: 12px; }
        .ci-hero-poster { width: 52px; height: 52px; }
        .ci-share-btn { padding: 7px 12px; font-size: 12px; }

        .ci-scanner-card {
          padding: 10px;
          border-radius: 12px;
        }
        #qr-reader { max-width: 100%; }

        .ci-manual { flex-direction: column; gap: 8px; }
        .ci-manual input { width: 100%; font-size: 15px; padding: 12px 14px; }
        .ci-manual button { width: 100%; padding: 14px 18px; font-size: 14px; }

        .ci-result {
          padding: 14px;
          border-radius: 12px;
          min-height: 90px;
        }
        .ci-name { font-size: 17px; }
        .ci-meta { font-size: 12px; }
        .ci-award-banner { padding: 10px 14px; font-size: 14px; }

        .ci-recent-title { font-size: 12px; margin-bottom: 8px; }
        .ci-recent-item { padding: 8px 12px; }
        .ci-recent-name { font-size: 13px; }

        /* Success popup */
        .ci-success-card {
          padding: 22px 18px 18px;
          border-radius: 16px;
          border-width: 2px;
        }
        .ci-success-check {
          width: 68px;
          height: 68px;
          font-size: 38px;
          margin-bottom: 10px;
        }
        .ci-success-title { font-size: 19px; }
        .ci-success-name { font-size: 17px; margin-top: 8px; }
        .ci-success-meta { font-size: 12px; }
        .ci-success-award { padding: 10px 14px; font-size: 13px; }

        /* Share modal */
        .share-modal-body { padding: 14px; }
        #shareQrCode { padding: 10px; }
        .share-link-row { flex-direction: column; }
        .share-link-row input { width: 100%; }
        .share-link-row button { width: 100%; }
      }

      @media (max-width: 380px) {
        .ci-hero-title { font-size: 15px; }
        .ci-success-check { width: 58px; height: 58px; font-size: 32px; }
        .ci-success-title { font-size: 17px; }
        .ci-success-name { font-size: 15px; }
      }

      /* Better touch targets on coarse pointers */
      @media (pointer: coarse) {
        .ci-manual input, .ci-manual button { min-height: 48px; }
        .ci-share-btn { min-height: 40px; }
      }
    </style>
  </head>
  <body>
    <div class="toast" id="toast"></div>

    <div class="ci-page">
      <div class="ci-hero">
        <div class="ci-hero-poster" id="ciHeroPoster"></div>
        <div class="ci-hero-info">
          <div class="ci-hero-title" id="ciEventName">✅ Check-in หน้างาน</div>
          <div class="ci-hero-sub" id="ciEventSub">กำลังโหลด...</div>
        </div>
        <div class="ci-hero-actions">
          <button class="ci-share-btn" onclick="window.ciOpenShareLink()">🔗 แชร์ลิงก์ลงทะเบียน</button>
        </div>
      </div>

      <div class="share-modal-overlay" id="shareModal">
        <div class="share-modal">
          <div class="share-modal-header">
            <div>📲 แชร์ลิงก์ลงทะเบียน</div>
            <button class="close-x" onclick="window.ciCloseShareLink()">✕</button>
          </div>
          <div class="share-modal-body">
            <div id="shareQrCode"></div>
            <div class="share-link-row">
              <input id="shareLinkInput" type="text" readonly />
              <button onclick="window.ciCopyShareLink()">📋 Copy</button>
            </div>
            <div class="share-hint">📱 ให้สมาชิกสแกน QR หรือเปิดลิงก์เพื่อลงทะเบียน</div>
          </div>
        </div>
      </div>

      <div class="ci-scanner-card">
        <div id="qr-reader"></div>
        <div class="ci-manual">
          <input
            id="manualCode"
            type="text"
            placeholder="หรือพิมพ์ Ticket No / รหัสสมาชิก"
            autocomplete="off"
            autocapitalize="characters"
            autocorrect="off"
            spellcheck="false"
            inputmode="latin"
            lang="en"
          />
          <button onclick="window.ciManualCheckin()">Check-in</button>
        </div>
      </div>

      <div id="ciResult" class="ci-result">
        <div style="color:var(--text3);text-align:center;padding:20px">
          สแกน QR หรือพิมพ์รหัสเพื่อ check-in
        </div>
      </div>

      <div class="ci-recent">
        <div class="ci-recent-title">🕐 Check-in ล่าสุด</div>
        <div id="ciRecent"></div>
      </div>
    </div>

    <!-- SUCCESS POPUP -->
    <div class="ci-success-overlay" id="ciSuccessModal" onclick="window.ciCloseSuccess()">
      <div class="ci-success-card" onclick="event.stopPropagation()">
        <div class="ci-success-check">✓</div>
        <div class="ci-success-title">Check-in สำเร็จ</div>
        <div class="ci-success-name" id="ciSuccessName">—</div>
        <div class="ci-success-meta" id="ciSuccessTicket">—</div>
        <div class="ci-success-chips" id="ciSuccessChips"></div>
        <div class="ci-success-award" id="ciSuccessAward" style="display:none"></div>
        <div class="ci-success-progress"></div>
      </div>
    </div>

    <script type="module" src="./check-in.js"></script>
    <script src="../../js/components/modal/modalManager.js"></script>
  </body>
</html>
