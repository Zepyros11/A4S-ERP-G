    <div class="layout">

      <!-- CONTENT -->
      <div class="content-area">
        <div class="page">

            <div>

          </div>

          <!-- SECTION: รูปภาพ (full width) -->

          </div>

          <!-- FORM BODY (2 columns) -->

            <!-- ── LEFT COLUMN ── -->
            <div class="ef-left">

              <!-- SECTION: ข้อมูลหลัก -->
              <div class="ef-section">
                <div class="ef-section-title">📋 ข้อมูลหลัก</div>

                <div class="ef-field" style="position: relative">
                  <label class="ef-label">
                    ชื่องาน <span class="ef-required">*</span>
                  </label>

                    class="ef-input"
                    type="text"
                    id="fEventName"
                    placeholder="ระบุชื่อกิจกรรม"
                    autocomplete="off"
                  />
                  <div id="eventNameDropdown" class="ef-dropdown"></div>
                </div>

                <div class="ef-field">
                  <label class="ef-label">
                    ประเภทกิจกรรม <span class="ef-required">*</span>
                  </label>
                  <select class="ef-input" id="fEventType">
                    <option value="">— เลือกประเภทกิจกรรม —</option>
                  </select>
                </div>

                <div class="ef-row-2">
                  <div class="ef-field">
                    <label class="ef-label">📚 หลักสูตร (Course Series)</label>
                    <select class="ef-input" id="fSeries" onchange="onSeriesChange()">

                  </div>
                  <div class="ef-field">
                    <label class="ef-label">📊 Level</label>

                  </div>
                </div>

                <div class="ef-field">

                  <div class="ef-toggle-group">

                        <input type="checkbox" id="fRegEnabled">
                        <span class="slider"></span>
                      </span>
                      <span class="ef-toggle-title">เปิดลงทะเบียน</span>
                    </label>
                    <label class="ef-toggle-row">
                      <span class="switch">
                        <input type="checkbox" id="fMembersOnly">
                        <span class="slider"></span>
                      </span>
                      <span class="ef-toggle-title">สมาชิก A4S เท่านั้น</span>
                    </label>
                  </div>
                </div>

                <div class="ef-row-2">
                  <div class="ef-field">
                    <label class="ef-label">
                      วันที่เริ่ม <span class="ef-required">*</span>
                    </label>
                    <input class="ef-input" type="text" id="fEventDate" placeholder="dd/mm/yyyy" autocomplete="off" />
                  </div>
                  <div class="ef-field">
                    <label class="ef-label">วันที่สิ้นสุด</label>
                    <input class="ef-input" type="text" id="fEndDate" placeholder="dd/mm/yyyy" autocomplete="off" />
                  </div>
                </div>

                <div class="ef-allday-row">
                  <label class="ef-toggle-row">
                    <span class="switch">
                      <input type="checkbox" id="fAllDay">
                      <span class="slider"></span>
                    </span>
                    <span class="ef-toggle-title">⏱ ทั้งวัน (ไม่ระบุเวลา)</span>
                  </label>
                </div>

                <div class="ef-row-2 ef-time-row">
                  <div class="ef-field">
                    <label class="ef-label">เวลาเริ่ม</label>
                    <div class="ef-time-pair">
                      <select class="ef-input" id="fStartHour" aria-label="ชั่วโมงเริ่ม">
                        <option value="">ชม.</option>
                      </select>
                      <span class="ef-time-sep">:</span>
                      <select class="ef-input" id="fStartMin" aria-label="นาทีเริ่ม">
                        <option value="">นาที</option>
                      </select>
                    </div>
                    <input type="hidden" id="fStartTime">
                  </div>
                  <div class="ef-field">
                    <label class="ef-label">เวลาสิ้นสุด</label>
                    <div class="ef-time-pair">
                      <select class="ef-input" id="fEndHour" aria-label="ชั่วโมงสิ้นสุด">
                        <option value="">ชม.</option>
                      </select>
                      <span class="ef-time-sep">:</span>
                      <select class="ef-input" id="fEndMin" aria-label="นาทีสิ้นสุด">
                        <option value="">นาที</option>
                      </select>
                    </div>
                    <input type="hidden" id="fEndTime">
                  </div>
                </div>

                <div class="ef-field">
                  <label class="ef-label">สถานที่</label>
  <div class="ef-location-wrap" id="locationWrap">
    <input
      class="ef-input"
      type="text"
      id="fLocation"
      placeholder="พิมพ์เพื่อค้นหาสถานที่..."
      autocomplete="off"
      style="padding-right:36px"
    />
    <button type="button" id="btnClearLocation" onclick="window._clearLocation()" title="ล้างสถานที่"
      style="display:none;position:absolute;right:10px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;color:var(--text3);font-size:16px;padding:2px 4px;line-height:1">✕</button>
    <div class="ef-location-dropdown" id="locationDropdown"></div>
  </div>
</div>

                <div class="ef-row-2">
                  <div class="ef-field">
                    <label class="ef-label">จำนวนผู้เข้าร่วมสูงสุด</label>
                    <input
                      class="ef-input"
                      type="number"
                      id="fMaxAttendees"
                      placeholder="0"
                      min="0"
                    />
                  </div>
                  <div class="ef-field">
                    <label class="ef-label">💰 ราคา / ท่าน (บาท)</label>
                    <input
                      class="ef-input"
                      type="number"
                      id="fPrice"
                      placeholder="0.00"
                      min="0"
                      step="0.01"
                    />
                  </div>
                </div>

                <input type="hidden" id="fGraceDays">
              </div>
              <!-- end ef-section ข้อมูลหลัก -->

              <!-- SECTION: TICKET TIERS (เรียงตามวันที่) -->
              <div class="ef-section">
                <div class="ef-section-title">🎟️ ระดับราคาตามเวลา (Early Bird / Regular / Walk-in)</div>

                <div class="tier-table">
                  <div class="tier-hdr">
                    <div>ชื่อระดับ</div>
                    <div class="col-center">ราคา (฿)</div>
                    <div class="col-center">ตั้งแต่</div>
                    <div class="col-center">ถึง</div>
                    <div class="col-center">จำกัดที่นั่ง</div>
                    <div></div>
                  </div>
                  <div id="tiersContainer"></div>
                  <div id="tiersEmpty" style="padding:14px 10px;color:var(--text3);font-size:12.5px;text-align:center">
                    ยังไม่มี tier — คลิก "เพิ่มระดับราคา" เพื่อตั้งค่าราคาตามเวลา
                  </div>
                </div>

                <button type="button" class="btn-add-tier" onclick="window.addTierRow()">
                  ➕ เพิ่มระดับราคา
                </button>
              </div>

            </div>
            <!-- end ef-left -->

            <!-- ── RIGHT COLUMN ── -->
            <div class="ef-right">
              <!-- SECTION: รหัสกิจกรรม -->
              <div class="ef-section">
                <div class="ef-section-title">🔖 รหัสกิจกรรม</div>
                <div class="ef-field">
                  <label class="ef-label">Event Code</label>
                  <input
                    class="ef-input"
                    style="font-family: &quot;IBM Plex Mono&quot;, monospace"
                    type="text"
                    id="fEventCode"
                    placeholder="EVT-YYYYMM-001 (สร้างอัตโนมัติ)"
                  />
                </div>
              </div>

              <!-- SECTION: LINE OA -->
              <div class="ef-section">
                <div class="ef-section-title">📱 LINE OA สำหรับแจ้งเตือน</div>
                <div class="ef-field">
                  <label class="ef-label">LINE Channel</label>
                  <select class="ef-input" id="fLineChannelId">
                    <option value="">— ใช้ default ของระบบ —</option>
                  </select>
                </div>
              </div>


              <!-- SECTION: การมอบหมาย -->
              <div class="ef-section">
                <div class="ef-section-title">👤 การมอบหมาย</div>

                <div class="ef-field">
                  <label class="ef-label">ผู้รับผิดชอบ</label>
                  <select class="ef-input" id="fAssignedTo">
                    <option value="">— เลือกพนักงาน —</option>
                  </select>
                </div>
                <div class="ef-field">
                  <label class="ef-label">สถานะ</label>
                  <select class="ef-input" id="fStatus">
                    <option value="DRAFT">📝 Draft</option>
                    <option value="CONFIRMED" selected>✔️ Confirmed</option>
                    <option value="ONGOING">▶️ Ongoing</option>
                    <option value="DONE">✅ Done</option>
                    <option value="CANCELLED">❌ Cancelled</option>
                  </select>
                </div>

                <div class="ef-field">
                  <label class="ef-label">รายละเอียดกิจกรรม</label>
                  <textarea
                    class="ef-input ef-textarea"
                    id="fDescription"
                    placeholder="ระบุรายละเอียดกิจกรรม หรือกำหนดการเบื้องต้น..."
                  ></textarea>
                </div>
              </div>
            </div>
            <!-- end ef-right -->
          </div>
          <!-- end ef-layout -->
        </div>
        <!-- end .page -->

        <!-- ══════════════════════════════════════════
             PLAIN SCRIPT: Poster handlers
             ต้องเป็น plain script (ไม่ใช่ module)
             เพื่อให้ inline onclick/ondrop เรียกได้ทันที
        ══════════════════════════════════════════ -->
        <script>
          // ── saveEvent bridge ──────────────────────────────────
          window.saveEvent = function () {
            if (typeof window._saveEventImpl === "function") {
              window._saveEventImpl();
            } else {
              var waited = 0;
              var check = setInterval(function () {
                waited += 100;
                if (typeof window._saveEventImpl === "function") {
                  clearInterval(check);
                  window._saveEventImpl();
                } else if (waited >= 5000) {
                  clearInterval(check);
                  if (window.ConfirmModal) {
                    ConfirmModal.open({
                      title: "ระบบยังโหลดไม่เสร็จ",
                      message: "กรุณารอสักครู่แล้วลองใหม่",
                      tone: "warning",
                      icon: "⏳",
                      hideCancel: true,
                      okText: "ตกลง",
                    });
                  }
                }
              }, 100);
            }
          };

          // ── backward-compat image state (used by event-form.js save) ──
          var MAX_IMGS = 5;
          window._imageFiles = new Array(MAX_IMGS).fill(null);
          window._imageUrls  = new Array(MAX_IMGS).fill(null);

          // ── populate time selects (hour 09–18, minute 00/15/30/45) ──
          (function () {
            var hourSels = ["fStartHour", "fEndHour"].map(function(id){ return document.getElementById(id); });
            var minSels  = ["fStartMin",  "fEndMin"].map(function(id){ return document.getElementById(id); });
            for (var h = 9; h <= 18; h++) {
              var hh = h < 10 ? "0" + h : "" + h;
              hourSels.forEach(function (s) {
                if (s) s.insertAdjacentHTML("beforeend", '<option value="'+hh+'">'+hh+'</option>');
              });
            }
            ["00","15","30","45"].forEach(function (m) {
              minSels.forEach(function (s) {
                if (s) s.insertAdjacentHTML("beforeend", '<option value="'+m+'">'+m+'</option>');
              });
            });

            // bind hidden input ↔ hour/min selects
            function bindTime(hiddenId, hourId, minId) {
              var hidden = document.getElementById(hiddenId);
              var hour   = document.getElementById(hourId);
              var min    = document.getElementById(minId);
              if (!hidden || !hour || !min) return;
              Object.defineProperty(hidden, "value", {
                get: function () { return (hour.value && min.value) ? hour.value + ":" + min.value : ""; },
                set: function (v) {
                  if (typeof v === "string" && /^\d{2}:\d{2}/.test(v)) {
                    hour.value = v.slice(0, 2);
                    min.value  = v.slice(3, 5);
                  } else {
                    hour.value = "";
                    min.value  = "";
                  }
                },
                configurable: true,
              });
            }
            bindTime("fStartTime", "fStartHour", "fStartMin");
            bindTime("fEndTime",   "fEndHour",   "fEndMin");

            // ── "ทั้งวัน" toggle: disable + clear time selects when on ──
            var allDay   = document.getElementById("fAllDay");
            var timeRow  = document.querySelector(".ef-time-row");
            var timeSels = ["fStartHour","fStartMin","fEndHour","fEndMin"]
              .map(function (id) { return document.getElementById(id); })
              .filter(Boolean);
            if (allDay) {
              allDay.addEventListener("change", function () {
                var on = allDay.checked;
                if (timeRow) timeRow.classList.toggle("is-disabled", on);
                timeSels.forEach(function (s) {
                  s.disabled = on;
                  if (on) s.value = "";
                });
              });
            }
          })();
        </script>

        <!-- Image grid via shared component (ES module) -->
        <script type="module">
          import { ImageGrid } from "../../js/components/ui/imageGrid.js";

          function syncToWindow(grid) {
            var images = grid.getImages();
            var files = new Array(5).fill(null);
            var urls  = new Array(5).fill(null);
            images.forEach(function (item, i) {
              if (item.file) files[i] = item.file;
              if (item.url)  urls[i]  = item.url;
            });
            window._imageFiles = files;
            window._imageUrls  = urls;
          }

          document.addEventListener("DOMContentLoaded", function () {
            var container = document.getElementById("imgGrid");
            if (!container) return;

            var imgGrid = new ImageGrid({
              container: container,
              maxImages: 5,
              columns: 5,
              aspectRatio: "1/1.3",
              firstBadge: "โปสเตอร์",
              placeholderSrc: "../../assets/images/NoPoster.png",
              onChange: function () { syncToWindow(imgGrid); },
            });

            // expose for event-form.js to call after loading existing images
            window._renderImgGrid = function () {
              // rebuild images array from window._imageFiles / _imageUrls
              var images = [];
              for (var i = 0; i < 5; i++) {
                var file = window._imageFiles[i];
                var url  = window._imageUrls[i];
                if (file || url) images.push({ file: file || undefined, url: url || undefined });
              }
              imgGrid.setImages(images);
            };

            window._imgGrid = imgGrid;
          });
        </script>

        <!-- ES MODULE: main logic -->
        <script src="../../js/core/date-format.js"></script>
        <script src="../../js/core/crypto.js"></script>
        <script src="../../js/core/line.js"></script>

        <script src="../../js/components/navigation/sidebar.js"></script>
      </div>
    </div>

    <!-- FLOATING SAVE BUTTON -->
