<!doctype html>
<html lang="th">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Poster Gallery</title>

    <!-- Fonts -->
    <link
      href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&family=IBM+Plex+Sans+Thai:wght@300;400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <!-- CSS -->
    <link rel="stylesheet" href="../../../css/main.css" />
    <link rel="stylesheet" href="../events.css" />
    <link rel="stylesheet" href="../event-poster-gallery.css" />
    <link rel="stylesheet" href="./topbar-calendar.css" />
    <link rel="stylesheet" href="./event-poster-gallery-view.css" />
  </head>

  <body class="cal-standalone-page">
    <!-- TOPBAR -->
    <div id="calTopbarContainer"></div>

    <!-- ✅ LOADING (JS ต้องใช้) -->
    <div id="loadingOverlay" class="loading-overlay">
      <div class="spinner"></div>
    </div>

    <!-- ✅ TOAST (JS ต้องใช้) -->
    <div id="toast" class="toast"></div>

    <!-- PAGE -->
    <div class="page">
      <!-- HEADER -->
      <div class="toolbar">
        <div>
          <div class="title">🖼️ Poster Gallery</div>
          <div id="pageSubtitle" class="subtitle">กำลังโหลด...</div>
        </div>
      </div>

      <!-- Category Filter Chips (desktop) -->
      <div class="epg-filter-chips" id="filterChipsWrap">
        <button class="epg-chip active" data-cat="" onclick="window.setTypeFilter(this, '')">ทั้งหมด</button>
        <!-- dynamic chips injected by JS -->
      </div>
      <!-- Category Filter Dropdown (mobile) -->
      <select id="epgCatSelect" class="filter-select epg-cat-select" onchange="window.setTypeFilterFromSelect(this)">
        <option value="">ทั้งหมด</option>
      </select>

      <!-- GALLERY -->
      <div id="galleryBody"></div>
    </div>

    <!-- POPUP -->
    <div id="popup" class="popup hidden">
      <div class="popup-bg"></div>
      <div class="popup-content">
        <button id="popupClose">✕</button>
        <button id="popupPrev" class="popup-nav popup-prev">‹</button>
        <img id="popupImg" />
        <button id="popupNext" class="popup-nav popup-next">›</button>
        <div id="popupThumbs" class="popup-thumbs"></div>
      </div>
    </div>

    <!-- SCRIPT -->
    <script type="module" src="../event-poster-gallery.js"></script>
    <script src="./topbar-calendar.js"></script>

    <script>
      CalTopbar.init({ container: "calTopbarContainer", pageName: "Poster Gallery", logoPath: "../../assets/logo/logo-a4s.png" });

      // ── ImgPopup with slider ──────────────────────────────
      var _popImgs = [];
      var _popIdx  = 0;

      function _popShow(idx) {
        _popIdx = (idx + _popImgs.length) % _popImgs.length;
        document.getElementById("popupImg").src = _popImgs[_popIdx];

        // nav visibility
        var hasMulti = _popImgs.length > 1;
        document.getElementById("popupPrev").style.display = hasMulti ? "flex" : "none";
        document.getElementById("popupNext").style.display = hasMulti ? "flex" : "none";

        // thumbnail strip
        var thumbs = document.getElementById("popupThumbs");
        thumbs.style.display = hasMulti ? "flex" : "none";
        thumbs.innerHTML = _popImgs.map(function (url, i) {
          return '<img src="' + url + '" class="popup-thumb' + (i === _popIdx ? " active" : "") + '" onclick="_popShow(' + i + ')" />';
        }).join("");
      }

      window.ImgPopup = {
        open: function (imgs, index) {
          _popImgs = Array.isArray(imgs) ? imgs : [imgs];
          document.getElementById("popup").classList.remove("hidden");
          _popShow(index || 0);
        },
      };

      document.getElementById("popupClose").onclick = function () {
        document.getElementById("popup").classList.add("hidden");
      };
      document.getElementById("popupPrev").onclick = function () { _popShow(_popIdx - 1); };
      document.getElementById("popupNext").onclick = function () { _popShow(_popIdx + 1); };
      document.querySelector(".popup-bg").onclick = function () {
        document.getElementById("popup").classList.add("hidden");
      };
      document.addEventListener("keydown", function (e) {
        if (document.getElementById("popup").classList.contains("hidden")) return;
        if (e.key === "Escape") document.getElementById("popup").classList.add("hidden");
        if (e.key === "ArrowLeft")  _popShow(_popIdx - 1);
        if (e.key === "ArrowRight") _popShow(_popIdx + 1);
      });
    </script>
  </body>
</html>
