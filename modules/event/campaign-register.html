<!doctype html>
<html lang="th">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ลงทะเบียนแคมเปญ — A4S</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./campaign-register.css" />
  </head>
  <body>
    <div class="toast" id="toast"></div>

    <!-- LOADING -->
    <div class="reg-wrap" id="stateLoading">
      <div class="reg-state"><div class="ic">⏳</div><div class="msg">กำลังโหลด...</div></div>
    </div>

    <!-- CLOSED / NOT FOUND -->
    <div class="reg-wrap hidden" id="stateClosed">
      <div class="reg-state"><div class="ic" id="closedIcon">🔒</div><div class="msg" id="closedMsg">ไม่พบแคมเปญ หรือปิดรับลงทะเบียนแล้ว</div></div>
    </div>

    <!-- DONE (after submit) -->
    <div class="reg-wrap hidden" id="stateDone">
      <div class="reg-state"><div class="ic">🎉</div><div class="msg" id="doneMsg">ลงทะเบียนเรียบร้อยแล้ว ขอบคุณค่ะ</div></div>
    </div>

    <!-- MAIN -->
    <div class="reg-wrap hidden" id="content">
      <div class="reg-cols reg-cols-2">
        <!-- COL 1: ข้อมูลแคมเปญ -->
        <div class="reg-col">
          <div class="reg-hero">
            <div id="heroCover"></div>
            <div class="reg-hero-body">
              <h1 class="reg-title" id="cName">—</h1>
              <div class="reg-meta" id="cMeta"></div>
              <div class="reg-desc" id="cDesc"></div>
              <div class="reg-reward hidden" id="cReward"></div>
            </div>
          </div>
          <div class="reg-card hidden" id="termsCard">
            <h2>📜 เงื่อนไขการเข้าร่วม</h2>
            <ul class="terms-list" id="termsList"></ul>
          </div>
        </div>

        <!-- COL 2: ฟอร์มกรอกข้อมูล -->
        <div class="reg-col">
          <div class="reg-card" id="regCard">
            <h2>📝 ลงทะเบียนเข้าร่วม</h2>
            <div class="sub">กรอกข้อมูล และช่องทางโซเชียลอย่างน้อย 1 ช่องทาง</div>
            <div class="reg-grid">
              <div class="fg">
                <label>รหัส <span class="req">*</span></label>
                <input id="rCode" placeholder="รหัสของคุณ" />
              </div>
              <div class="fg">
                <label>ชื่อ <span class="req">*</span></label>
                <input id="rName" placeholder="ชื่อ-นามสกุล" />
              </div>
            </div>

            <!-- ช่องทางโซเชียล (อย่างน้อย 1 · ใส่ลิงก์แล้วต้องแนบรูป) -->
            <div class="social-section">
              <div class="social-section-title">
                ช่องทางโซเชียล <span class="req">*</span>
                <span class="social-hint">กรอกอย่างน้อย 1 ช่องทาง — ช่องทางที่ใส่ลิงก์ต้องแนบรูป</span>
              </div>
              <div id="socials"></div>
            </div>

            <div id="rMsg" style="margin-top:10px"></div>
            <button class="btn" id="btnRegister" onclick="doRegister()" style="margin-top:12px;width:100%">✅ ส่งข้อมูลลงทะเบียน</button>
          </div>
        </div>
      </div>
    </div>

    <!-- LIGHTBOX (กดรูปขยายเต็มจอ) -->
    <div class="lightbox hidden" id="lightbox" onclick="window.closeLightbox()">
      <span class="lightbox-close">✕</span>
      <img id="lightboxImg" src="" alt="" onclick="event.stopPropagation()" />
    </div>

    <script src="./register-config.js"></script>
    <script src="../../js/core/imageCompressor.js"></script>
    <script src="./campaign-register.js"></script>
  </body>
</html>
