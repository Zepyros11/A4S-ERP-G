<!doctype html>
<html lang="th">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ผู้เข้าร่วมกิจกรรม — A4S-ERP</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="../../../../css/main.css" />
    <link rel="stylesheet" href="./attendees.css" />
  </head>
  <body>
    <div class="loading-overlay" id="loadingOverlay">
      <div class="spinner"></div>
    </div>
    <div class="toast" id="toast"></div>

    <div class="topbar"></div>
    <div class="layout">
      <div id="sidebar-container"></div>
      <div class="content-area">
        <div class="page">
          <!-- PAGE HEADER -->
          <div
            style="
              display: flex;
              align-items: center;
              justify-content: space-between;
              margin-bottom: 20px;
            "
          >
            <div style="font-size: 20px; font-weight: 700">
              👥 ผู้เข้าร่วมกิจกรรม
            </div>
          </div>

          <!-- EVENT SELECTOR -->
          <div
            style="
              background: var(--surface);
              border: 1px solid var(--border);
              border-radius: 10px;
              padding: 12px 16px;
              display: flex;
              align-items: center;
              gap: 12px;
              margin-bottom: 20px;
            "
          >
            <span
              style="
                font-size: 13px;
                font-weight: 600;
                color: var(--text2);
                white-space: nowrap;
              "
            >
              🗓 เลือกกิจกรรม:
            </span>
            <select
              class="form-input"
              id="eventSelect"
              style="flex: 1; max-width: 400px"
              onchange="window.onEventChange()"
            >
              <option value="">-- เลือกกิจกรรม --</option>
            </select>
            <div
              id="eventActionBtns"
              style="display: none; gap: 8px; display: none"
            >
              <button
                class="btn btn-secondary"
                style="font-size: 12px"
                onclick="window.exportCSV()"
              >
                📥 Export CSV
              </button>
              <button class="btn btn-primary" onclick="window.openAttModal()">
                ＋ เพิ่มผู้เข้าร่วม
              </button>
            </div>
          </div>

          <!-- STATS (hidden until event selected) -->
          <div id="attStatsSection" style="display: none">
            <div class="att-stats">
              <div class="att-stat-card">
                <div class="att-stat-label">ลงทะเบียนทั้งหมด</div>
                <div class="att-stat-value" id="statTotal">0</div>
              </div>
              <div class="att-stat-card">
                <div class="att-stat-label">Check-in แล้ว</div>
                <div
                  class="att-stat-value"
                  id="statCheckedIn"
                  style="color: var(--success)"
                >
                  0
                </div>
              </div>
              <div class="att-stat-card">
                <div class="att-stat-label">ยังไม่ Check-in</div>
                <div
                  class="att-stat-value"
                  id="statNotCheckedIn"
                  style="color: var(--text3)"
                >
                  0
                </div>
              </div>
              <div class="att-stat-card">
                <div class="att-stat-label">ชำระแล้ว</div>
                <div
                  class="att-stat-value"
                  id="statPaid"
                  style="color: var(--accent)"
                >
                  0
                </div>
              </div>
              <div class="att-stat-card">
                <div class="att-stat-label">รายรับรวม (฿)</div>
                <div class="att-stat-value" id="statRevenue">0</div>
              </div>
            </div>
          </div>

          <!-- TOOLBAR -->
          <div id="attToolbar" style="display: none">
            <div class="toolbar">
              <div class="search-wrap">
                <span class="search-icon">🔍</span>
                <input
                  class="search-input"
                  id="searchInput"
                  placeholder="ค้นหาชื่อ / อีเมล / บริษัท..."
                />
              </div>
              <select class="filter-select" id="filterCheckin">
                <option value="">⚪ ทุกสถานะ Check-in</option>
                <option value="true">✅ Check-in แล้ว</option>
                <option value="false">⏳ ยังไม่ Check-in</option>
              </select>
              <select class="filter-select" id="filterPayment">
                <option value="">⚪ ทุกสถานะชำระ</option>
                <option value="PAID">💳 ชำระแล้ว</option>
                <option value="PENDING">⏳ รอชำระ</option>
                <option value="FREE">🆓 ฟรี</option>
                <option value="WAIVED">🎫 ยกเว้น</option>
              </select>
              <select class="filter-select" id="filterAttendType">
                <option value="">⚪ ทุกประเภท</option>
                <option value="ONSITE">🏢 Onsite</option>
                <option value="ONLINE">💻 Online</option>
                <option value="VIP">⭐ VIP</option>
              </select>
            </div>
          </div>

          <!-- TABLE -->
          <div id="attTableSection" style="display: none">
            <div class="content-wrap">
              <div class="table-card">
                <div class="table-hdr">
                  <div class="table-title">👥 รายชื่อผู้เข้าร่วม</div>
                  <div class="table-count" id="attCount">0 คน</div>
                </div>
                <div class="table-wrap">
                  <table class="data-table">
                    <thead>
                      <tr>
                        <th>ชื่อ-นามสกุล</th>
                        <th class="col-center">ประเภท</th>
                        <th class="col-center">Ticket</th>
                        <th class="col-center">ชำระ</th>
                        <th class="col-center">Check-in</th>
                        <th class="col-center">จัดการ</th>
                      </tr>
                    </thead>
                    <tbody id="attTableBody">
                      <tr>
                        <td colspan="6">
                          <div class="empty-state">
                            <div class="empty-icon">👥</div>
                            <div class="empty-text">ยังไม่มีผู้เข้าร่วม</div>
                          </div>
                        </td>
                      </tr>
                    </tbody>
                  </table>
                </div>
              </div>
            </div>
          </div>

          <!-- Empty state -->
          <div id="noEventState">
            <div class="empty-state" style="min-height: 300px">
              <div class="empty-icon">👥</div>
              <div class="empty-text">เลือกกิจกรรมเพื่อดูผู้เข้าร่วม</div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- ── ATTENDEE MODAL ── -->
    <div class="att-modal-overlay" id="attModalOverlay">
      <div class="att-modal">
        <div class="att-modal-header">
          <div style="font-weight: 700; font-size: 15px" id="attModalTitle">
            👤 เพิ่มผู้เข้าร่วม
          </div>
          <button class="btn-icon" onclick="window.closeAttModal()">✕</button>
        </div>
        <div class="att-modal-body">
          <input type="hidden" id="fAttId" />
          <div class="att-form-grid">
            <div class="form-group aspan2">
              <label class="form-label"
                >ชื่อ-นามสกุล <span style="color: var(--danger)">*</span></label
              >
              <input
                class="form-input"
                id="fAttName"
                placeholder="ชื่อ-นามสกุล"
              />
            </div>

            <div class="form-group">
              <label class="form-label">อีเมล</label>
              <input
                type="email"
                class="form-input"
                id="fAttEmail"
                placeholder="email@example.com"
              />
            </div>
            <div class="form-group">
              <label class="form-label">เบอร์โทร</label>
              <input
                class="form-input"
                id="fAttPhone"
                placeholder="0XX-XXX-XXXX"
              />
            </div>

            <div class="form-group aspan2">
              <label class="form-label">บริษัท / หน่วยงาน</label>
              <input
                class="form-input"
                id="fAttCompany"
                placeholder="ชื่อบริษัท"
              />
            </div>

            <div class="form-group">
              <label class="form-label">ประเภทการเข้าร่วม</label>
              <select class="form-input" id="fAttendType">
                <option value="ONSITE">🏢 Onsite</option>
                <option value="ONLINE">💻 Online</option>
                <option value="VIP">⭐ VIP</option>
              </select>
            </div>
            <div class="form-group">
              <label class="form-label">ประเภท Ticket</label>
              <input
                class="form-input"
                id="fTicketType"
                placeholder="เช่น General / Early Bird / Staff"
              />
            </div>

            <div class="form-group">
              <label class="form-label">ยอดชำระ (บาท)</label>
              <input
                type="number"
                class="form-input"
                id="fPaidAmount"
                min="0"
                placeholder="0.00"
              />
            </div>
            <div class="form-group">
              <label class="form-label">สถานะชำระ</label>
              <select class="form-input" id="fPaymentStatus">
                <option value="FREE">🆓 ฟรี</option>
                <option value="PENDING">⏳ รอชำระ</option>
                <option value="PAID">💳 ชำระแล้ว</option>
                <option value="WAIVED">🎫 ยกเว้น</option>
              </select>
            </div>

            <div class="form-group aspan2">
              <label class="form-label">หมายเหตุ</label>
              <textarea
                class="form-input"
                id="fAttNote"
                rows="2"
                placeholder="..."
              ></textarea>
            </div>
          </div>
        </div>
        <div class="att-modal-footer">
          <button class="btn btn-secondary" onclick="window.closeAttModal()">
            ยกเลิก
          </button>
          <button class="btn btn-primary" onclick="window.saveAttendee()">
            💾 บันทึก
          </button>
        </div>
      </div>
    </div>

    <script type="module" src="./attendees.js"></script>
    <script src="../../../../js/core/auth.js"></script>
    <script src="../../../../js/components/modal/deleteModal.js"></script>
    <script src="../../../../js/components/modal/modalManager.js"></script>
    <script src="../../../../js/components/modal/enterModal.js"></script>
    <script type="module">
      import { loadTopbar } from "../../../../js/components/navigation/topbar.js";
      loadTopbar("👥 ผู้เข้าร่วมกิจกรรม");
    </script>
    <script src="../../../../js/components/navigation/sidebar.js"></script>
  </body>
</html>
