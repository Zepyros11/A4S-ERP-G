<!doctype html>
<html lang="th">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ห้องประชุม — A4S-ERP</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="../../../../css/main.css" />
    <link rel="stylesheet" href="./rooms.css" />
  </head>
  <body>
    <div class="loading-overlay" id="loadingOverlay">
      <div class="spinner"></div>
    </div>
    <div class="toast" id="toast"></div>

    <div class="topbar"></div>
    <div class="layout">
      <div id="sidebar-container"></div>
      <div class="content-area">
        <div class="page">
          <!-- STATS -->
          <div class="stats-row">
            <div class="stat-card">
              <div class="stat-icon">🚪</div>
              <div>
                <div class="stat-value" id="cardTotal">0</div>
                <div class="stat-label">ห้องทั้งหมด</div>
              </div>
            </div>
            <div class="stat-card">
              <div class="stat-icon">✅</div>
              <div>
                <div class="stat-value" id="cardActive">0</div>
                <div class="stat-label">พร้อมใช้งาน</div>
              </div>
            </div>
            <div class="stat-card">
              <div class="stat-icon">📅</div>
              <div>
                <div class="stat-value" id="cardTodayBookings">0</div>
                <div class="stat-label">การจองวันนี้</div>
              </div>
            </div>
          </div>

          <!-- TOOLBAR -->
          <div class="toolbar">
            <div class="search-wrap">
              <span class="search-icon">🔍</span>
              <input
                class="search-input"
                id="searchInput"
                placeholder="ค้นหาห้องประชุม..."
              />
            </div>
            <select class="filter-select" id="filterBranch">
              <option value="">⚪ ทุกสาขา</option>
            </select>
            <select class="filter-select" id="filterStatus">
              <option value="">⚪ ทุกสถานะ</option>
              <option value="true">✅ พร้อมใช้งาน</option>
              <option value="false">⛔ ปิดใช้งาน</option>
            </select>
            <div class="toolbar-right">
              <button
                class="btn btn-secondary"
                onclick="window.location.href = './room-booking.html'"
              >
                📅 ดูการจองทั้งหมด
              </button>
              <button class="btn btn-primary" onclick="window.openRoomModal()">
                ＋ เพิ่มห้อง
              </button>
            </div>
          </div>

          <!-- ROOM GRID -->
          <div class="content-wrap">
            <div class="table-card">
              <div class="table-hdr">
                <div class="table-title">🚪 รายการห้องประชุม</div>
                <div class="table-count" id="roomCount">0 ห้อง</div>
              </div>
              <div style="padding: 16px">
                <div class="rooms-grid" id="roomsGrid">
                  <div style="grid-column: 1/-1">
                    <div class="empty-state">
                      <div class="empty-icon">🚪</div>
                      <div class="empty-text">ยังไม่มีห้องประชุม</div>
                    </div>
                  </div>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- ── ROOM MODAL (Add/Edit) ── -->
    <div class="room-modal-overlay" id="roomModalOverlay">
      <div class="room-modal">
        <div class="room-modal-header">
          <div style="font-weight: 700; font-size: 15px" id="roomModalTitle">
            🚪 เพิ่มห้องประชุม
          </div>
          <button class="btn-icon" onclick="window.closeRoomModal()">✕</button>
        </div>
        <div class="room-modal-body">
          <input type="hidden" id="fRoomId" />
          <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 12px">
            <div class="form-group">
              <label class="form-label"
                >รหัสห้อง <span style="color: var(--danger)">*</span></label
              >
              <input
                class="form-input"
                id="fRoomCode"
                placeholder="เช่น RM-01"
              />
            </div>
            <div class="form-group">
              <label class="form-label"
                >ชื่อห้อง <span style="color: var(--danger)">*</span></label
              >
              <input
                class="form-input"
                id="fRoomName"
                placeholder="เช่น ห้องประชุมใหญ่"
              />
            </div>
            <div class="form-group">
              <label class="form-label">สาขา / อาคาร</label>
              <input
                class="form-input"
                id="fRoomBranch"
                placeholder="เช่น สำนักงานใหญ่"
              />
            </div>
            <div class="form-group">
              <label class="form-label">ชั้น</label>
              <input class="form-input" id="fRoomFloor" placeholder="เช่น 3" />
            </div>
            <div class="form-group">
              <label class="form-label">ความจุ (คน)</label>
              <input
                type="number"
                class="form-input"
                id="fRoomCapacity"
                min="1"
                placeholder="0"
              />
            </div>
            <div class="form-group">
              <label class="form-label">สถานะ</label>
              <select class="form-input" id="fRoomActive">
                <option value="true">✅ พร้อมใช้งาน</option>
                <option value="false">⛔ ปิดใช้งาน</option>
              </select>
            </div>
            <div class="form-group" style="grid-column: span 2">
              <label class="form-label">สิ่งอำนวยความสะดวก</label>
              <div class="facilities-grid">
                <label class="facility-check"
                  ><input type="checkbox" value="projector" /> 📽
                  Projector</label
                >
                <label class="facility-check"
                  ><input type="checkbox" value="tv" /> 📺 TV Screen</label
                >
                <label class="facility-check"
                  ><input type="checkbox" value="whiteboard" /> 📋
                  Whiteboard</label
                >
                <label class="facility-check"
                  ><input type="checkbox" value="video_conf" /> 📹 Video
                  Conference</label
                >
                <label class="facility-check"
                  ><input type="checkbox" value="wifi" /> 📶 Wi-Fi</label
                >
                <label class="facility-check"
                  ><input type="checkbox" value="ac" /> ❄️ Air Con</label
                >
                <label class="facility-check"
                  ><input type="checkbox" value="mic" /> 🎤 Microphone</label
                >
                <label class="facility-check"
                  ><input type="checkbox" value="coffee" /> ☕ Coffee
                  Corner</label
                >
                <label class="facility-check"
                  ><input type="checkbox" value="phone" /> 📞 Phone</label
                >
              </div>
            </div>
            <div class="form-group" style="grid-column: span 2">
              <label class="form-label">หมายเหตุ</label>
              <textarea
                class="form-input"
                id="fRoomNote"
                rows="2"
                placeholder="..."
              ></textarea>
            </div>
          </div>
        </div>
        <div class="room-modal-footer">
          <button class="btn btn-secondary" onclick="window.closeRoomModal()">
            ยกเลิก
          </button>
          <button class="btn btn-primary" onclick="window.saveRoom()">
            💾 บันทึก
          </button>
        </div>
      </div>
    </div>

    <script type="module" src="./rooms-list.js"></script>
    <script src="../../../../js/core/auth.js"></script>
    <script src="../../../../js/components/modal/deleteModal.js"></script>
    <script src="../../../../js/components/modal/modalManager.js"></script>
    <script src="../../../../js/components/modal/enterModal.js"></script>
    <script type="module">
      import { loadTopbar } from "../../../../js/components/navigation/topbar.js";
      loadTopbar("🚪 ห้องประชุม");
    </script>
    <script src="../../../../js/components/navigation/sidebar.js"></script>
  </body>
</html>
