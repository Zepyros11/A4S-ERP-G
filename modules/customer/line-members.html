<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>สมาชิกที่เชื่อม LINE — A4S-ERP</title>
<link rel="stylesheet" href="../../css/main.css">
<style>
  /* ── Page-specific only (LINE-themed bits) ── */
  .lm-avatar {
    width: 38px; height: 38px;
    border-radius: 50%;
    object-fit: cover;
    background: #06c755;
    color: #fff;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    font-weight: 700;
    font-size: 13px;
    flex-shrink: 0;
    overflow: hidden;
  }
  .lm-avatar img { width: 100%; height: 100%; object-fit: cover; }
  .lm-name { font-weight: 600; color: var(--text); }
  .lm-member-code {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 12px;
    color: var(--accent);
    font-weight: 700;
  }
  .lm-line-name { color: var(--text2); font-size: 12.5px; }
  .lm-phone {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 12px;
    color: var(--text2);
  }
  .lm-date {
    font-size: 12px;
    color: var(--text3);
    font-variant-numeric: tabular-nums;
    white-space: nowrap;
  }
  .lm-relative { font-size: 11px; color: #10b981; font-weight: 600; }
  .lm-relative.stale { color: #94a3b8; }

  /* LINE-themed badge (green) */
  .lm-badge {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    padding: 2px 8px;
    border-radius: 10px;
    font-size: 10.5px;
    font-weight: 700;
    background: #06c755;
    color: #fff;
  }
  /* Action button: LINE green hover (extends .btn-icon) */
  .btn-icon.lm-line-hover:hover { background: #dcfce7; color: #06c755; }
  .btn-icon.danger:hover { background: #fee2e2; color: #dc2626; }
</style>
</head>
<body>

<div class="loading-overlay" id="loadingOverlay"><div class="spinner"></div></div>
<div class="toast" id="toast"></div>

<div class="topbar"></div>

<div class="page">

  <!-- HERO -->
  <div class="page-hero page-hero--simple page-hero--compact">
    <h1 class="page-hero-title">💬 สมาชิกที่เชื่อม LINE แล้ว</h1>
  </div>

  <!-- STATS -->
  <div class="stats-row">
    <div class="stat-card green">
      <div class="stat-icon">💬</div>
      <div class="stat-info">
        <div class="stat-label">สมาชิกเชื่อม LINE</div>
        <div class="stat-value" id="lmTotalLinked">—</div>
        <div class="stat-sub">Active only</div>
      </div>
    </div>
    <div class="stat-card blue">
      <div class="stat-icon">📅</div>
      <div class="stat-info">
        <div class="stat-label">เพิ่ม 7 วันล่าสุด</div>
        <div class="stat-value" id="lmRecent7">—</div>
        <div class="stat-sub">ที่ผูกใหม่</div>
      </div>
    </div>
    <div class="stat-card amber">
      <div class="stat-icon">👥</div>
      <div class="stat-info">
        <div class="stat-label">สมาชิกทั้งระบบ</div>
        <div class="stat-value" id="lmTotalMembers">—</div>
        <div class="stat-sub" id="lmCoverage">— coverage</div>
      </div>
    </div>
  </div>

  <!-- TABLE CARD -->
  <div class="table-card">

    <!-- TOOLBAR -->
    <div class="table-toolbar">
      <div class="search-wrap" style="max-width:none;flex:1;">
        <span class="search-icon">🔍</span>
        <input class="search-input" id="lmSearchInput" placeholder="ค้นหา รหัส / ชื่อ / LINE name / เบอร์ ...">
      </div>
      <div class="toolbar-right">
        <button class="btn btn-outline" onclick="refresh()">🔄 Refresh</button>
        <button class="btn btn-success" onclick="exportCsv()">📥 Export CSV</button>
      </div>
    </div>

    <!-- TABLE -->
    <div class="table-wrap">
      <table class="data-table">
        <thead>
          <tr>
            <th style="width:54px" class="col-center"></th>
            <th>รหัสสมาชิก</th>
            <th>ชื่อสมาชิก</th>
            <th>LINE Name</th>
            <th>เบอร์</th>
            <th>ผูกเมื่อ</th>
            <th class="col-center" style="width:120px">จัดการ</th>
          </tr>
        </thead>
        <tbody id="lmTableBody"></tbody>
      </table>
    </div>

    <!-- PAGINATION (canonical .pagination) -->
    <nav class="pagination" id="lmPaginate" style="margin:14px auto;display:none;" aria-label="pagination"></nav>
  </div>

</div><!-- /.page -->

<script src="../../js/core/auth.js"></script>
<script src="../../js/core/authz.js"></script>
<script src="../../js/core/date-format.js"></script>
<script>AuthZ.requirePerm("member_view");</script>
<script src="line-members.js"></script>
<script type="module">
  import { loadTopbar } from "../../js/components/navigation/topbar.js";
  loadTopbar("💬 สมาชิกที่เชื่อม LINE");
</script>
<script src="../../js/components/navigation/sidebar.js"></script>
<script src="../../js/components/modal/modalManager.js"></script>
<script src="../../js/components/modal/confirmModal.js"></script>
</body>
</html>
