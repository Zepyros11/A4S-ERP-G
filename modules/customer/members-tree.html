<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MLM Tree — A4S-ERP</title>
<link rel="stylesheet" href="../../css/main.css">
<style>
/* ── Search ── */
.tree-search-wrap{display:flex;gap:8px;align-items:center;background:var(--surface);border:1.5px solid var(--border);border-radius:22px;padding:0 14px;max-width:560px;transition:border-color .15s;}
.tree-search-wrap:focus-within{border-color:var(--accent);box-shadow:0 0 0 3px rgba(15,76,117,.12);}
.tree-search-icon{font-size:16px;opacity:.6;}
.tree-search-wrap input{flex:1;border:none;padding:11px 0;font-family:inherit;font-size:14px;outline:none;background:transparent;}

/* ── Selected member card ── */
.member-card{background:linear-gradient(135deg,var(--accent),var(--accent-light));color:#fff;border-radius:14px;padding:24px 28px;margin-top:18px;box-shadow:0 8px 22px rgba(15,76,117,.25);position:relative;overflow:hidden;}
.member-card::before{content:'';position:absolute;right:-50px;top:-50px;width:180px;height:180px;border-radius:50%;background:rgba(255,255,255,.06);}
.member-card-top{display:flex;align-items:center;gap:14px;margin-bottom:14px;}
.member-avatar{width:54px;height:54px;border-radius:50%;background:rgba(255,255,255,.18);display:flex;align-items:center;justify-content:center;font-size:24px;font-weight:700;flex-shrink:0;}
.member-card-name{font-size:18px;font-weight:700;line-height:1.3;}
.member-card-code{font-family:'IBM Plex Mono',monospace;font-size:12.5px;opacity:.85;margin-top:2px;}
.member-stats-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-top:18px;padding-top:16px;border-top:1px solid rgba(255,255,255,.18);position:relative;}
.member-stat{font-size:11.5px;opacity:.85;}
.member-stat strong{display:block;font-size:18px;font-weight:700;margin-top:2px;opacity:1;font-variant-numeric:tabular-nums;}

/* ── Toggle tabs ── */
.tree-tabs{display:flex;gap:8px;margin-top:18px;}
.tree-tab{padding:10px 22px;border:1.5px solid var(--border);border-radius:22px;background:var(--surface);color:var(--text2);cursor:pointer;font-family:inherit;font-size:13.5px;font-weight:500;transition:all .15s;display:flex;align-items:center;gap:7px;}
.tree-tab:hover{border-color:var(--accent);color:var(--accent);}
.tree-tab.active{background:linear-gradient(135deg,var(--accent),var(--accent-light));color:#fff;border-color:var(--accent);font-weight:600;box-shadow:0 3px 10px rgba(15,76,117,.3);}

/* ── Tree node ── */
.tree-wrap{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:14px;margin-top:14px;min-height:120px;}
.tree-empty{text-align:center;padding:40px;color:var(--text3);}
.tree-empty-icon{font-size:48px;opacity:.4;margin-bottom:8px;}

.tree-node{display:flex;align-items:center;gap:8px;padding:8px 10px;border-radius:8px;cursor:pointer;transition:background .12s;}
.tree-node:hover{background:var(--accent-pale);}
.tree-toggle{width:22px;height:22px;border-radius:5px;border:1px solid var(--border);background:var(--surface);display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:11px;color:var(--text3);transition:all .15s;flex-shrink:0;}
.tree-toggle:hover{background:var(--accent);color:#fff;border-color:var(--accent);}
.tree-toggle.leaf{visibility:hidden;}
.tree-icon{font-size:14px;flex-shrink:0;}
.tree-info{flex:1;min-width:0;display:flex;align-items:baseline;gap:10px;flex-wrap:wrap;}
.tree-code{font-family:'IBM Plex Mono',monospace;font-size:12px;color:var(--accent);font-weight:600;}
.tree-name{font-size:13.5px;color:var(--text);font-weight:500;}
.tree-meta{font-size:11.5px;color:var(--text3);}
.tree-pkg{padding:1px 7px;border-radius:4px;font-size:10.5px;font-weight:600;}
.pkg-DM{background:#ddd6fe;color:#5b21b6;}
.pkg-SI{background:#fef3c7;color:#92400e;}
.pkg-PL{background:#cffafe;color:#0e7490;}
.pkg-MB{background:#fce7f3;color:#9f1239;}
.pkg-EM{background:#d1fae5;color:#065f46;}
.tree-count{margin-left:auto;background:var(--accent-pale);color:var(--accent);font-size:11px;font-weight:700;padding:2px 9px;border-radius:10px;font-family:'IBM Plex Mono',monospace;}
.tree-side{font-size:10.5px;font-weight:700;padding:1px 6px;border-radius:3px;}
.tree-side.left{background:#dbeafe;color:#1e40af;}
.tree-side.right{background:#fee2e2;color:#991b1b;}

/* indented children container */
.tree-children{margin-left:30px;padding-left:14px;border-left:2px dashed var(--border);margin-top:2px;}
.tree-loading{padding:8px 14px;color:var(--text3);font-size:12px;font-style:italic;}

/* breadcrumb (upline path) */
.upline-breadcrumb{display:flex;flex-wrap:wrap;gap:6px;align-items:center;padding:12px 16px;background:var(--surface2);border-radius:10px;margin-bottom:12px;font-size:12.5px;}
.upline-link{padding:4px 10px;background:var(--surface);border:1px solid var(--border);border-radius:6px;cursor:pointer;font-family:'IBM Plex Mono',monospace;color:var(--accent);font-weight:600;transition:all .12s;}
.upline-link:hover{background:var(--accent);color:#fff;border-color:var(--accent);}
.upline-arrow{color:var(--text3);font-size:12px;}
</style>
</head>
<body>

<div class="loading-overlay" id="loadingOverlay"><div class="spinner"></div></div>
<div class="toast" id="toast"></div>

<!-- TOPBAR -->
<div class="topbar"></div>

<!-- PAGE -->
<div class="page">

  <!-- Search -->
  <div class="tree-search-wrap">
    <span class="tree-search-icon">🔍</span>
    <input id="searchInput" placeholder="ค้นหารหัสสมาชิก เช่น 10001 หรือ ชื่อ..." autocomplete="off">
  </div>
  <div style="font-size:11.5px;color:var(--text3);margin-top:6px;margin-left:14px">
    💡 พิมพ์รหัสตรงๆ จะเร็วสุด · ค้นชื่อจะเสนอ 5 รายการแรกให้เลือก
  </div>

  <!-- Search suggestions dropdown -->
  <div id="searchSuggest" style="display:none;background:var(--surface);border:1px solid var(--border);border-radius:10px;margin-top:6px;max-width:560px;box-shadow:var(--shadow);overflow:hidden"></div>

  <!-- Selected member info -->
  <div id="memberCard" style="display:none">
    <div class="member-card">
      <div class="member-card-top">
        <div class="member-avatar" id="mAvatar">?</div>
        <div style="flex:1">
          <div class="member-card-name" id="mName">—</div>
          <div class="member-card-code" id="mCode">—</div>
        </div>
        <div id="mPkgBadge"></div>
      </div>
      <div class="member-stats-grid">
        <div class="member-stat">Sponsor (แม่ทีม)<strong id="mSponsor">—</strong></div>
        <div class="member-stat">Upline (ข้างบน)<strong id="mUpline">—</strong></div>
        <div class="member-stat">ด้าน<strong id="mSide">—</strong></div>
        <div class="member-stat">วันที่สมัคร<strong id="mRegAt">—</strong></div>
      </div>
    </div>

    <!-- Toggle tabs -->
    <div class="tree-tabs">
      <button class="tree-tab active" data-mode="sponsor-down" onclick="setMode('sponsor-down')">⭐ ลูกทีม (Sponsor)</button>
      <button class="tree-tab" data-mode="sponsor-up" onclick="setMode('sponsor-up')">⬆️ สาย Sponsor</button>
      <button class="tree-tab" data-mode="upline-down" onclick="setMode('upline-down')">🌲 Downline (Upline)</button>
      <button class="tree-tab" data-mode="upline-up" onclick="setMode('upline-up')">⬆️ สาย Upline</button>
    </div>

    <!-- Tree -->
    <div class="tree-wrap" id="treeWrap">
      <div class="tree-empty"><div class="tree-empty-icon">🌳</div>คลิกแท็บด้านบนเพื่อดูสาย</div>
    </div>
  </div>

  <!-- Empty state -->
  <div id="emptyState" style="text-align:center;padding:80px 20px;color:var(--text3)">
    <div style="font-size:64px;opacity:.3;margin-bottom:16px">🌳</div>
    <div style="font-size:15px;font-weight:500">ค้นหาสมาชิกเพื่อดูโครงสร้าง MLM</div>
    <div style="font-size:13px;margin-top:6px">พิมพ์รหัสสมาชิกหรือชื่อในช่องด้านบน</div>
  </div>

</div>

<script src="../../js/core/auth.js"></script>
<script src="../../js/core/authz.js"></script>
<script src="../../js/core/date-format.js"></script>
<script>AuthZ.requirePerm("member_view");</script>
<script src="./members-tree.js"></script>
<script type="module">
  import { loadTopbar } from "../../js/components/navigation/topbar.js";
  loadTopbar("🌳 MLM Tree View");
</script>
<script src="../../js/components/navigation/sidebar.js"></script>
</body>
</html>
