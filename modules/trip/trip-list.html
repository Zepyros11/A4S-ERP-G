<!doctype html>
<html lang="th">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>รายการทริป — A4S-ERP</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="../../css/main.css" />
    <style>
      /* status pill */
      .trip-status-pill{
        display:inline-block;padding:3px 10px;border-radius:999px;
        font-size:11px;font-weight:600;letter-spacing:.2px;
        white-space:nowrap;
      }
      .trip-status-ACTIVE   { background:#dbeafe; color:#1d4ed8; }
      .trip-status-DONE     { background:#dcfce7; color:#15803d; }
      .trip-status-CANCELLED{ background:#fee2e2; color:#b91c1c; }

      .trip-name-cell{font-weight:600;color:var(--text);font-size:13.5px;}
      .trip-date-range{color:var(--text2);font-size:12.5px;}
      .trip-date-range .sep{color:var(--text3);margin:0 6px;}
      .trip-seat-badge{
        display:inline-block;padding:2px 9px;border-radius:999px;
        background:#f1f5f9;color:#475569;font-size:11.5px;font-weight:600;
      }
      .trip-seat-badge.has{background:#e0f2fe;color:#0369a1;}

      /* action group: keep all 4 icons on one row */
      .action-group{
        display:flex;flex-direction:row;align-items:center;
        justify-content:center;gap:4px;flex-wrap:nowrap;
      }
      .action-group .btn-icon{
        width:30px;height:30px;font-size:14px;flex-shrink:0;
      }
    </style>
  </head>
  <body>
    <div class="loading-overlay" id="loadingOverlay">
      <div class="spinner"></div>
    </div>
    <div class="toast" id="toast"></div>

    <div class="topbar"></div>
    <div class="layout">
      <div class="content-area">
        <div class="page">

          <!-- HERO -->
          <div class="page-hero page-hero--simple page-hero--compact">
            <h1 class="page-hero-title">✈️ รายการทริป</h1>
          </div>

          <!-- STATS -->
          <div class="stats-row">
            <div class="stat-card">
              <div class="stat-icon">✈️</div>
              <div>
                <div class="stat-value" id="cardTotal">0</div>
                <div class="stat-label">ทริปทั้งหมด</div>
              </div>
            </div>
            <div class="stat-card">
              <div class="stat-icon">🟢</div>
              <div>
                <div class="stat-value" id="cardActive">0</div>
                <div class="stat-label">กำลังดำเนินการ</div>
              </div>
            </div>
            <div class="stat-card">
              <div class="stat-icon">✅</div>
              <div>
                <div class="stat-value" id="cardDone">0</div>
                <div class="stat-label">เสร็จสิ้น</div>
              </div>
            </div>
            <div class="stat-card">
              <div class="stat-icon">👥</div>
              <div>
                <div class="stat-value" id="cardSeats">0</div>
                <div class="stat-label">ลูกค้ารวม</div>
              </div>
            </div>
          </div>

          <!-- TABLE CARD -->
          <div class="table-card">
            <div class="toolbar">
              <div class="search-wrap">
                <span class="search-icon">🔍</span>
                <input
                  class="search-input"
                  id="searchInput"
                  placeholder="ค้นหาชื่อทริป..."
                />
              </div>
              <select class="filter-select" id="filterStatus">
                <option value="">🧿 ทุกสถานะ</option>
                <option value="ACTIVE">🟢 กำลังดำเนินการ</option>
                <option value="DONE">✅ เสร็จสิ้น</option>
                <option value="CANCELLED">❌ ยกเลิก</option>
              </select>
              <div class="toolbar-right">
                <button
                  class="btn btn-primary"
                  data-perm="trip_list_create"
                  onclick="window.openTripModal()"
                >
                  ＋ สร้างทริป
                </button>
              </div>
            </div>

            <div class="table-hdr">
              <div class="table-title">✈️ รายการทริป</div>
              <div class="table-count" id="tableCount">0 รายการ</div>
            </div>

            <div class="table-wrap">
              <table class="data-table">
                <thead>
                  <tr>
                    <th style="width:48px;text-align:center">#</th>
                    <th onclick="window.sortTable('trip_name')" style="cursor:pointer">
                      ชื่อทริป <span class="sort-icon">⇅</span>
                    </th>
                    <th onclick="window.sortTable('start_date')" class="col-center" style="cursor:pointer;white-space:nowrap">
                      ช่วงวันที่ <span class="sort-icon">⇅</span>
                    </th>
                    <th class="col-center" style="width:90px">ลูกค้า</th>
                    <th class="col-center" style="width:130px">สถานะ</th>
                    <th class="col-center" style="width:160px">จัดการ</th>
                  </tr>
                </thead>
                <tbody id="tableBody">
                  <tr>
                    <td colspan="6">
                      <div class="empty-state">
                        <div class="empty-icon">✈️</div>
                        <div class="empty-text">กำลังโหลด...</div>
                      </div>
                    </td>
                  </tr>
                </tbody>
              </table>
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- ═════════════ TRIP FORM MODAL ═════════════ -->
    <div class="modal-overlay" id="tripOverlay" onclick="window.closeTripModal(event)">
      <div class="modal v-sage-header" onclick="event.stopPropagation()">
        <div class="modal-hdr">
          <div class="modal-title" id="tripModalTitle">สร้างทริป</div>
          <button class="btn-modal-close" onclick="window.closeTripModal()">✕</button>
        </div>
        <div class="modal-body">
          <div class="form-group">
            <label class="form-label">
              ชื่อทริป <span class="req">*</span>
            </label>
            <input
              class="form-control"
              id="fTripName"
              placeholder="เช่น ทริปไนจีเรีย รุ่น 1"
              autocomplete="off"
            />
          </div>

          <div class="form-row" style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:14px">
            <div class="form-group">
              <label class="form-label">วันที่เริ่ม</label>
              <input class="form-control" type="date" id="fStartDate" />
            </div>
            <div class="form-group">
              <label class="form-label">วันที่สิ้นสุด</label>
              <input class="form-control" type="date" id="fEndDate" />
            </div>
          </div>

          <div class="form-group" style="margin-top:14px">
            <label class="form-label">สถานะ</label>
            <select class="form-control" id="fStatus">
              <option value="ACTIVE">🟢 กำลังดำเนินการ</option>
              <option value="DONE">✅ เสร็จสิ้น</option>
              <option value="CANCELLED">❌ ยกเลิก</option>
            </select>
          </div>

          <div class="form-group" style="margin-top:14px">
            <label class="form-label">หมายเหตุ</label>
            <textarea
              class="form-control"
              id="fDescription"
              rows="2"
              placeholder="รายละเอียดเพิ่มเติม (ถ้ามี)"
            ></textarea>
          </div>
        </div>
        <div class="modal-footer">
          <button class="btn btn-ghost" onclick="window.closeTripModal()">
            ยกเลิก
          </button>
          <button class="btn btn-primary" onclick="window.saveTrip()">
            💾 บันทึก
          </button>
        </div>
      </div>
    </div>

    <!-- SCRIPTS -->
    <script src="../../js/core/auth.js"></script>
    <script src="../../js/core/authz.js"></script>
    <script src="../../js/core/date-format.js"></script>
    <script>AuthZ.requirePerm("trip_list_view");</script>
    <script src="./trip-list.js"></script>
    <script src="../../js/components/modal/deleteModal.js"></script>
    <script src="../../js/components/modal/modalManager.js"></script>
    <script src="../../js/components/modal/enterSave.js"></script>
    <script src="../../js/components/navigation/sidebar.js"></script>
    <script type="module">
      import { loadTopbar } from "../../js/components/navigation/topbar.js";
      loadTopbar("✈️ รายการทริป");
    </script>
  </body>
</html>
