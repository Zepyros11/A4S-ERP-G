<!doctype html>
<html lang="th">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>📊 Custom Report — A4S-ERP</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="../../css/main.css" />
    <script src="https://cdn.sheetjs.com/xlsx-0.20.1/package/dist/xlsx.full.min.js"></script>
    <style>
      /* ── Trip context banner ── */
      .cr-trip-banner{
        display:inline-flex;align-items:center;gap:10px;
        background:var(--accent-pale);
        border:1px solid color-mix(in srgb, var(--accent) 20%, transparent);
        padding:6px 14px;border-radius:999px;font-size:13px;
        color:var(--accent);white-space:nowrap;
      }
      .cr-trip-banner a{color:var(--accent);text-decoration:none;font-weight:600;opacity:.85}
      .cr-trip-banner a:hover{opacity:1}

      /* ── Layout: picker | preview ── */
      .cr-main{display:grid;grid-template-columns:280px 1fr;gap:14px;margin-top:8px}
      @media (max-width:880px){ .cr-main{grid-template-columns:1fr} }

      .cr-card{background:#fff;border:1px solid var(--border);border-radius:10px;padding:14px}
      .cr-card h3{margin:0 0 10px;font-size:13px;color:var(--text)}

      /* picker groups */
      .cr-group{margin-bottom:6px;border:1px solid var(--border);border-radius:8px;overflow:hidden}
      .cr-group-hdr{
        display:flex;align-items:center;justify-content:space-between;
        padding:8px 10px;background:#f8fafc;cursor:pointer;
        font-size:12.5px;font-weight:700;color:var(--text);
        user-select:none;
      }
      .cr-group-hdr:hover{background:#e2e8f0}
      .cr-group-hdr:hover .cr-group-caret{color:var(--accent)}
      .cr-group-body{padding:4px 6px}
      .cr-group.collapsed .cr-group-body{display:none}
      .cr-group-caret{
        font-size:16px;color:var(--text2);font-weight:700;
        min-width:24px;text-align:center;cursor:pointer;
        padding:2px 6px;border-radius:4px;background:rgba(0,0,0,.04);
      }
      .cr-opt{
        display:flex;align-items:center;gap:8px;
        padding:5px 8px;border-radius:6px;font-size:12.5px;
        color:var(--text);cursor:pointer;
      }
      .cr-opt:hover{background:#f1f5f9}
      .cr-opt input{cursor:pointer;margin:0;width:15px;height:15px}

      /* selected chips */
      .cr-chips{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:10px;min-height:8px}
      .cr-chip{
        display:inline-flex;align-items:center;gap:6px;
        background:var(--accent-pale);color:var(--accent);
        border:1px solid color-mix(in srgb, var(--accent) 25%, transparent);
        padding:3px 6px 3px 9px;border-radius:999px;font-size:11.5px;font-weight:600;
      }
      .cr-chip button{
        border:none;background:transparent;cursor:pointer;
        color:var(--accent);font-size:13px;line-height:1;padding:0 2px;
      }
      .cr-chip .cr-chip-move{font-size:11px;opacity:.7}
      .cr-chip .cr-chip-move:hover{opacity:1}

      /* preview table */
      #cr-table-wrap{overflow:auto;max-height:62vh;border:1px solid var(--border);border-radius:8px}
      table.cr-table{border-collapse:separate;border-spacing:0;width:max-content;min-width:100%;font-size:12px}
      table.cr-table th,table.cr-table td{
        padding:6px 9px;border-bottom:1px solid var(--border);border-right:1px solid var(--border);
        text-align:left;white-space:nowrap;
      }
      table.cr-table thead th{
        background:#f1f5f9;color:var(--text2);font-weight:700;font-size:11px;
        position:sticky;top:0;z-index:2;
      }
      table.cr-table tbody tr:nth-child(even){background:#fafafa}
      table.cr-table tbody tr:hover{background:#f1f5f9}
      .cr-empty{padding:40px 20px;text-align:center;color:var(--text3);font-size:13px}

      /* ── Header filter ── */
      .cr-th-flex{display:inline-flex;align-items:center;gap:4px;width:100%}
      .cr-th-lbl{flex:1;cursor:pointer;user-select:none}
      .cr-th-fbtn{
        border:none;background:transparent;cursor:pointer;
        padding:1px 3px;border-radius:4px;font-size:10px;line-height:1;
        color:var(--text3);opacity:.55;
      }
      .cr-th-fbtn:hover{background:#e2e8f0;opacity:1}
      .cr-th-fbtn.active{
        color:#fff;background:var(--accent);opacity:1;
        box-shadow:0 1px 2px rgba(0,0,0,.15);
      }
      .cr-fpop{
        position:fixed;z-index:1000;min-width:220px;max-width:300px;
        background:#fff;border:1px solid var(--border);border-radius:8px;
        box-shadow:0 6px 20px rgba(0,0,0,.15);
        padding:8px;font-size:12.5px;
      }
      .cr-fpop-search{
        width:100%;padding:5px 8px;border:1px solid var(--border);
        border-radius:6px;font-size:12px;margin-bottom:6px;box-sizing:border-box;
      }
      .cr-fpop-acts{
        display:flex;gap:8px;margin-bottom:6px;font-size:11px;
      }
      .cr-fpop-acts button{
        border:none;background:transparent;color:var(--accent);
        cursor:pointer;padding:0;font-weight:600;font-size:11px;
      }
      .cr-fpop-acts button:hover{text-decoration:underline}
      .cr-fpop-list{
        max-height:240px;overflow-y:auto;
        border:1px solid var(--border);border-radius:6px;padding:3px;
      }
      .cr-fpop-list label{
        display:flex;align-items:center;gap:7px;
        padding:4px 6px;border-radius:4px;cursor:pointer;font-size:12px;
        color:var(--text);
      }
      .cr-fpop-list label:hover{background:#f1f5f9}
      .cr-fpop-list input{cursor:pointer;margin:0;width:14px;height:14px}
      .cr-fpop-empty{padding:12px;text-align:center;color:var(--text3);font-size:12px}
      .cr-fpop-foot{
        display:flex;justify-content:flex-end;gap:6px;margin-top:8px;
      }
      .cr-fpop-foot button{
        padding:4px 10px;border-radius:6px;font-size:12px;cursor:pointer;
        border:1px solid var(--border);background:#fff;color:var(--text);
      }
      .cr-fpop-foot button.primary{
        background:var(--accent);color:#fff;border-color:var(--accent);
      }
      .cr-fpop-merge{
        display:flex;align-items:center;gap:7px;
        padding:7px 9px;border-radius:6px;
        background:#f0f9ff;border:1px solid #bae6fd;
        cursor:pointer;font-size:12px;color:#075985;font-weight:600;
      }
      .cr-fpop-merge:hover{background:#e0f2fe}
      .cr-fpop-merge input{cursor:pointer;margin:0;width:14px;height:14px}
      .cr-fpop-divider{border-top:1px dashed var(--border);margin:8px 0}
      .cr-fpop-msg{
        padding:10px;text-align:center;color:var(--text3);font-size:12px;
        background:#f8fafc;border:1px dashed var(--border);border-radius:6px;
      }

      /* merge badge บนปุ่ม filter header */
      .cr-th-mbadge{
        display:inline-block;margin-left:2px;font-size:9px;
        font-weight:700;line-height:1;vertical-align:1px;
      }

      /* 👁 ปุ่มซ่อน/แสดงคอลัมน์ (header) */
      .cr-th-eye{
        border:none;background:transparent;cursor:pointer;
        padding:1px 3px;border-radius:4px;font-size:11px;line-height:1;
        opacity:.45;filter:grayscale(1);
      }
      .cr-th-eye:hover{background:#e2e8f0;opacity:1;filter:none}
      .cr-th-eye.off{opacity:1;filter:none;background:#fee2e2}
      .cr-th-hidetag{
        display:inline-block;font-size:9px;font-weight:700;
        color:#b91c1c;background:#fee2e2;border-radius:4px;
        padding:0 4px;margin-left:2px;vertical-align:1px;
      }
      /* คอลัมน์ที่ซ่อน — จางใน preview บนจอ (ยังคลิกเรียง/กรองได้) */
      table.cr-table th.cr-col-hidden,
      table.cr-table td.cr-col-hidden{opacity:.4}
      table.cr-table th.cr-col-hidden{background:#fff5f5}

      /* 👁 ปุ่มซ่อน/แสดง (chip) */
      .cr-chip-eye{
        border:none;background:transparent;cursor:pointer;
        font-size:11px;line-height:1;padding:0 2px;
        opacity:.55;filter:grayscale(1);
      }
      .cr-chip-eye:hover{opacity:1;filter:none}
      .cr-chip.cr-chip-hidden{opacity:.55;text-decoration:line-through;text-decoration-color:#cbd5e1}
      .cr-chip.cr-chip-hidden .cr-chip-eye{opacity:1;filter:none;text-decoration:none}

      /* เซลที่ถูกผสาน (rowspan) — top-align + พื้นสว่างนิดให้เห็นกลุ่ม */
      table.cr-table td.cr-merged{
        vertical-align:top;background:#fafdff;font-weight:600;
      }
      table.cr-table tbody tr:nth-child(even) td.cr-merged{background:#f4f9ff}

      /* image cell — thumbnail click → popup ภาพขยาย */
      table.cr-table td.cr-cell-img{padding:4px;text-align:center}
      /* image lightbox */
      #cr-img-modal{
        display:none;position:fixed;inset:0;z-index:4000;
        background:rgba(0,0,0,.75);align-items:center;justify-content:center;
      }
      #cr-img-modal.open{display:flex}
      #cr-img-modal img{
        max-width:92vw;max-height:92vh;border-radius:8px;
        box-shadow:0 20px 60px rgba(0,0,0,.5);background:#fff;
      }
      #cr-img-modal-close{
        position:fixed;top:20px;right:24px;background:#fff;border:none;
        border-radius:50%;width:36px;height:36px;font-size:18px;cursor:pointer;
        display:flex;align-items:center;justify-content:center;
        box-shadow:0 2px 8px rgba(0,0,0,.3);
      }
      .cr-img-thumb{
        max-height:64px;max-width:120px;
        border:1px solid var(--border);border-radius:4px;
        background:#f8fafc;display:block;margin:0 auto;
        object-fit:contain;cursor:zoom-in;transition:.12s;
      }
      .cr-img-thumb:hover{
        border-color:var(--accent);
        box-shadow:0 2px 8px rgba(15,23,42,.18);
      }
      #cr-print-area td img.cr-img-thumb{
        max-height:48px;max-width:90px;border:1px solid #cbd5e1;
      }

      .cr-preset-bar{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
      .cr-preset-bar select{min-width:200px}

      /* ── Preview Modal (A4 simulated, paginated) ── */
      .cr-preview-modal{
        position:fixed;inset:0;z-index:1000;
        background:#1e293b;
        display:flex;flex-direction:column;
      }
      .cr-preview-toolbar{
        display:flex;align-items:center;gap:10px;flex-wrap:wrap;
        padding:10px 16px;background:#fff;border-bottom:1px solid var(--border);
        flex-shrink:0;
      }
      .cr-preview-scroll{
        flex:1;overflow:auto;padding:24px;
        display:flex;flex-direction:column;align-items:center;gap:18px;
      }
      .cr-preview-paper{
        /* default = landscape A4 */
        width:297mm;height:210mm;flex-shrink:0;
        background:#fff;box-shadow:0 6px 24px rgba(0,0,0,.4);
        padding:10mm;box-sizing:border-box;
        font-size:11px;color:#0f172a;
        overflow:hidden;position:relative;
      }
      .cr-preview-paper.portrait{width:210mm;height:297mm}
      .cr-preview-paper .cr-print-title{font-size:15px;font-weight:700;margin-bottom:2px}
      .cr-preview-paper .cr-print-sub{font-size:11px;color:#64748b;margin-bottom:10px}
      .cr-preview-paper table{border-collapse:collapse;width:100%;font-size:11px}
      .cr-preview-paper th,.cr-preview-paper td{
        border:1px solid #94a3b8;padding:4px 6px;text-align:left;vertical-align:middle;
      }
      .cr-preview-paper thead th{background:#f1f5f9;font-weight:700}
      .cr-preview-paper td img.cr-img-thumb{
        max-height:var(--cr-img-h, 16mm);max-width:var(--cr-img-w, 60mm);
        border:1px solid #cbd5e1;background:#fff;
        object-fit:contain;display:block;margin:0 auto;
      }
      .cr-preview-page-num{
        position:absolute;bottom:4mm;right:8mm;
        font-size:10px;color:#94a3b8;
      }
      .cr-preview-more{
        background:#fff;border:1px dashed #cbd5e1;border-radius:8px;
        padding:14px 20px;color:#64748b;font-size:13px;text-align:center;
        max-width:80%;
      }

      /* ── Card layout (per-person card with image right) — prefix .cr-pcard เพื่อกันชน .cr-card panel ── */
      .cr-pcards-grid{
        display:grid;
        grid-template-columns:repeat(var(--cr-card-cols, 1), 1fr);
        gap:4mm;width:100%;height:100%;
      }
      .cr-pcard{
        display:grid;grid-template-columns:1fr auto;gap:4mm;
        border:1px solid #94a3b8;border-radius:2mm;
        padding:3mm;box-sizing:border-box;
        background:#fff;overflow:hidden;
      }
      .cr-pcard-fields{
        display:flex;flex-direction:column;gap:1.2mm;
        min-width:0;font-size:11px;
        justify-content:var(--cr-card-vpos, flex-start);
      }
      .cr-pcard-field{
        display:flex;gap:6px;align-items:baseline;
        border-bottom:1px dotted #e2e8f0;padding-bottom:1.2mm;
      }
      .cr-pcard-field:last-child{border-bottom:none}
      .cr-pcard-label{
        flex:0 0 auto;color:#64748b;font-weight:600;
        min-width:24mm;font-size:10.5px;
      }
      .cr-pcard-value{
        flex:1;color:#0f172a;word-break:break-word;font-weight:500;
      }
      .cr-pcard-images{
        display:flex;flex-direction:column;gap:2mm;
        align-items:center;justify-content:flex-start;
      }
      .cr-pcard-images img{
        max-height:var(--cr-card-img-h, 50mm);max-width:var(--cr-card-img-w, 70mm);
        border:1px solid #cbd5e1;background:#fff;
        object-fit:contain;display:block;
      }
      .cr-pcard-img-placeholder{
        width:var(--cr-card-img-w, 70mm);height:var(--cr-card-img-h, 50mm);
        border:1px dashed #cbd5e1;background:#f8fafc;color:#94a3b8;
        display:flex;flex-direction:column;align-items:center;justify-content:center;
        font-size:11px;font-style:italic;
      }
      .cr-pcard-team{background:#fffbeb;border-color:#fcd34d}
      .cr-pcard-team-badge{
        display:inline-block;margin-left:6px;
        background:#fef3c7;color:#92400e;border:1px solid #fcd34d;
        padding:0 6px;border-radius:99px;font-size:9.5px;font-weight:700;
      }
      /* preview-paper container for card mode — ใช้ grid เต็มพื้นที่ */
      .cr-preview-paper.cr-mode-card{padding:8mm}
      .cr-preview-paper.cr-mode-card .cr-pcards-grid{height:calc(100% - 14mm)}
      .cr-preview-paper.cr-mode-card .cr-print-title{margin-bottom:4mm}

      /* Print settings (rows per A4 + orientation) */
      .cr-print-settings{
        display:inline-flex;align-items:center;gap:6px;
        background:#f1f5f9;border:1px solid var(--border);border-radius:8px;
        padding:3px 8px;
      }
      .cr-print-settings select{min-width:auto;padding:3px 6px;font-size:11.5px}

      /* ── Print ── */
      #cr-print-area{display:none}
      .cr-print-title{font-size:15px;font-weight:700;margin-bottom:2px}
      .cr-print-sub{font-size:11px;color:#64748b;margin-bottom:10px}
      #cr-print-area table{border-collapse:collapse;width:100%;font-size:11px}
      #cr-print-area th,#cr-print-area td{border:1px solid #94a3b8;padding:4px 6px;text-align:left;vertical-align:middle}
      #cr-print-area thead th{background:#f1f5f9;font-weight:700}
      /* image cell in print — size driven by --cr-img-h (set ก่อน print) */
      #cr-print-area td img.cr-img-thumb{
        max-height:var(--cr-img-h, 16mm);max-width:var(--cr-img-w, 60mm);
        border:1px solid #cbd5e1;background:#fff;
        object-fit:contain;display:block;margin:0 auto;
      }
      /* card mode in print — mirror preview styles */
      /* 1 หน้า A4 ต่อ 1 .cr-print-page → บังคับ page-break กันหน้าว่าง (mirror .cr-preview-paper.cr-mode-card) */
      #cr-print-area .cr-print-page{
        box-sizing:border-box;padding:8mm;overflow:hidden;position:relative;
        page-break-after:always;break-after:page;
      }
      #cr-print-area .cr-print-page:last-child{page-break-after:auto;break-after:auto}
      #cr-print-area .cr-print-page .cr-print-title{margin-bottom:4mm}
      #cr-print-area .cr-print-page .cr-pcards-grid{height:calc(100% - 14mm)}
      #cr-print-area .cr-pcards-grid{
        display:grid;grid-template-columns:repeat(var(--cr-card-cols, 1), 1fr);
        gap:4mm;page-break-inside:auto;
      }
      #cr-print-area .cr-pcard{
        display:grid;grid-template-columns:1fr auto;gap:4mm;
        border:1px solid #94a3b8;border-radius:2mm;padding:3mm;
        page-break-inside:avoid;background:#fff;
      }
      #cr-print-area .cr-pcard-fields{display:flex;flex-direction:column;gap:1.2mm;font-size:11px;justify-content:var(--cr-card-vpos, flex-start)}
      #cr-print-area .cr-pcard-field{
        display:flex;gap:6px;border-bottom:1px dotted #e2e8f0;padding-bottom:1.2mm;
      }
      #cr-print-area .cr-pcard-label{
        color:#64748b;font-weight:600;min-width:24mm;font-size:10.5px;flex-shrink:0;
      }
      #cr-print-area .cr-pcard-value{color:#0f172a;font-weight:500;word-break:break-word}
      #cr-print-area .cr-pcard-images{display:flex;flex-direction:column;gap:2mm;align-items:center}
      #cr-print-area .cr-pcard-images img{
        max-height:var(--cr-card-img-h, 50mm);max-width:var(--cr-card-img-w, 70mm);
        border:1px solid #cbd5e1;object-fit:contain;display:block;
      }
      #cr-print-area .cr-pcard-img-placeholder{
        width:var(--cr-card-img-w, 70mm);height:var(--cr-card-img-h, 50mm);
        border:1px dashed #cbd5e1;background:#f8fafc;color:#94a3b8;
        display:flex;flex-direction:column;align-items:center;justify-content:center;
        font-size:11px;font-style:italic;
      }
      #cr-print-area .cr-pcard-team{background:#fffbeb;border-color:#fcd34d}
      #cr-print-area .cr-pcard-team-badge{
        display:inline-block;margin-left:6px;
        background:#fef3c7;color:#92400e;border:1px solid #fcd34d;
        padding:0 6px;border-radius:99px;font-size:9.5px;font-weight:700;
      }
      /* ── Image-only card → ภาพเต็มการ์ด/เต็มหน้า ไม่มีช่องว่าง (preview + print) ── */
      .cr-pcard.cr-pcard-full,
      #cr-print-area .cr-pcard.cr-pcard-full{
        display:flex;align-items:center;justify-content:center;
        padding:0;overflow:hidden;position:relative;
      }
      .cr-pcard-full .cr-pcard-full-imgs,
      #cr-print-area .cr-pcard-full .cr-pcard-full-imgs{
        display:flex;flex-direction:column;gap:1mm;
        align-items:center;justify-content:center;width:100%;
      }
      .cr-pcard-full .cr-pcard-full-imgs img,
      #cr-print-area .cr-pcard-full .cr-pcard-full-imgs img{
        width:var(--cr-card-full-w, 80mm);
        height:var(--cr-card-full-h, 60mm);
        object-fit:contain;border:none;background:#fff;display:block;
      }
      .cr-pcard-full-num{
        position:absolute;top:1mm;left:2mm;z-index:2;line-height:1.4;
        font-size:9px;color:#64748b;background:rgba(255,255,255,.75);
        padding:0 4px;border-radius:3px;
      }

      @media print{
        body > *:not(#cr-print-area){display:none !important}
        #cr-print-area{display:block !important}
        #cr-print-area tr{page-break-inside:avoid}
      }
    </style>
    <style id="crPageStyle">@page{size:landscape;margin:10mm}</style>
  </head>
  <body>
    <div class="loading-overlay" id="loadingOverlay">
      <div class="spinner"></div>
    </div>
    <div class="toast" id="toast"></div>

    <div class="topbar"></div>
    <div class="layout">
      <div class="content-area">
        <div class="page">

          <!-- HERO -->
          <div class="page-hero page-hero--simple page-hero--compact">
            <div style="display:flex;align-items:center;gap:12px;flex-wrap:wrap">
              <h1 class="page-hero-title" style="margin:0">📊 Custom Report</h1>
              <span id="crTripBanner" class="cr-trip-banner" style="display:none">
                <a href="./trip-list.html">← รายการทริป</a>
                <span style="opacity:.4">|</span>
                <span id="crTripName" style="font-weight:700">—</span>
                <span id="crTripDates" style="color:var(--text2);font-size:11.5px;font-weight:500"></span>
              </span>
            </div>
          </div>

          <!-- PRESET BAR -->
          <div class="cr-card" style="margin-bottom:12px">
            <div class="cr-preset-bar">
              <span style="font-size:12.5px;font-weight:700;color:var(--text2)">⭐ ชุดคอลัมน์:</span>
              <select class="filter-select" id="presetSelect" onchange="window.applyPreset(this.value)">
                <option value="">— เลือก preset —</option>
              </select>
              <button class="btn btn-outline" onclick="window.savePreset()" title="บันทึกคอลัมน์ที่เลือกเป็น preset ใหม่">💾 บันทึกเป็น preset</button>
              <button class="btn btn-outline" onclick="window.deletePreset()" title="ลบ preset ที่เลือก">🗑 ลบ preset</button>
              <div style="flex:1"></div>
              <span id="crPrintSettings" class="cr-print-settings" style="display:none"
                title="ตั้งจำนวนแถวต่อหน้า A4 เพื่อให้ภาพใหญ่ขึ้นเวลาพิมพ์">
                <span style="font-size:11.5px;color:var(--text2)">🎨 รูปแบบ:</span>
                <select id="crLayout" class="filter-select" onchange="window.setLayout(this.value)">
                  <option value="table" selected>📊 ตาราง</option>
                  <option value="card">🪪 การ์ด</option>
                </select>
                <span id="crRowsPerPageWrap">
                  <span style="font-size:11.5px;color:var(--text2)">🖨 แถว/A4:</span>
                  <select id="crRowsPerPage" class="filter-select" onchange="window.setRowsPerPage(this.value)">
                    <option value="auto" selected>อัตโนมัติ</option>
                    <option value="2">2 (ใหญ่สุด)</option>
                    <option value="4">4</option>
                    <option value="6">6</option>
                    <option value="8">8 (ปกติ)</option>
                    <option value="12">12</option>
                    <option value="16">16 (เล็กสุด)</option>
                  </select>
                </span>
                <span id="crCardsPerPageWrap" style="display:none">
                  <span style="font-size:11.5px;color:var(--text2)">🪪 การ์ด/A4:</span>
                  <select id="crCardsPerPage" class="filter-select" onchange="window.setCardsPerPage(this.value)">
                    <option value="1">1 (ใหญ่สุด)</option>
                    <option value="2" selected>2</option>
                    <option value="4">4</option>
                    <option value="6">6 (เล็กสุด)</option>
                  </select>
                  <span style="font-size:11.5px;color:var(--text2)">↕ ตำแหน่งข้อมูล:</span>
                  <select id="crCardFieldPos" class="filter-select" onchange="window.setCardFieldPos(this.value)"
                    title="ตำแหน่งกล่องข้อมูล (ชื่อ/ฟิลด์) ในการ์ดเทียบกับภาพ">
                    <option value="top" selected>⬆ บน</option>
                    <option value="center">⬌ กลาง</option>
                    <option value="bottom">⬇ ล่าง</option>
                  </select>
                </span>
                <select id="crOrientation" class="filter-select" onchange="window.setOrientation(this.value)">
                  <option value="landscape" selected>แนวนอน</option>
                  <option value="portrait">แนวตั้ง</option>
                </select>
              </span>
              <button class="btn btn-outline" onclick="window.exportReportExcel()">📥 Excel</button>
              <button class="btn btn-outline" onclick="window.previewReportPrint()" title="ดูตัวอย่างหน้ากระดาษ A4 ก่อนพิมพ์">👁 Preview</button>
              <button class="btn btn-primary" onclick="window.exportReportPrint()">🖨 Print / PDF</button>
            </div>
          </div>

          <!-- MAIN: picker | preview -->
          <div class="cr-main">
            <!-- COLUMN PICKER -->
            <div class="cr-card">
              <h3>เลือกคอลัมน์</h3>
              <div id="crPicker"></div>
            </div>

            <!-- PREVIEW -->
            <div class="cr-card">
              <h3>ตัวอย่างรายงาน <span id="crRowCount" style="color:var(--text3);font-weight:400"></span></h3>
              <div class="cr-chips" id="crChips"></div>
              <div id="cr-table-wrap">
                <div class="cr-empty" id="crEmpty">เลือกคอลัมน์จากด้านซ้ายเพื่อสร้างรายงาน</div>
                <table class="cr-table" id="crTable" style="display:none">
                  <thead><tr id="crThead"></tr></thead>
                  <tbody id="crTbody"></tbody>
                </table>
              </div>
            </div>
          </div>

        </div>
      </div>
    </div>

    <!-- PRINT AREA (populated on print) -->
    <div id="cr-print-area"></div>

    <!-- PREVIEW MODAL — ดู layout ก่อนกด Excel/Print -->
    <div id="crPreviewModal" class="cr-preview-modal" style="display:none">
      <div class="cr-preview-toolbar">
        <span style="font-size:14px;font-weight:700">👁 ตัวอย่างก่อน export</span>
        <span id="crPreviewMeta" style="font-size:11.5px;color:var(--text2)"></span>
        <span style="flex:1"></span>
        <button class="btn btn-outline" onclick="window.closePreview()">✕ ปิด</button>
        <button class="btn btn-outline" onclick="window.closePreview();window.exportReportExcel()">📥 Excel</button>
        <button class="btn btn-primary" onclick="window.closePreview();setTimeout(window.exportReportPrint,50)">🖨 Print / PDF</button>
      </div>
      <div class="cr-preview-scroll" id="crPreviewScroll"></div>
    </div>

    <!-- IMAGE LIGHTBOX -->
    <div id="cr-img-modal" onclick="window.crCloseImg()">
      <button id="cr-img-modal-close" onclick="window.crCloseImg()" title="ปิด">✕</button>
      <img id="cr-img-modal-img" src="" alt="ภาพขยาย" onclick="event.stopPropagation()" />
    </div>

    <!-- SCRIPTS -->
    <script src="../../js/core/auth.js"></script>
    <script src="../../js/core/authz.js"></script>
    <script src="../../js/core/date-format.js"></script>
    <script>AuthZ.requirePerm("trip_pax_detail_view");</script>
    <script src="./custom-report.js"></script>
    <script src="../../js/components/modal/confirmModal.js"></script>
    <script src="../../js/components/modal/promptModal.js"></script>
    <script src="../../js/components/modal/modalManager.js"></script>
    <script src="../../js/components/navigation/sidebar.js"></script>
    <script type="module">
      import { loadTopbar } from "../../js/components/navigation/topbar.js";
      loadTopbar("📊 Custom Report");
    </script>
  </body>
</html>
