<!doctype html>
<html lang="th">
  <head>
    <meta charset="UTF-8" />
    <title>Database Viewer</title>

    <link rel="stylesheet" href="../../css/main.css" />

    <style>
      .db-container {
        padding: 20px;
      }

      .db-toolbar {
        display: flex;
        gap: 10px;
        margin-bottom: 15px;
      }

      .db-table {
        width: 100%;
        border-collapse: collapse;
        font-size: 14px;
      }

      .db-table th,
      .db-table td {
        border-bottom: 1px solid #ddd;
        padding: 8px;
        text-align: left;
      }

      .db-table th {
        background: #f5f5f5;
        font-weight: 600;
      }

      .db-actions button {
        margin-right: 4px;
        cursor: pointer;
      }

      .db-pagination {
        margin-top: 15px;
        display: flex;
        gap: 10px;
      }
    </style>
  </head>

  <body>
    <div class="topbar">
      <div style="padding: 10px 16px; font-weight: 600">
        📦 A4S-ERP | Database Viewer
      </div>
    </div>

    <div class="page">
      <div class="db-container">
        <h2>Database Viewer</h2>

        <div class="db-toolbar">
          <select id="tableSelect"></select>

          <input
            id="searchInput"
            placeholder="ค้นหา..."
            oninput="loadTable()"
          />

          <button onclick="loadTable()">รีเฟรช</button>

          <button onclick="insertRow()">＋ เพิ่มข้อมูล</button>
        </div>

        <table class="db-table">
          <thead>
            <tr id="tableHead"></tr>
          </thead>

          <tbody id="tableBody"></tbody>
        </table>

        <div class="db-pagination">
          <button onclick="prevPage()">⬅ ก่อนหน้า</button>
          <button onclick="nextPage()">ถัดไป ➡</button>
        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <script src="../../js/core/supabase.js"></script>
    <script src="../../js/core/auth.js"></script>
    <script src="../../js/core/authz.js"></script>
<script src="../../js/core/date-format.js"></script>
    <script>AuthZ.requirePerm("db_viewer_view");</script>
    <script src="../../js/core/responsive.js"></script>
    <script src="../../js/components/navigation/sidebar.js"></script>
    <script src="../../js/components/modal/modalManager.js"></script>
    <script src="../../js/components/modal/confirmModal.js"></script>
    <script src="../../js/components/modal/promptModal.js"></script>

    <script>
      let supabaseClient;

      let currentTable = "";
      let page = 0;
      const pageSize = 50;

      initSupabase();

      function initSupabase() {
        if (!window.supabaseConfig) {
          ConfirmModal.open({
            title: "Config missing",
            message: "Supabase config missing",
            tone: "danger",
            icon: "⚠️",
            hideCancel: true,
            okText: "ตกลง",
          });
          return;
        }

        supabaseClient = supabase.createClient(
          supabaseConfig.url,
          supabaseConfig.anon,
        );

        loadTables();
      }

      async function loadTables() {
        const { data, error } = await supabaseClient.rpc("get_tables");

        if (error) {
          console.error(error);
          return;
        }

        const select = document.getElementById("tableSelect");

        select.innerHTML = "";

        data.forEach((t) => {
          const opt = document.createElement("option");
          opt.value = t.table_name;
          opt.textContent = t.table_name;

          select.appendChild(opt);
        });

        currentTable = data[0].table_name;

        select.onchange = () => {
          currentTable = select.value;
          page = 0;
          loadTable();
        };

        loadTable();
      }

      async function loadTable() {
        const search = document.getElementById("searchInput").value;

        let query = supabaseClient
          .from(currentTable)
          .select("*")
          .range(page * pageSize, (page + 1) * pageSize - 1);

        const { data, error } = await query;

        if (error) {
          console.error(error);
          return;
        }

        renderTable(data);
      }

      function renderTable(rows) {
        const head = document.getElementById("tableHead");
        const body = document.getElementById("tableBody");

        head.innerHTML = "";
        body.innerHTML = "";

        if (!rows.length) return;

        const columns = Object.keys(rows[0]);

        columns.forEach((c) => {
          const th = document.createElement("th");
          th.textContent = c;
          head.appendChild(th);
        });

        const act = document.createElement("th");
        act.textContent = "Action";
        head.appendChild(act);

        rows.forEach((r) => {
          const tr = document.createElement("tr");

          columns.forEach((c) => {
            const td = document.createElement("td");
            td.textContent = r[c];
            tr.appendChild(td);
          });

          const td = document.createElement("td");
          td.className = "db-actions";

          td.innerHTML = `
<button onclick='editRow(${JSON.stringify(r)})'>✏️</button>
<button onclick='deleteRow("${r.id || r.product_id || ""}")'>🗑</button>
`;

          tr.appendChild(td);

          body.appendChild(tr);
        });
      }

      async function deleteRow(id) {
        const ok = await ConfirmModal.open({
          title: "ยืนยันการลบ",
          message: `ลบข้อมูลใน ${currentTable} (id=${id}) ?`,
          tone: "danger",
          icon: "🗑️",
          okText: "ลบ",
          cancelText: "ยกเลิก",
          note: "⚠️ ย้อนกลับไม่ได้",
        });
        if (!ok) return;

        const pk = await getPrimaryKey();

        const { error } = await supabaseClient
          .from(currentTable)
          .delete()
          .eq(pk, id);

        if (error) {
          ConfirmModal.open({
            title: "ลบไม่สำเร็จ",
            message: error.message,
            tone: "danger",
            icon: "❌",
            hideCancel: true,
            okText: "ปิด",
          });
          return;
        }

        loadTable();
      }

      async function editRow(row) {
        const json = await PromptModal.open({
          title: "แก้ไข JSON",
          message: `แก้ค่าใน ${currentTable}`,
          icon: "✏️",
          okText: "บันทึก",
          tone: "primary",
          inputType: "textarea",
          multiline: true,
          defaultValue: JSON.stringify(row, null, 2),
          required: true,
        });

        if (!json) return;

        let data;

        try {
          data = JSON.parse(json);
        } catch {
          ConfirmModal.open({
            title: "JSON ผิด",
            message: "ตรวจสอบ syntax ของ JSON อีกครั้ง",
            tone: "warning",
            icon: "⚠️",
            hideCancel: true,
            okText: "ปิด",
          });
          return;
        }

        const pk = await getPrimaryKey();

        const { error } = await supabaseClient
          .from(currentTable)
          .update(data)
          .eq(pk, row[pk]);

        if (error) {
          ConfirmModal.open({
            title: "แก้ไขไม่สำเร็จ",
            message: error.message,
            tone: "danger",
            icon: "❌",
            hideCancel: true,
            okText: "ปิด",
          });
          return;
        }

        loadTable();
      }

      async function insertRow() {
        const json = await PromptModal.open({
          title: "เพิ่มข้อมูลใหม่",
          message: `เพิ่ม row ใน ${currentTable} (รูปแบบ JSON)`,
          icon: "＋",
          okText: "เพิ่ม",
          tone: "success",
          inputType: "textarea",
          multiline: true,
          placeholder: '{ "column1": "value", "column2": "value" }',
          required: true,
        });

        if (!json) return;

        let data;

        try {
          data = JSON.parse(json);
        } catch {
          ConfirmModal.open({
            title: "JSON ผิด",
            message: "ตรวจสอบ syntax ของ JSON อีกครั้ง",
            tone: "warning",
            icon: "⚠️",
            hideCancel: true,
            okText: "ปิด",
          });
          return;
        }

        const { error } = await supabaseClient.from(currentTable).insert(data);

        if (error) {
          ConfirmModal.open({
            title: "เพิ่มไม่สำเร็จ",
            message: error.message,
            tone: "danger",
            icon: "❌",
            hideCancel: true,
            okText: "ปิด",
          });
          return;
        }

        loadTable();
      }

      async function getPrimaryKey() {
        if (currentTable === "products") return "product_id";

        return "id";
      }

      function nextPage() {
        page++;
        loadTable();
      }

      function prevPage() {
        if (page === 0) return;

        page--;
        loadTable();
      }
    </script>
    <script src="../../js/components/modal/modalManager.js"></script>
  </body>
</html>
