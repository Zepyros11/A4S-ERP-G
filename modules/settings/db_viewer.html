<!doctype html>
<html lang="th">
  <head>
    <meta charset="UTF-8" />
    <title>Database Viewer</title>

    <link rel="stylesheet" href="../../assets/css/common.css" />

    <style>
      .db-container {
        padding: 20px;
      }

      .db-toolbar {
        display: flex;
        gap: 10px;
        margin-bottom: 15px;
      }

      .db-table {
        width: 100%;
        border-collapse: collapse;
        font-size: 14px;
      }

      .db-table th,
      .db-table td {
        border-bottom: 1px solid #ddd;
        padding: 8px;
        text-align: left;
      }

      .db-table th {
        background: #f5f5f5;
        font-weight: 600;
      }

      .db-actions button {
        margin-right: 4px;
        cursor: pointer;
      }

      .db-pagination {
        margin-top: 15px;
        display: flex;
        gap: 10px;
      }
    </style>
  </head>

  <body>
    <div id="sidebar"></div>

    <div class="db-container">
      <h2>Database Viewer</h2>

      <div class="db-toolbar">
        <select id="tableSelect"></select>

        <input id="searchInput" placeholder="ค้นหา..." oninput="loadTable()" />

        <button onclick="loadTable()">รีเฟรช</button>

        <button onclick="insertRow()">＋ เพิ่มข้อมูล</button>
      </div>

      <table class="db-table">
        <thead>
          <tr id="tableHead"></tr>
        </thead>

        <tbody id="tableBody"></tbody>
      </table>

      <div class="db-pagination">
        <button onclick="prevPage()">⬅ ก่อนหน้า</button>
        <button onclick="nextPage()">ถัดไป ➡</button>
      </div>
    </div>

    <script src="../../shared/auth.js"></script>
    <script src="../../shared/responsive.js"></script>
    <script src="../../shared/sidebar.js"></script>
    <script src="../../modules/settings/settings.js"></script>

    <script>
      let supabaseClient;

      let currentTable = "";
      let page = 0;
      const pageSize = 50;

      initSupabase();

      function initSupabase() {
        if (!window.supabaseConfig) {
          alert("Supabase config missing");
          return;
        }

        supabaseClient = supabase.createClient(
          supabaseConfig.url,
          supabaseConfig.anon,
        );

        loadTables();
      }

      async function loadTables() {
        const { data, error } = await supabaseClient.rpc("get_tables");

        if (error) {
          console.error(error);
          return;
        }

        const select = document.getElementById("tableSelect");

        select.innerHTML = "";

        data.forEach((t) => {
          const opt = document.createElement("option");
          opt.value = t.table_name;
          opt.textContent = t.table_name;

          select.appendChild(opt);
        });

        currentTable = data[0].table_name;

        select.onchange = () => {
          currentTable = select.value;
          page = 0;
          loadTable();
        };

        loadTable();
      }

      async function loadTable() {
        const search = document.getElementById("searchInput").value;

        let query = supabaseClient
          .from(currentTable)
          .select("*")
          .range(page * pageSize, (page + 1) * pageSize - 1);

        const { data, error } = await query;

        if (error) {
          console.error(error);
          return;
        }

        renderTable(data);
      }

      function renderTable(rows) {
        const head = document.getElementById("tableHead");
        const body = document.getElementById("tableBody");

        head.innerHTML = "";
        body.innerHTML = "";

        if (!rows.length) return;

        const columns = Object.keys(rows[0]);

        columns.forEach((c) => {
          const th = document.createElement("th");
          th.textContent = c;
          head.appendChild(th);
        });

        const act = document.createElement("th");
        act.textContent = "Action";
        head.appendChild(act);

        rows.forEach((r) => {
          const tr = document.createElement("tr");

          columns.forEach((c) => {
            const td = document.createElement("td");
            td.textContent = r[c];
            tr.appendChild(td);
          });

          const td = document.createElement("td");
          td.className = "db-actions";

          td.innerHTML = `
<button onclick='editRow(${JSON.stringify(r)})'>✏️</button>
<button onclick='deleteRow("${r.id || r.product_id || ""}")'>🗑</button>
`;

          tr.appendChild(td);

          body.appendChild(tr);
        });
      }

      async function deleteRow(id) {
        if (!confirm("ลบข้อมูล ?")) return;

        const pk = await getPrimaryKey();

        const { error } = await supabaseClient
          .from(currentTable)
          .delete()
          .eq(pk, id);

        if (error) {
          alert(error.message);
          return;
        }

        loadTable();
      }

      async function editRow(row) {
        const json = prompt("แก้ไข JSON", JSON.stringify(row));

        if (!json) return;

        let data;

        try {
          data = JSON.parse(json);
        } catch {
          alert("JSON ผิด");
          return;
        }

        const pk = await getPrimaryKey();

        const { error } = await supabaseClient
          .from(currentTable)
          .update(data)
          .eq(pk, row[pk]);

        if (error) {
          alert(error.message);
          return;
        }

        loadTable();
      }

      async function insertRow() {
        const json = prompt("เพิ่ม JSON");

        if (!json) return;

        let data;

        try {
          data = JSON.parse(json);
        } catch {
          alert("JSON ผิด");
          return;
        }

        const { error } = await supabaseClient.from(currentTable).insert(data);

        if (error) {
          alert(error.message);
          return;
        }

        loadTable();
      }

      async function getPrimaryKey() {
        if (currentTable === "products") return "product_id";

        return "id";
      }

      function nextPage() {
        page++;
        loadTable();
      }

      function prevPage() {
        if (page === 0) return;

        page--;
        loadTable();
      }
    </script>
  </body>
</html>
