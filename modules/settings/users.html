<!doctype html>
<html lang="th">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>จัดการผู้ใช้งาน — A4S-ERP</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="../../css/main.css" />
    <link rel="stylesheet" href="./users.css" />
  </head>
  <body>
    <div class="loading-overlay" id="loadingOverlay">
      <div class="spinner"></div>
    </div>
    <div class="toast" id="toast"></div>

    <!-- TOPBAR -->
    <div class="topbar"></div>

    <div class="layout">
      <!-- SIDEBAR -->
      <div id="sidebar-container"></div>

      <!-- CONTENT -->
      <div class="content-area">
        <div class="page">

          <!-- STATS -->
          <div class="stats-row">
            <div class="stat-card">
              <div class="stat-icon" style="background:#e0f2fe;color:#0369a1">👥</div>
              <div>
                <div class="stat-value" id="statTotal">—</div>
                <div class="stat-label">ผู้ใช้ทั้งหมด</div>
              </div>
            </div>
            <div class="stat-card">
              <div class="stat-icon" style="background:var(--warning-pale);color:var(--warning)">👑</div>
              <div>
                <div class="stat-value" id="statAdmin" style="color:var(--warning)">—</div>
                <div class="stat-label">Admin</div>
              </div>
            </div>
            <div class="stat-card">
              <div class="stat-icon" style="background:var(--accent-pale);color:var(--accent)">🏢</div>
              <div>
                <div class="stat-value" id="statManager" style="color:var(--accent)">—</div>
                <div class="stat-label">Manager</div>
              </div>
            </div>
            <div class="stat-card">
              <div class="stat-icon" style="background:var(--success-pale);color:var(--success)">✅</div>
              <div>
                <div class="stat-value" id="statActive" style="color:var(--success)">—</div>
                <div class="stat-label">ใช้งาน</div>
              </div>
            </div>
            <div class="stat-card">
              <div class="stat-icon" style="background:var(--danger-pale);color:var(--danger)">❌</div>
              <div>
                <div class="stat-value" id="statInactive" style="color:var(--danger)">—</div>
                <div class="stat-label">ปิดใช้งาน</div>
              </div>
            </div>
          </div>

          <!-- TABLE CARD -->
          <div class="table-card">

            <!-- TOOLBAR -->
            <div class="toolbar">
              <div class="search-wrap">
                <span class="search-icon">🔍</span>
                <input class="search-input" id="searchInput" placeholder="ค้นหาชื่อ, username, อีเมล..." oninput="filterTable()" />
              </div>
              <select class="filter-select" id="filterRole" onchange="filterTable()">
                <option value="">ทุก Role</option>
              </select>
              <select class="filter-select" id="filterStatus" onchange="filterTable()">
                <option value="">ทุกสถานะ</option>
                <option value="true">ใช้งาน</option>
                <option value="false">ปิดใช้งาน</option>
              </select>
              <div class="toolbar-right">
                <button class="btn btn-outline" onclick="loadData()">🔄 รีเฟรช</button>
                <button class="btn btn-primary" data-perm="users_create" onclick="openModal()">＋ เพิ่มผู้ใช้</button>
              </div>
            </div>

            <!-- TABLE HEADER -->
            <div class="table-hdr">
              <span class="table-title">รายชื่อผู้ใช้งาน</span>
              <span class="table-count" id="tableCount">0 รายการ</span>
            </div>

            <!-- TABLE -->
            <div class="table-wrap">
              <table class="data-table usr-table">
                <thead>
                  <tr>
                    <th onclick="sortBy('full_name')" style="cursor:pointer">ชื่อ-นามสกุล <span class="sort-icon">⇅</span></th>
                    <th onclick="sortBy('username')" style="cursor:pointer">Username <span class="sort-icon">⇅</span></th>
                    <th onclick="sortBy('role')" style="cursor:pointer">Role <span class="sort-icon">⇅</span></th>
                    <th>อีเมล</th>
                    <th class="col-center">สถานะ</th>
                    <th class="col-center">จัดการ</th>
                  </tr>
                </thead>
                <tbody id="tableBody">
                  <tr>
                    <td colspan="5">
                      <div class="empty-state">
                        <div class="empty-icon">👥</div>
                        <div class="empty-text">กำลังโหลด...</div>
                      </div>
                    </td>
                  </tr>
                </tbody>
              </table>
            </div>

          </div>
          <!-- end .table-card -->

        </div>
        <!-- end .page -->

        <!-- SCRIPTS -->
        <script src="../../js/core/permissions.js"></script>
        <script src="../../js/core/auth.js"></script>
        <script src="../../js/core/authz.js"></script>
        <script>AuthZ.requirePerm("users_view");</script>
        <script src="./users.js"></script>
        <script src="../../js/components/modal/deleteModal.js"></script>
        <script src="../../js/components/modal/modalManager.js"></script>
        <script src="../../js/components/modal/enterSave.js"></script>
        <script type="module">
          import { loadTopbar } from "../../js/components/navigation/topbar.js";
          loadTopbar("👤 จัดการผู้ใช้งาน");
        </script>
        <script src="../../js/components/navigation/imgPopup.js"></script>
        <script src="../../js/components/navigation/sidebar.js"></script>
      </div>
    </div>

    <!-- EDIT MODAL -->
    <div class="modal-overlay" id="modalOverlay" onclick="closeModalBg(event)">
      <div class="modal" style="width:640px;max-height:90vh;display:flex;flex-direction:column">
        <div class="modal-hdr">
          <div class="modal-title" id="modalTitle">เพิ่มผู้ใช้งานใหม่</div>
          <button class="btn-modal-close" onclick="closeModal()">✕</button>
        </div>
        <div class="modal-body" style="flex:1;overflow-y:auto;min-height:0">
          <input type="hidden" id="editId" />
          <div class="form-grid">
            <div class="form-group" style="grid-column:span 2">
              <label class="form-label">ชื่อ-นามสกุล <span class="req">*</span></label>
              <input class="form-control" id="fFullName" placeholder="ชื่อ นามสกุล" />
            </div>
            <div class="form-group">
              <label class="form-label">รหัสพนักงาน <span class="req">*</span></label>
              <input class="form-control" id="fUserCode" placeholder="EMP001" style="font-family:'IBM Plex Mono',monospace;text-transform:uppercase" />
            </div>
            <div class="form-group">
              <label class="form-label">Username <span class="req">*</span></label>
              <input class="form-control" id="fUsername" placeholder="username" style="font-family:'IBM Plex Mono',monospace" />
            </div>
            <div class="form-group">
              <label class="form-label">รหัสผ่าน <span class="req" id="pwdReq">*</span></label>
              <div class="input-with-btn">
                <input class="form-control" id="fPassword" type="password" placeholder="รหัสผ่าน" autocomplete="new-password" />
                <button type="button" class="btn-eye" onclick="toggleEye('fPassword','eyeIcon1')" tabindex="-1"><span id="eyeIcon1">👁</span></button>
              </div>
              <div class="form-hint" id="pwdHint" style="display:none">เว้นว่างไว้ถ้าไม่ต้องการเปลี่ยนรหัสผ่าน</div>
            </div>
            <div class="form-group">
              <label class="form-label">ยืนยันรหัสผ่าน <span class="req" id="pwdConfirmReq">*</span></label>
              <div class="input-with-btn">
                <input class="form-control" id="fPasswordConfirm" type="password" placeholder="ยืนยันรหัสผ่าน" autocomplete="new-password" />
                <button type="button" class="btn-eye" onclick="toggleEye('fPasswordConfirm','eyeIcon2')" tabindex="-1"><span id="eyeIcon2">👁</span></button>
              </div>
            </div>
            <div class="form-group">
              <label class="form-label">อีเมล</label>
              <input class="form-control" id="fEmail" type="email" placeholder="user@company.com" />
            </div>
            <div class="form-group">
              <label class="form-label">เบอร์โทร</label>
              <input class="form-control" id="fPhone" placeholder="0x-xxxx-xxxx" />
            </div>
            <div class="form-group">
              <label class="form-label">สถานะ</label>
              <select class="form-control" id="fStatus">
                <option value="true">✅ ใช้งาน</option>
                <option value="false">❌ ปิดใช้งาน</option>
              </select>
            </div>
            <div class="form-section">🔐 Role & สิทธิ์การใช้งาน</div>
            <div class="form-group full">
              <label class="form-label">Role <span class="req">*</span></label>
              <select class="form-control" id="fRole" onchange="onRoleChange()"></select>
            </div>
            <div class="perm-section-header">
              <span class="perm-section-title">สิทธิ์การใช้งาน</span>
              <div class="perm-legend">
                <span class="legend-item legend-role">✓ จาก Role</span>
                <span class="legend-item legend-custom">✓ เพิ่มเติม</span>
                <span class="legend-item legend-off">☐ คลิกเพิ่ม</span>
              </div>
            </div>
            <div class="perm-toggle-grid" id="permToggles"></div>
          </div>
        </div>
        <div class="modal-footer">
          <button class="btn btn-outline" onclick="closeModal()">ยกเลิก</button>
          <button class="btn btn-primary" onclick="saveUser()">💾 บันทึก</button>
        </div>
      </div>
    </div>



  </body>
</html>
