<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>กฎแจ้งเตือน LINE — A4S-ERP</title>
<link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../../css/main.css">
<style>
.page{padding:20px 24px;max-width:1280px;margin:0 auto;}
.page-header{display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap;margin-bottom:18px;}
.page-title{font-size:20px;font-weight:700;display:flex;align-items:center;gap:10px;color:var(--text);}
.page-subtitle{font-size:12.5px;color:var(--text3);margin-top:2px;}

.btn-primary{padding:9px 16px;background:linear-gradient(135deg,#06c755,#0ea5e9);color:#fff;border:none;border-radius:10px;font-weight:600;font-size:13px;cursor:pointer;display:inline-flex;align-items:center;gap:6px;}
.btn-primary:hover{filter:brightness(1.08);}
.btn-ghost{padding:8px 12px;background:var(--surface);color:var(--text2);border:1px solid var(--border);border-radius:8px;font-weight:600;font-size:12.5px;cursor:pointer;}
.btn-ghost:hover{background:var(--surface2);}

.nr-table-wrap{background:var(--surface);border:1px solid var(--border);border-radius:12px;overflow:hidden;}
.nr-table{width:100%;border-collapse:collapse;font-size:13px;}
.nr-table th{padding:11px 12px;background:var(--surface2);font-size:11px;font-weight:700;letter-spacing:.5px;color:var(--text3);text-align:left;border-bottom:2px solid var(--border);text-transform:uppercase;white-space:nowrap;}
.nr-table td{padding:10px 12px;border-bottom:1px solid var(--border);vertical-align:middle;}
.nr-table tr:hover td{background:var(--accent-pale);}
.nr-table tr:last-child td{border-bottom:none;}

.nr-name{font-weight:600;color:var(--text);}
.nr-trigger-chip{display:inline-block;padding:3px 9px;border-radius:8px;font-size:11px;font-weight:700;font-family:'IBM Plex Mono',monospace;background:#dbeafe;color:#1e40af;}
.nr-target-chip{display:inline-block;padding:3px 8px;border-radius:8px;font-size:11px;font-weight:600;background:var(--surface2);color:var(--text2);margin-right:4px;}
.nr-target-type{display:inline-block;padding:2px 7px;border-radius:6px;font-size:10px;font-weight:700;background:#fef3c7;color:#92400e;text-transform:uppercase;margin-right:6px;}

.nr-toggle{position:relative;display:inline-block;width:38px;height:22px;}
.nr-toggle input{opacity:0;width:0;height:0;}
.nr-toggle-slider{position:absolute;cursor:pointer;top:0;left:0;right:0;bottom:0;background:#cbd5e1;border-radius:22px;transition:.2s;}
.nr-toggle-slider:before{content:'';position:absolute;height:16px;width:16px;left:3px;bottom:3px;background:#fff;border-radius:50%;transition:.2s;}
.nr-toggle input:checked + .nr-toggle-slider{background:#06c755;}
.nr-toggle input:checked + .nr-toggle-slider:before{transform:translateX(16px);}

.nr-row-actions{display:flex;gap:6px;justify-content:flex-end;}
.btn-icon{width:30px;height:30px;border-radius:8px;border:1px solid var(--border);background:var(--surface);cursor:pointer;display:inline-flex;align-items:center;justify-content:center;font-size:14px;color:var(--text2);}
.btn-icon:hover{background:var(--accent-pale);border-color:var(--accent);color:var(--accent);}
.btn-icon.btn-danger:hover{background:#fef2f2;border-color:#dc2626;color:#dc2626;}

.nr-empty{text-align:center;padding:50px 20px;color:var(--text3);}
.nr-empty-icon{font-size:42px;opacity:.4;margin-bottom:8px;}

/* Modal */
.nr-modal{display:none;position:fixed;inset:0;background:rgba(15,23,42,.5);z-index:200;align-items:center;justify-content:center;padding:20px;}
.nr-modal.open{display:flex;}
.nr-modal-card{background:var(--surface);border-radius:14px;width:100%;max-width:680px;max-height:92vh;display:flex;flex-direction:column;overflow:hidden;}
.nr-modal-head{padding:16px 22px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;}
.nr-modal-title{font-size:16px;font-weight:700;color:var(--text);}
.nr-modal-close{background:transparent;border:none;font-size:22px;cursor:pointer;color:var(--text3);}
.nr-modal-body{padding:18px 22px;overflow-y:auto;flex:1;}
.nr-modal-foot{padding:12px 22px;border-top:1px solid var(--border);display:flex;align-items:center;gap:8px;}
#nrTestBtn{background:#fffbeb;border-color:#fde68a;color:#92400e;}
#nrTestBtn:hover{background:#fef3c7;border-color:#f59e0b;color:#713f12;}
#nrTestBtn:disabled{opacity:.5;cursor:not-allowed;}

.nr-field{margin-bottom:14px;}
.nr-field label{display:block;font-size:11.5px;font-weight:700;color:var(--text3);margin-bottom:6px;text-transform:uppercase;letter-spacing:.3px;}
.nr-field input[type=text],.nr-field select,.nr-field textarea{width:100%;box-sizing:border-box;padding:9px 12px;border:1px solid var(--border);border-radius:8px;font-family:inherit;font-size:13px;background:var(--surface);color:var(--text);}
.nr-field textarea{min-height:130px;resize:vertical;font-family:inherit;line-height:1.6;}
.nr-row-2{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
@media(max-width:560px){.nr-row-2{grid-template-columns:1fr;}}

.nr-radio-group{display:flex;gap:8px;flex-wrap:wrap;}
.nr-radio{flex:1;min-width:80px;padding:8px 10px;border:1.5px solid var(--border);border-radius:8px;cursor:pointer;text-align:center;font-size:12.5px;font-weight:600;color:var(--text2);user-select:none;transition:.15s;}
.nr-radio:hover{border-color:var(--accent);}
.nr-radio input{display:none;}
.nr-radio.checked{border-color:#06c755;background:#dcfce7;color:#15803d;}

.nr-target-picker{max-height:220px;overflow-y:auto;border:1px solid var(--border);border-radius:8px;padding:8px;background:var(--surface2);}
.nr-pick-item{display:flex;align-items:center;gap:8px;padding:6px 8px;border-radius:6px;cursor:pointer;font-size:13px;}
.nr-pick-item:hover{background:var(--surface);}
.nr-pick-item input{cursor:pointer;}
.nr-pick-meta{font-size:11px;color:var(--text3);margin-left:auto;}
.nr-pick-line{display:inline-block;width:7px;height:7px;border-radius:50%;background:#06c755;margin-left:6px;}

.nr-tags-wrap-outer{position:relative;}
.nr-tags-wrap{display:flex;flex-wrap:wrap;gap:6px;padding:8px;border:1px solid var(--border);border-radius:8px;background:var(--surface2);min-height:42px;align-items:center;}
.nr-tag{display:inline-flex;align-items:center;gap:6px;background:#dbeafe;color:#1e40af;padding:3px 10px;border-radius:999px;font-size:12px;font-weight:600;}
.nr-tag-remove{cursor:pointer;font-size:14px;line-height:1;opacity:.6;}
.nr-tag-remove:hover{opacity:1;}
.nr-tags-input{flex:1;min-width:120px;border:none;outline:none;background:transparent;font-family:inherit;font-size:13px;padding:4px;color:var(--text);}

/* Custom dropdown (แทน <datalist> native ที่สไตล์ไม่ได้) */
.nr-suggest{position:absolute;left:0;right:0;top:calc(100% + 4px);background:var(--surface);border:1px solid var(--border);border-radius:8px;box-shadow:0 8px 24px rgba(15,23,42,.12);max-height:180px;overflow-y:auto;z-index:10;display:none;}
.nr-suggest.open{display:block;}
.nr-suggest-item{padding:8px 12px;font-size:13px;color:var(--text);cursor:pointer;display:flex;align-items:center;justify-content:space-between;gap:8px;}
.nr-suggest-item:hover,.nr-suggest-item.active{background:var(--accent-pale);color:var(--accent);}
.nr-suggest-item .meta{font-size:11px;color:var(--text3);}
.nr-suggest-empty{padding:10px 12px;font-size:12.5px;color:var(--text3);font-style:italic;text-align:center;}
.nr-suggest-hint{padding:6px 12px;font-size:11px;color:var(--text3);border-top:1px solid var(--border);background:var(--surface2);}
.nr-suggest-hint kbd{background:var(--surface);border:1px solid var(--border);border-radius:4px;padding:1px 6px;font-size:10.5px;font-family:'IBM Plex Mono',monospace;}

.nr-placeholder-bar{display:flex;flex-wrap:wrap;gap:6px;margin-top:6px;}
.nr-ph{display:inline-block;padding:3px 10px;border-radius:999px;font-size:11px;font-weight:600;background:#fef3c7;color:#92400e;cursor:pointer;font-family:'IBM Plex Mono',monospace;border:1px dashed #fcd34d;}
.nr-ph:hover{background:#fcd34d;color:#713f12;}

.nr-preview{margin-top:10px;padding:12px 14px;background:#f0fdf4;border:1px dashed #86efac;border-radius:8px;font-size:12.5px;color:#166534;line-height:1.7;white-space:pre-wrap;display:none;}
.nr-preview.show{display:block;}

.nr-hint{font-size:11.5px;color:var(--text3);margin-top:4px;line-height:1.5;}
</style>
</head>
<body>

<div class="loading-overlay" id="loadingOverlay"><div class="spinner"></div></div>
<div class="toast" id="toast"></div>

<div class="topbar"></div>

<div class="layout">
  <div id="sidebar-container"></div>

  <div class="content-area">
    <div class="page">

      <div class="page-header">
        <div>
          <div class="page-title">🔔 กฎแจ้งเตือน LINE</div>
          <div class="page-subtitle">ตั้งค่าให้ส่ง LINE อัตโนมัติเมื่อมี Event/Booking ถูกอนุมัติ</div>
        </div>
        <div style="display:flex;gap:8px;">
          <a href="./staff-groups.html" class="btn-ghost">👥 จัดการกลุ่มพนักงาน</a>
          <button class="btn-primary" onclick="openRuleModal(null)">➕ เพิ่มกฎ</button>
        </div>
      </div>

      <div class="nr-table-wrap">
        <table class="nr-table">
          <thead>
            <tr>
              <th>ชื่อกฎ</th>
              <th>Trigger</th>
              <th>Target</th>
              <th>Channel</th>
              <th style="width:60px;text-align:center;">เปิด</th>
              <th style="width:130px;text-align:right;">จัดการ</th>
            </tr>
          </thead>
          <tbody id="nrTbody">
            <tr><td colspan="6" class="nr-empty"><div class="nr-empty-icon">⏳</div>กำลังโหลด...</td></tr>
          </tbody>
        </table>
      </div>

    </div>
  </div>
</div>

<!-- Edit Modal -->
<div class="nr-modal" id="nrModal">
  <div class="nr-modal-card">
    <div class="nr-modal-head">
      <div class="nr-modal-title" id="nrModalTitle">เพิ่มกฎแจ้งเตือน</div>
      <button class="nr-modal-close" onclick="closeRuleModal()">×</button>
    </div>
    <div class="nr-modal-body">
      <div class="nr-field">
        <label>ชื่อกฎ *</label>
        <input type="text" id="fRuleName" placeholder="เช่น แจ้งทีม Event เมื่อมี request approve">
      </div>

      <div class="nr-row-2">
        <div class="nr-field">
          <label>Trigger *</label>
          <select id="fTrigger" onchange="onTriggerChange()"></select>
        </div>
        <div class="nr-field">
          <label>Channel</label>
          <select id="fChannel">
            <option value="">— ใช้ default (announcement) —</option>
          </select>
        </div>
      </div>

      <div class="nr-field">
        <label>ส่งหา (Target Type) *</label>
        <div class="nr-radio-group" id="fTargetTypeGroup">
          <label class="nr-radio" data-type="role"><input type="radio" name="ttype" value="role">🎭 Role</label>
          <label class="nr-radio" data-type="group"><input type="radio" name="ttype" value="group">👥 Group</label>
          <label class="nr-radio" data-type="user"><input type="radio" name="ttype" value="user">👤 User</label>
        </div>
        <div class="nr-hint" id="fTargetHint"></div>
      </div>

      <div class="nr-field">
        <label>เลือก Target *</label>
        <div id="fTargetPickerWrap"></div>
      </div>

      <div class="nr-field">
        <label>ข้อความ (รองรับ <code>{{placeholder}}</code>) *</label>
        <textarea id="fTemplate" placeholder="เช่น&#10;✅ {{event_name}} อนุมัติแล้ว&#10;📅 {{event_date}}"></textarea>
        <div class="nr-placeholder-bar" id="fPlaceholders"></div>
        <button type="button" class="btn-ghost" style="margin-top:8px;" onclick="togglePreview()">👁️ ดูตัวอย่าง</button>
        <div class="nr-preview" id="fPreview"></div>
      </div>

      <div class="nr-field">
        <label style="display:flex;align-items:center;gap:8px;cursor:pointer;">
          <input type="checkbox" id="fActive" checked>
          เปิดใช้งานทันที (is_active)
        </label>
      </div>
    </div>
    <div class="nr-modal-foot">
      <button class="btn-ghost" id="nrTestBtn" onclick="testSendRule()" title="ส่งทดสอบไปที่ LINE ของคุณเอง ด้วย sample data">🧪 ทดสอบส่ง (หาฉัน)</button>
      <div style="flex:1;"></div>
      <button class="btn-ghost" onclick="closeRuleModal()">ยกเลิก</button>
      <button class="btn-primary" id="nrSaveBtn" onclick="saveRule()">💾 บันทึก</button>
    </div>
  </div>
</div>

<script src="../../js/core/auth.js"></script>
<script src="../../js/core/authz.js"></script>
<script src="../../js/core/crypto.js"></script>
<script src="../../js/core/line.js"></script>
<script src="../../js/core/notify.js"></script>
<script>AuthZ.requirePerm("sys_settings_view");</script>
<script src="./notification-rules.js"></script>
<script type="module">
  import { loadTopbar } from "../../js/components/navigation/topbar.js";
  loadTopbar("🔔 กฎแจ้งเตือน LINE");
</script>
<script src="../../js/components/navigation/sidebar.js"></script>
<script src="../../js/components/modal/modalManager.js"></script>
<script src="../../js/components/modal/confirmModal.js"></script>
</body>
</html>
