<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>จัดการกลุ่มพนักงาน — A4S-ERP</title>
<link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../../css/main.css">
<style>
.page{padding:20px 24px;max-width:1280px;margin:0 auto;}
.page-header{display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap;margin-bottom:18px;}
.page-title{font-size:20px;font-weight:700;display:flex;align-items:center;gap:10px;color:var(--text);}
.page-subtitle{font-size:12.5px;color:var(--text3);margin-top:2px;}

.btn-primary{padding:9px 16px;background:linear-gradient(135deg,#06c755,#0ea5e9);color:#fff;border:none;border-radius:10px;font-weight:600;font-size:13px;cursor:pointer;display:inline-flex;align-items:center;gap:6px;}
.btn-primary:hover{filter:brightness(1.08);}
.btn-primary:disabled{opacity:.5;cursor:not-allowed;filter:none;}
.btn-ghost{padding:8px 12px;background:var(--surface);color:var(--text2);border:1px solid var(--border);border-radius:8px;font-weight:600;font-size:12.5px;cursor:pointer;text-decoration:none;display:inline-flex;align-items:center;gap:6px;}
.btn-ghost:hover{background:var(--surface2);}

.sg-toolbar{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:10px 14px;display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-bottom:12px;}
.sg-search{flex:1;min-width:220px;display:flex;align-items:center;background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:0 12px;}
.sg-search input{border:none;background:transparent;padding:9px 6px;flex:1;outline:none;font-family:inherit;font-size:13px;}
.sg-filter{padding:8px 12px;border:1px solid var(--border);border-radius:10px;font-family:inherit;font-size:13px;background:var(--surface);}

.sg-bulkbar{background:#dcfce7;border:1px solid #86efac;border-radius:10px;padding:10px 14px;display:flex;align-items:center;gap:10px;margin-bottom:12px;flex-wrap:wrap;}
.sg-bulkbar input{padding:7px 11px;border:1px solid #86efac;border-radius:8px;font-family:inherit;font-size:13px;}
.sg-bulkbar .count{font-weight:700;color:#15803d;}

.sg-table-wrap{background:var(--surface);border:1px solid var(--border);border-radius:12px;overflow:hidden;}
.sg-table{width:100%;border-collapse:collapse;font-size:13px;}
.sg-table th{padding:10px 12px;background:var(--surface2);font-size:11px;font-weight:700;letter-spacing:.5px;color:var(--text3);text-align:left;border-bottom:2px solid var(--border);text-transform:uppercase;white-space:nowrap;}
.sg-table td{padding:9px 12px;border-bottom:1px solid var(--border);vertical-align:middle;}
.sg-table tr:hover td{background:var(--accent-pale);}
.sg-table tr.selected td{background:#eff6ff;}
.sg-table tr:last-child td{border-bottom:none;}

.sg-name{font-weight:600;color:var(--text);}
.sg-username{font-family:'IBM Plex Mono',monospace;font-size:12px;color:var(--text2);}
.sg-role{display:inline-block;padding:2px 8px;border-radius:8px;font-size:10.5px;font-weight:700;background:var(--surface2);color:var(--text2);}
.sg-line{display:inline-flex;align-items:center;gap:4px;padding:2px 8px;border-radius:10px;font-size:10.5px;font-weight:700;background:#06c755;color:#fff;}
.sg-line-none{font-size:11px;color:var(--text3);font-style:italic;}

.sg-tags-cell{display:flex;flex-wrap:wrap;gap:5px;align-items:center;min-height:30px;}
.sg-tag{display:inline-flex;align-items:center;gap:5px;background:#dbeafe;color:#1e40af;padding:2px 9px;border-radius:999px;font-size:11.5px;font-weight:600;}
.sg-tag-remove{cursor:pointer;font-size:13px;line-height:1;opacity:.55;}
.sg-tag-remove:hover{opacity:1;color:#dc2626;}
.sg-add-btn{background:transparent;border:1px dashed var(--border);color:var(--text3);width:24px;height:24px;border-radius:50%;cursor:pointer;font-size:14px;line-height:1;display:inline-flex;align-items:center;justify-content:center;}
.sg-add-btn:hover{border-color:var(--accent);color:var(--accent);}
.sg-add-input{padding:3px 8px;border:1px solid var(--accent);border-radius:8px;font-family:inherit;font-size:12px;width:120px;}

.sg-empty{text-align:center;padding:50px 20px;color:var(--text3);}
.sg-empty-icon{font-size:42px;opacity:.4;margin-bottom:8px;}

.sg-side-panel{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:14px;}
.sg-side-title{font-size:13px;font-weight:700;color:var(--text);margin-bottom:10px;display:flex;align-items:center;justify-content:space-between;}
.sg-side-list{display:flex;flex-direction:column;gap:6px;}
.sg-side-row{display:flex;align-items:center;justify-content:space-between;gap:8px;padding:6px 10px;background:var(--surface2);border-radius:8px;font-size:12.5px;}
.sg-side-row .name{font-weight:600;color:var(--accent);}
.sg-side-row .count{color:var(--text3);font-size:11px;}

.sg-grid{display:grid;grid-template-columns:1fr 280px;gap:18px;align-items:start;}
@media(max-width:1024px){.sg-grid{grid-template-columns:1fr;}}

.sg-check{width:16px;height:16px;cursor:pointer;}
</style>
</head>
<body>

<div class="loading-overlay" id="loadingOverlay"><div class="spinner"></div></div>
<div class="toast" id="toast"></div>

<div class="topbar"></div>

<div class="layout">
  <div id="sidebar-container"></div>

  <div class="content-area">
    <div class="page">

      <div class="page-header">
        <div>
          <div class="page-title">👥 จัดการกลุ่มพนักงาน</div>
          <div class="page-subtitle">เพิ่ม/ลบกลุ่มของแต่ละพนักงาน — ใช้เป็น target ในกฎแจ้งเตือน LINE</div>
        </div>
        <a href="./notification-rules.html" class="btn-ghost">🔔 กฎแจ้งเตือน LINE →</a>
      </div>

      <div class="sg-grid">
        <div>

          <div class="sg-toolbar">
            <div class="sg-search">
              <span>🔍</span>
              <input type="text" id="sgSearch" placeholder="ค้นหา ชื่อ / username / กลุ่ม..." oninput="renderTable()">
            </div>
            <select class="sg-filter" id="sgFilterRole" onchange="renderTable()">
              <option value="">ทุก Role</option>
            </select>
            <select class="sg-filter" id="sgFilterGroup" onchange="renderTable()">
              <option value="">ทุกกลุ่ม</option>
            </select>
          </div>

          <div class="sg-bulkbar" id="sgBulkBar" style="display:none;">
            <span>เลือก <span class="count" id="sgBulkCount">0</span> คน — เพิ่มกลุ่มพร้อมกัน:</span>
            <input type="text" id="sgBulkGroup" placeholder="ชื่อกลุ่ม" list="sgGroupList">
            <datalist id="sgGroupList"></datalist>
            <button class="btn-primary" onclick="bulkAddGroup()">➕ เพิ่ม</button>
            <button class="btn-ghost" onclick="clearSelection()">ยกเลิก</button>
          </div>

          <div class="sg-table-wrap">
            <table class="sg-table">
              <thead>
                <tr>
                  <th style="width:30px"><input type="checkbox" id="sgCheckAll" class="sg-check" onchange="toggleAll(this.checked)"></th>
                  <th>ชื่อ-นามสกุล</th>
                  <th>Username</th>
                  <th>Role</th>
                  <th>LINE</th>
                  <th>กลุ่ม (Notification Groups)</th>
                </tr>
              </thead>
              <tbody id="sgTbody">
                <tr><td colspan="6" class="sg-empty"><div class="sg-empty-icon">⏳</div>กำลังโหลด...</td></tr>
              </tbody>
            </table>
          </div>
        </div>

        <aside>
          <div class="sg-side-panel">
            <div class="sg-side-title">
              📚 กลุ่มทั้งหมดในระบบ
              <span style="font-weight:400;color:var(--text3);font-size:11px;" id="sgGroupTotal">—</span>
            </div>
            <div class="sg-side-list" id="sgGroupSummary">
              <div style="color:var(--text3);font-size:12px;text-align:center;padding:10px;">ยังไม่มีกลุ่ม</div>
            </div>
          </div>
        </aside>
      </div>

    </div>
  </div>
</div>

<script src="../../js/core/auth.js"></script>
<script src="../../js/core/authz.js"></script>
<script>AuthZ.requirePerm("sys_settings_view");</script>
<script src="./staff-groups.js"></script>
<script type="module">
  import { loadTopbar } from "../../js/components/navigation/topbar.js";
  loadTopbar("👥 จัดการกลุ่มพนักงาน");
</script>
<script src="../../js/components/navigation/sidebar.js"></script>
<script src="../../js/components/modal/modalManager.js"></script>
<script src="../../js/components/modal/confirmModal.js"></script>
</body>
</html>
