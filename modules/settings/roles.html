<!doctype html>
<html lang="th">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>จัดการ Role & สิทธิ์ — A4S-ERP</title>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="../../css/main.css" />
    <link rel="stylesheet" href="./roles.css" />
  </head>
  <body>
    <div class="loading-overlay" id="loadingOverlay"><div class="spinner"></div></div>
    <div class="toast" id="toast"></div>

    <div class="topbar"></div>

    <div class="layout">
      <div id="sidebar-container"></div>

      <div class="content-area">
        <div class="page">

          <!-- SPLIT LAYOUT -->
          <div class="roles-layout">

            <!-- LEFT: Role List -->
            <div class="roles-sidebar">
              <div class="roles-sidebar-hdr">
                <span class="roles-sidebar-title">Role ทั้งหมด</span>
                <button class="btn btn-primary btn-sm" data-perm="roles_create" onclick="openAddRole()">＋ เพิ่ม</button>
              </div>
              <div class="role-list" id="roleList">
                <div class="empty-state"><div class="empty-icon">⚙️</div><div>กำลังโหลด...</div></div>
              </div>
            </div>

            <!-- RIGHT: Permission Tree -->
            <div class="roles-panel" id="rolesPanel">
              <div class="roles-panel-empty" id="panelEmpty">
                <div style="font-size:40px">🔐</div>
                <div style="font-size:14px;color:var(--text3);margin-top:8px">เลือก Role เพื่อจัดการสิทธิ์</div>
              </div>

              <div class="roles-panel-content" id="panelContent" style="display:none">
                <div class="roles-panel-hdr">
                  <div>
                    <div class="panel-role-name" id="panelTitle">—</div>
                    <div class="panel-role-meta" id="panelMeta">—</div>
                  </div>
                  <button class="btn btn-primary" data-perm="roles_edit" onclick="saveRole()">💾 บันทึก</button>
                </div>

                <!-- Search -->
                <div class="perm-search-wrap">
                  <span class="search-icon">🔍</span>
                  <input class="search-input perm-search" id="permSearch" placeholder="ค้นหาสิทธิ์..." oninput="filterTree()" />
                </div>

                <!-- Select All -->
                <div class="perm-select-all-row">
                  <label class="perm-select-all-label" onclick="toggleAll()">
                    <div class="tree-cb mod-cb" id="cbAll"></div>
                    <span>เลือก / ยกเลิก ทั้งหมด</span>
                  </label>
                  <span class="perm-total-count" id="totalCount">0 สิทธิ์</span>
                </div>

                <!-- Permission Tree -->
                <div class="perm-tree" id="permTree"></div>
              </div>
            </div>

          </div>
        </div>

        <script src="../../js/core/permissions.js"></script>
        <script src="../../js/core/auth.js"></script>
        <script src="../../js/core/authz.js"></script>
        <script>AuthZ.requirePerm("roles_view");</script>
        <script src="./roles.js"></script>
        <script src="../../js/components/modal/deleteModal.js"></script>
        <script src="../../js/components/modal/modalManager.js"></script>
        <script type="module">
          import { loadTopbar } from "../../js/components/navigation/topbar.js";
          loadTopbar("🔐 จัดการ Role & สิทธิ์");
        </script>
        <script src="../../js/components/navigation/sidebar.js"></script>
      </div>
    </div>

    <!-- ADD ROLE MODAL -->
    <div class="modal-overlay" id="addRoleOverlay" onclick="closeAddRoleBg(event)">
      <div class="modal add-role-modal">
        <div class="modal-hdr">
          <div class="modal-title">เพิ่ม Role ใหม่</div>
          <button class="btn-modal-close" onclick="closeAddRole()">✕</button>
        </div>
        <div class="modal-body">
          <div class="add-role-form">
            <div class="form-row">
              <div class="form-group" style="flex:1">
                <label class="form-label">ชื่อ Role <span class="req">*</span></label>
                <input class="form-control" id="newRoleLabel" placeholder="เช่น Staff" />
              </div>
              <div class="form-group" style="flex:1">
                <label class="form-label">สี (Color)</label>
                <select class="form-control" id="newRoleColor">
                  <optgroup label="— มาตรฐาน —">
                    <option value="role-ADMIN">🟡 ทอง (Admin)</option>
                    <option value="role-MANAGER">🔵 น้ำเงิน (Manager)</option>
                    <option value="role-WAREHOUSE">💠 ฟ้าน้ำทะเล</option>
                    <option value="role-SALES">🟢 เขียว (Sales)</option>
                    <option value="role-VIEWER" selected>⚪ เทา (Viewer)</option>
                  </optgroup>
                  <optgroup label="— โทนร้อน —">
                    <option value="role-red">🔴 แดง</option>
                    <option value="role-rose">🌹 กุหลาบ</option>
                    <option value="role-pink">🌸 ชมพู</option>
                    <option value="role-orange">🟠 ส้ม</option>
                    <option value="role-yellow">💛 เหลือง</option>
                  </optgroup>
                  <optgroup label="— โทนเย็น —">
                    <option value="role-lime">🟩 เขียวมะนาว</option>
                    <option value="role-emerald">🟢 มรกต</option>
                    <option value="role-cyan">🩵 ฟ้าครีม</option>
                    <option value="role-sky">🌤️ ฟ้าสด</option>
                    <option value="role-indigo">🟣 คราม</option>
                    <option value="role-purple">💜 ม่วง</option>
                  </optgroup>
                  <optgroup label="— โทนกลาง —">
                    <option value="role-slate">⚫ สเลท</option>
                  </optgroup>
                </select>
              </div>
            </div>
            <div class="form-group">
              <label class="form-label">Icon</label>
              <div class="icon-picker-wrap">
                <div class="icon-selected-row">
                  <div class="icon-preview" id="iconPreview">👤</div>
                  <input class="form-control icon-search" id="iconSearch" placeholder="🔍 ค้นหาไอคอน (เช่น user, home, star)..." oninput="searchIcons()" />
                </div>
                <div class="icon-picker" id="iconPicker"></div>
              </div>
              <input type="hidden" id="newRoleIcon" value="fluent-emoji-flat:bust-in-silhouette" />
            </div>
          </div>
        </div>
        <div class="modal-footer">
          <button class="btn btn-outline" onclick="closeAddRole()">ยกเลิก</button>
          <button class="btn btn-primary" onclick="saveNewRole()">สร้าง Role</button>
        </div>
      </div>
    </div>

  </body>
</html>
