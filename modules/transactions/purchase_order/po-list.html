<!doctype html>
<html lang="th">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>🧾 รายการใบสั่งซื้อ — A4S-ERP</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="../../../css/main.css" />
    <link rel="stylesheet" href="./po-list.css" />
  </head>
  <body>
    <div class="loading-overlay" id="loadingOverlay"><div class="spinner"></div></div>
    <div class="toast" id="toast"></div>

    <div class="topbar"></div>

    <div class="page">
      <div class="page-hero page-hero--simple page-hero--compact">
        <div>
          <h1 class="page-hero-title">🧾 รายการใบสั่งซื้อ</h1>
          <p class="page-hero-sub">ติดตามใบสั่งซื้อทั้งหมด ดูสถานะล่าสุด รับของ และเปิดรายละเอียดได้จากหน้าเดียว</p>
        </div>
        <div class="page-hero-actions">
          <button class="btn-on-hero btn-primary" data-perm="po_create" onclick="window.goToPOForm()">＋ สร้างใบสั่งซื้อ</button>
        </div>
      </div>

      <div class="stats-row">
        <div class="stat-card amber">
          <div class="stat-icon">🧾</div>
          <div class="stat-info">
            <div class="stat-label">ใบสั่งซื้อทั้งหมด</div>
            <div class="stat-value" id="cardTotal">0</div>
          </div>
        </div>
        <div class="stat-card purple">
          <div class="stat-icon">📝</div>
          <div class="stat-info">
            <div class="stat-label">Draft</div>
            <div class="stat-value" id="cardDraft">0</div>
          </div>
        </div>
        <div class="stat-card green">
          <div class="stat-icon">✅</div>
          <div class="stat-info">
            <div class="stat-label">รอรับของ</div>
            <div class="stat-value" id="cardApproved">0</div>
          </div>
        </div>
        <div class="stat-card blue">
          <div class="stat-icon">💰</div>
          <div class="stat-info">
            <div class="stat-label">มูลค่ารวม</div>
            <div class="stat-value" id="cardAmount">฿0</div>
          </div>
        </div>
      </div>

      <div class="table-card">
        <div class="table-toolbar">
          <div class="search-wrap" style="max-width:none;flex:1;">
            <span class="search-icon">🔍</span>
            <input
              class="search-input"
              id="searchInput"
              placeholder="ค้นหาเลขที่ PO, supplier, คลัง, หมายเหตุ..."
            />
          </div>
          <select class="filter-select" id="filterStatus">
            <option value="">🧿 ทุกสถานะ</option>
            <option value="DRAFT">📝 Draft</option>
            <option value="APPROVED">✅ อนุมัติแล้ว (รอรับของ)</option>
            <option value="RECEIVED">📦 รับของแล้ว</option>
            <option value="CANCELLED">⛔ ยกเลิก</option>
          </select>
          <select class="filter-select" id="filterSupplier">
            <option value="">🏭 ทุก Supplier</option>
          </select>
          <select class="filter-select" id="filterWarehouse">
            <option value="">🏬 ทุกคลัง</option>
          </select>
        </div>

        <div class="table-hdr">
          <div class="table-title">🧾 เอกสารใบสั่งซื้อ</div>
          <div class="table-count" id="poCount">0 รายการ</div>
        </div>

        <div class="table-wrap">
          <table class="data-table v-striped r-cards">
            <thead>
              <tr>
                <th>เลขที่ PO</th>
                <th>Supplier</th>
                <th class="col-center">คลัง</th>
                <th class="col-center">วันที่สั่ง</th>
                <th class="col-center">กำหนดรับ</th>
                <th class="col-center">รายการ</th>
                <th class="col-center">ยอดรวม</th>
                <th class="col-center">สถานะ</th>
                <th class="col-center" style="width:210px">จัดการ</th>
              </tr>
            </thead>
            <tbody id="poTableBody">
              <tr class="r-card-plain">
                <td colspan="9">
                  <div class="empty-state">
                    <div class="empty-state-icon">🧾</div>
                    <div class="empty-state-title">กำลังโหลดข้อมูล...</div>
                  </div>
                </td>
              </tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>

    <script src="../../../js/core/auth.js"></script>
    <script src="../../../js/core/authz.js"></script>
    <script src="../../../js/core/date-format.js"></script>
    <script>AuthZ.requirePerm("po_view");</script>
    <script src="./po-list.js"></script>
    <script type="module">
      import { loadTopbar } from "../../../js/components/navigation/topbar.js";
      loadTopbar("🧾 รายการใบสั่งซื้อ");
    </script>
    <script src="../../../js/components/navigation/sidebar.js"></script>
    <script src="../../../js/components/modal/confirmModal.js"></script>
    <script src="../../../js/components/modal/modalManager.js"></script>
  </body>
</html>
