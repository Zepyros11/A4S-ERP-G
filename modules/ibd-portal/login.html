<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>A4S — IBD Portal Login</title>
<link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="./portal-shared.css">
</head>
<body>

<div class="pp-main">
  <div class="pp-card" style="max-width:440px;margin:24px auto;">
    <div class="pp-card-head" style="text-align:center;background:#5fa825;color:#fff;border-bottom:3px solid #e53935;">
      <img src="../../assets/logo/logo-a4s.png" alt="A4S"
           style="height:64px;width:auto;background:#fff;border-radius:12px;padding:10px 14px;box-shadow:0 4px 14px rgba(0,0,0,.15);margin-bottom:14px;" />
      <div class="pp-card-title" id="lblTitle" style="color:#fff">Member Login</div>
      <div class="pp-card-sub" id="lblSub" style="color:rgba(255,255,255,.92)">Please enter your A4S Member ID and password to continue</div>
    </div>
    <div class="pp-card-body">
      <div class="pp-field">
        <label class="pp-label" id="lblMemberId">A4S Member ID <span class="req">*</span></label>
        <input type="text" id="memberCode" class="pp-input" placeholder="e.g. 10001" autocomplete="off" inputmode="numeric" />
      </div>
      <div class="pp-field">
        <label class="pp-label" id="lblPassword">Password <span class="req">*</span></label>
        <input type="password" id="password" class="pp-input" placeholder="" autocomplete="current-password" />
      </div>
      <button class="pp-btn" id="btnLogin" onclick="doLogin()">
        <span>🔐</span><span id="lblBtn">Sign In</span>
      </button>
    </div>
  </div>
</div>

<script src="./portal-config.js"></script>
<script src="../../js/core/crypto.js"></script>
<script src="./portal-shared.js"></script>
<script>
  // If already logged in → go home
  if (IBDPortal.getSession()) location.replace('./home.html');

  IBDPortal.renderTopbar({ showUser: false });

  // Apply translations
  document.title = `${IBDPortal.t('brand')} — ${IBDPortal.t('login_title')}`;
  document.getElementById('lblTitle').textContent = IBDPortal.t('login_title');
  document.getElementById('lblSub').textContent = IBDPortal.t('login_sub');
  document.getElementById('lblMemberId').innerHTML = IBDPortal.t('member_id') + ' <span class="req">*</span>';
  document.getElementById('lblPassword').innerHTML = IBDPortal.t('password') + ' <span class="req">*</span>';
  document.getElementById('lblBtn').textContent = IBDPortal.t('login_btn');

  async function doLogin() {
    const code = document.getElementById('memberCode').value.trim();
    const pass = document.getElementById('password').value;
    if (!code || !pass) { IBDPortal.toast(IBDPortal.t('required'), 'error'); return; }
    const btn = document.getElementById('btnLogin');
    btn.disabled = true;
    IBDPortal.showLoading(true);
    try {
      const member = await IBDPortal.loginMember(code, pass);
      IBDPortal.setSession(member, true);
      IBDPortal.toast('✓', 'success');
      setTimeout(() => location.href = './home.html', 250);
    } catch (e) {
      IBDPortal.toast(e.message, 'error');
      btn.disabled = false;
    } finally {
      IBDPortal.showLoading(false);
    }
  }

  // Enter to submit
  ['memberCode', 'password'].forEach(id => {
    document.getElementById(id).addEventListener('keydown', (e) => {
      if (e.key === 'Enter') doLogin();
    });
  });
</script>
</body>
</html>
