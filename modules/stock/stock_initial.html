<!doctype html>
<html lang="th">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Initial Stock — A4S ERP</title>

    <link
      href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="../../assets/css/main.css" />
  </head>

  <body>
    <div class="loading-overlay" id="loadingOverlay">
      <div class="spinner"></div>
    </div>

    <div class="toast" id="toast"></div>

    <!-- TOPBAR -->

    <div class="topbar">
      <div class="topbar-logo">📦 <span>A4S</span>-ERP</div>

      <div class="topbar-sep"></div>

      <div class="topbar-title">📦 ตั้งค่า Stock เริ่มต้น</div>

      <div class="topbar-actions">
        <button class="btn-topbar btn-ghost" onclick="loadData()">
          🔄 รีเฟรช
        </button>
      </div>
    </div>

    <div id="sidebar-container"></div>

    <!-- PAGE -->

    <div class="page">
      <div class="table-card">
        <!-- HEADER -->

        <div class="table-hdr">
          <div class="table-title">📦 Initial Stock</div>

          <div class="table-count" id="prodCount">0 รายการ</div>
        </div>

        <!-- SEARCH -->

        <div
          style="
            padding: 14px 18px;
            border-bottom: 1px solid var(--border);
            background: var(--surface2);
          "
        >
          <div style="max-width: 320px; position: relative">
            <span
              style="
                position: absolute;
                left: 10px;
                top: 50%;
                transform: translateY(-50%);
                font-size: 12px;
                color: var(--text3);
              "
            >
              🔍
            </span>

            <input
              class="form-control"
              style="padding-left: 30px"
              placeholder="ค้นหาสินค้า..."
              id="searchInput"
              oninput="filterTable()"
            />
          </div>
        </div>

        <!-- TABLE -->

        <div class="table-wrap">
          <table class="data-table table-products">
            <thead>
              <tr>
                <th style="width: 60px">ภาพ</th>

                <th style="width: 160px">SKU</th>

                <th>สินค้า</th>

                <th style="width: 200px">คลัง</th>

                <th class="col-right" style="width: 120px">Current</th>

                <th class="col-center" style="width: 160px">Set Stock</th>
              </tr>
            </thead>

            <tbody id="prodTableBody">
              <tr>
                <td colspan="6" class="table-empty">กำลังโหลดข้อมูล...</td>
              </tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>

    <!-- SCRIPTS -->

    <script src="../../shared/auth.js"></script>
    <script src="../../shared/sidebar.js"></script>

    <script src="stock_initial.js"></script>
  </body>
</html>
