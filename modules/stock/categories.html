<!doctype html>
<html lang="th">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>หมวดหมู่สินค้า — A4S ERP</title>

    <link
      href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />

    <link rel="stylesheet" href="../../assets/css/main.css" />
  </head>

  <body>
    <div class="loading-overlay" id="loadingOverlay">
      <div class="spinner"></div>
    </div>

    <div class="toast" id="toast"></div>

    <!-- TOPBAR -->

    <div class="topbar">
      <div class="topbar-logo">📦 <span>A4S</span>-ERP</div>

      <div class="topbar-sep"></div>

      <div class="topbar-title">🏷️ หมวดหมู่</div>
    </div>

    <div class="page">
      <!-- ========================= -->
      <!-- STATS -->
      <!-- ========================= -->

      <div class="stats-row">
        <div class="stat-card">
          <div class="stat-icon">🏷️</div>
          <div>
            <div class="stat-value" id="statTotal">0</div>
            <div class="stat-label">หมวดทั้งหมด</div>
          </div>
        </div>

        <div class="stat-card">
          <div class="stat-icon">📦</div>
          <div>
            <div class="stat-value" id="statUsed">0</div>
            <div class="stat-label">หมวดที่มีสินค้า</div>
          </div>
        </div>

        <div class="stat-card">
          <div class="stat-icon">📭</div>
          <div>
            <div class="stat-value" id="statEmpty">0</div>
            <div class="stat-label">หมวดว่าง</div>
          </div>
        </div>
      </div>

      <!-- ========================= -->
      <!-- TOOLBAR -->
      <!-- ========================= -->

      <div class="toolbar">
        <div class="search-wrap">
          <span class="search-icon">🔍</span>

          <input
            class="search-input"
            id="searchInput"
            placeholder="ค้นหาหมวดหมู่"
            oninput="renderTable()"
          />
        </div>

        <div class="toolbar-right">
          <button class="btn btn-primary" onclick="openModal()">
            ＋ เพิ่มหมวดหมู่
          </button>
        </div>
      </div>

      <!-- ========================= -->
      <!-- CONTENT ROW -->
      <!-- ========================= -->

      <div class="content-row">
        <!-- ========================= -->
        <!-- TABLE -->
        <!-- ========================= -->

        <div class="table-card">
          <div class="table-hdr">
            <div class="table-title">🏷️ หมวดหมู่</div>

            <div class="table-count" id="catCount">0 รายการ</div>
          </div>

          <div class="table-wrap">
            <table class="data-table table-categories">
              <thead>
                <tr>
                  <th style="width: 40px"></th>

                  <th>Icon</th>

                  <th onclick="sortTable('category_name')">
                    ชื่อหมวดหมู่
                    <span class="sort-icon" id="sort-category_name">⇅</span>
                  </th>

                  <th onclick="sortTable('sku_pattern')">
                    SKU
                    <span class="sort-icon" id="sort-sku_pattern">⇅</span>
                  </th>

                  <th onclick="sortTable('product_count')">
                    จำนวนสินค้า
                    <span class="sort-icon" id="sort-product_count">⇅</span>
                  </th>

                  <th class="col-center">จัดการ</th>
                </tr>
              </thead>

              <tbody id="catTable"></tbody>
            </table>
          </div>
        </div>

        <!-- ========================= -->
        <!-- SIDE PANEL -->
        <!-- ========================= -->

        <div class="side-panel" id="categoryPanel">
          <div class="panel-hdr">
            <div id="panelTitle">สินค้าในหมวด</div>

            <button class="btn-close" onclick="closeCategoryPanel()">✕</button>
          </div>

          <div class="panel-body">
            <div class="panel-search">
              <input
                id="panelSearch"
                placeholder="ค้นหาสินค้า..."
                oninput="filterCategoryProducts()"
              />
            </div>

            <div id="panelBody"></div>
          </div>
        </div>
      </div>
      <!-- END content-row -->
    </div>
    <!-- END page -->

    <script src="categories.js"></script>

    <script src="../../shared/auth.js"></script>
    <script src="../../shared/sidebar.js"></script>
  </body>
</html>
