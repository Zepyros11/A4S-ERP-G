<!doctype html>
<html lang="th">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>หมวดหมู่สินค้า — A4S-ERP</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="../../assets/css/common.css" />
    <style>
      /* ── Categories-specific ── */
      .cat-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
        gap: 16px;
        margin-bottom: 24px;
      }
      .cat-card {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: var(--radius);
        box-shadow: var(--shadow);
        overflow: hidden;
        transition: all 0.2s;
        cursor: pointer;
      }
      .cat-card:hover {
        transform: translateY(-2px);
        box-shadow: var(--shadow-lg);
      }
      .cat-card-top {
        padding: 18px 20px;
        display: flex;
        align-items: center;
        gap: 14px;
      }
      .cat-color {
        width: 46px;
        height: 46px;
        border-radius: 12px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 22px;
        flex-shrink: 0;
      }
      .cat-name {
        font-size: 15px;
        font-weight: 700;
        color: var(--text);
      }
      .cat-desc {
        font-size: 12px;
        color: var(--text3);
        margin-top: 3px;
      }
      .cat-card-foot {
        padding: 10px 20px;
        background: var(--surface2);
        border-top: 1px solid var(--border);
        display: flex;
        align-items: center;
        justify-content: space-between;
      }
      .cat-count {
        font-family: "IBM Plex Mono", monospace;
        font-size: 18px;
        font-weight: 700;
        color: var(--accent);
      }
      .cat-count-lbl {
        font-size: 11px;
        color: var(--text3);
      }
      .cat-actions {
        display: flex;
        gap: 6px;
      }
      .btn-sm {
        padding: 5px 10px;
        border-radius: 6px;
        font-size: 12px;
        font-family: "Sarabun", sans-serif;
        font-weight: 500;
        cursor: pointer;
        border: none;
        transition: all 0.15px;
        display: inline-flex;
        align-items: center;
        gap: 4px;
      }
      .btn-sm-edit {
        background: var(--accent-pale);
        color: var(--accent);
      }
      .btn-sm-edit:hover {
        background: #c7d7f5;
      }
      .btn-sm-del {
        background: var(--danger-pale);
        color: var(--danger);
        border: 1.5px solid #fca5a5;
      }
      .btn-sm-del:hover {
        background: #fee2e2;
      }
      .cat-add-card {
        background: var(--surface);
        border: 2px dashed var(--border2);
        border-radius: var(--radius);
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        min-height: 120px;
        cursor: pointer;
        transition: all 0.2s;
        color: var(--text3);
        gap: 8px;
      }
      .cat-add-card:hover {
        border-color: var(--accent);
        color: var(--accent);
        background: var(--accent-pale);
      }
      .cat-add-icon {
        font-size: 28px;
      }
      .cat-add-lbl {
        font-size: 13px;
        font-weight: 600;
      }
      .emoji-row {
        display: flex;
        flex-wrap: wrap;
        gap: 6px;
        max-height: 180px;
        overflow-y: auto;
        padding: 4px 2px;
        scrollbar-width: thin;
      }
      .emoji-opt {
        width: 36px;
        height: 36px;
        border-radius: 8px;
        border: 1.5px solid var(--border);
        background: var(--surface);
        cursor: pointer;
        font-size: 18px;
        display: flex;
        align-items: center;
        justify-content: center;
        transition: all 0.15s;
      }
      .emoji-opt:hover {
        border-color: var(--accent);
        background: var(--accent-pale);
      }
      .emoji-opt.selected {
        border-color: var(--accent);
        background: var(--accent-pale);
        box-shadow: 0 0 0 2px var(--accent-pale);
      }
      .color-row {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        padding: 4px 2px;
      }
      .color-opt {
        width: 28px;
        height: 28px;
        border-radius: 50%;
        cursor: pointer;
        border: 2px solid transparent;
        transition: all 0.15s;
      }
      .color-opt:hover {
        transform: scale(1.15);
      }
      .color-opt.selected {
        border-color: var(--text);
        box-shadow:
          0 0 0 2px #fff,
          0 0 0 4px var(--text);
      }
    </style>
  </head>
  <body>
    <div class="loading-overlay" id="loadingOverlay">
      <div class="spinner"></div>
    </div>
    <div class="toast" id="toast"></div>

    <!-- MODAL -->
    <div class="modal-overlay" id="modalOverlay" onclick="closeModalBg(event)">
      <div class="modal" style="width: 820px; max-width: 96vw">
        <div class="modal-hdr">
          <div class="modal-title" id="modalTitle">เพิ่มหมวดหมู่ใหม่</div>
          <button class="btn-modal-close" onclick="closeModal()">✕</button>
        </div>
        <div
          style="display: grid; grid-template-columns: 1fr 1fr; min-height: 0"
        >
          <!-- Left: ชื่อ / ไอคอน / สี -->
          <div
            style="
              padding: 22px 20px;
              border-right: 1px solid var(--border);
              display: flex;
              flex-direction: column;
              gap: 14px;
              overflow-y: auto;
              max-height: 70vh;
            "
          >
            <input type="hidden" id="editId" />
            <div
              style="
                font-size: 11px;
                font-weight: 700;
                color: var(--text3);
                letter-spacing: 1px;
                text-transform: uppercase;
                border-bottom: 1px solid var(--border);
                padding-bottom: 8px;
              "
            >
              📋 ข้อมูลหมวดหมู่
            </div>
            <div class="form-group">
              <label class="form-label"
                >ชื่อหมวดหมู่ <span class="req">*</span></label
              >
              <input
                class="form-control"
                id="fName"
                placeholder="เช่น เสื้อผ้า"
                oninput="updateCatPreview()"
              />
            </div>
            <div class="form-group">
              <label class="form-label">คำอธิบาย</label>
              <input
                class="form-control"
                id="fDesc"
                placeholder="คำอธิบายสั้นๆ (ถ้ามี)"
                oninput="updateCatPreview()"
              />
            </div>
            <div class="form-group">
              <label class="form-label">ไอคอน</label>
              <div
                class="emoji-row"
                id="emojiPicker"
                style="max-height: 160px"
              ></div>
            </div>
            <div class="form-group">
              <label class="form-label">สีหมวดหมู่</label>
              <div class="color-row" id="colorPicker"></div>
            </div>
            <!-- Preview -->
            <div
              id="catPreviewCard"
              style="
                margin-top: 4px;
                padding: 12px 14px;
                border-radius: 9px;
                border: 1.5px solid var(--border);
                background: var(--surface2);
                display: flex;
                align-items: center;
                gap: 12px;
              "
            >
              <div
                id="prevIcon"
                style="
                  width: 42px;
                  height: 42px;
                  border-radius: 10px;
                  display: flex;
                  align-items: center;
                  justify-content: center;
                  font-size: 22px;
                  background: #0f4c7522;
                  color: #0f4c75;
                  flex-shrink: 0;
                "
              >
                📦
              </div>
              <div>
                <div
                  id="prevName"
                  style="font-size: 14px; font-weight: 700; color: var(--text)"
                >
                  ชื่อหมวดหมู่
                </div>
                <div
                  id="prevDesc"
                  style="font-size: 11px; color: var(--text3); margin-top: 2px"
                >
                  คำอธิบาย
                </div>
              </div>
            </div>
          </div>
          <!-- Right: SKU Format -->
          <div
            style="
              padding: 22px 20px;
              overflow-y: auto;
              max-height: 70vh;
              display: flex;
              flex-direction: column;
              gap: 16px;
            "
          >
            <div
              style="
                font-size: 11px;
                font-weight: 700;
                color: var(--text3);
                letter-spacing: 1px;
                text-transform: uppercase;
                border-bottom: 1px solid var(--border);
                padding-bottom: 8px;
              "
            >
              🔖 รูปแบบ SKU สินค้า
            </div>
            <div
              style="
                padding: 10px 14px;
                background: var(--accent-pale);
                border-radius: 8px;
                border: 1.5px solid #93c5fd;
              "
            >
              <div
                style="
                  font-size: 10px;
                  font-weight: 700;
                  color: var(--text3);
                  letter-spacing: 0.8px;
                  margin-bottom: 4px;
                "
              >
                PREVIEW
              </div>
              <div
                id="skuPreview"
                style="
                  font-family: monospace;
                  font-size: 15px;
                  font-weight: 700;
                  color: var(--accent);
                  letter-spacing: 1px;
                "
              >
                XXX-[?]-[?]-[?]-001
              </div>
            </div>
            <div class="form-group">
              <div
                style="
                  display: flex;
                  align-items: center;
                  justify-content: space-between;
                  margin-bottom: 5px;
                "
              >
                <label class="form-label" style="margin: 0"
                  >ช่อง 1 — Prefix (Fix)</label
                >
                <span
                  style="
                    font-size: 10px;
                    background: var(--accent);
                    color: #fff;
                    padding: 1px 6px;
                    border-radius: 4px;
                    font-weight: 700;
                  "
                  >FIX</span
                >
              </div>
              <input
                class="form-control"
                id="skuF1"
                placeholder="APP"
                maxlength="6"
                style="
                  font-family: monospace;
                  text-transform: uppercase;
                  font-size: 14px;
                  font-weight: 700;
                  letter-spacing: 2px;
                  color: var(--accent);
                "
                oninput="
                  this.value = this.value.toUpperCase();
                  updateSkuPreview();
                "
              />
              <div
                style="font-size: 11px; color: var(--text3); margin-top: 4px"
              >
                รหัสตัวย่อหมวด เช่น APP, MED, FOOD
              </div>
            </div>
            <div style="border-top: 1px dashed var(--border)"></div>
            <div
              style="
                font-size: 11px;
                font-weight: 700;
                color: var(--text2);
                margin-bottom: -8px;
              "
            >
              ช่อง 2-4 — ชื่อ Label
            </div>
            <div class="form-group">
              <label class="form-label">ช่อง 2</label>
              <input
                class="form-control"
                id="skuL2"
                placeholder="เช่น ประเภท, Type"
                oninput="updateSkuPreview()"
              />
            </div>
            <div class="form-group">
              <label class="form-label">ช่อง 3</label>
              <input
                class="form-control"
                id="skuL3"
                placeholder="เช่น สี, Color"
                oninput="updateSkuPreview()"
              />
            </div>
            <div class="form-group">
              <label class="form-label">ช่อง 4</label>
              <input
                class="form-control"
                id="skuL4"
                placeholder="เช่น ไซส์, Size"
                oninput="updateSkuPreview()"
              />
            </div>
            <div style="border-top: 1px dashed var(--border)"></div>
            <div class="form-group">
              <div
                style="
                  display: flex;
                  align-items: center;
                  justify-content: space-between;
                  margin-bottom: 5px;
                "
              >
                <label class="form-label" style="margin: 0"
                  >ช่อง 5 — ลำดับ</label
                >
                <span
                  style="
                    font-size: 10px;
                    background: #374151;
                    color: #fff;
                    padding: 1px 6px;
                    border-radius: 4px;
                    font-weight: 700;
                  "
                  >AUTO</span
                >
              </div>
              <input
                class="form-control"
                id="skuF5"
                value="001"
                readonly
                style="
                  font-family: monospace;
                  font-size: 13px;
                  background: var(--surface2);
                  color: var(--text3);
                "
              />
              <div
                style="font-size: 11px; color: var(--text3); margin-top: 4px"
              >
                ระบบ Generate อัตโนมัติ เพิ่มทีละ 1
              </div>
            </div>
            <div
              style="
                padding: 10px 12px;
                background: #fef9c3;
                border-radius: 8px;
                border: 1px solid #fcd34d;
              "
            >
              <div
                style="
                  font-size: 10px;
                  font-weight: 700;
                  color: #92400e;
                  margin-bottom: 4px;
                "
              >
                💡 ตัวอย่าง
              </div>
              <div
                id="skuExample"
                style="font-family: monospace; font-size: 12px; color: #92400e"
              >
                APP-TEE-RED-XL-001
              </div>
            </div>
          </div>
        </div>
        <div class="modal-footer">
          <button class="btn btn-outline" onclick="closeModal()">ยกเลิก</button>
          <button class="btn btn-primary" onclick="saveCategory()">
            💾 บันทึก
          </button>
        </div>
      </div>
    </div>

    <!-- TOPBAR -->
    <div class="topbar">
      <div class="topbar-logo">📦 <span>A4S</span>-ERP</div>
      <div class="topbar-sep"></div>
      <div class="topbar-title">หมวดหมู่สินค้า</div>
      <div class="topbar-actions">
        <button class="btn-topbar btn-white" onclick="openModal()">
          ＋ เพิ่มหมวดหมู่
        </button>
      </div>
    </div>

    <div class="page">
      <div class="cat-grid" id="catGrid">
        <div
          style="
            grid-column: 1/-1;
            padding: 40px;
            text-align: center;
            color: var(--text3);
          "
        >
          กำลังโหลด...
        </div>
      </div>
    </div>

    <script src="categories.js"></script>
    <script src="../../shared/auth.js"></script>
    <script src="../../shared/sidebar.js"></script>
  </body>
</html>
