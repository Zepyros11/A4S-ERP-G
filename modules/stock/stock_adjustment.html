<!doctype html>
<html lang="th">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ปรับ Stock — Stock Adjustment</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="../../assets/css/common.css" />
    <style>
      /* ── PAGE LAYOUT ── */
      .page {
        max-width: 1200px;
        margin: 0 auto;
        padding: 24px 24px 60px;
      }
      .layout {
        display: grid;
        grid-template-columns: 1fr 360px;
        gap: 20px;
        align-items: start;
      }

      /* ── LEFT PANEL: PRODUCT TABLE ── */
      .table-card {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: var(--radius);
        box-shadow: var(--shadow);
        overflow: hidden;
        margin-bottom: 16px;
      }
      .card-hdr {
        padding: 14px 20px;
        border-bottom: 1px solid var(--border);
        background: var(--surface2);
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
      }
      .card-title {
        font-size: 14px;
        font-weight: 700;
        color: var(--text);
        white-space: nowrap;
      }
      .search-wrap {
        position: relative;
        flex: 1;
        max-width: 260px;
      }
      .search-icon {
        position: absolute;
        left: 10px;
        top: 50%;
        transform: translateY(-50%);
        color: var(--text3);
        font-size: 12px;
      }
      .search-input {
        width: 100%;
        padding: 7px 12px 7px 30px;
        border: 1.5px solid var(--border);
        border-radius: 7px;
        font-size: 13px;
        font-family: "Sarabun", sans-serif;
        outline: none;
        transition: all 0.18s;
        background: var(--surface);
      }
      .search-input:focus {
        border-color: var(--accent);
      }

      /* TABLE */
      .prod-table {
        width: 100%;
        border-collapse: collapse;
      }
      .prod-table th {
        padding: 10px 16px;
        background: var(--surface2);
        font-size: 11px;
        font-weight: 700;
        letter-spacing: 0.8px;
        color: var(--text3);
        text-align: left;
        border-bottom: 2px solid var(--border);
        white-space: nowrap;
      }
      .prod-table th.right,
      .prod-table td.right {
        text-align: right;
      }
      .prod-table td {
        padding: 11px 16px;
        border-bottom: 1px solid var(--border);
        font-size: 13.5px;
        vertical-align: middle;
      }
      .prod-table tr:last-child td {
        border-bottom: none;
      }
      .prod-table tr {
        cursor: pointer;
        transition: background 0.12s;
      }
      .prod-table tr:hover td {
        background: var(--accent-pale);
      }
      .prod-table tr.selected td {
        background: #dbeafe;
      }
      .mono {
        font-family: "IBM Plex Mono", monospace;
      }
      .code-cell {
        font-family: "IBM Plex Mono", monospace;
        font-size: 12px;
        color: var(--text3);
      }
      .qty-ok {
        color: var(--success);
        font-weight: 700;
      }
      .qty-low {
        color: #d97706;
        font-weight: 700;
      }
      .qty-zero {
        color: var(--danger);
        font-weight: 700;
      }
      .badge {
        display: inline-flex;
        align-items: center;
        gap: 3px;
        padding: 2px 7px;
        border-radius: 4px;
        font-size: 10px;
        font-weight: 700;
      }
      .badge-ok {
        background: var(--success-pale);
        color: var(--success);
      }
      .badge-low {
        background: var(--warning-pale);
        color: var(--warning);
      }
      .badge-out {
        background: var(--danger-pale);
        color: var(--danger);
      }

      /* LOG CARD */
      .log-card {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: var(--radius);
        box-shadow: var(--shadow);
        overflow: hidden;
      }
      .log-item {
        display: flex;
        align-items: center;
        gap: 12px;
        padding: 10px 16px;
        border-bottom: 1px solid var(--border);
      }
      .log-item:last-child {
        border-bottom: none;
      }
      .log-type {
        width: 32px;
        height: 32px;
        border-radius: 8px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 16px;
        flex-shrink: 0;
      }
      .log-info {
        flex: 1;
        min-width: 0;
      }
      .log-prod {
        font-size: 13px;
        font-weight: 500;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }
      .log-meta {
        font-size: 11px;
        color: var(--text3);
        margin-top: 1px;
      }
      .log-qty {
        font-family: "IBM Plex Mono", monospace;
        font-size: 14px;
        font-weight: 700;
        flex-shrink: 0;
      }
      .qty-in-clr {
        color: var(--success);
      }
      .qty-out-clr {
        color: var(--danger);
      }
      .qty-adj-clr {
        color: #d97706;
      }

      /* ADJ HEADER */
      .adj-prod-hdr {
        padding: 16px 20px;
        background: linear-gradient(135deg, var(--accent), var(--accent-light));
        color: #fff;
      }
      .adj-prod-code {
        font-family: "IBM Plex Mono", monospace;
        font-size: 11px;
        opacity: 0.7;
        margin-bottom: 2px;
      }
      .adj-prod-name {
        font-size: 15px;
        font-weight: 700;
        line-height: 1.3;
      }
      .adj-prod-cat {
        font-size: 11px;
        opacity: 0.65;
        margin-top: 3px;
      }

      /* ADJ BODY */
      .adj-body {
        padding: 20px;
      }

      /* TYPE BUTTONS */
      .adj-type-row {
        display: grid;
        grid-template-columns: 1fr 1fr 1fr;
        gap: 8px;
        margin-bottom: 20px;
      }
      .adj-type-btn {
        padding: 10px 6px;
        border-radius: 8px;
        border: 1.5px solid var(--border);
        background: var(--surface);
        cursor: pointer;
        text-align: center;
        transition: all 0.15s;
        font-family: "Sarabun", sans-serif;
      }
      .adj-type-btn:hover {
        border-color: var(--accent);
      }
      .adj-type-btn.sel-IN {
        background: #d1fae5;
        border-color: var(--success);
      }
      .adj-type-btn.sel-OUT {
        background: var(--danger-pale);
        border-color: var(--danger);
      }
      .adj-type-btn.sel-ADJUST {
        background: var(--warning-pale);
        border-color: #fcd34d;
      }
      .adj-type-icon {
        font-size: 18px;
        margin-bottom: 3px;
      }
      .adj-type-lbl {
        font-size: 11px;
        font-weight: 600;
        color: var(--text2);
      }

      /* WAREHOUSE LIST */
      .wh-list {
        margin-bottom: 16px;
      }
      .wh-list-title {
        font-size: 11px;
        font-weight: 700;
        color: var(--text3);
        letter-spacing: 0.8px;
        text-transform: uppercase;
        margin-bottom: 8px;
      }
      .wh-item {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 8px 12px;
        border-radius: 7px;
        border: 1.5px solid var(--border);
        background: var(--surface2);
        margin-bottom: 6px;
        cursor: pointer;
        transition: all 0.15s;
      }
      .wh-item:hover {
        border-color: var(--accent-light);
      }
      .wh-item.selected {
        border-color: var(--accent);
        background: var(--accent-pale);
      }
      .wh-name {
        font-size: 13px;
        font-weight: 500;
      }
      .wh-qty {
        font-family: "IBM Plex Mono", monospace;
        font-size: 15px;
        font-weight: 700;
      }

      /* FORM */
      .form-group {
        display: flex;
        flex-direction: column;
        gap: 5px;
        margin-bottom: 14px;
      }
      .form-label {
        font-size: 11px;
        font-weight: 700;
        color: var(--text2);
        letter-spacing: 0.5px;
      }
      .form-control {
        padding: 9px 12px;
        border: 1.5px solid var(--border);
        border-radius: 7px;
        font-size: 13.5px;
        font-family: "Sarabun", sans-serif;
        color: var(--text);
        background: var(--surface);
        outline: none;
        transition: all 0.18s;
        appearance: none;
      }
      .form-control:focus {
        border-color: var(--accent);
        box-shadow: 0 0 0 3px rgba(15, 76, 117, 0.08);
      }
      .form-control.mono {
        font-family: "IBM Plex Mono", monospace;
        font-size: 18px;
        font-weight: 600;
        text-align: center;
      }

      /* QTY PREVIEW */
      .qty-preview {
        padding: 10px 14px;
        border-radius: 8px;
        font-size: 13px;
        font-family: "IBM Plex Mono", monospace;
        font-weight: 600;
        text-align: center;
        margin-bottom: 14px;
        display: none;
      }
      .qty-preview.ok {
        background: #d1fae5;
        color: var(--success);
      }
      .qty-preview.warn {
        background: var(--warning-pale);
        color: var(--warning);
      }
      .qty-preview.err {
        background: var(--danger-pale);
        color: var(--danger);
      }

      /* SUBMIT BTN */
      .btn-primary {
        padding: 12px 20px;
        border-radius: 8px;
        background: var(--accent);
        color: #fff;
        font-size: 14px;
        font-family: "Sarabun", sans-serif;
        font-weight: 600;
        border: none;
        cursor: pointer;
        width: 100%;
        transition: all 0.18s;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
      }
      .btn-primary:hover {
        background: var(--accent-light);
      }
      .btn-primary:active {
        transform: scale(0.98);
      }

      @media (max-width: 900px) {
        .layout {
          grid-template-columns: 1fr;
        }
      }

      .row-menu-btn {
        border: none;
        background: transparent;
        font-size: 18px;
        cursor: pointer;
        color: var(--text3);
      }

      .row-menu-btn:hover {
        color: var(--accent);
      }

      .row-menu {
        position: fixed;
        background: #fff;
        border: 1px solid var(--border);
        border-radius: 8px;
        box-shadow: var(--shadow);
        display: none;
        z-index: 999;
        overflow: hidden;
      }

      .row-menu button {
        display: block;
        width: 180px;
        padding: 10px 14px;
        border: none;
        background: #fff;
        text-align: left;
        cursor: pointer;
        font-family: "Sarabun";
      }

      .row-menu button:hover {
        background: var(--accent-pale);
      }

      .prod-img {
        width: 36px;
        height: 36px;
        object-fit: cover;
        border-radius: 6px;
        border: 1px solid var(--border);
      }

      .prod-img-wrap {
        width: 36px;
        height: 36px;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      .prod-img-placeholder {
        font-size: 18px;
      }
    </style>
  </head>
  <body>
    <div class="loading-overlay" id="loadingOverlay">
      <div class="spinner"></div>
    </div>
    <div class="toast" id="toast"></div>

    <div class="topbar">
      <div class="topbar-logo">📦 <span>A4S</span>-ERP</div>
      <div class="topbar-sep"></div>
      <div class="topbar-title">ปรับ Stock (Manual Adjustment)</div>
      <div class="topbar-actions">
        <button class="btn-topbar btn-ghost" onclick="loadData()">
          🔄 รีเฟรช
        </button>
      </div>
    </div>
    <div id="sidebar-container"></div>

    <div class="page">
      <div class="layout">
        <!-- LEFT: PRODUCT LIST + LOG -->
        <div>
          <div class="table-card">
            <div class="card-hdr">
              <span class="card-title">📦 เลือกสินค้าที่ต้องการปรับ</span>
              <div class="search-wrap">
                <span class="search-icon">🔍</span>
                <input
                  class="search-input"
                  id="searchInput"
                  placeholder="ค้นหาสินค้า..."
                  oninput="filterTable()"
                />
              </div>
            </div>
            <div style="overflow-x: auto">
              <table class="prod-table">
                <thead>
                  <tr>
                    <th style="width: 60px">ภาพ</th>
                    <th style="width: 160px">SKU</th>
                    <th>สินค้า</th>
                    <th style="width: 200px">คลัง</th>
                    <th class="right" style="width: 90px">Stock</th>
                    <th style="width: 90px">สถานะ</th>
                    <th style="width: 40px"></th>
                  </tr>
                </thead>
                <tbody id="prodTableBody">
                  <tr>
                    <td
                      colspan="6"
                      style="
                        padding: 40px;
                        text-align: center;
                        color: var(--text3);
                      "
                    >
                      กำลังโหลด...
                    </td>
                  </tr>
                </tbody>
              </table>
            </div>
          </div>

          <!-- RECENT LOG -->
          <div class="log-card" id="logCard" style="display: none">
            <div class="card-hdr">
              <span class="card-title">🕐 รายการปรับล่าสุด (10 รายการ)</span>
            </div>
            <div id="logList"></div>
          </div>
        </div>

        <!-- ADJ FORM -->
        <div id="adjForm" style="display: none">
          <div class="adj-prod-hdr">
            <div class="adj-prod-code" id="adjCode">—</div>
            <div class="adj-prod-name" id="adjName">—</div>
            <div class="adj-prod-cat" id="adjCat">—</div>
          </div>
          <div class="adj-body">
            <!-- TYPE BUTTONS -->
            <div class="adj-type-row">
              <button
class="adj-type-btn sel-IN"
data-type="IN"
onclick="selectAdjType('IN')"
>
เพิ่ม
</button>

<button
class="adj-type-btn"
data-type="OUT"
onclick="selectAdjType('OUT')"
>
ลด
</button>

<button
class="adj-type-btn"
data-type="ADJUST"
onclick="selectAdjType('ADJUST')"
>
ตั้งค่า
</button>
            </div>

            <!-- WAREHOUSE DROPDOWN -->
            <div class="form-group">
              <label class="form-label">เลือกคลัง</label>
              <<select
id="whSelect"
class="form-control"
onchange="selectWarehouse(this.value)"
>
              </select>
            </div>

            <!-- STOCK CURRENT -->
<div class="form-group">

<label class="form-label">
Stock ปัจจุบัน
</label>

<div
id="currentStock"
style="
padding:10px;
border-radius:8px;
background:var(--surface2);
text-align:center;
font-weight:600;
font-family:'IBM Plex Mono';
font-size:18px;
">
-
</div>

</div>

<!-- QTY INPUT -->
<div class="form-group">

<label class="form-label" id="qtyLabel">
จำนวนที่เพิ่ม
</label>

<input
class="form-control mono"
type="number"
id="adjQty"
min="0"
placeholder="0"
oninput="updatePreview()"
/>

</div>

<!-- PREVIEW -->
<div class="qty-preview" id="qtyPreview"></div>


              <!-- PREVIEW -->
              <div class="qty-preview" id="qtyPreview"></div>

              <!-- NOTE CHECKLIST -->
              <div class="form-group">
                <label class="form-label">หมายเหตุ / เหตุผล</label>
                <div
                  id="noteList"
                  style="
                    display: flex;
                    flex-direction: column;
                    gap: 6px;
                    margin-bottom: 6px;
                  "
                ></div>
                <input
                  class="form-control"
                  id="adjNote"
                  placeholder="หมายเหตุ"
                />
                <button
                  type="button"
                  onclick="addNoteRow()"
                  style="
                    width: 100%;
                    padding: 7px;
                    border-radius: 7px;
                    border: 1.5px dashed var(--border);
                    background: var(--surface2);
                    color: var(--text3);
                    font-size: 13px;
                    font-family: &quot;Sarabun&quot;, sans-serif;
                    cursor: pointer;
                  "
                  onmouseover="
                    this.style.borderColor = 'var(--accent)';
                    this.style.color = 'var(--accent)';
                  "
                  onmouseout="
                    this.style.borderColor = 'var(--border)';
                    this.style.color = 'var(--text3)';
                  "
                >
                  ＋ เพิ่มเหตุผล
                </button>
              </div>

              <button class="btn-primary" onclick="saveAdjustment()">
                💾 บันทึกการปรับ Stock
              </button>
            </div>
          </div>
        </div>
      </div>
    </div>

    <script src="../../shared/auth.js"></script>
    <script src="../../shared/responsive.js"></script>
    <script src="../../shared/sidebar.js"></script>
    <script src="stock_adjustment.js"></script>
  </body>
</html>
