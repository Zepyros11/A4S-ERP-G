<!-- =====================================================
     categories-form.html
     Category Form Modal
===================================================== -->

<div class="modal-overlay" id="categoryModal">

  <div class="modal" style="width:820px;max-width:96vw">

    <!-- HEADER -->
    <div class="modal-hdr">
      <div class="modal-title" id="categoryModalTitle">เพิ่มหมวดหมู่</div>
      <button class="btn-modal-close" onclick="closeCategoryModal()">✕</button>
    </div>

    <!-- BODY : 2 คอลัมน์ -->
    <div style="display:grid;grid-template-columns:1fr 1fr;min-height:0">

      <!-- ── LEFT : ข้อมูล + ไอคอน + สี ── -->
      <div style="
        padding:22px 20px;
        border-right:1px solid var(--border);
        display:flex;
        flex-direction:column;
        gap:14px;
        overflow-y:auto;
        max-height:70vh;
      ">

        <input type="hidden" id="categoryEditId" />

        <div style="
          font-size:11px;font-weight:700;color:var(--text3);
          letter-spacing:1px;text-transform:uppercase;
          border-bottom:1px solid var(--border);padding-bottom:8px;
        ">
          📋 ข้อมูลหมวดหมู่
        </div>

        <!-- ชื่อ -->
        <div class="form-group">
          <label class="form-label">ชื่อหมวดหมู่ <span class="req">*</span></label>
          <input
            class="form-control"
            id="categoryName"
            placeholder="เช่น เสื้อผ้า"
            oninput="updateCategoryPreview()"
          />
        </div>

        <!-- คำอธิบาย -->
        <div class="form-group">
          <label class="form-label">คำอธิบาย</label>
          <input
            class="form-control"
            id="categoryDesc"
            placeholder="คำอธิบายสั้นๆ (ถ้ามี)"
            oninput="updateCategoryPreview()"
          />
        </div>

        <!-- ไอคอน -->
        <div class="form-group">
          <label class="form-label">ไอคอน</label>
          <div class="emoji-row" id="emojiPicker" style="max-height:160px"></div>
        </div>

        <!-- สี -->
        <div class="form-group">
          <label class="form-label">สีหมวดหมู่</label>
          <div class="color-row" id="colorPicker"></div>
        </div>

        <!-- Preview Card -->
        <div style="
          margin-top:4px;padding:12px 14px;border-radius:9px;
          border:1.5px solid var(--border);background:var(--surface2);
          display:flex;align-items:center;gap:12px;
        ">
          <div id="prevIcon" style="
            width:42px;height:42px;border-radius:10px;
            display:flex;align-items:center;justify-content:center;
            font-size:22px;background:#0f4c7522;color:#0f4c75;flex-shrink:0;
          ">📦</div>
          <div>
            <div id="prevName" style="font-size:14px;font-weight:700;color:var(--text)">
              ชื่อหมวดหมู่
            </div>
            <div id="prevDesc" style="font-size:11px;color:var(--text3);margin-top:2px">
              คำอธิบาย
            </div>
          </div>
        </div>

      </div>

      <!-- ── RIGHT : SKU Format ── -->
      <div style="
        padding:22px 20px;
        overflow-y:auto;
        max-height:70vh;
        display:flex;flex-direction:column;gap:16px;
      ">

        <div style="
          font-size:11px;font-weight:700;color:var(--text3);
          letter-spacing:1px;text-transform:uppercase;
          border-bottom:1px solid var(--border);padding-bottom:8px;
        ">
          🔖 รูปแบบ SKU สินค้า
        </div>

        <!-- SKU Preview Box -->
        <div style="
          padding:10px 14px;background:var(--accent-pale);
          border-radius:8px;border:1.5px solid #93c5fd;
        ">
          <div style="font-size:10px;font-weight:700;color:var(--text3);letter-spacing:0.8px;margin-bottom:4px;">
            PREVIEW
          </div>
          <div id="skuPreview" style="
            font-family:monospace;font-size:15px;
            font-weight:700;color:var(--accent);letter-spacing:1px;
          ">
            XXX-[?]-001
          </div>
        </div>

        <!-- Prefix -->
        <div class="form-group">
          <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:5px;">
            <label class="form-label" style="margin:0">ช่อง 1 — Prefix (Fix)</label>
            <span style="
              font-size:10px;background:var(--accent);color:#fff;
              padding:1px 6px;border-radius:4px;font-weight:700;
            ">FIX</span>
          </div>
          <input
            id="skuPrefix"
            class="form-control"
            placeholder="APP / MED / FOOD"
            maxlength="5"
            style="text-transform:uppercase;font-family:monospace;letter-spacing:1px;"
            oninput="
              this.value = this.value.toUpperCase().replace(/[^A-Z]/g,'');
              updateSkuPreview();
            "
          />
          <div style="font-size:11px;color:var(--text3);margin-top:4px;">
            รหัสตัวย่อหมวด เช่น APP, MED, FOOD
          </div>
        </div>

        <div style="border-top:1px dashed var(--border)"></div>

        <!-- Segments -->
        <div style="font-size:11px;font-weight:700;color:var(--text2);margin-bottom:-8px;">
          SKU Segments
        </div>

        <div id="segmentContainer"></div>

        <button
          type="button"
          class="btn btn-outline"
          style="width:fit-content"
          onclick="addSegment()"
        >
          ＋ เพิ่มช่อง
        </button>

        <div style="font-size:11px;color:var(--text3);">
          ต้องมีอย่างน้อย 1 ช่อง / สูงสุด 6 ช่อง
        </div>

        <div style="border-top:1px dashed var(--border)"></div>

        <!-- Auto Sequence -->
        <div class="form-group">
          <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:5px;">
            <label class="form-label" style="margin:0">ช่องสุดท้าย — ลำดับ</label>
            <span style="
              font-size:10px;background:#374151;color:#fff;
              padding:1px 6px;border-radius:4px;font-weight:700;
            ">AUTO</span>
          </div>
          <input
            class="form-control"
            value="001"
            readonly
            style="font-family:monospace;font-size:13px;background:var(--surface2);color:var(--text3);"
          />
          <div style="font-size:11px;color:var(--text3);margin-top:4px;">
            ระบบ Generate อัตโนมัติ เพิ่มทีละ 1
          </div>
        </div>

        <!-- Example -->
        <div style="
          padding:10px 12px;background:#fef9c3;
          border-radius:8px;border:1px solid #fcd34d;
        ">
          <div style="font-size:10px;font-weight:700;color:#92400e;margin-bottom:4px;">
            💡 ตัวอย่าง
          </div>
          <div id="skuExample" style="font-family:monospace;font-size:12px;color:#92400e;">
            APP-TEE-RED-XL-001
          </div>
        </div>

      </div>
    </div>

    <!-- FOOTER -->
    <div class="modal-footer">
      <button class="btn btn-outline" onclick="closeCategoryModal()">ยกเลิก</button>
      <button class="btn btn-primary" onclick="saveCategoryForm()">💾 บันทึก</button>
    </div>

  </div>
</div>
