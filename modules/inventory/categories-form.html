<!-- =====================================================
     categories-form.html
     Category Form Modal
===================================================== -->

<div class="modal-overlay" id="categoryModal">

  <div class="modal v-sage-header" style="width:580px;max-width:96vw">

    <!-- HEADER -->
    <div class="modal-hdr">
      <div class="modal-title" id="categoryModalTitle">เพิ่มหมวดหมู่</div>
      <button class="btn-modal-close" onclick="closeCategoryModal()">✕</button>
    </div>

    <!-- BODY -->
    <div class="cat-form-body">

      <input type="hidden" id="categoryEditId" />

      <!-- LIVE PREVIEW (top, full width) -->
      <div class="cat-preview-card" id="catPreviewCard">
        <div id="prevIcon" class="cat-preview-icon">📦</div>
        <div class="cat-preview-text">
          <div id="prevName" class="cat-preview-name">ชื่อหมวดหมู่</div>
        </div>
        <div class="cat-preview-badge">PREVIEW</div>
      </div>

      <!-- TOP: ข้อมูลหมวดหมู่ (full width) -->
      <div class="cat-form-section-title">📋 ข้อมูลหมวดหมู่</div>

      <div class="form-group">
        <label class="form-label">ชื่อหมวดหมู่ <span class="req">*</span></label>
        <input
          class="form-control"
          id="categoryName"
          placeholder="เช่น เสื้อผ้า"
          oninput="updateCategoryPreview()"
        />
      </div>

      <!-- 2-col grid: สี (left) + ไอคอน (right) -->
      <div class="cat-form-grid">

        <!-- LEFT: สี -->
        <div class="cat-form-col">
          <div class="cat-form-section-title">🎨 สีหมวดหมู่</div>
          <div class="form-group">
            <div class="color-grid" id="colorPicker"></div>
          </div>
        </div>

        <!-- RIGHT: ไอคอน -->
        <div class="cat-form-col">
          <div class="cat-form-section-title">😀 ไอคอน</div>
          <div class="form-group">
            <div class="emoji-grid" id="emojiPicker"></div>
          </div>
        </div>

      </div>

    </div>

    <!-- FOOTER -->
    <div class="modal-footer">
      <button class="btn btn-outline" onclick="closeCategoryModal()">ยกเลิก</button>
      <button class="btn btn-primary" onclick="saveCategoryForm()">💾 บันทึก</button>
    </div>

  </div>
</div>
