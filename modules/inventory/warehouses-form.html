<!-- =====================================================
     warehouses-form.html
     Warehouse Form Modal
===================================================== -->

<div class="modal-overlay" id="warehouseModal">
  <div class="modal v-sage-header" style="width: 620px; max-width: 96vw">
    <div class="modal-hdr">
      <div class="modal-title" id="warehouseModalTitle">
        เพิ่มคลังสินค้าใหม่
      </div>
      <button class="btn-modal-close" onclick="closeWarehouseModal()">✕</button>
    </div>

    <div class="wh-form-body">
      <input type="hidden" id="whEditId" />
      <input type="hidden" id="fCode" />
      <input type="hidden" id="fStatus" value="true" />

      <!-- LIVE PREVIEW -->
      <div class="wh-preview-card">
        <div id="whPrevIcon" class="wh-preview-icon">🏭</div>
        <div class="wh-preview-text">
          <div id="whPrevName" class="wh-preview-name">ชื่อคลัง</div>
          <div id="whPrevCode" class="wh-preview-code">WH-001</div>
        </div>
        <div class="wh-preview-badge">PREVIEW</div>
      </div>

      <!-- ข้อมูลคลัง -->
      <div class="wh-form-section-title">📋 ข้อมูลคลัง</div>

      <div class="wh-form-grid">
        <div class="form-group">
          <label class="form-label">ชื่อคลัง <span class="req">*</span></label>
          <input
            class="form-control"
            id="fName"
            oninput="updateWarehousePreview()"
          />
        </div>
        <div class="form-group">
          <label class="form-label">ประเภทคลัง</label>
          <input type="hidden" id="fType" value="MAIN" />
          <div class="country-dropdown-wrap" id="whtDropdownWrap">
            <button
              type="button"
              class="country-trigger"
              id="whtTrigger"
              onclick="toggleWhtDropdown(event)"
            >
              — เลือกประเภท —
              <span class="country-trigger-arrow">▾</span>
            </button>
            <div class="country-panel" id="whtPanel">
              <div class="country-list" id="whtList"></div>
            </div>
          </div>
        </div>
      </div>

      <!-- ที่ตั้ง -->
      <div class="wh-form-section-title">📍 ที่ตั้ง</div>

      <div class="wh-form-grid">
        <div class="form-group">
          <label class="form-label">ประเทศ</label>
          <div class="country-dropdown-wrap" id="countryDropdownWrap">
            <button
              type="button"
              class="country-trigger"
              id="countryTrigger"
              onclick="toggleCountryDropdown(event)"
            >
              — เลือกประเทศ —
              <span class="country-trigger-arrow">▾</span>
            </button>
            <div class="country-panel" id="countryPanel">
              <div class="country-list" id="countryList"></div>
            </div>
          </div>
        </div>
        <div class="form-group">
          <label class="form-label">คลังแม่ (Parent)</label>
          <select class="form-control" id="fParent">
            <option value="">— ไม่มี (คลังหลัก) —</option>
          </select>
        </div>
      </div>

      <div class="form-group">
        <label class="form-label">ที่อยู่</label>
        <textarea class="form-control" id="fAddress" rows="2"></textarea>
      </div>

      <!-- ติดต่อ + ความจุ -->
      <div class="wh-form-section-title">👤 ติดต่อ</div>

      <div class="wh-form-grid">
        <div class="form-group">
          <label class="form-label">ผู้ดูแล</label>
          <select class="form-control" id="fManager">
            <option value="">— ไม่กำหนด —</option>
          </select>
        </div>
        <div class="form-group">
          <label class="form-label">เบอร์โทร</label>
          <input class="form-control" id="fPhone" />
        </div>
      </div>

      <div class="wh-form-grid">
        <div class="form-group">
          <label class="form-label">ความจุ</label>
          <input class="form-control" type="number" id="fCapacity" />
        </div>
        <div class="form-group">
          <label class="form-label">หมายเหตุ</label>
          <input class="form-control" id="fNote" />
        </div>
      </div>
    </div>

    <div class="modal-footer">
      <button class="btn btn-outline" onclick="closeWarehouseModal()">
        ยกเลิก
      </button>
      <button class="btn btn-primary" onclick="saveWarehouseForm()">
        💾 บันทึก
      </button>
    </div>
  </div>
</div>
