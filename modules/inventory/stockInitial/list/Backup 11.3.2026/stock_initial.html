<!doctype html>
<html lang="th">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Stock เริ่มต้น — A4S-ERP</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="../../assets/css/main.css" />
  </head>

  <body>
    <div class="loading-overlay" id="loadingOverlay">
      <div class="spinner"></div>
    </div>
    <div class="toast" id="toast"></div>

    <!-- TOPBAR -->
    <div class="topbar">
      <div class="topbar-logo">📦 <span>A4S</span>-ERP</div>
      <div class="topbar-sep"></div>
      <div class="topbar-title">📦 Stock เริ่มต้น</div>
    </div>

    <div class="page page-layout">
      <!-- STATS -->
      <div class="stats-grid" id="statsGrid">
        <div class="stat-card">
          <div class="stat-icon">📦</div>
          <div class="stat-info">
            <div class="stat-value" id="statTotal">0</div>
            <div class="stat-label">สินค้าทั้งหมด</div>
          </div>
        </div>
        <div class="stat-card">
          <div class="stat-icon">✅</div>
          <div class="stat-info">
            <div class="stat-value" id="statHasStock">0</div>
            <div class="stat-label">มี Stock แล้ว</div>
          </div>
        </div>
        <div class="stat-card">
          <div class="stat-icon">⏳</div>
          <div class="stat-info">
            <div class="stat-value" id="statNoStock">0</div>
            <div class="stat-label">ยังไม่มี Stock</div>
          </div>
        </div>
        <div class="stat-card">
          <div class="stat-icon">🏭</div>
          <div class="stat-info">
            <div class="stat-value" id="statWarehouses">0</div>
            <div class="stat-label">คลังที่ใช้งาน</div>
          </div>
        </div>
      </div>

      <!-- TOOLBAR -->
      <div class="toolbar">
        <div class="search-wrap">
          <span class="search-icon">🔍</span>
          <input
            class="search-input"
            id="searchInput"
            placeholder="ค้นหาสินค้า / รหัส"
            oninput="renderTable()"
          />
        </div>
        <select
          class="filter-select"
          id="filterCountry"
          onchange="onCountryChange()"
        >
          <option value="">🌍 ประเทศ</option>
        </select>

        <select
          class="filter-select"
          id="filterParent"
          onchange="onParentChange()"
        >
          <option value="">🏬 คลังหลัก</option>
        </select>

        <select
          class="filter-select"
          id="filterChild"
          onchange="onChildChange()"
        >
          <option value="">🏠 คลังสาขา</option>
        </select>
        <select
          class="filter-select"
          id="filterCategory"
          onchange="renderTable()"
        >
          <option value="">🏷️ ทุกหมวดหมู่</option>
        </select>
        <select
          class="filter-select"
          id="filterStatus"
          onchange="renderTable()"
        >
          <option value="">⚪ ทุกสถานะ</option>
          <option value="has">✅ มี Stock แล้ว</option>
          <option value="none">⏳ ยังไม่มี Stock</option>
        </select>
        <div class="toolbar-right">
          <button
            class="btn btn-primary"
            id="saveAllBtn"
            onclick="saveAll()"
            style="display: none"
          >
            💾 Save All
          </button>
        </div>
      </div>

      <!-- TABLE -->

      <div class="table-card">
        <div class="table-hdr">
          <div class="table-title">📋 รายการสินค้า</div>
          <div class="table-count" id="productCount">0 รายการ</div>
        </div>
        <div class="table-wrap">
          <table class="data-table si-table" id="siTable">
            <thead id="siThead"></thead>
            <tbody id="productTable"></tbody>
          </table>
        </div>
      </div>
    </div>

    <script src="../../shared/auth.js"></script>
    <script src="../../shared/sidebar.js"></script>
    <script src="../../assets/components/imgPopup/imgPopup.js"></script>
    <script src="stock_initial.js"></script>
    <div id="deleteModalContainer"></div>
    <script src="../../assets/components/modal/deleteModal.js"></script>
  </body>
</html>
