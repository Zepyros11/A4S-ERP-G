<!doctype html>
<html lang="th">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Stock เริ่มต้น — A4S-ERP</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="../../../css/main.css" />
    <link rel="stylesheet" href="./stock-initial.css" />
  </head>
  <body>
    <div class="loading-overlay" id="loadingOverlay">
      <div class="spinner"></div>
    </div>
    <div class="toast" id="toast"></div>

    <!-- TOPBAR -->
    <div class="topbar"></div>

    <!-- PAGE -->
    <div class="page">
      <!-- STATS -->
      <div class="stats-row">
        <div class="stat-card">
          <div class="stat-icon">📦</div>
          <div>
            <div class="stat-value" id="statTotal">0</div>
            <div class="stat-label">สินค้าทั้งหมด</div>
          </div>
        </div>
        <div class="stat-card">
          <div class="stat-icon">✅</div>
          <div>
            <div class="stat-value" id="statHasStock">0</div>
            <div class="stat-label">มี Stock แล้ว</div>
          </div>
        </div>
        <div class="stat-card">
          <div class="stat-icon">⏳</div>
          <div>
            <div class="stat-value" id="statNoStock">0</div>
            <div class="stat-label">ยังไม่มี Stock</div>
          </div>
        </div>
        <div class="stat-card">
          <div class="stat-icon">🏭</div>
          <div>
            <div class="stat-value" id="statWarehouses">0</div>
            <div class="stat-label">คลังที่ใช้งาน</div>
          </div>
        </div>
      </div>


  <!-- TABLE -->
<div class="content-wrap">
  <div class="table-card">

    <div class="table-toolbar si-toolbar">

      <!-- แถว 1: Warehouse Filter -->
      <div class="si-wh-row">
        <div class="wh-filter-group">
          <label class="wh-filter-label">🌍 ประเทศ</label>
          <select class="filter-select" id="countryTabs"></select>
        </div>
        <div class="wh-filter-group">
          <label class="wh-filter-label">🏬 คลังหลัก</label>
          <select class="filter-select" id="parentTabs"></select>
        </div>
        <div class="wh-filter-group">
          <label class="wh-filter-label">🏠 คลังย่อย</label>
          <select class="filter-select" id="childTabs"></select>
        </div>
      </div>

      <!-- แถว 2: Search + Filter -->
      <div class="si-search-row">
        <div class="search-wrap">
          <span class="search-icon">🔍</span>
          <input class="search-input" id="searchInput" placeholder="ค้นหาสินค้า / รหัส" />
        </div>
       
        <div class="toolbar-right">
          <button class="btn btn-primary" id="saveAllBtn" onclick="window.saveAll()" style="display:none">💾 Save All</button>
        </div>
      </div>

    </div>

    <div class="table-hdr">
      <div class="table-title">📋 รายการสินค้า</div>
      <div class="table-count" id="productCount">0 รายการ</div>
    </div>
    <div class="table-wrap">
      <table class="data-table si-table">
        <thead id="siThead"></thead>
        <tbody id="productTable"></tbody>
      </table>
    </div>

  </div>
</div>

    <script type="module" src="./stock-initial-list.js"></script>
    <!-- MODALS -->

    <!-- Core -->
    <script src="../../../js/core/auth.js"></script>
    <!-- MODALS -->
    <script src="../../../js/components/modal/deleteModal.js"></script>
    <script src="../../../js/components/modal/modalManager.js"></script>
    <script src="../../../js/components/modal/enterModal.js"></script>

    <!-- JS Component/navigation -->
    <script type="module">
      import { loadTopbar } from "../../../js/components/navigation/topbar.js";
      loadTopbar("📦 Stock เริ่มต้น");
    </script>
    <script src="../../../js/components/navigation/imgPopup.js"></script>
    <script src="../../../js/components/navigation/sidebar.js"></script>
  </body>
</html>
