<!doctype html>
<html lang="th">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>รายการสินค้า — A4S-ERP</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="../../css/main.css" />
    <link rel="stylesheet" href="./products.css" />
  </head>
  <body>
    <div class="loading-overlay" id="loadingOverlay">
      <div class="spinner"></div>
    </div>
    <div class="toast" id="toast"></div>

    <!-- TOPBAR -->
    <div class="topbar"></div>
    <div class="layout">
      <!-- SIDEBAR -->
      <!-- CONTENT -->
      <div class="content-area">
        <!-- PAGE -->
        <div class="page">          <!-- HERO -->
          <div class="page-hero page-hero--simple page-hero--compact">
            <h1 class="page-hero-title">📦 รายการสินค้า</h1>
          </div>

          <div class="stats-row">
            <div class="stat-card">
              <div class="stat-icon">📦</div>
              <div>
                <div class="stat-value" id="cardProducts">0</div>
                <div class="stat-label">ชุดสินค้า</div>
              </div>
            </div>
            <div class="stat-card">
              <div class="stat-icon">🏷️</div>
              <div>
                <div class="stat-value" id="cardSkus">0</div>
                <div class="stat-label">ตัวเลือกทั้งหมด</div>
              </div>
            </div>
            <div class="stat-card">
              <div class="stat-icon">✅</div>
              <div>
                <div class="stat-value" id="cardActive">0</div>
                <div class="stat-label">เปิดใช้งาน</div>
              </div>
            </div>
            <div class="stat-card">
              <div class="stat-icon">⛔</div>
              <div>
                <div class="stat-value" id="cardInactive">0</div>
                <div class="stat-label">ปิดใช้งาน</div>
              </div>
            </div>
          </div>

          <!-- TABLE -->
          <div class="content-wrap">
            <div class="table-card" id="tableCard">

    <div class="table-toolbar">
      <div class="search-wrap">
        <span class="search-icon">🔍</span>
        <input class="search-input" id="searchInput" placeholder="ค้นหาชื่อสินค้า..." />
      </div>
      <select class="filter-select" id="filterCategory">
        <option value="">🧿 ทุกหมวดหมู่</option>
      </select>
      <select class="filter-select" id="filterStatus">
        <option value="">🧿 ทุกสถานะ</option>
        <option value="true">✅ เปิดใช้งาน</option>
        <option value="false">⛔ ปิดใช้งาน</option>
      </select>
      <div class="toolbar-right">
        <button class="btn btn-outline" id="btnToggleStockAlert" style="display:none" onclick="window.bulkToggleStockAlert()">🔕 ปิดแจ้งเตือนสินค้าหมด</button>
        <button class="btn btn-danger-outline" id="btnDeleteSelected" data-perm="product_delete" style="display:none" onclick="window.deleteSelectedProducts()">🗑 ลบที่เลือก</button>
        <button class="btn btn-primary" data-perm="product_create" onclick="window.location.href = './product-form.html'">＋ เพิ่มสินค้า</button>
      </div>
    </div>

    <div class="table-hdr">
      <div class="table-title">📦 รายการสินค้า</div>
      <div class="table-count" id="tableCount">0 รายการ</div>
    </div>
    <div class="table-wrap">
      <table class="data-table table-products r-cards">
        <thead>
          <tr>
            <th style="width:40px;text-align:center">
              <input type="checkbox" id="chkAll" onclick="window.toggleAllCheckbox(this)" />
            </th>
            <th class="col-center">ภาพ</th>
            <th class="col-center" onclick="window.sortTable('product_name')" style="cursor:pointer">ชื่อสินค้า <span class="sort-icon">⇅</span></th>
            <th class="col-center">หมวดหมู่</th>
            <th class="col-center" onclick="window.sortTable('cost_price')" style="cursor:pointer">ราคาทุน <span class="sort-icon">⇅</span></th>
            <th class="col-center" onclick="window.sortTable('sale_price')" style="cursor:pointer">ราคาขาย <span class="sort-icon">⇅</span></th>
            <th class="col-center">สถานะ</th>
            <th class="col-center" title="เปิด = ไม่แจ้งเตือนเมื่อสินค้าหมด/ใกล้หมด">ปิดแจ้งเตือนสินค้าหมด</th>
            <th class="col-center">จัดการ</th>
          </tr>
        </thead>
        <tbody id="tableBody">
          <tr class="r-card-plain"><td colspan="9"><div class="empty-state"><div class="empty-icon">📦</div><div class="empty-text">ยังไม่มีข้อมูล</div></div></td></tr>
        </tbody>
      </table>
    </div>

  </div>
</div>
        <!-- Core -->
        <script src="../../js/core/auth.js"></script>
        <script src="../../js/core/authz.js"></script>
<script src="../../js/core/date-format.js"></script>
        <script>AuthZ.requirePerm("product_view");</script>
        <!-- product -->
        <script type="module" src="./products-list.js"></script>
        <!-- MODALS -->
        <script src="../../js/components/modal/deleteModal.js"></script>
        <script src="../../js/components/modal/confirmModal.js"></script>
        <script src="../../js/components/modal/modalManager.js"></script>
        <script src="../../js/components/modal/enterSave.js"></script>

        <!-- JS Component/navigation -->
        <script type="module">
          import { loadTopbar } from "../../js/components/navigation/topbar.js";
          loadTopbar("📦 รายการสินค้า");
        </script>
        <script src="../../js/components/navigation/imgPopup.js"></script>
        <script src="../../js/components/navigation/sidebar.js"></script>
        </div>
      </div>
    </div>
  </body>
</html>
