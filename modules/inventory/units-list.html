<!doctype html>
<html lang="th">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>📐 หน่วยนับ — A4S-ERP</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="../../css/main.css" />
    <link rel="stylesheet" href="./units-list.css" />
  </head>
  <body>
    <div class="loading-overlay" id="loadingOverlay">
      <div class="spinner"></div>
    </div>
    <div class="toast" id="toast"></div>

    <!-- TOPBAR -->
    <div class="topbar"></div>

    <!-- PAGE -->
    <div class="page">
      <!-- HERO -->
      <div class="page-hero page-hero--simple page-hero--compact">
        <div>
          <h1 class="page-hero-title">📐 หน่วยนับ (Master Units)</h1>
          <p class="page-hero-sub">
            จัดการหน่วยนับมาตรฐาน — ฟอร์มสินค้าจะ dropdown เลือกจากนี่
          </p>
        </div>
        <div class="page-hero-actions">
          <button class="btn-on-hero btn-primary" data-perm="units_create" onclick="window.openUnitModal()">
            ＋ เพิ่มหน่วยนับ
          </button>
        </div>
      </div>

      <!-- TABLE -->
      <div class="content-row">
        <div class="table-card">
          <div class="table-toolbar">
            <div class="search-wrap">
              <span class="search-icon">🔍</span>
              <input
                class="search-input"
                id="searchInput"
                placeholder="ค้นหาหน่วยนับ..."
                oninput="window.filterTable()"
              />
            </div>
            <select
              class="filter-select"
              id="filterStatus"
              onchange="window.filterTable()"
            >
              <option value="">🧿 ทุกสถานะ</option>
              <option value="true">✅ เปิดใช้งาน</option>
              <option value="false">⛔ ปิดใช้งาน</option>
            </select>
            <button
              class="btn btn-danger"
              id="btnDeleteSelected"
              data-perm="units_delete"
              style="display:none;margin-left:auto"
              onclick="window.deleteSelectedUnits()"
            >
              🗑️ ลบที่เลือก
            </button>
          </div>

          <div class="table-wrap">
            <table class="data-table r-cards">
              <thead>
                <tr>
                  <th class="col-center" style="width:44px">
                    <input
                      type="checkbox"
                      id="selectAllCheckbox"
                      onchange="window.toggleAllCheckbox(this)"
                    />
                  </th>
                  <th>ชื่อหน่วย</th>
                  <th class="col-center" style="width:140px">ใช้กับสินค้า</th>
                  <th class="col-center" style="width:120px">สถานะ</th>
                  <th class="col-center" style="width:120px">จัดการ</th>
                </tr>
              </thead>
              <tbody id="tableBody">
                <tr class="r-card-plain">
                  <td colspan="5" class="empty-state">
                    <div class="empty-icon">📐</div>
                    <div class="empty-text">กำลังโหลด...</div>
                  </td>
                </tr>
              </tbody>
            </table>
          </div>
        </div>
      </div>
    </div>

    <!-- UNIT FORM MODAL -->
    <div class="modal-overlay" id="unitOverlay" onclick="window.closeUnitModal(event)">
      <div class="modal v-sage-header" onclick="event.stopPropagation()">
        <div class="modal-hdr">
          <div class="modal-title" id="unitModalTitle">เพิ่มหน่วยนับ</div>
          <button class="btn-modal-close" onclick="window.closeUnitModal()">✕</button>
        </div>
        <div class="modal-body">
          <div class="form-group">
            <label class="form-label">ชื่อหน่วย <span class="req">*</span></label>
            <input
              class="form-control"
              id="uName"
              placeholder="เช่น ชิ้น, กล่อง, ลัง"
              autocomplete="off"
            />
          </div>
          <div class="form-group" style="margin-top:14px">
            <label style="display:flex;align-items:center;gap:8px;cursor:pointer">
              <input type="checkbox" id="uActive" checked />
              <span>เปิดใช้งาน</span>
            </label>
          </div>
        </div>
        <div class="modal-footer">
          <button class="btn btn-ghost" onclick="window.closeUnitModal()">
            ยกเลิก
          </button>
          <button class="btn btn-primary" onclick="window.saveUnit()">
            💾 บันทึก
          </button>
        </div>
      </div>
    </div>

    <script src="./units-list.js"></script>
    <script src="../../js/core/auth.js"></script>
    <script src="../../js/core/authz.js"></script>
    <script>AuthZ.requirePerm("units_view");</script>
    <script src="../../js/core/date-format.js"></script>
    <script src="../../js/components/navigation/sidebar.js"></script>
    <script src="../../js/components/modal/modalManager.js"></script>
    <script src="../../js/components/modal/deleteModal.js"></script>
    <script type="module">
      import { loadTopbar } from "../../js/components/navigation/topbar.js";
      loadTopbar("📐 หน่วยนับ");
    </script>
  </body>
</html>
