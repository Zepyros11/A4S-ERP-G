<!doctype html>
<html lang="th">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>🛍️ Product Catalog — A4S-ERP</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700&family=IBM+Plex+Mono:wght@400;500&family=Playfair+Display:wght@400;600;700;900&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="../../css/main.css" />
    <link rel="stylesheet" href="./catalog.css" />
  </head>
  <body class="catalog-body">
    <div class="loading-overlay" id="loadingOverlay">
      <div class="spinner"></div>
    </div>
    <div class="toast" id="toast"></div>

    <!-- TOPBAR -->
    <div class="topbar"></div>

    <!-- HERO (slim band) -->
    <section class="cat-hero">
      <div class="cat-hero-inner">
        <div class="cat-hero-left">
          <h1 class="cat-hero-title">Product Catalog</h1>
          <span class="cat-hero-sub">— A4S Lookbook</span>
        </div>
      </div>
    </section>

    <!-- LAYOUT: SIDEBAR + MAIN -->
    <div class="cat-layout">
      <!-- SIDEBAR -->
      <aside class="cat-sidebar" id="catSidebar">
        <div class="cat-sidebar-inner">
          <div class="cat-sidebar-title">Category</div>
          <nav class="cat-side-list" id="catSideList">
            <button class="cat-side-item active" data-cat="all">
              <span class="cat-side-icon">📦</span>
              <span class="cat-side-name">All Product</span>
              <span class="cat-side-count" id="cntAll">0</span>
            </button>
          </nav>

          <div class="cat-sidebar-divider"></div>

          <div class="cat-sidebar-title">Filter</div>
          <nav class="cat-side-list">
            <button class="cat-side-item cat-side-filter" data-filter="all">
              <span class="cat-side-name">🧿 ทั้งหมด</span>
            </button>
            <button class="cat-side-item cat-side-filter" data-filter="instock">
              <span class="cat-side-name">✅ มีของ</span>
            </button>
            <button class="cat-side-item cat-side-filter" data-filter="outstock">
              <span class="cat-side-name">❌ ของหมด</span>
            </button>
          </nav>
        </div>
      </aside>

      <!-- MAIN -->
      <main class="cat-main">
        <!-- COMBINED HEADER + TOOLBAR -->
        <div class="cat-toolbar" id="catCurrentLabel">
          <div class="cat-current-label">
            <span class="cat-current-icon">📦</span>
            <span class="cat-current-name">All Product</span>
          </div>
          <div class="cat-search">
            <span class="cat-search-icon">🔍</span>
            <input
              id="catSearch"
              class="cat-search-input"
              placeholder="ค้นหาสินค้า / รหัส..."
              autocomplete="off"
            />
          </div>
          <div class="cat-view-toggle" role="group" aria-label="มุมมอง">
            <button class="cat-view-btn active" data-view="grid" type="button" title="มุมมองภาพ" aria-label="มุมมองภาพ">▦</button>
            <button class="cat-view-btn" data-view="list" type="button" title="มุมมองรายการ" aria-label="มุมมองรายการ">≡</button>
          </div>
          <div class="cat-toolbar-right">
            <span class="cat-result-count" id="catResultCount">— รายการ</span>
            <select id="catSort" class="cat-sort">
              <option value="default">เรียงตามหมวด</option>
              <option value="name-asc">ชื่อ A → Z</option>
              <option value="name-desc">ชื่อ Z → A</option>
              <option value="price-asc">ราคา น้อย → มาก</option>
              <option value="price-desc">ราคา มาก → น้อย</option>
            </select>
            <button class="cat-tool-btn" id="btnRefresh" title="รีเฟรช">🔄</button>
          </div>
        </div>

        <!-- GRID -->
        <div class="cat-grid" id="catGrid"></div>

        <!-- EMPTY -->
        <div class="cat-empty-state" id="catEmpty" style="display:none">
          <div class="cat-empty-icon">🔎</div>
          <div class="cat-empty-title">ไม่พบสินค้า</div>
          <div class="cat-empty-sub">ลองเปลี่ยนคำค้นหาหรือเลือกหมวดอื่น</div>
        </div>
      </main>
    </div>

    <!-- DETAIL MODAL -->
    <div class="cat-modal-overlay" id="catModalOv"></div>
    <div class="cat-modal" id="catModal" role="dialog" aria-modal="true">
      <button class="cat-modal-close" id="catModalClose" aria-label="ปิด">✕</button>
      <div class="cat-modal-body" id="catModalBody"></div>
    </div>

    <!-- Core -->
    <script src="../../js/core/auth.js"></script>
    <script src="../../js/core/authz.js"></script>
    <script src="../../js/core/date-format.js"></script>
    <script>AuthZ.requirePerm("product_view");</script>

    <!-- Page logic -->
    <script type="module" src="./catalog.js"></script>

    <!-- MODALS -->
    <script src="../../js/components/modal/modalManager.js"></script>

    <!-- Topbar / Sidebar -->
    <script type="module">
      import { loadTopbar } from "../../js/components/navigation/topbar.js";
      loadTopbar("🛍️ Product Catalog");
    </script>
    <script src="../../js/components/navigation/sidebar.js"></script>
  </body>
</html>
