<!doctype html>
<html lang="th">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>รายการสินค้า — A4S-ERP</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="../../../../css/main.css" />
    <link rel="stylesheet" href="./products.css" />
  </head>
  <body>
    <div class="loading-overlay" id="loadingOverlay">
      <div class="spinner"></div>
    </div>
    <div class="toast" id="toast"></div>

    <!-- TOPBAR -->
    <div class="topbar"></div>

    <!-- LIGHTBOX -->
    <div
      id="lightboxOverlay"
      class="lightbox-overlay"
      onclick="window.closeLightboxOnBg(event)"
    >
      <div class="lightbox-modal">
        <button class="lightbox-close" onclick="window.closeLightbox()">
          ✕
        </button>
        <div class="lightbox-body">
          <button
            id="lbPrev"
            class="lightbox-nav left"
            onclick="window.lightboxNav(-1)"
          >
            ‹
          </button>
          <img id="lightboxImg" />
          <button
            id="lbNext"
            class="lightbox-nav right"
            onclick="window.lightboxNav(1)"
          >
            ›
          </button>
        </div>
        <div class="lightbox-info">
          <div class="lightbox-title" id="lightboxTitle"></div>
          <div class="lightbox-counter" id="lightboxCounter"></div>
          <div id="lightboxThumbs" class="lightbox-thumbs"></div>
        </div>
      </div>
    </div>

    <!-- CATEGORY PICKER -->
    <div id="catPicker" class="cat-picker"></div>

    <!-- EDIT PANEL -->
    <div id="editPanel" class="edit-panel">
      <div class="edit-panel-header">
        <div class="edit-panel-title">แก้ไขสินค้า</div>
        <button onclick="window.closeEditPanel()" class="btn-modal-close">
          ✕
        </button>
      </div>
      <div class="edit-panel-body">
        <input type="hidden" id="epProductId" />
        <div class="form-group">
          <label class="form-label">ชื่อสินค้า</label>
          <input id="epName" class="form-control" />
        </div>
        <div class="form-group">
          <label class="form-label">ราคาทุน</label>
          <input id="epCost" type="number" class="form-control" />
        </div>
        <div class="form-group">
          <label class="form-label">ราคาขาย</label>
          <input id="epSale" type="number" class="form-control" />
        </div>
        <div class="form-group">
          <label class="form-label">ภาพสินค้า</label>
          <div class="ep-image-grid" id="epImages">
            <div class="ep-slot" data-index="0"></div>
            <div class="ep-slot" data-index="1"></div>
            <div class="ep-slot" data-index="2"></div>
            <div class="ep-slot" data-index="3"></div>
            <div class="ep-slot" data-index="4"></div>
          </div>
          <input type="file" id="epUpload" accept="image/*" hidden />
        </div>
      </div>
      <div class="edit-panel-footer">
        <button class="btn btn-outline" onclick="window.closeEditPanel()">
          ยกเลิก
        </button>
        <button class="btn btn-primary" onclick="window.saveEditPanel()">
          💾 บันทึก
        </button>
      </div>
    </div>

    <!-- PAGE -->
    <div class="page">
      <!-- STATS -->
      <div class="stats-row">
        <div class="stat-card">
          <div class="stat-icon">📦</div>
          <div>
            <div class="stat-value" id="cardTotal">0</div>
            <div class="stat-label">สินค้าทั้งหมด</div>
          </div>
        </div>
        <div class="stat-card">
          <div class="stat-icon">✅</div>
          <div>
            <div class="stat-value" id="cardActive">0</div>
            <div class="stat-label">เปิดใช้งาน</div>
          </div>
        </div>
        <div class="stat-card">
          <div class="stat-icon">⛔</div>
          <div>
            <div class="stat-value" id="cardInactive">0</div>
            <div class="stat-label">ปิดใช้งาน</div>
          </div>
        </div>
      </div>

      <!-- TOOLBAR -->
      <div class="toolbar">
        <div class="search-wrap">
          <span class="search-icon">🔍</span>
          <input
            class="search-input"
            id="searchInput"
            placeholder="ค้นหาชื่อหรือรหัสสินค้า..."
          />
        </div>
        <select class="filter-select" id="filterCategory">
          <option value="">⚪ ทุกหมวดหมู่</option>
        </select>
        <select class="filter-select" id="filterStatus">
          <option value="">⚪ ทุกสถานะ</option>
          <option value="true">✅ เปิดใช้งาน</option>
          <option value="false">⛔ ปิดใช้งาน</option>
        </select>
        <div class="toolbar-right">
          <button
            class="btn btn-danger-outline"
            id="btnDeleteSelected"
            style="display: none"
            onclick="window.deleteSelectedProducts()"
          >
            🗑 ลบที่เลือก
          </button>
          <button
            class="btn btn-primary"
            onclick="window.location.href = '../form/product-form.html'"
          >
            ＋ เพิ่มสินค้า
          </button>
        </div>
      </div>

      <!-- TABLE -->
      <div class="content-wrap">
        <div class="table-card" id="tableCard">
          <div class="table-hdr">
            <div class="table-title">📦 รายการสินค้า</div>
            <div class="table-count" id="tableCount">0 รายการ</div>
          </div>
          <div class="table-wrap">
            <table class="data-table table-products">
              <thead>
                <tr>
                  <th style="width: 40px; text-align: center">
                    <input
                      type="checkbox"
                      id="chkAll"
                      onclick="window.toggleAllCheckbox(this)"
                    />
                  </th>
                  <th class="col-center">ภาพ</th>
                  <th
                    class="col-center"
                    onclick="window.sortTable('product_name')"
                    style="cursor: pointer"
                  >
                    ชื่อสินค้า <span class="sort-icon">⇅</span>
                  </th>
                  <th class="col-center">หมวดหมู่</th>
                  <th
                    class="col-center"
                    onclick="window.sortTable('cost_price')"
                    style="cursor: pointer"
                  >
                    ราคาทุน <span class="sort-icon">⇅</span>
                  </th>
                  <th
                    class="col-center"
                    onclick="window.sortTable('sale_price')"
                    style="cursor: pointer"
                  >
                    ราคาขาย <span class="sort-icon">⇅</span>
                  </th>
                  <th class="col-center">สถานะ</th>
                  <th class="col-center">จัดการ</th>
                </tr>
              </thead>
              <tbody id="tableBody">
                <tr>
                  <td colspan="8">
                    <div class="empty-state">
                      <div class="empty-icon">📦</div>
                      <div class="empty-text">ยังไม่มีข้อมูล</div>
                    </div>
                  </td>
                </tr>
              </tbody>
            </table>
          </div>
        </div>
      </div>
    </div>

    <!-- MODALS -->
    <div id="deleteModalContainer"></div>

    <script type="module">
      import { loadTopbar } from "../../../../js/components/navigation/topbar/topbar.js";
      loadTopbar("📦 รายการสินค้า");
    </script>
    <script type="module" src="./products-list.js"></script>
    <script src="../../../../js/core/auth.js"></script>
    <script src="../../../../js/components/navigation/sidebar/sidebar.js"></script>
    <script src="../../../../js/components/modal/modalManager.js"></script>
    <script src="../../../../js/components/modal/deleteModal/deleteModal.js"></script>
    <script src="../../../../js/components/modal/enterModal.js"></script>
  </body>
</html>
